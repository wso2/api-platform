openapi: 3.1.1
info:
  title: Portal API
  description: |
    A **RESTful API** exposed by the WSO2 **API Platform - Platform API** exclusively for the
    platform's portals (Developer Portal, AI Workspace, Management Portal, etc.) to connect to
    the control plane.

    These endpoints are not intended for general client use — they back portal-specific flows
    such as local (file-based) credential login and permission discovery for the signed-in
    user.

    ## Authentication

    `/auth/login` is public (unauthenticated): it is used to *obtain* a token rather than to
    access a protected resource. Every other endpoint requires the resulting token as a Bearer
    JWT, but requires no scope — a portal must be able to ask what the current user may do
    before it knows what the current user may do.

  version: "0.9"
  contact:
    name: WSO2 API Platform Team
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://localhost:9243/api/portal/v0.9
    description: Development server (HTTPS)
  - url: https://api.platform.com/api/portal/v0.9
    description: Production server

paths:
  /auth/login:
    post:
      summary: Authenticate a portal user (file-based auth)
      description: |
        Validates a username and password against the locally-configured users (file-based auth
        mode) and, on success, issues a signed JWT for use against the Platform API.

        Credentials are submitted as `application/x-www-form-urlencoded`. This endpoint is
        unauthenticated.
      operationId: portalLogin
      tags:
        - Portal Authentication
      security: []
      requestBody:
        description: User credentials.
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication succeeded; a JWT is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: The request was malformed (e.g. username or password missing).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                status: error
                code: VALIDATION_FAILED
                message: username and password are required
        '401':
          description: |
            Authentication failed. The response is identical for an unknown username, a wrong
            password, and a malformed credential, so it cannot be used to enumerate users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                status: error
                code: UNAUTHORIZED
                message: Invalid or expired credentials.
        '500':
          description: The server failed to issue a token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                status: error
                code: INTERNAL_ERROR
                message: An unexpected error occurred.
                trackingId: 4f1c6f2e-8a4b-4c93-b1de-9f2f6f0c2a11

  /me:
    get:
      summary: Get the signed-in user's identity and effective permissions
      description: |
        Returns the caller's identity together with the roles their token carries and the
        scopes those roles grant.

        Portals that gate UI on permissions must read `scopes` from here rather than decoding
        the token's `scope` claim. When the Platform API runs in role validation mode
        (`auth.idp.validation_mode = "role"`) the token carries roles only and no scope claim,
        so a portal reading the claim would see an empty list and hide every action the user is
        in fact allowed to perform. The scopes returned here are resolved server-side from the
        configured role-to-scope mapping (`roles.yaml`) and are the same list the Platform API
        authorizes each request against — so a portal can neither hide a permitted action nor
        offer one the API would reject.

        Requires a valid Bearer JWT. No scope is required.
      operationId: portalGetCurrentUser
      tags:
        - Portal Users
      security:
        - BearerAuth: []
      responses:
        '200':
          description: The signed-in user's identity, roles, and effective scopes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          description: |
            Authentication failed. The response is identical for a missing, malformed, expired,
            and invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                status: error
                code: UNAUTHORIZED
                message: Invalid or expired credentials.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: The JWT issued by `/auth/login`, or by the configured IDP.

  schemas:
    CurrentUser:
      type: object
      required:
        - userId
        - roles
        - scopes
      properties:
        userId:
          type: string
          description: Identifier of the signed-in user, resolved from the token subject.
          example: 9f2f6f0c-2a11-4c93-b1de-4f1c6f2e8a4b
        username:
          type: string
          description: Username claim carried by the token, when present.
          example: admin
        email:
          type: string
          description: Email claim carried by the token, when present.
          example: admin@example.com
        organization:
          type: object
          description: The organization the caller's token is scoped to.
          required:
            - id
            - handle
          properties:
            id:
              type: string
              description: UUID of the organization.
            name:
              type: string
              description: Human-readable display name of the organization.
            handle:
              type: string
              description: URL-safe handle (identifier) of the organization.
        roles:
          type: array
          description: |
            The IDP role names carried by the token, exactly as the IDP wrote them. Empty when
            the deployment authorizes on scopes rather than roles.
          items:
            type: string
          example:
            - platform-admin
        scopes:
          type: array
          description: |
            The scopes the caller effectively holds — the token's scope claim in scope
            validation mode, or the scopes the caller's roles expand to in role mode. This is
            the list the Platform API authorizes requests against.
          items:
            type: string
          example:
            - ap:project:manage
            - ap:rest_api:manage

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: The username of a locally-configured user.
          example: admin
        password:
          type: string
          format: password
          description: The user's password.
          example: "admin"

    LoginResponse:
      type: object
      required:
        - token
        - expires_at
      properties:
        token:
          type: string
          description: A signed JWT to be used as a Bearer token against the Platform API.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbiJ9.signature
        expires_at:
          type: integer
          format: int64
          description: Token expiry as a Unix timestamp (seconds since epoch).
          example: 1735689600

    Error:
      title: Standard error response
      description: |
        The error shape shared with the main Platform API (see the `Error` schema in
        openapi.yaml). Portal errors are produced by the same central error mapper, so the
        two surfaces cannot drift.
      required:
        - status
        - code
        - message
      type: object
      properties:
        status:
          type: string
          enum: [error]
          description: Always the literal "error".
          example: error
        code:
          type: string
          pattern: '^[A-Z][A-Z0-9_]*$'
          description: "Stable, machine-readable error code from the error catalog. Clients should branch on this, not on the HTTP status."
          example: UNAUTHORIZED
        message:
          type: string
          description: Human-readable description of the error.
          example: Invalid or expired credentials.
        trackingId:
          type: string
          format: uuid
          description: >-
            Correlation ID for server-side failures. Present only on 5xx
            responses; quote it when reporting the error so operators can
            find the corresponding server log entry.
          example: 4f1c6f2e-8a4b-4c93-b1de-9f2f6f0c2a11

tags:
  - name: Portal Authentication
    description: |
      Authentication endpoints used by the platform's portals to obtain a token via
      file-based (local) credential login.
  - name: Portal Users
    description: |
      Identity and effective-permission lookups for the signed-in user, used by portals to
      decide what to show them.
