    post:
      summary: Generate an HMAC secret for a WebSub API
      description: |
        Generates (or stores an externally supplied) HMAC secret for the specified WebSub API.
        The plaintext secret value is returned **once** in the response and never stored unencrypted —
        save it immediately. Subsequent calls to this endpoint create additional named secrets;
        all active secrets are accepted during HMAC signature verification to support zero-downtime rotation.
      operationId: createWebSubAPISecret
      security:
        - OAuth2Security:
            - ap:websub_api:secret:create
            - ap:websub_api:secret:manage
            - ap:websub_api:manage
      tags:
        - WebSubAPIs
      parameters:
        - name: apiId
          in: path
          required: true
          description: Unique handle of the WebSub API
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebSubAPIHmacSecretRequest'
      responses:
        '201':
          description: HMAC secret created — plaintext returned once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebSubAPIHmacSecretCreationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          description: Service Unavailable — HMAC secret management not configured on this server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      summary: List HMAC secrets for a WebSub API
      description: Returns metadata for all HMAC secrets belonging to the WebSub API. Plaintext values are never returned.
      operationId: listWebSubAPISecrets
      security:
        - OAuth2Security:
            - ap:websub_api:secret:read
            - ap:websub_api:secret:manage
            - ap:websub_api:manage
      tags:
        - WebSubAPIs
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of HMAC secret metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebSubAPIHmacSecretListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /websub-apis/{apiId}/secrets/{secretName}:
    delete:
      summary: Delete an HMAC secret for a WebSub API
      description: Permanently removes the named HMAC secret. The secret will no longer be accepted for signature verification.
      operationId: deleteWebSubAPISecret
      security:
        - OAuth2Security:
            - ap:websub_api:secret:delete
            - ap:websub_api:secret:manage
            - ap:websub_api:manage
      tags:
        - WebSubAPIs
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: secretName
          in: path
          required: true
          description: Name (slug) of the HMAC secret
          schema:
            type: string
      responses:
        '204':
          description: HMAC secret deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /websub-apis/{apiId}/secrets/{secretName}/regenerate:
    post:
      summary: Regenerate an HMAC secret value
      description: |
        Replaces the value of an existing HMAC secret with a newly generated (or caller-supplied) value.
        The new plaintext is returned **once** in the response. All gateways where the API is deployed
        are notified to reload their secret stores.
      operationId: regenerateWebSubAPISecret
      security:
        - OAuth2Security:
            - ap:websub_api:secret:update
            - ap:websub_api:secret:manage
            - ap:websub_api:manage
      tags:
        - WebSubAPIs
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: secretName
          in: path
          required: true
          description: Name (slug) of the HMAC secret to regenerate
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebSubAPIHmacSecretRegenerateRequest'
      responses:
        '200':
          description: HMAC secret regenerated — new plaintext returned once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebSubAPIHmacSecretCreationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /subscription-plans:
    post:
      summary: Create subscription plan
      description: Creates an organization-scoped subscription plan.
      operationId: CreateSubscriptionPlan
      security:
        - OAuth2Security:
            - ap:subscription_plan:create
            - ap:subscription_plan:manage
      tags:
        - SubscriptionPlans
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionPlanRequest'
      responses:
        '201':
          description: Subscription plan created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: List subscription plans
      description: Returns subscription plans for the organization.
      operationId: ListSubscriptionPlans
      security:
        - OAuth2Security:
            - ap:subscription_plan:read
            - ap:subscription_plan:manage
      tags:
        - SubscriptionPlans
      responses:
        '200':
          description: List of subscription plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPlanListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /subscription-plans/{planId}:
    get:
      summary: Get subscription plan by ID
      operationId: GetSubscriptionPlan
      security:
        - OAuth2Security:
            - ap:subscription_plan:read
            - ap:subscription_plan:manage
      tags:
        - SubscriptionPlans
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Subscription plan details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      summary: Update subscription plan
      operationId: UpdateSubscriptionPlan
      security:
        - OAuth2Security:
            - ap:subscription_plan:update
            - ap:subscription_plan:manage
      tags:
        - SubscriptionPlans
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubscriptionPlanRequest'
      responses:
        '200':
          description: Updated subscription plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete subscription plan
      operationId: DeleteSubscriptionPlan
      security:
        - OAuth2Security:
            - ap:subscription_plan:delete
            - ap:subscription_plan:manage
      tags:
        - SubscriptionPlans
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Subscription plan deleted (no content)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /subscriptions:
    post:
      summary: Create subscription
      description: |
        Creates a subscription for the specified API.
        `subscriberId` identifies the unique subscriber for this API, allowing multiple subscribers to create subscriptions for the same API.
      operationId: CreateSubscription
      security:
        - OAuth2Security:
            - ap:subscription:create
            - ap:subscription:manage
      tags:
        - Subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionRequest'
      responses:
        '201':
          description: Subscription created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: List subscriptions
      description: |
        Returns subscriptions filtered by API and/or application.
        Optional query parameters apiId, subscriberId, applicationId and status filter the list.
        Supports pagination via limit and offset.
      operationId: ListSubscriptions
      security:
        - OAuth2Security:
            - ap:subscription:read
            - ap:subscription:manage
      tags:
        - Subscriptions
      parameters:
        - name: apiId
          in: query
          required: false
          description: Filter by API ID (UUID or handle)
          schema:
            type: string
        - name: subscriberId
          in: query
          required: false
          description: Filter by subscriber ID
          schema:
            type: string
            minLength: 1
        - name: applicationId
          in: query
          required: false
          description: Filter by application ID
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter by status (ACTIVE, INACTIVE, REVOKED)
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, REVOKED]
        - name: limit
          in: query
          description: Maximum number of subscriptions to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: Number of subscriptions to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of subscriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /subscriptions/{subscriptionId}:
    get:
      summary: Get subscription by ID
      description: |
        Returns a single subscription by ID (scoped to organization).
        Query parameter `subscriberId` is required and must match the subscription's subscriber for access control.
      operationId: GetSubscription
      security:
        - OAuth2Security:
            - ap:subscription:read
            - ap:subscription:manage
      tags:
        - Subscriptions
      parameters:
        - name: subscriptionId
          in: path
          required: true
          description: Subscription UUID
          schema:
            type: string
            format: uuid
        - name: subscriberId
          in: query
          required: true
          description: Subscriber ID; must match the subscription's subscriberId.
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      summary: Update subscription
      description: |
        Updates a subscription (e.g. status).
        Query parameter `subscriberId` is required and must match the subscription's subscriber for access control.
      operationId: UpdateSubscription
      security:
        - OAuth2Security:
            - ap:subscription:update
            - ap:subscription:manage
      tags:
        - Subscriptions
      parameters:
        - name: subscriptionId
          in: path
          required: true
          description: Subscription UUID
          schema:
            type: string
            format: uuid
        - name: subscriberId
          in: query
          required: true
          description: Subscriber ID; must match the subscription's subscriberId.
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubscriptionRequest'
      responses:
        '200':
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete subscription
      description: |
        Removes the subscription for the API.
        Query parameter `subscriberId` is required and must match the subscription's subscriber for access control.
      operationId: DeleteSubscription
      security:
        - OAuth2Security:
            - ap:subscription:delete
            - ap:subscription:manage
      tags:
        - Subscriptions
      parameters:
        - name: subscriptionId
          in: path
          required: true
          description: Subscription UUID
          schema:
            type: string
            format: uuid
        - name: subscriberId
          in: query
          required: true
          description: Subscriber ID; must match the subscription's subscriberId.
          schema:
            type: string
            minLength: 1
      responses:
        '204':
          description: Subscription deleted (no content)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /me/api-keys:
    get:
      summary: List API keys for the current user
      description: |
        Returns API keys created by the caller within the organization.
        Optionally filter by one or more artifact types using a comma-separated `type` query parameter.
        The plain key value is never returned.
      operationId: listUserAPIKeys
      security:
        - OAuth2Security:
            - ap:api_key:read
      tags:
        - API Keys
      parameters:
        - name: type
          in: query
          description: |
            Comma-separated list of artifact types to filter by.
            If omitted, all types are returned.
          required: false
          schema:
            type: array
            items:
              type: string
              enum: [RestApi, LlmProvider, LlmProxy]
          style: form
          explode: false
          example: LlmProxy,LlmProvider
      responses:
        '200':
          description: List of API keys retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAPIKeyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /secrets:
    post:
      summary: Create a secret
      description: |
        Create a new encrypted secret scoped to the organization. The plaintext value is never returned.
      operationId: createSecret
      security:
        - OAuth2Security:
            - ap:secret:create
            - ap:secret:manage
      tags:
        - Secrets
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SecretCreateRequest'
            example:
              handle: wso2-openai-key
              name: WSO2 OpenAI API Key
              description: API key for WSO2 OpenAI integration
              value: sk-xxx
              type: GENERIC
      responses:
        '201':
          description: Secret created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      summary: List secrets
      description: |
        Returns metadata for all secrets in the organization. The plaintext value is
        never included in list or get responses.
      operationId: listSecrets
      security:
        - OAuth2Security:
            - ap:secret:read
            - ap:secret:manage
      tags:
        - Secrets
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: updatedAfter
          in: query
          description: RFC3339 timestamp — return only secrets updated after this time. Used by GW controller for incremental polling.
          schema:
            type: string
            format: date-time
            example: "2026-01-01T00:00:00Z"
      responses:
        '200':
          description: List of secret metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /secrets/{handle}:
    get:
      summary: Get a secret by handle
      description: Returns metadata for a single secret. The plaintext value is never returned.
      operationId: getSecret
      security:
        - OAuth2Security:
            - ap:secret:read
            - ap:secret:manage
      tags:
        - Secrets
      parameters:
        - name: handle
          in: path
          required: true
          description: The secret handle
          schema:
            type: string
      responses:
        '200':
          description: Secret metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Rotate a secret value
      description: |
        Re-encrypts and stores a new value for an existing secret. The handle is immutable
        so all `{{ secret "handle" }}` placeholder references across resources remain valid
        without modification.
      operationId: rotateSecret
      security:
        - OAuth2Security:
            - ap:secret:update
            - ap:secret:manage
      tags:
        - Secrets
      parameters:
        - name: handle
          in: path
          required: true
          description: The secret handle
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SecretUpdateRequest'
            example:
              value: sk-new-rotated-value
              name: WSO2 OpenAI API Key (rotated)
      responses:
        '200':
          description: Secret rotated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete a secret
      description: |
        Soft-deletes a secret by marking it as DEPRECATED. Returns 409 if the secret is
        still referenced by any LLM provider or API configuration.
      operationId: deleteSecret
      security:
        - OAuth2Security:
            - ap:secret:delete
            - ap:secret:manage
      tags:
        - Secrets
      parameters:
        - name: handle
          in: path
          required: true
          description: The secret handle
          schema:
            type: string
      responses:
        '204':
          description: Secret deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Secret is referenced by active resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretDeleteConflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

