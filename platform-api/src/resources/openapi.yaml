    post:
      summary: Create and deploy a new deployment for MCP proxy
      description: |
        Creates an immutable deployment artifact for an MCP proxy and deploys it to a specified gateway.
        Each deployment targets a single gateway. The id parameter is the MCP proxy handle (identifier),
        not the UUID. The operation returns a transitional DEPLOYING status. Final success or failure will be reported asynchronously via the deployment's status and statusReason once the gateway acknowledges. 
        Access is validated against the organization in the JWT token.
      operationId: DeployMCPProxy
      security:
        - OAuth2Security:
            - ap:mcp_proxy:deployment:create
            - ap:mcp_proxy:deployment:manage
            - ap:mcp_proxy:manage
      tags:
        - MCP Proxy Deployments
        - Deployments
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the MCP proxy
          schema:
            type: string
      requestBody:
        description: Deployment request with gateway ID, base reference, and metadata
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployRequest'
      responses:
        '201':
          description: MCP proxy deployed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponse'
        '400':
          description: Bad Request. Validation errors (missing name, base, gatewayId, or MCP proxy has no backend services)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not Found. MCP proxy, gateway, or base deployment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

