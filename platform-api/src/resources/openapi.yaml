        Access is validated against the organization in the JWT token.
      operationId: GetMCPProxyDeployments
      security:
        - OAuth2Security:
            - ap:mcp_proxy:deployment:read
            - ap:mcp_proxy:deployment:manage
            - ap:mcp_proxy:manage
      tags:
        - MCP Proxy Deployments
        - Deployments
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the MCP proxy
          schema:
            type: string
        - $ref: '#/components/parameters/gatewayId-Q'
        - $ref: '#/components/parameters/deploymentStatus-Q'
      responses:
