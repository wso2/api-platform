openapi: 3.1.1
info:
  title: WSO2 API Platform - Platform API
  description: |
    This document specifies a **RESTful API** for WSO2 **API Platform** - **Platform API**.

    ## Authentication

    Most API endpoints require a Bearer JWT token in the `Authorization` header. Tokens are
    validated against a configured Identity Provider (IDP) using JWKS-based signature
    verification.

    **Required claim**: `organization` — UUID of the caller's organization. All operations are
    automatically scoped to this organization.

    **Supported signing algorithms**: RS256, RS384, RS512 (RSA) and ES256, ES384, ES512 (ECDSA).
    Works with any standards-compliant IDP (Keycloak, Azure AD, Okta, Auth0, WSO2 IS, etc.).

    ## Scope-Based Access Control

    Authorization is enforced via OAuth2 scopes carried in the JWT. Both read (GET) and write
    operations require specific scopes declared in the `security` field of each operation.

  version: 0.9.0
  contact:
    name: WSO2 API Platform Team
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://localhost:9243/api/v0.9
    description: Development server (HTTPS)
  - url: https://api.platform.com/api/v0.9
    description: Production server

security:
  - OAuth2Security: []

paths:
  /organizations:
    post:
      summary: Register a new organization
      description: |
        Registers a new organization with a unique UUID and handle.
        This endpoint is used during the organization onboarding process.
        A valid Bearer JWT token with the `ap:organization:create` or `ap:organization:manage` scope is required.
      operationId: RegisterOrganization
      tags:
        - Organizations
      security:
        - OAuth2Security:
            - ap:organization:create
            - ap:organization:manage
      requestBody:
        description: Organization that needs to be added
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Organization'
      responses:
        '201':
          description: Organization registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
            $ref: '#/components/responses/Conflict'
        '500':
            $ref: '#/components/responses/InternalServerError'

    get:
      summary: Get current user's organization
      description: |
        Retrieves the organization details for the organization specified in the JWT token's 
        `organization` claim.
      operationId: GetOrganization
      security:
        - OAuth2Security:
            - ap:organization:read
            - ap:organization:manage
      tags:
        - Organizations
      responses:
        '200':
          description: Organization retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /organizations/{organizationId}:
    get:
      summary: Get organization by UUID
      description: |
        Returns the organization with the specified UUID.
      operationId: GetOrganizationByUUID
      security:
        - OAuth2Security:
            - ap:organization:read
            - ap:organization:manage
      tags:
        - Organizations
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '200':
          description: Organization retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    head:
      summary: Check if organization exists
      description: |
        Checks if an organization with the specified UUID.
        Returns only headers without a response body.
      operationId: HeadOrganizationByUuid
      security:
        - OAuth2Security:
            - ap:organization:read
            - ap:organization:manage
      tags:
        - Organizations
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '200':
          description: Organization exists
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Organization not found
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects:
    post:
      summary: Create a new project
      description: |
        Creates a new project within the organization specified in the JWT token.
        Organization ID is automatically extracted from the token and does not need to be provided.
      operationId: CreateProject
      security:
        - OAuth2Security:
            - ap:project:create
            - ap:project:manage
      tags:
        - Projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
            example:
              name: "My Project"
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      summary: Get all projects for current user's organization
      description: |
        Retrieves all projects belonging to the organization specified in the JWT token.
        Organization ID is automatically extracted from the token.
      operationId: ListProjects
      security:
        - OAuth2Security:
            - ap:project:read
            - ap:project:manage
      tags:
        - Projects
      responses:
        '200':
          description: Projects retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/{projectId}:
    get:
      summary: Get project by UUID
      description: |
        Retrieves a specific project by its UUID. Access is validated against the organization 
        in the JWT token to ensure users can only access projects in their organization.
      operationId: GetProject
      security:
        - OAuth2Security:
            - ap:project:read
            - ap:project:manage
      tags:
        - Projects
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Project retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update project
      description: |
        Updates an existing project's name. Access is validated against the organization 
        in the JWT token.
      operationId: UpdateProject
      security:
        - OAuth2Security:
            - ap:project:update
            - ap:project:manage
      tags:
        - Projects
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete project
      description: |
        Deletes a specific project by its UUID. Access is validated against the organization 
        in the JWT token.
      operationId: DeleteProject
      security:
        - OAuth2Security:
            - ap:project:delete
            - ap:project:manage
      tags:
        - Projects
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '204':
          description: Project deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest-apis:
    get:
      summary: Get all REST APIs for an organization
      description: |
        Retrieves all REST APIs belonging to an organization.
        Requires the projectId query parameter to filter APIs by project.
        Provide name and version together to check uniqueness (empty result = name/version combination is available).
        Access is validated against the organization in the JWT token.
      operationId: ListRESTAPIs
      security:
        - OAuth2Security:
            - ap:rest_api:read
            - ap:rest_api:manage
      tags:
        - REST APIs
      parameters:
        - $ref: '#/components/parameters/projectId-Q'
        - $ref: '#/components/parameters/api-name-Q'
        - $ref: '#/components/parameters/api-version-Q'
      responses:
        '200':
          description: REST APIs retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RESTAPIListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create a new REST API
      description: |
        Creates a new REST API in the platform. The API is associated with a project, which must 
        belong to the organization specified in the JWT token.
      operationId: CreateRESTAPI
      security:
        - OAuth2Security:
            - ap:rest_api:create
            - ap:rest_api:manage
      tags:
        - REST APIs
      requestBody:
        description: API object that needs to be added
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRESTAPIRequest'
        required: true
      responses:
        '201':
          description: API created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RESTAPI'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest-apis/{apiId}:
    get:
      summary: Get REST API by UUID
      description: |
        Retrieves a specific API by its UUID. Access is validated against the organization 
        in the JWT token.
      operationId: GetRESTAPI
      security:
        - OAuth2Security:
            - ap:rest_api:read
            - ap:rest_api:manage
      tags:
        - REST APIs
      parameters:
        - $ref: '#/components/parameters/apiId'
      responses:
        '200':
          description: API retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RESTAPI'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update REST API
      description: |
        Updates an existing API's details. Access is validated against the organization 
        in the JWT token.
      operationId: UpdateRESTAPI
      security:
        - OAuth2Security:
            - ap:rest_api:update
            - ap:rest_api:manage
      tags:
        - REST APIs
      parameters:
        - $ref: '#/components/parameters/apiId'
      requestBody:
        description: API object that needs to be updated
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRESTAPIRequest'
      responses:
        '200':
          description: API updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RESTAPI'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete REST API
      description: |
        Deletes a specific API by its UUID. Access is validated against the organization 
        in the JWT token.
      operationId: DeleteRESTAPI
      security:
        - OAuth2Security:
            - ap:rest_api:delete
            - ap:rest_api:manage
      tags:
        - REST APIs
      parameters:
        - $ref: '#/components/parameters/apiId'
      responses:
        '204':
          description: API deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'


  /rest-apis/{apiId}/gateways:
    get:
      summary: Get gateways for REST API
      description: |
        Retrieves all gateways associated with the specified API, including deployment details.
        Returns gateway information along with association timestamps and deployment status.
        Access is validated against the organization in the JWT token.
      operationId: GetRESTAPIGateways
      security:
        - OAuth2Security:
            - ap:rest_api:gateway:read
            - ap:rest_api:gateway:manage
            - ap:rest_api:manage
            - ap:gateway:read
            - ap:gateway:manage
      tags:
        - REST APIs
        - Gateways
      parameters:
        - $ref: '#/components/parameters/apiId'
      responses:
        '200':
          description: List of gateways associated with the API, including deployment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RESTAPIGatewayListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Add gateways for REST API
      description: |
        Associates gateways to the specified API. If gateways are already associated,
        updates the association timestamp. Returns all gateways associated with the API
        including deployment details. Access is validated against the organization 
        in the JWT token.
      operationId: AddGatewaysToAPI
      security:
        - OAuth2Security:
            - ap:rest_api:gateway:create
            - ap:rest_api:gateway:manage
            - ap:rest_api:manage
      tags:
        - REST APIs
        - Gateways
      parameters:
        - $ref: '#/components/parameters/apiId'
      requestBody:
        description: List of gateways to associate with the API
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AddGatewayToRESTAPIRequest'
      responses:
        '200':
          description: List of all gateways associated with the API, including deployment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RESTAPIGatewayListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest-apis/{apiId}/api-keys:
    post:
      summary: Create API key
      description: |
        Creates a new API key for the specified API. The API key will be hashed before
        storage and broadcasted to all gateways where the API is deployed. This endpoint
        allows external platforms to inject API keys to hybrid gateways.
      operationId: CreateAPIKey
      security:
        - OAuth2Security:
            - ap:rest_api:api_key:create
            - ap:rest_api:api_key:manage
            - ap:rest_api:manage
      tags:
        - REST APIs
        - API Keys
      parameters:
        - $ref: '#/components/parameters/apiId'
      requestBody:
        description: API key creation request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyRequest'
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAPIKeyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: Service Unavailable - No gateway connections available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest-apis/{apiId}/api-keys/{keyName}:
    put:
      summary: Update API key
      description: |
        Updates an existing API key for the specified API. The new API key value will
        be hashed before storage and broadcasted to all gateways where the API is deployed.
        This endpoint allows external platforms to rotate API keys on hybrid gateways.
      operationId: UpdateAPIKey
      security:
        - OAuth2Security:
            - ap:rest_api:api_key:update
            - ap:rest_api:api_key:manage
            - ap:rest_api:manage
      tags:
        - REST APIs
        - API Keys
      parameters:
        - $ref: '#/components/parameters/apiId'
        - name: keyName
          in: path
          required: true
          description: The unique name/identifier of the API key
          schema:
            type: string
          example: "my-api-key"
      requestBody:
        description: API key update request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAPIKeyRequest'
      responses:
        '200':
          description: API key updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateAPIKeyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: Service Unavailable - No gateway connections available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Revoke API key
      description: |
        Revokes an API key for the specified API. The revocation will be broadcasted
        to all gateways where the API is deployed. This endpoint allows external platforms
        to revoke API keys on hybrid gateways.
      operationId: RevokeAPIKey
      security:
        - OAuth2Security:
            - ap:rest_api:api_key:delete
            - ap:rest_api:api_key:manage
            - ap:rest_api:manage
      tags:
        - REST APIs
        - API Keys
      parameters:
        - $ref: '#/components/parameters/apiId'
        - name: keyName
          in: path
          required: true
          description: The unique name/identifier of the API key to revoke
          schema:
            type: string
          example: "my-api-key"
      responses:
        '204':
          description: API key revoked successfully (no content)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: Service Unavailable - No gateway connections available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest-apis/{apiId}/deployments:
    post:
      summary: Create and deploy a new deployment
      description: |
        Creates an immutable deployment artifact for an API and deploys it to a specified gateway.
        Each deployment targets a single gateway. The apiId parameter is the API handle (identifier),
        not the UUID. The operation returns a transitional DEPLOYING status. Final success or failure will be reported asynchronously via the deployment's status and statusReason once the gateway acknowledges. 
        Access is validated against the organization in the JWT token.
      operationId: DeployAPI
      security:
        - OAuth2Security:
            - ap:rest_api:deployment:create
            - ap:rest_api:deployment:manage
            - ap:rest_api:manage
      tags:
        - REST API Deployments
        - Deployments
      parameters:
        - $ref: '#/components/parameters/apiId'
      requestBody:
        description: Deployment request with gateway ID, base reference, and metadata
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployRequest'
      responses:
        '201':
          description: API deployed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponse'
        '400':
          description: Bad Request. Validation errors (missing name, base, gatewayId, or API has no backend services)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not Found. API, gateway, or base deployment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      summary: Get deployments for a REST API
      description: |
        Retrieves all deployment artifacts for a specific API. The apiId parameter is the API handle (identifier),
        not the UUID. Supports filtering by gateway UUID and deployment status. 
        Access is validated against the organization in the JWT token.
      operationId: GetDeployments
      security:
        - OAuth2Security:
            - ap:rest_api:deployment:read
            - ap:rest_api:deployment:manage
            - ap:rest_api:manage
      tags:
        - REST API Deployments
        - Deployments
      parameters:
        - $ref: '#/components/parameters/apiId'
        - $ref: '#/components/parameters/gatewayId-Q'
        - $ref: '#/components/parameters/deploymentStatus-Q'
      responses:
        '200':
          description: Deployments retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest-apis/{apiId}/deployments/{deploymentId}:
    get:
      summary: Get deployment by ID
      description: |
        Retrieves metadata for a specific deployment artifact including status, gateway association,
        and timestamps. Access is validated against the organization in the JWT token.
      operationId: GetDeployment
      security:
        - OAuth2Security:
            - ap:rest_api:deployment:read
            - ap:rest_api:deployment:manage
            - ap:rest_api:manage
      tags:
        - REST API Deployments
        - Deployments
      parameters:
        - $ref: '#/components/parameters/apiId'
        - $ref: '#/components/parameters/deploymentId'
      responses:
        '200':
          description: Deployment metadata retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete deployment
      description: |
        Deletes a deployment artifact. Deletion is only allowed when the deployment is in UNDEPLOYED status.
        Access is validated against the organization in the JWT token.
      operationId: DeleteDeployment
      security:
        - OAuth2Security:
            - ap:rest_api:deployment:delete
            - ap:rest_api:deployment:manage
            - ap:rest_api:manage
      tags:
        - REST API Deployments
        - Deployments
      parameters:
        - $ref: '#/components/parameters/apiId'
        - $ref: '#/components/parameters/deploymentId'
      responses:
        '204':
          description: Deployment deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest-apis/{apiId}/deployments/{deploymentId}/undeploy:
    post:
      summary: Undeploy deployment from gateway
      description: |
        Undeploys an active deployment, stopping the API from being served on the specified gateway.
        The deployment artifact remains in the system and can be restored later.
        Returns the updated deployment object with initial status UNDEPLOYING. Final status (UNDEPLOYED or FAILED) will be reported asynchronously via the deployment's status and statusReason once the gateway acknowledges.

        The gatewayId query parameter is validated against deployment's bound gateway to prevent unintended operations.
        Access is validated against the organization in the JWT token.
      operationId: UndeployDeployment
      security:
        - OAuth2Security:
            - ap:rest_api:deployment:undeploy
            - ap:rest_api:deployment:manage
            - ap:rest_api:manage
      tags:
        - REST API Deployments
        - Deployments
      parameters:
        - $ref: '#/components/parameters/apiId'
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
          description: UUID of the deployment to undeploy
        - name: gatewayId
          in: query
          required: true
          schema:
            type: string
          description: UUID of the gateway (validated against deployment's bound gateway)
      responses:
        '200':
          description: Undeploy initiated successfully. Returns the deployment with initial status UNDEPLOYING. Poll status for final result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest-apis/{apiId}/deployments/{deploymentId}/restore:
    post:
      summary: Restore a previous deployment
      description: |
        Initiates restoring a previous deployment (ARCHIVED or UNDEPLOYED) on the specified gateway.
        Returns the deployment with initial status DEPLOYING. Final success or failure will be reported asynchronously via the deployment's status and statusReason once the gateway acknowledges.
        The target deployment must not already be in DEPLOYED status.

        The gatewayId query parameter is validated against the deployment's bound gateway to prevent unintended operations.
        Access is validated against the organization in the JWT token.
      operationId: RestoreDeployment
      security:
        - OAuth2Security:
            - ap:rest_api:deployment:restore
            - ap:rest_api:deployment:manage
            - ap:rest_api:manage
      tags:
        - REST API Deployments
        - Deployments
      parameters:
        - $ref: '#/components/parameters/apiId'
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
          description: UUID of the deployment to restore (must be ARCHIVED or UNDEPLOYED)
        - name: gatewayId
          in: query
          required: true
          schema:
            type: string
          description: UUID of the gateway (validated against deployment's bound gateway)
      responses:
        '200':
          description: Restore initiated successfully. Returns the deployment with initial status DEPLOYING. Poll status for final result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict. Cannot restore currently deployed deployment or deployment is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

