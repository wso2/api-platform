      parameters:
        - name: customPolicyUuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the custom policy record
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: Version of the custom policy (e.g. "1.0.0")
          example: "1.0.0"
