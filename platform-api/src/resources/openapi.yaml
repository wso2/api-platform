          example: success
        message:
          type: string
          description: Additional details about the operation result
          example: "API key created and broadcasted to gateways successfully"
        keyId:
          type: string
          description: The internal ID generated for tracking
          example: "production-key-01"

    UpdateAPIKeyRequest:
