  /llm-providers/{id}/deployments/{deploymentId}/undeploy:
    post:
      summary: Undeploy LLM provider deployment from gateway
      description: |
        Undeploys an active LLM provider deployment, stopping it from being served on the specified gateway.
        The deployment artifact remains in the system and can be restored later.
        Returns the updated deployment object with initial status UNDEPLOYING. Final status (UNDEPLOYED or FAILED) will be reported asynchronously via the deployment's status and statusReason once the gateway acknowledges.

        The gatewayId query parameter is validated against the deployment's bound gateway to prevent unintended operations.
        Access is validated against the organization in the JWT token.
      operationId: undeployLLMProviderDeployment
      security:
        - OAuth2Security:
            - ap:llm_provider:deployment:undeploy
            - ap:llm_provider:deployment:manage
            - ap:llm_provider:manage
      tags:
        - LLM Provider Deployments
        - Deployments
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the LLM provider
          schema:
            type: string
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
          description: UUID of the deployment to undeploy
        - name: gatewayId
          in: query
          required: true
          schema:
            type: string
          description: UUID of the gateway (validated against deployment's bound gateway)
      responses:
        '200':
          description: Undeploy initiated successfully. Returns the deployment with initial status UNDEPLOYING. Poll status for final result.
