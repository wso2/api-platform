          type: array
          description: >
            Optional list of gateways this LLM proxy can be deployed to, along with
            per-gateway configuration overrides. This field is optional; omitting it
            does not change existing behaviour.
          items:
            $ref: '#/components/schemas/AssociatedGateway'
          example:
            - name: prod-eu
            - name: prod-us
        createdAt:
          type: string
          format: date-time
