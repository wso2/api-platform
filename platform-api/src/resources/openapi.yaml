  schemas:
    APIKeyItem:
      type: object
      required:
        - name
        - maskedApiKey
        - status
        - createdAt
        - createdBy
        - updatedAt
        - allowedTargets
      properties:
        name:
          type: string
          description: URL-safe identifier of the API key
        maskedApiKey:
          type: string
          description: Masked representation of the API key for display purposes
        status:
          type: string
          description: Current status of the key
          enum: [active, revoked, expired]
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the key was created
        createdBy:
          type: string
          description: User who created the key
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the key was last updated
        expiresAt:
          type: string
          format: date-time
          description: Optional expiration timestamp
        issuer:
          type: string
          description: Optional identifier of the developer portal that provisioned this key
          example: "api-platform-devportal"
        allowedTargets:
          type: string
          description: "Comma-separated list of allowed gateways; 'ALL' means unrestricted"

    UserAPIKeyItem:
      allOf:
        - $ref: '#/components/schemas/APIKeyItem'
        - type: object
          required:
            - artifactId
            - artifactType
          properties:
            artifactId:
              type: string
              description: Handle (ID) of the artifact this key belongs to
              example: wso2-openai-provider
            artifactType:
              type: string
              enum: [RestApi, LlmProvider, LlmProxy]
              description: Type of the artifact this key belongs to

    UserAPIKeyListResponse:
      type: object
      required:
        - items
        - count
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserAPIKeyItem'
          description: List of API keys
        count:
          type: integer
          description: Total number of API keys returned

    LLMProviderAPIKeyListResponse:
      type: object
      required:
        - items
        - count
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/APIKeyItem'
          description: List of API keys
        count:
          type: integer
          description: Total number of API keys returned

    LLMProxyAPIKeyListResponse:
      type: object
      required:
        - items
        - count
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/APIKeyItem'
          description: List of API keys
        count:
          type: integer
          description: Total number of API keys returned

    Organization:
      type: object
      required:
        - id
        - displayName
        - region
      properties:
        uuid:
          type: string
          format: uuid
          description: Unique UUID for the organization
          readOnly: true
          example: "123e4567-e89b-12d3-a456-426614174000"
        id:
          type: string
          description: Handle (URL-friendly slug) for the organization
          pattern: '^[a-z0-9-]+$'
          minLength: 1
          readOnly: true
          example: "acme"
        displayName:
          type: string
          description: Display name of the organization
          example: "Acme Corporation"
        region:
          type: string
          description: Geographic region where the organization operates
          example: "us"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the organization was created
          readOnly: true
          example: "2023-10-12T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the organization was last updated
          readOnly: true
          example: "2023-10-12T10:30:00Z"

    CreateProjectRequest:
      description: |
        Request body for creating a project. Organization ID is automatically extracted
        from the JWT token and does not need to be provided.
      type: object
      required:
        - displayName
      properties:
        id:
          type: string
          description: Handle (URL-friendly slug) for the project. Auto-generated from displayName if not provided.
          minLength: 1
          maxLength: 40
          example: "default-project"
        displayName:
          type: string
          description: Human-readable name for the project
          minLength: 1
          example: "Default Project"
        description:
          type: string
          description: Description of the project
          example: "This is the default project for development"

    UpdateProjectRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: Handle of the project — must match the existing handle (immutable)
          example: "default-project"
        displayName:
          type: string
          description: Updated human-readable name for the project
          minLength: 1
          example: "Updated Project Name"
        description:
          type: string
          description: Description of the project
          example: "Updated project description"

    Project:
      type: object
      required:
        - id
        - displayName
        - organizationId
      properties:
        id:
          type: string
          description: Handle (URL-friendly slug) for the project
          readOnly: true
          example: "default-project"
        displayName:
          type: string
          description: Human-readable name for the project
          minLength: 1
          example: "Default Project"
        uuid:
          type: string
          format: uuid
          description: Unique UUID for the project
          readOnly: true
          example: "yr434567-de34-76uj6-w376-234324532"
        description:
          type: string
          description: Description of the project
          example: "This is the default project for development"
        organizationId:
          type: string
          format: uuid
          description: UUID of the organization this project belongs to
          readOnly: true
          example: "123e4567-e89b-12d3-a456-426614174000"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the project was created
          readOnly: true
          example: "2023-10-12T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the project was last updated
          readOnly: true
          example: "2023-10-12T10:30:00Z"

    ApplicationType:
      type: string
      description: Type of the application
      enum:
        - genai
      example: genai

    CreateApplicationRequest:
      description: Request body for creating an application.
      type: object
      required:
        - displayName
        - projectId
        - type
      properties:
        id:
          type: string
          description: Unique handle/identifier for the application. Can be provided during creation or auto-generated.
          example: my-app-handle
        displayName:
          type: string
          minLength: 1
          description: Display name of the application
          example: "GenAI Demo App"
        projectId:
          type: string
          format: uuid
          description: UUID of the project this application belongs to.
          example: "7d7a51fd-daa1-4095-b7ff-98a1aa05cc0f"
        type:
          $ref: '#/components/schemas/ApplicationType'
        description:
          type: string
          description: Description of the application
          example: "Sample GenAI application"
        createdBy:
          type: string
          description: Creator identifier
          example: "admin"

    UpdateApplicationRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: Application handle/identifier. Immutable; must match the application being updated.
          example: "my-app-handle"
        displayName:
          type: string
          minLength: 1
          description: Display name of the application
          example: "Updated GenAI App"
        description:
          type: string
          description: Description of the application
          example: "Updated application description"
        type:
          $ref: '#/components/schemas/ApplicationType'

    Application:
      type: object
      required:
        - id
        - displayName
        - projectId
        - type
      properties:
        id:
          type: string
          description: Application handle/identifier
          example: "my-app-handle"
        displayName:
          type: string
          description: Display name of the application
          example: "GenAI Demo App"
        projectId:
          type: string
          format: uuid
          description: UUID of the project this application belongs to
          example: "7d7a51fd-daa1-4095-b7ff-98a1aa05cc0f"
        type:
          $ref: '#/components/schemas/ApplicationType'
        description:
          type: string
          description: Description of the application
          example: "Sample GenAI application"
        createdBy:
          type: string
          description: Creator identifier
          example: "admin"
        createdAt:
          type: string
          format: date-time
          readOnly: true
          example: "2025-11-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          example: "2025-11-15T11:30:00Z"

    ApplicationListResponse:
      type: object
      required:
        - count
        - list
        - pagination
      properties:
        count:
          type: integer
          description: Number of items in current response
          example: 2
        list:
          type: array
          items:
            $ref: '#/components/schemas/Application'
        pagination:
          $ref: '#/components/schemas/Pagination'

    AddApplicationAPIKeysRequest:
      type: object
      required:
        - apiKeys
      properties:
        apiKeys:
          type: array
          description: List of API key selectors to add to the application mappings
          items:
            $ref: '#/components/schemas/APIKeyMappingSelector'

    AddApplicationAssociationsRequest:
      type: object
      required:
        - associations
      properties:
        associations:
          type: array
          description: List of association selectors to add to the application
          items:
            $ref: '#/components/schemas/ApplicationAssociationSelector'

    ApplicationAssociationSelector:
      type: object
      required:
        - id
        - kind
      properties:
        id:
          type: string
          description: ID or handle of the association target
          example: provider-handle
        kind:
          type: string
          description: Type of the association target
          enum:
            - LlmProvider
            - LlmProxy
          example: LlmProvider

    ApplicationAssociation:
      type: object
      required:
        - id
        - uuid
        - displayName
        - version
        - kind
      properties:
        id:
          type: string
          description: Handle/ID of the associated target
          example: provider-handle
        uuid:
          type: string
          format: uuid
          description: UUID of the associated target
          example: "7d7a51fd-daa1-4095-b7ff-98a1aa05cc0f"
        displayName:
          type: string
          description: Display name of the associated target
          example: "OpenAI Provider"
        version:
          type: string
          description: Version of the associated target
          example: "v1.0"
        kind:
          type: string
          description: Type of associated target
          example: LlmProvider
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the association was created
          example: "2025-11-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the association was updated
          example: "2025-11-15T11:30:00Z"

    ApplicationAssociationListResponse:
      type: object
      required:
        - count
        - list
        - pagination
      properties:
        count:
          type: integer
          description: Number of items in current response
          example: 2
        list:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationAssociation'
        pagination:
          $ref: '#/components/schemas/Pagination'

    APIKeyMappingSelector:
      type: object
      required:
        - keyId
        - associatedEntity
      properties:
        keyId:
          type: string
          description: API key name
          example: client-key-1
        associatedEntity:
          $ref: '#/components/schemas/APIKeyMappingAssociatedEntity'

    APIKeyMappingAssociatedEntity:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: ID of the entity that owns the API key
          example: pizza-api

    AssociatedEntity:
      type: object
      required:
        - id
        - kind
      properties:
        id:
          type: string
          description: ID of the associated entity
          example: pizza-api
        kind:
          type: string
          description: Type of the associated entity
          example: RestApi

    MappedAPIKey:
      type: object
      required:
        - keyId
        - associatedEntity
      properties:
        keyId:
          type: string
          description: Name of the API key
          example: "client-key-1"
        associatedEntity:
          $ref: '#/components/schemas/AssociatedEntity'
        status:
          type: string
          description: Status of the API key
          example: "ACTIVE"
        userId:
          type: string
          description: User id of the key creator
          example: "user-123"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the API key was created
          example: "2025-11-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the API key was updated
          example: "2025-11-15T11:30:00Z"
        expiresAt:
          type: string
          format: date-time
          description: Expiration timestamp of the API key
          example: "2026-11-15T10:30:00Z"

    MappedAPIKeyListResponse:
      type: object
      required:
        - count
        - list
        - pagination
      properties:
        count:
          type: integer
          description: Number of items in current response
          example: 2
        list:
          type: array
          items:
            $ref: '#/components/schemas/MappedAPIKey'
        pagination:
          $ref: '#/components/schemas/Pagination'

    RESTAPI:
      title: API object
      required:
        - displayName
        - context
        - version
        - projectId
        - upstream
      type: object
      properties:
        id:
          type: string
          description: Unique handle/identifier for the API. Can be provided during creation or auto-generated.
          example: my-rest-api-handle
        displayName:
          minLength: 1
          description: Display name of the API
          pattern: '(^[^~!@#;:%^*()+={}|\\<>"'',&$\[\]\/]*$)'
          type: string
          example: PizzaShackAPI
        description:
          maxLength: 32766
          type: string
          example: This is a simple API for Pizza Shack online pizza delivery store
        context:
          maxLength: 232
          minLength: 1
          type: string
          example: pizza
        version:
          maxLength: 30
          minLength: 1
          type: string
          pattern: '^[^~!@#;:%^*()+={}|\\<>"'',&/$\[\]\s+\/]+$'
          example: 1.0.0
        createdBy:
          maxLength: 200
          type: string
          description: |
            If the createdBy value is not given user invoking the api will be used as the createdBy.
          example: admin
        projectId:
          type: string
          format: uuid
          description: ID of the project this API belongs to
          example: yr434567-de34-76uj6-w376-234324532
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the api was created
          example: "2023-10-12T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the api was last updated
          example: "2023-10-12T10:30:00Z"
        readOnly:
          type: boolean
          readOnly: true
          description: True if the artifact originated from a data-plane gateway (origin gateway_api) and is read-only in the control plane; false for control-plane created artifacts.
          example: false
        upstream:
          $ref: "#/components/schemas/Upstream"
        lifeCycleStatus:
          type: string
          description: Current lifecycle status of the API
          enum:
            - STAGED
            - CREATED
            - PUBLISHED
            - DEPRECATED
            - RETIRED
            - BLOCKED
          example: "CREATED"
        kind:
          type: string
          description: Kind of the API based on its communication protocol or architectural style
          example: RestApi
          default: RestApi
        transport:
          type: array
          description: |
            Supported transports for the API (http and/or https)
          example:
            - http
            - https
          items:
            type: string
        policies:
          type: array
          description: List of policies to be applied on the API
          items:
            $ref: '#/components/schemas/Policy'
        operations:
          type: array
          description: List of operations exposed by this API
          items:
            $ref: '#/components/schemas/Operation'
        channels:
          type: array
          description: List of channels exposed by this API
          items:
            $ref: '#/components/schemas/Channel'
        subscriptionPlans:
          type: array
          description: |
            List of subscription plan names enabled for this API (e.g. Gold, Silver).
            When set, only these plans can be used when subscribing to the API.
          items:
            type: string
          example: [Gold, Silver]

    SecurityConfig:
      title: Security Configuration
      description: Defines security mechanisms (API key, OAuth2) applicable to the API
      type: object
      properties:
        enabled:
          type: boolean
          description: Whether security is enabled
          example: true
        apiKey:
          $ref: '#/components/schemas/APIKeySecurity'

    APIKeySecurity:
      title: API Key Security
      description: Configuration for API key based authentication
      type: object
      properties:
        enabled:
          type: boolean
          description: Whether API key authentication is enabled
          example: true
        key:
          type: string
          description: Name of the header or query parameter to be used for the API key
          example: "X-API-Key"
        in:
          type: string
          description: Location of the API key (header or query)
          enum:
            - header
            - query
          example: "header"
        
    Operation:
      title: API Operation
      type: object
      description: Defines a single operation (resource) within the API
      required:
        - request
      properties:
        name:
          type: string
          description: Name of the operation
          example: "getPetById"
        description:
          type: string
          description: Description of the operation
          example: "Find pet by ID"
        request:
          $ref: "#/components/schemas/OperationRequest"

    Channel:
      title: Async API Channel
      type: object
      description: Defines a single channel within the Async API
      required:
        - request
      properties:
        name:
          type: string
          description: Name of the channel
          example: "issues"
        description:
          type: string
          description: Description of the channel
          example: "Channel for order events"
        request:
          $ref: "#/components/schemas/ChannelRequest"

    OperationRequest:
      title: Operation Request
      type: object
      description: Request details for an API operation
      required:
        - method
        - path
      properties:
        method:
          type: string
          description: HTTP method for the operation
          enum:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - HEAD
            - OPTIONS
          example: "GET"
        path:
          type: string
          description: Resource path for the operation
          example: "/pet/{petId}"
        policies:
          type: array
          description: List of policies to be applied on the operation
          items:
            $ref: "#/components/schemas/Policy"

    ChannelRequest:
      title: Channel Request
      type: object
      description: Request details for a channel within the Async API
      required:
        - method
        - name
      properties:
        method:
          type: string
          description: Async method for the channel
          enum:
            - SUB
          example: "SUB"
        name:
          type: string
          description: Channel name for the event
          example: "issues"
        policies:
          type: array
          description: List of policies to be applied on the operation
          items:
            $ref: "#/components/schemas/Policy"

    Policy:
      title: Policy Configuration
      type: object
      description: Defines a request or response policy applied at runtime
      required:
        - name
        - version
      properties:
        executionCondition:
          type: string
          description: Conditional expression that determines when this policy executes
          example: "request.header.x-custom == 'enabled'"
        name:
          type: string
          description: Name of the policy to apply
          example: "SET_HEADER"
        params:
          type: object
          description: Key-value pairs of parameters for the policy
          additionalProperties: true
          example:
            key: "MyHeader"
            value: "MyValue"
        version:
          type: string
          description: Semantic version of the policy
          example: "1.0.0"

    AddGatewayToRESTAPIRequest:
      title: AddGatewayToAPIRequest object with basic gateway details
      type: object
      required:
        - gatewayId
      properties:
        gatewayId:
          type: string
          format: uuid
          example: "987e6543-e21b-45d3-a789-426614174999"

    RESTAPIGatewayListResponse:
      type: object
      required:
        - count
        - list
        - pagination
      properties:
        count:
          type: integer
          description: Number of gateways in current response
          example: 3
        list:
          type: array
          description: List of gateways associated with the API, including deployment details when deployed
          items:
            $ref: '#/components/schemas/RESTAPIGatewayResponse'
        pagination:
          $ref: '#/components/schemas/Pagination'

    RESTAPIGatewayResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/GatewayResponse'
        - type: object
          required:
            - associatedAt
            - isDeployed
          properties:
            associatedAt:
              type: string
              format: date-time
              description: Timestamp when the gateway was associated with the API
              example: "2025-10-15T10:30:00Z"
            isDeployed:
              type: boolean
              description: Whether the API is currently deployed to this gateway
              example: true
            deployment:
              $ref: '#/components/schemas/RESTAPIDeploymentDetails'
              description: Deployment details (only present when isDeployed is true)

    RESTAPIDeploymentDetails:
      type: object
      description: Details about API deployment to a specific gateway
      required:
        - status
        - deployedAt
      properties:
        status:
          description: Current deployment status
          type: string
          example: CREATED
          default: CREATED
          enum:
            - CREATED
            - APPROVED
            - REJECTED
        deployedAt:
          type: string
          format: date-time
          description: Timestamp when the API was deployed
          example: "2025-10-15T11:00:00Z"

    CreateGatewayRequest:
      description: |
        Request body for creating a gateway. Organization ID is automatically extracted
        from the JWT token and does not need to be provided.
      type: object
      required:
        - id
        - displayName
        - vhost
        - functionalityType
      properties:
        id:
          type: string
          pattern: '^[a-z0-9-]+$'
          minLength: 3
          maxLength: 64
          description: Handle (URL-friendly slug) for the gateway. Immutable after creation.
          example: "prod-gateway-01"
        displayName:
          type: string
          minLength: 1
          maxLength: 128
          description: Human-readable gateway name
          example: "Production Gateway 01"
        description:
          type: string
          description: Description of the gateway
          example: "Production gateway for handling API traffic"
        vhost:
          type: string
          description: Virtual host (domain name) for the gateway
          maxLength: 255
          minLength: 1
          # hostname regex as per RFC 1123 (http://tools.ietf.org/html/rfc1123) and appended *
          pattern: '^(([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9]|[A-Za-z0-9][A-Za-z0-9\-]*[A-Za-z0-9])$'
          example: mg.wso2.com
        isCritical:
          type: boolean
          description: Whether the gateway is critical for production
          default: false
          example: true
        functionalityType:
          type: string
          enum: [regular, ai, event]
          description: Type of gateway functionality
          default: regular
          example: "regular"
        properties:
          type: object
          additionalProperties: true
          description: Custom key-value properties for the gateway
          example: {"region": "us-west", "tier": "premium"}
        version:
          type: string
          pattern: '^([0-9]{1,6}\.[0-9]{1,6}|[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2})$'
          description: Gateway version in `major.minor` format (e.g. `1.0`) or CalVer `YYYY.MM.DD` format (e.g. `2026.05.13`). Defaults to `1.0` if not provided.
          default: "1.0"
          example: "1.0"
    CustomPolicyResponse:
      type: object
      description: A custom policy stored in the platform's custom policy registry.
      required:
        - uuid
        - organizationUuid
        - name
        - version
        - policyDefinition
      properties:
        uuid:
          type: string
          format: uuid
          description: Unique identifier of the custom policy record
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        organizationUuid:
          type: string
          format: uuid
          description: Organization this policy belongs to
        name:
          type: string
          description: Policy name
          example: "rate-limit-custom"
        version:
          type: string
          description: Policy version
          example: "1.0.0"
        description:
          type: string
          description: Human-readable description of the policy
          example: "Custom rate limiting policy"
        policyDefinition:
          type: object
          description: |
            The full policy schema as declared in the policy's policy-definition.yaml.
            Contains `parameters` and `systemParameters` JSON Schema documents.
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GatewayPolicyDefinition:
      type: object
      description: A policy installed on a gateway controller.
      required:
        - name
        - version
        - isCustomPolicy
      properties:
        name:
          type: string
          description: Unique policy name
          example: "set-wso2-headers"
        version:
          type: string
          description: Semantic version of the policy
          example: "v0.8.0"
        description:
          type: string
          description: Human-readable description of the policy
          example: "Sets WSO2-specific headers in the request and response."
        isCustomPolicy:
          type: boolean
          description: Whether this is a user-installed custom policy.
          example: true
        policyDefinition:
          type: object
          description: |
            The full policy schema as declared in the policy's policy-definition.yaml.
            Contains `parameters` and `systemParameters` JSON Schema documents.
            Only present for custom policies.
          additionalProperties: true

    ManifestSyncResponse:
      type: object
      properties:
        policies:
          type: array
          description: |
            All policies installed on the gateway. Each entry includes name, version, and isCustomPolicy.
            Custom policies additionally include policyDefinition with their parameters and systemParameters schemas.
          items:
            $ref: '#/components/schemas/GatewayPolicyDefinition'

    GatewayResponse:
      type: object
      properties:
