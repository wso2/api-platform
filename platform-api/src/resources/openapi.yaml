    CreateSubscriptionPlanRequest:
      type: object
      required:
        - planName
      properties:
        planName:
          type: string
          description: Name of the subscription plan
          example: "Gold"
        billingPlan:
          type: string
          description: Billing plan type (e.g. Free, Commercial)
          example: "Free"
        stopOnQuotaReach:
          type: boolean
          description: Whether to block requests when quota is exhausted
          default: true
        throttleLimitCount:
          type: integer
          minimum: 1
          description: Number of requests allowed in the throttle window (must be paired with throttleLimitUnit)
          example: 10000
        throttleLimitUnit:
          type: string
          description: Throttle window unit (must be paired with throttleLimitCount)
          enum: [Min, Hour, Day, Month]
          example: "Hour"
        expiryTime:
          type: string
          format: date-time
          description: Optional plan expiry time (RFC3339)
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
          default: ACTIVE
      if:
        anyOf:
          - required: [throttleLimitCount]
          - required: [throttleLimitUnit]
      then:
        required: [throttleLimitCount, throttleLimitUnit]

    UpdateSubscriptionPlanRequest:
      type: object
      properties:
        planName:
          type: string
        billingPlan:
          type: string
        stopOnQuotaReach:
          type: boolean
        throttleLimitCount:
          type: integer
          minimum: 1
          description: Number of requests allowed in the throttle window (must be paired with throttleLimitUnit)
        throttleLimitUnit:
          type: string
          description: Throttle window unit (must be paired with throttleLimitCount)
          enum: [Min, Hour, Day, Month]
        expiryTime:
          type: string
          format: date-time
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
      if:
        anyOf:
          - required: [throttleLimitCount]
          - required: [throttleLimitUnit]
      then:
        required: [throttleLimitCount, throttleLimitUnit]

