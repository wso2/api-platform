          format: uri
          description: Sandbox endpoint URL
          example: "https://sandbox.api.example.com/v1"

    PublishRESTAPIResponse:
      type: object
      required:
        - message
        - apiId
        - devPortalRefId
        - publishedAt
      properties:
        message:
          type: string
          description: Human-readable success message
          example: "API published successfully to DevPortal"
        apiId:
          type: string
          format: uuid
          description: Platform-api API identifier
          example: "1f01c9b2-440b-4cfe-bf48-f8f168062df4"
        devPortalRefId:
          type: string
          description: DevPortal reference ID for the published API
          example: "1f01c9b2-440b-4cfe-bf48-f8f168062df4"
        publishedAt:
          type: string
          format: date-time
          description: Timestamp of publication
          example: "2025-10-29T21:25:09.418859918+05:30"

    UnpublishRESTAPIResponse:
      type: object
      required:
        - message
        - apiId
        - unpublishedAt
      properties:
        message:
          type: string
          description: Human-readable success message
          example: "API unpublished successfully from DevPortal"
        apiId:
          type: string
          format: uuid
          description: Platform-api API identifier
          example: "1f01c9b2-440b-4cfe-bf48-f8f168062df4"
        unpublishedAt:
          type: string
          format: date-time
          description: Timestamp when API was unpublished
          example: "2025-10-29T21:08:59.834784232+05:30"

    DeployRequest:
      type: object
      required:
        - name
        - base
        - gatewayId
      properties:
        name:
          type: string
          description: Name/label for this deployment (e.g., "v1.0-prod", "hotfix-2024-01-15")
          example: "v1.0-production"
        base:
          type: string
          description: The source for the API definition. Can be "current" (latest working copy) or a deploymentId (existing deployment)
          example: "current"
        gatewayId:
          type: string
          format: uuid
          description: The target gateway UUID for this deployment
        metadata:
          type: object
          additionalProperties: true
          description: Optional metadata for the deployment. Supported keys include `endpointUrl`, `vhostMain`, and `vhostSandbox`.

    DeploymentResponse:
      type: object
      required:
        - deploymentId
        - name
        - gatewayId
        - status
        - createdAt
      properties:
        deploymentId:
          type: string
          format: uuid
          description: Unique identifier for the deployment
        name:
          type: string
          description: Name/label for this deployment
          example: "v1.0-production"
        gatewayId:
          type: string
          format: uuid
          description: UUID of the gateway
        status:
          type: string
          enum:
            - DEPLOYED
            - UNDEPLOYED
            - DEPLOYING
            - UNDEPLOYING
            - FAILED
            - ARCHIVED
          description: |
            Current deployment lifecycle state:
            - DEPLOYED: Currently active on the gateway
            - UNDEPLOYED: Suspended but can be rolled back
            - DEPLOYING: Deployment in progress, waiting for gateway acknowledgement
            - UNDEPLOYING: Undeployment in progress, waiting for gateway acknowledgement
            - FAILED: Deployment or undeployment failed (see statusReason for error code)
            - ARCHIVED: Historical deployment, can be rolled back
        baseDeploymentId:
          type: string
          format: uuid
          nullable: true
          description: UUID of the base deployment this was created from
        metadata:
          type: object
          additionalProperties: true
          description: Metadata associated with the deployment
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the deployment artifact was created
        statusReason:
          type: string
          nullable: true
          description: Error code explaining the failure reason. Null unless status is FAILED (e.g. DEPLOYMENT_TIMEOUT, GATEWAY_PROCESSING_ERROR)
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the deployment status last changed (null for ARCHIVED deployments)

    DeploymentListResponse:
      type: object
      required:
        - count
        - list
      properties:
        count:
          type: integer
          description: Total number of deployments
        list:
          type: array
          items:
            $ref: '#/components/schemas/DeploymentResponse'
          description: List of deployments

    Upstream:
      type: object
      description: Upstream backend configuration with main and sandbox endpoints
      required:
        - main
      properties:
        main:
          $ref: '#/components/schemas/UpstreamDefinition'
        sandbox:
          $ref: '#/components/schemas/UpstreamDefinition'

    UpstreamDefinition:
      type: object
      oneOf:
        - required: [ "url" ]
        - required: [ "ref" ]
      description: Upstream endpoint configuration (single target or reference)
      properties:
        url:
          type: string
          format: uri
          description: Direct backend URL to route traffic to
          example: http://prod-backend:5000/api/v2
        ref:
          type: string
          description: Reference to a predefined upstreamDefinition
        auth:
          $ref: '#/components/schemas/UpstreamAuth'

    UpstreamAuth:
      type: object
      description: Authentication configuration for upstream endpoints
      properties:
        type:
          type: string
          description: Authentication type
          enum: [ basic, bearer, api-key ]
          example: api-key
        header:
          type: string
          description: Header name for api-key authentication (e.g., 'Authorization' for bearer/basic, custom header for api-key)
          example: X-API-Key
        value:
          type: string
          writeOnly: true
          format: password
          description: Authentication value (API key, Bearer token, or Base64 encoded credentials for basic auth)
          example: my-api-key-value

    ExtractionIdentifier:
      type: object
      required:
        - location
        - identifier
      properties:
        location:
          type: string
          description: Where to find the token information
          enum:
            - payload
            - header
            - queryParam
            - pathParam
          example: payload
        identifier:
          type: string
          description: JSONPath expression or header name to identify the token value
          example: $.usage.inputTokens

    LLMProviderTemplateAuth:
      type: object
      properties:
        type:
          type: string
          description: Authentication type used by the LLM provider template
          example: bearer
        header:
          type: string
          description: Header name to send the auth value
          example: Authorization
        valuePrefix:
          type: string
          description: Prefix to attach before the auth value
          example: "Bearer "

    LLMProviderTemplateMetadata:
      type: object
      properties:
        endpointUrl:
          type: string
          format: uri
          description: Default endpoint URL for the template
          example: https://api.openai.com
        auth:
          $ref: '#/components/schemas/LLMProviderTemplateAuth'
        logoUrl:
          type: string
          format: uri
          description: URL of the provider logo
          example: https://cdn.example.com/logos/openai.svg
        openapiSpecUrl:
          type: string
          format: uri
          description: URL to the OpenAPI specification for the provider
          example: https://api.openai.com/openapi.json

    LLMProviderTemplateResourceMapping:
      type: object
      required:
        - resource
      properties:
        resource:
          type: string
          minLength: 1
          description: Resource path pattern this mapping applies to (for example /responses or /chat/*)
          example: /responses
        promptTokens:
          $ref: '#/components/schemas/ExtractionIdentifier'
        completionTokens:
          $ref: '#/components/schemas/ExtractionIdentifier'
        totalTokens:
          $ref: '#/components/schemas/ExtractionIdentifier'
        remainingTokens:
          $ref: '#/components/schemas/ExtractionIdentifier'
        requestModel:
          $ref: '#/components/schemas/ExtractionIdentifier'
        responseModel:
          $ref: '#/components/schemas/ExtractionIdentifier'

    LLMProviderTemplateResourceMappings:
      type: object
      properties:
        resources:
          type: array
          items:
            $ref: '#/components/schemas/LLMProviderTemplateResourceMapping'

    LLMProviderTemplate:
      type: object
      required:
        - id
        - displayName
        - version
      properties:
        id:
          type: string
          description: Unique handle for the template
          maxLength: 40
          example: openai
        groupId:
          type: string
          description: |
            Stable identifier shared by every version of a template family
            (defaults to the first version's handle). Read-only.
          readOnly: true
          maxLength: 40
          example: openai
        displayName:
          type: string
          description: Human-readable LLM Template name
          minLength: 1
          maxLength: 255
          example: OpenAI
        managedBy:
          type: string
          description: |
            Identifies who manages the template. Built-in templates use 'wso2';
            custom templates default to 'customer' and may be set to any value.
            Optional on create/update — the server defaults it to 'customer' when
            omitted, so a request/YAML without a managedBy is accepted.
          default: customer
          maxLength: 255
          example: wso2
        description:
          type: string
          description: Description of the LLM provider template
          maxLength: 1023
          example: Default OpenAI template
        createdBy:
          type: string
          description: Username of the creator
          readOnly: true
          maxLength: 200
          example: jane.doe
        updatedBy:
          type: string
          description: Username of the last user to update the template
          readOnly: true
          maxLength: 200
          example: jane.doe
        readOnly:
          type: boolean
          readOnly: true
          description: True if the artifact originated from a data-plane gateway (origin gateway_api) and is read-only in the control plane; false for control-plane created artifacts.
          example: false
        version:
          type: string
          description: |
            Content version, e.g. v1.0. Required. A new template starts at v1.0;
            editing updates that version in place. Supply a new unique version
            only when creating a new version via
            POST /llm-provider-templates/{id}/versions.
          pattern: '^[vV]\d+\.\d+$'
          maxLength: 30
          example: v1.0
        isLatest:
          type: boolean
          description: Whether this is the latest version of the template.
          readOnly: true
          example: true
        enabled:
          type: boolean
          description: |
            Whether this version is offered when creating providers. Disabled
            versions stay in the catalog but are hidden from the provider picker.
            Response-only: create/update default new versions to enabled; toggle
            via PATCH /llm-provider-templates/{id}/versions/{version}.
          readOnly: true
          example: true
        openapi:
          type: string
          description: |
            OpenAPI specification content (JSON or YAML) for the provider, when
            uploaded/pasted. Use metadata.openapiSpecUrl instead to reference the
            spec by URL.
          example: |
            openapi: 3.0.3
            info:
              title: Provider API
              version: v1.0
            paths: {}
        metadata:
          $ref: '#/components/schemas/LLMProviderTemplateMetadata'
        promptTokens:
          $ref: '#/components/schemas/ExtractionIdentifier'
        completionTokens:
          $ref: '#/components/schemas/ExtractionIdentifier'
        totalTokens:
          $ref: '#/components/schemas/ExtractionIdentifier'
        remainingTokens:
          $ref: '#/components/schemas/ExtractionIdentifier'
        requestModel:
          $ref: '#/components/schemas/ExtractionIdentifier'
        responseModel:
          $ref: '#/components/schemas/ExtractionIdentifier'
        resourceMappings:
          $ref: '#/components/schemas/LLMProviderTemplateResourceMappings'
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the resource was created
          readOnly: true
          example: "2023-10-12T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the resource was last updated
          readOnly: true
          example: "2023-10-12T10:30:00Z"

    CreateLLMProviderTemplateVersionRequest:
      type: object
      required:
        - displayName
        - version
      properties:
        displayName:
          type: string
          description: Human-readable LLM Template name
          minLength: 1
          maxLength: 255
          example: OpenAI
        version:
          type: string
          description: New version identifier, e.g. v2.0. Must be unique for this template.
          pattern: '^[vV]\d+\.\d+$'
          maxLength: 30
          example: v2.0
        managedBy:
          type: string
          description: |
            Identifies who manages the template. Custom templates default to 'customer'.
          default: customer
          maxLength: 255
          example: customer
        description:
          type: string
          description: Description of the LLM provider template
          maxLength: 1023
          example: Default OpenAI template
        openapi:
          type: string
          description: |
            OpenAPI specification content (JSON or YAML) for the provider, when
            uploaded/pasted. Use metadata.openapiSpecUrl instead to reference the
            spec by URL.
        metadata:
          $ref: '#/components/schemas/LLMProviderTemplateMetadata'
        promptTokens:
          $ref: '#/components/schemas/ExtractionIdentifier'
        completionTokens:
          $ref: '#/components/schemas/ExtractionIdentifier'
        totalTokens:
          $ref: '#/components/schemas/ExtractionIdentifier'
        remainingTokens:
          $ref: '#/components/schemas/ExtractionIdentifier'
        requestModel:
          $ref: '#/components/schemas/ExtractionIdentifier'
        responseModel:
          $ref: '#/components/schemas/ExtractionIdentifier'
        resourceMappings:
          $ref: '#/components/schemas/LLMProviderTemplateResourceMappings'

    LLMProviderTemplateListItem:
      type: object
      properties:
        id:
          type: string
          example: openai
        groupId:
          type: string
          description: |
            Stable identifier shared by every version of a template family
            (defaults to the first version's handle). Read-only.
          readOnly: true
          maxLength: 40
          example: openai
        displayName:
          type: string
          example: OpenAI
        managedBy:
          type: string
          description: Who manages the template ('wso2' for built-in, otherwise custom-defined).
          example: wso2
        description:
          type: string
          example: Default OpenAI template
        createdBy:
          type: string
          example: jane.doe
        version:
          type: string
          description: Content version, matching the v<major>.<minor> pattern (e.g. v1.0, v2.0).
          example: v1.0
        isLatest:
          type: boolean
          description: Whether this is the latest version of the template.
          example: true
        enabled:
          type: boolean
          description: Whether this version is offered when creating providers.
          example: true
        logoUrl:
          type: string
          format: uri
          description: URL of the provider logo
          example: https://cdn.example.com/logos/openai.svg
        createdAt:
          type: string
          format: date-time
          example: 2025-11-25T10:30:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2025-11-25T10:30:00Z
        readOnly:
          type: boolean
          description: True when the artifact originated from a data-plane gateway (origin gateway_api) and is read-only in the control plane.
          example: false

    LLMProviderTemplateListResponse:
      type: object
      required:
        - count
        - list
        - pagination
      properties:
        count:
          type: integer
          example: 5
        list:
          type: array
          items:
            $ref: '#/components/schemas/LLMProviderTemplateListItem'
        pagination:
          $ref: '#/components/schemas/Pagination'

    LLMAccessControl:
      type: object
      required:
        - mode
      properties:
        mode:
          type: string
          description: Access control mode
          example: deny_all
          enum:
            - allow_all
            - deny_all
        exceptions:
          type: array
          description: Path exceptions to the access control mode
          items:
            $ref: '#/components/schemas/RouteException'

    RouteException:
      type: object
      required:
        - path
        - methods
      properties:
        path:
          type: string
          description: Path pattern
          example: /chat/completions
        methods:
          type: array
          description: HTTP methods
          items:
            type: string
            enum: [ GET, POST, PUT, DELETE, PATCH, OPTIONS, HEAD, "*" ]

    LLMPolicy:
      type: object
      required:
        - name
        - version
        - paths
      properties:
        name:
          type: string
          example: budgetControl
        version:
          type: string
          example: v1.0.0
        paths:
          type: array
          items:
            $ref: '#/components/schemas/LLMPolicyPath'

    LLMPolicyPath:
      type: object
      required:
        - path
        - methods
        - params
      properties:
        path:
          type: string
          example: /chat/completions
        methods:
          type: array
          items:
            type: string
            enum: [ GET, POST, PUT, DELETE, PATCH, OPTIONS, HEAD, "*" ]
        params:
          type: object
          description: JSON Schema describing the parameters accepted by this policy. This itself is a JSON Schema document.
          additionalProperties: true

    OperationPolicy:
      type: object
      required:
        - name
        - version
        - paths
      properties:
        name:
          type: string
          example: token-based-ratelimit
        version:
          type: string
          example: v1
        executionCondition:
          type: string
          description: Optional per-request CEL expression controlling whether the policy runs
        paths:
          type: array
          items:
            $ref: '#/components/schemas/OperationPolicyPath'

    OperationPolicyPath:
      type: object
      required:
        - path
        - methods
        - params
      properties:
        path:
          type: string
          example: /chat/completions
        methods:
          type: array
          items:
            type: string
            enum: [ GET, POST, PUT, DELETE, PATCH, OPTIONS, HEAD, "*" ]
            description: "HTTP method: GET, POST, PUT, DELETE, PATCH, OPTIONS, HEAD, or * for all"
        params:
          type: object
          description: Policy parameters
          additionalProperties: true

    LLMRateLimitingConfig:
      type: object
      description: Rate limiting configuration for an LLM provider at provider and consumer levels.
      properties:
        providerLevel:
          $ref: '#/components/schemas/RateLimitingScopeConfig'
        consumerLevel:
          $ref: '#/components/schemas/RateLimitingScopeConfig'
      example:
        providerLevel:
          global:
            request:
              enabled: true
              count: 1500
              reset:
                duration: 2
                unit: week
            token:
              enabled: true
              count: 1000000
              reset:
                duration: 1
                unit: month
        consumerLevel:
          resourceWise:
            default:
              request:
                enabled: true
                count: 50
                reset:
                  duration: 2
                  unit: week
              cost:
                enabled: true
                amount: 100
                reset:
                  duration: 1
                  unit: month
            resources:
              - resource: /models
                limit:
                  request:
                    enabled: true
                    count: 200
                    reset:
                      duration: 1
                      unit: week
                  token:
                    enabled: true
                    count: 100000
                    reset:
                      duration: 1
                      unit: month
              - resource: /chat/completions
                limit:
                  request:
                    enabled: true
                    count: 25
                    reset:
                      duration: 1
                      unit: week
                  cost:
                    enabled: true
                    amount: 10
                    reset:
                      duration: 1
                      unit: month

    RateLimitingScopeConfig:
      type: object
      description: Rate limiting configuration for a scope (provider or consumer). Either global or resource-wise limits can be defined.
      oneOf:
        - required: [ global ]
        - required: [ resourceWise ]
      properties:
        global:
          $ref: '#/components/schemas/RateLimitingLimitConfig'
        resourceWise:
          $ref: '#/components/schemas/ResourceWiseRateLimitingConfig'

    ResourceWiseRateLimitingConfig:
      type: object
      description: Resource-specific limits with a required default limit.
      required:
        - default
        - resources
      properties:
        default:
          $ref: '#/components/schemas/RateLimitingLimitConfig'
        resources:
          type: array
          description: Explicit resource limits that override the default limit.
          items:
            $ref: '#/components/schemas/RateLimitingResourceLimit'

    RateLimitingResourceLimit:
      type: object
      required:
        - resource
        - limit
      properties:
        resource:
          type: string
          description: Explicit resource path to apply the limit to.
          example: /chat/completions
        limit:
          $ref: '#/components/schemas/RateLimitingLimitConfig'

    RateLimitResetWindow:
      type: object
      required: [ duration, unit ]
      properties:
        duration:
          type: integer
          description: Reset duration for the limit window.
          example: 2
          minimum: 1
        unit:
          type: string
          description: Reset time unit for the limit window.
          enum: [ minute, hour, day, week, month ]
          example: week

    RequestRateLimitDimension:
      type: object
      properties:
        enabled:
          type: boolean
          description: Enable request-count based limiting.
        count:
          type: integer
          description: Maximum number of requests in the reset window.
          example: 1500
          minimum: 1
        reset:
          $ref: '#/components/schemas/RateLimitResetWindow'

    TokenRateLimitDimension:
      type: object
      properties:
        enabled:
          type: boolean
          description: Enable token-count based limiting.
        count:
          type: integer
          description: Maximum number of tokens in the reset window.
          example: 1000000
          minimum: 1
        reset:
          $ref: '#/components/schemas/RateLimitResetWindow'

    CostRateLimitDimension:
      type: object
      properties:
        enabled:
          type: boolean
          description: Enable cost-based limiting.
        amount:
          type: number
          format: float
          description: Maximum cost in the reset window.
          example: 1000
          minimum: 0
        reset:
          $ref: '#/components/schemas/RateLimitResetWindow'

    RateLimitingLimitConfig:
      type: object
      description: >-
        Limit definition with independent request/token/cost dimensions.
        If all dimensions are disabled (or absent), rate limiting is off for that scope.
      properties:
        request:
          $ref: '#/components/schemas/RequestRateLimitDimension'
        token:
          $ref: '#/components/schemas/TokenRateLimitDimension'
        cost:
          $ref: '#/components/schemas/CostRateLimitDimension'

    LLMProvider:
      type: object
      required:
        - id
        - displayName
        - version
        - template
        - upstream
        - accessControl
      properties:
        id:
          type: string
          description: Unique handle for the provider
          example: wso2-openai-provider
        displayName:
          type: string
          description: Human-readable LLM Provider name
          minLength: 1
          maxLength: 100
          pattern: '^[a-zA-Z0-9\-_\. ]+$'
          example: WSO2 OpenAI Provider
        description:
          type: string
          description: Description of the LLM provider
          maxLength: 1023
          example: Primary OpenAI provider
        createdBy:
          type: string
          description: Username of the creator
          readOnly: true
          example: jane.doe
        readOnly:
          type: boolean
          readOnly: true
          description: True if the artifact originated from a data-plane gateway (origin gateway_api) and is read-only in the control plane; false for control-plane created artifacts.
          example: false
        version:
          type: string
          description: Semantic version of the LLM Provider
          pattern: '^v\d+\.\d+$'
          example: v1.0
        context:
          type: string
          description: Base path for all REST API routes (must start with /, no trailing slash)
          pattern: '^\/([a-zA-Z0-9_\-.\/]*[^\/])?$'
          default: /
          minLength: 1
          maxLength: 20
          example: /openai
        vhost:
          type: string
          description: >
            Virtual host name used for routing. Supports standard domain names,
            subdomains, or wildcard domains. Must follow RFC-compliant hostname
            rules. Wildcards are only allowed in the left-most label (e.g., *.example.com).
          pattern: '^(\*\.|[a-zA-Z0-9](?:[a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}$'
          minLength: 1
          maxLength: 253
          example: "api.openai"
        template:
          type: string
          description: Template name to use for this LLM Provider
          example: openai
        openapi:
          type: string
          description: OpenAPI specification (JSON or YAML) for the provider endpoint
          example: |
            openapi: 3.0.3
            info:
              title: Provider API
              version: v1.0
            paths: {}
        modelProviders:
          type: array
          description: >
            List of model providers and their models supported by this provider. For non-aggregator
            templates, only a single model provider is allowed (aggregator templates: awsbedrock,
            azureaifoundry).
          items:
            $ref: '#/components/schemas/LLMModelProvider'
        upstream:
          $ref: "#/components/schemas/Upstream"
        accessControl:
          $ref: '#/components/schemas/LLMAccessControl'
        rateLimiting:
          $ref: '#/components/schemas/LLMRateLimitingConfig'
        globalPolicies:
          type: array
          description: Global (api-level) policies applied across ALL operations as one shared scope, evaluated before operation-level policies.
          items:
            $ref: "#/components/schemas/Policy"
        operationPolicies:
          type: array
          description: Operation-level policies scoped to specific paths/methods, evaluated after global policies.
          items:
            $ref: "#/components/schemas/OperationPolicy"
        policies:
          deprecated: true
          type: array
          description: DEPRECATED - use operationPolicies. Still honoured (treated identically to operationPolicies).
          items:
            $ref: "#/components/schemas/LLMPolicy"
        security:
          $ref: '#/components/schemas/SecurityConfig'
        associatedGateways:
          type: array
          description: >
            Optional list of gateways this LLM provider can be deployed to, along with
            per-gateway configuration overrides. This field is optional; omitting it does
            not change existing behaviour.
          items:
            $ref: '#/components/schemas/AssociatedGateway'
          example:
            - name: prod-eu
              configurations:
                host: prod-eu.platform-gw.local
            - name: prod-us
              configurations:
                host: prod-us.platform-gw.local
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the resource was created
          readOnly: true
