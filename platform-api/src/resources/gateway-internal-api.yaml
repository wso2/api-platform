      summary: Get all API keys for REST API artifacts deployed on the gateway
      description: |
        Retrieves all API keys for every REST API artifact currently deployed on the
        authenticated gateway. When the optional `issuer` query parameter is provided
        only keys whose issuer field matches are returned.
      operationId: getRestAPIAPIKeys
      tags:
        - Gateway Internal APIs
      parameters:
        - name: issuer
          in: query
          required: false
          description: Filter keys by issuer. When omitted all keys are returned.
          schema:
            type: string
            example: "api-platform-devportal"
      responses:
        '200':
          description: Successfully retrieved API keys
