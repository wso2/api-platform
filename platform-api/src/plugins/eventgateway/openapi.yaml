openapi: "3.0.3"
info:
  title: Event Gateway Plugin API
  version: "0.9"
  description: >
    WebSub and WebBroker API management endpoints provided by the
    eventgateway compile-time plugin.
paths:
  /api/v0.9/websub-apis:
    post:
      security:
        - OAuth2Security:
            - ap:websub_api:create
            - ap:websub_api:manage
      responses:
        '201':
          description: WebSub API created successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      security:
        - OAuth2Security:
            - ap:websub_api:read
            - ap:websub_api:manage
      responses:
        '200':
          description: WebSub APIs retrieved successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v0.9/websub-apis/{apiId}:
    get:
      security:
        - OAuth2Security:
            - ap:websub_api:read
            - ap:websub_api:manage
      responses:
        '200':
          description: WebSub API retrieved successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      security:
        - OAuth2Security:
            - ap:websub_api:update
            - ap:websub_api:manage
      responses:
        '200':
          description: WebSub API updated successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      security:
        - OAuth2Security:
            - ap:websub_api:delete
            - ap:websub_api:manage
      responses:
        '204':
          description: WebSub API deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v0.9/websub-apis/{apiId}/publications:
    post:
      security:
        - OAuth2Security:
            - ap:websub_api:publication:create
            - ap:websub_api:manage
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'

  /api/v0.9/websub-apis/{apiId}/publications/{devportalId}:
