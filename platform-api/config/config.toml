#
# Platform API configuration — local development
#
# This file is read by the Platform API (Go binary):
#   go run ./cmd/main.go -config config/config.toml
#
# Auth mode is "jwt" (locally-signed HMAC tokens, no local users). To use
# username/password login instead, set [auth] mode = "file" and add
# [auth.file.organization] / [[auth.file.users]] blocks — see
# config-template.toml for the full reference.
# --------------------------------------------------------------------

# ---------------------------------------------------------------------------
# All Platform API settings live under [platform_api] / [platform_api.*].
# ---------------------------------------------------------------------------
[platform_api]

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_level = '{{ env "APIP_CP_LOG_LEVEL" "INFO" }}'   # DEBUG | INFO | WARN | ERROR

# ---------------------------------------------------------------------------
# Encryption
# ---------------------------------------------------------------------------
# Single 32-byte key (64 hex chars or base64) used for ALL at-rest encryption
# (secrets, subscription tokens, WebSub HMAC secrets)
encryption_key = '{{ env "APIP_CP_ENCRYPTION_KEY" }}'

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
[platform_api.database]
driver = '{{ env "APIP_CP_DATABASE_DRIVER" "sqlite3" }}'          # "sqlite3" or "postgres"
path   = '{{ env "APIP_CP_DATABASE_PATH" "./data/api_platform.db" }}'   # SQLite file path (ignored for postgres)

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
# mode selects exactly one auth mode: "jwt" | "file" | "idp".
# "jwt" verifies locally-signed HMAC JWTs; tokens are minted externally
# (e.g. by the Developer Portal using the shared secret below).
[platform_api.auth]
mode             = '{{ env "APIP_CP_AUTH_MODE" "jwt" }}'
scope_validation = '{{ env "APIP_CP_AUTH_SCOPE_VALIDATION" "true" }}'   # validate OAuth2 scopes on incoming requests

# JWT (local HMAC) — used in the "jwt" and "file" modes.
[platform_api.auth.jwt]
issuer     = '{{ env "APIP_CP_AUTH_JWT_ISSUER" "platform-api" }}'
secret_key = '{{ env "APIP_CP_AUTH_JWT_SECRET_KEY" }}'
