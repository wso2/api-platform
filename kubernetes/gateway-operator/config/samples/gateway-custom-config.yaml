---
# ConfigMap containing custom Helm values
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-custom-config
  namespace: default
data:
  values.yaml: |
    # This sample is aligned to the current gateway chart schema.
    # For the exhaustive reference, see kubernetes/gateway-operator/config/gateway_values.yaml.

    nameOverride: ""
    fullnameOverride: ""

    imagePullSecrets: []

    commonLabels: {}
    commonAnnotations: {}

    serviceAccount:
      create: true
      annotations: {}
      name: ""

    gateway:
      # Shared configuration rendered into /configs/config.toml
      config:
        controller:
          server:
            api_port: 9090
            xds_port: 18000
            shutdown_timeout: 15s
            gateway_id: "platform-gateway-id"
          controlplane:
            insecure_skip_verify: false
            reconnect_initial: 1s
            reconnect_max: 5m
            polling_interval: 15m
            deployment_push_enabled: false
            sync_batch_size: 50
            gateway_name: ""
            apim_oauth2_client_id: ""
            apim_oauth2_client_secret: ""
            apim_oauth2_username: ""
            apim_oauth2_password: ""
          policy_server:
            port: 18001
            tls:
              enabled: false
              cert_file: ./certs/server.crt
              key_file: ./certs/server.key
          storage:
            type: sqlite
            sqlite:
              path: ./data/gateway.db
          policies:
            definitions_path: ./default-policies
          logging:
            level: info
            format: json

        router:
          gateway_host: "*"
          listener_port: 8080
          https_enabled: true
          https_port: 8443
          tracing_service_name: router
          access_logs:
            enabled: true
            format: text
            text_format: |
              [%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%" %REQ(:PATH)% %UPSTREAM_PROTOCOL% %RESPONSE_CODE% %RESPONSE_FLAGS% %RESPONSE_CODE_DETAILS% %CONNECTION_TERMINATION_DETAILS% %BYTES_RECEIVED% %BYTES_SENT% %DURATION% "%REQ(X-FORWARDED-FOR)%" "%REQ(USER-AGENT)%" "%REQ(X-REQUEST-ID)%" "%REQ(:AUTHORITY)%" "%UPSTREAM_HOST%"
          downstream_tls:
            cert_path: "./listener-certs/default-listener.crt"
            key_path: "./listener-certs/default-listener.key"
            minimum_protocol_version: TLS1_2
            maximum_protocol_version: TLS1_3
            ciphers: ""
          policy_engine:
            mode: uds
            host: ""
            port: 9001
            timeout_ms: 60000
            failure_mode_allow: false
            route_cache_action: RETAIN
            allow_mode_override: true
            message_timeout_ms: 60000
            tls:
              enabled: false
              cert_path: ""
              key_path: ""
              ca_path: ""
              server_name: ""
              skip_verify: false
          upstream:
            tls:
              minimum_protocol_version: TLS1_2
              maximum_protocol_version: TLS1_3
              ciphers: ""
              trusted_cert_path: /etc/ssl/certs/ca-certificates.crt
              custom_certs_path: ./certificates
              verify_host_name: true
              disable_ssl_verification: false
            timeouts:
              route_timeout_ms: 60000
              route_idle_timeout_ms: 300000
              connect_timeout_ms: 5000

        policy_engine:
          server:
            extproc_port: 9001
          admin:
            enabled: true
            port: 9002
            allowed_ips:
              - "127.0.0.1"
              - "::1"
          config_mode:
            mode: xds
          xds:
            connect_timeout: 10s
            request_timeout: 5s
            initial_reconnect_delay: 1s
            max_reconnect_delay: 60s
            tls:
              enabled: false
              cert_path: ""
              key_path: ""
              ca_path: ""
          file_config:
            path: ""
          logging:
            level: info
            format: json

        immutable_gateway:
          enabled: false
          artifacts_dir: "/etc/api-platform-gateway/immutable_gateway/artifacts"

      # Raw TOML appended to generated config.toml (optional)
      config_toml: ""

      configMap:
        annotations: {}
        labels: {}

      controller:
        service:
          ports:
            rest: 9090
            xds: 18000
            policy: 18001
            admin: 9092
            metrics: 9091
        encryptionKeys:
          enabled: false
          secretName: ""
          mountPath: /app/data/aesgcm-keys
        deployment:
          extraEnvFrom: []
          livenessProbe:
            httpGet:
              path: /health
              port: admin
          readinessProbe:
            httpGet:
              path: /health
              port: admin

      # Unified gateway-runtime (Envoy + policy-engine) (recommended for operator deploys)
      gatewayRuntime:
        service:
          ports:
            http: 8080
            https: 8443
            envoyAdmin: 9901
            policyEngineAdmin: 9002
            policyEngineMetrics: 9003
        deployment:
          env:
            gatewayControllerHost: ""
            logLevel: info
            moesifKey: ""
          livenessProbe:
            exec:
              command: ["health-check.sh"]
          readinessProbe:
            exec:
              command: ["health-check.sh"]

