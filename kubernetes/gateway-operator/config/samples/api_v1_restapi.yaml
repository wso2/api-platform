---
# Example 1: API with explicit gateway references (multiple gateways)
apiVersion: gateway.api-platform.wso2.com/v1
kind: RestApi
metadata:
  name: api-with-gateway-refs
  labels:
    environment: "production"
    team: "platform"
    tier: "stable"
spec:
  displayName: test-api
  version: v1.0
  context: /test
  upstream:
    main:
      url: https://httpbin.org/anything
  # policies:
  #   - name: jwt-auth
  #     version: v1
  #     params:
  #       issuers:
  #         - WSO2KeyManager1
  # API-level resilience applies to all operations unless overridden per operation.
  resilience:
    timeout: 15s
    idleTimeout: 0s
  operations:
    - method: GET
      path: /info
    - method: POST
      path: /submit
      # Operation-level resilience overrides the API-level values for this route.
      resilience:
        timeout: 5s
    - method: GET
      path: /helloworld
    - method: GET
      path: /heyhelloworld


---
# Example 1: API with explicit gateway references (multiple gateways)
apiVersion: gateway.api-platform.wso2.com/v1
kind: RestApi
metadata:
  name: api-with-gateway-refs-1
  labels:
    environment: "production"
    team: "platform"
    tier: "stable"
spec:
  displayName: test-api-1
  version: v1.0
  context: /ssa
  upstream:
    main:
      url: https://secure-backend:5443/api/v2
  # policies:
  #   - name: jwt-auth
  #     version: v1
  #     params:
  #       issuers:
  #         - WSO2KeyManager1
  operations:
    - method: GET
      path: /info
    - method: POST
      path: /submit
    - method: GET
      path: /helloworld
    - method: GET
      path: /heyhelloworld


---
# Example 3: API routing through a reusable upstreamDefinition with a per-upstream connect timeout.
# The upstream references the definition by name (url XOR ref); the connect timeout bounds TCP
# connection establishment to the backend.
apiVersion: gateway.api-platform.wso2.com/v1
kind: RestApi
metadata:
  name: api-with-upstream-definition
spec:
  displayName: test-api-upstreamdef
  version: v1.0
  context: /orders
  upstreamDefinitions:
    - name: orders-backend
      timeout:
        connect: 6s
      upstreams:
        - url: http://orders.default.svc.cluster.local:8080
  upstream:
    main:
      ref: orders-backend
  operations:
    - method: GET
      path: /info