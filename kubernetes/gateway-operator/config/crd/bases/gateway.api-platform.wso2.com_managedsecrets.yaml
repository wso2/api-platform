---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: managedsecrets.gateway.api-platform.wso2.com
spec:
  group: gateway.api-platform.wso2.com
  names:
    kind: ManagedSecret
    listKind: ManagedSecretList
    plural: managedsecrets
    shortNames:
    - msec
    singular: managedsecret
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ManagedSecret represents a platform secret stored by the gateway-controller.

          The CRD is named ManagedSecret (rather than Secret) so it does not collide
          with the built-in core/v1 Secret kind. The plural "managedsecrets" is used
          in URLs and RBAC to remain unambiguous.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SecretSpec mirrors the management-API SecretConfigData payload, with the
              sensitive Value field expressed as a SecretValueSource so operators can
              keep plaintext out of the CR by referencing a Kubernetes Secret.
            properties:
              description:
                description: Description is an optional description of the secret.
                type: string
              displayName:
                description: DisplayName is a human-readable secret name.
                type: string
              value:
                description: Value is the secret plaintext, supplied either inline
                  or via valueFrom.
                properties:
                  value:
                    description: |-
                      Value is the inline plaintext value. Avoid for production use; prefer
                      ValueFrom so the secret is stored in a Kubernetes Secret.
                    type: string
                  valueFrom:
                    description: |-
                      ValueFrom selects a key from a Kubernetes Secret in the same namespace
                      as the owning CR.
                    properties:
                      key:
                        description: The key of the secret to select from.  Must be
                          a valid secret key.
                        type: string
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                      optional:
                        description: Specify whether the Secret or its key must be
                          defined
                        type: boolean
                    required:
                    - key
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
                x-kubernetes-validations:
                - message: exactly one of value or valueFrom must be set
                  rule: has(self.value) != has(self.valueFrom)
            required:
            - displayName
            - value
            type: object
          status:
            description: |-
              ResourceStatus carries the controller-managed lifecycle fields shared by
              the new management-API CRDs.

              For UUID-keyed kinds (Subscription, SubscriptionPlan, Certificate) the
              gateway-controller assigns Id on first deploy; controllers persist it and
              use it to address the resource for subsequent update/delete calls.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  resource's state. The standard types are Accepted and Programmed.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              id:
                description: |-
                  Id is the gateway-issued identifier for UUID-keyed resources. When
                  set the controller addresses the resource via PUT/DELETE /<plural>/{id}.
                type: string
              lastUpdateTime:
                description: LastUpdateTime is the last time the status was updated.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
