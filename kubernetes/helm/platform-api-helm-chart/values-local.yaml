# Local development values for the platform-api chart.
# Usage (standalone):
#   helm install platform-api ./platform-api-helm-chart -f values-local.yaml
#
# Overrides the defaults for local development:
# - developmentMode on (self-signed TLS, relaxed auth/CORS, file-based login)
# - locally-built image (latest tag, IfNotPresent pull policy)
global:
  developmentMode: true

image:
  tag: "latest"
  pullPolicy: IfNotPresent
