{{- $pa := .Values -}}
{{- $tls := $pa.tls -}}
{{- if and $pa.deployment.enabled $pa.config.server.https.enabled (eq $tls.certificateProvider "cert-manager") }}
{{- if and $tls.certManager.createIssuer (ne $tls.certManager.issuerRef.kind "Issuer") }}
{{- fail "platform-api: tls.certManager.createIssuer=true only creates a namespaced Issuer, but issuerRef.kind is not \"Issuer\". Set issuerRef.kind: Issuer, or set createIssuer=false and reference your own ClusterIssuer." }}
{{- end }}
{{- end }}
{{- if and $pa.deployment.enabled $pa.config.server.https.enabled (eq $tls.certificateProvider "cert-manager") $tls.certManager.create }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "apip.platformApi.fullname" . }}-tls
  labels:
    {{- include "apip.componentLabels" (list . "platform-api" dict) | nindent 4 }}
  {{- with (include "apip.annotations" (list . dict)) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  secretName: {{ include "apip.platformApi.fullname" . }}-tls
  commonName: {{ $tls.certManager.commonName }}
  dnsNames:
    {{- range $tls.certManager.dnsNames }}
    - {{ . | quote }}
    {{- end }}
  duration: {{ $tls.certManager.duration | quote }}
  renewBefore: {{ $tls.certManager.renewBefore | quote }}
  issuerRef:
    {{- if $tls.certManager.createIssuer }}
    name: {{ include "apip.platformApi.fullname" . }}-selfsigned-issuer
    {{- else }}
    name: {{ $tls.certManager.issuerRef.name }}
    {{- end }}
    kind: {{ $tls.certManager.issuerRef.kind }}
    {{- if $tls.certManager.issuerRef.group }}
    group: {{ $tls.certManager.issuerRef.group }}
    {{- end }}
  privateKey:
    algorithm: RSA
    size: 2048
{{- end }}

