# Local development values for the Gateway Helm chart.
# Usage: helm install gateway ./gateway-helm-chart -f values-local.yaml
#
# This file overrides default values for local development:
# - Uses IfNotPresent pullPolicy to use locally built images
# - Uses latest tag for local builds
# - Enables at-rest encryption, pointing at a locally-provisioned key secret named
#   "gateway-encryption-keys" (create it first — see the README "At-rest Encryption").

gateway:
  controller:
    image:
      tag: "latest"
      pullPolicy: IfNotPresent
    encryptionKeys:
      enabled: true
      secretName: gateway-encryption-keys

  gatewayRuntime:
    image:
      tag: "latest"
      pullPolicy: IfNotPresent
