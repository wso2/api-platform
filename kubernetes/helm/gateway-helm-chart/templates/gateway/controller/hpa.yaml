{{- $controller := .Values.gateway.controller -}}
{{- $hpa := $controller.hpa -}}
{{- if and $controller.deployment.enabled $hpa.enabled }}
{{- if ne .Values.gateway.config.controller.storage.type "postgres" }}
{{- fail "gateway.controller.hpa requires gateway.config.controller.storage.type=postgres — SQLite does not support multiple replicas." }}
{{- end }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "gateway-operator.fullname" . }}-controller
  labels:
    {{- include "gateway-operator.componentLabels" (list . "controller" dict) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "gateway-operator.fullname" . }}-controller
  minReplicas: {{ $hpa.minReplicas }}
  maxReplicas: {{ $hpa.maxReplicas }}
  metrics:
    {{- if $hpa.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $hpa.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $hpa.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $hpa.targetMemoryUtilizationPercentage }}
    {{- end }}
    {{- with $hpa.customMetrics }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $hpa.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
