{{- $gc := .Values.gateway.config.controller -}}
{{- $router := .Values.gateway.config.router -}}
{{- $pe := .Values.gateway.config.policy_engine -}}
{{- $pg := $gc.storage.postgres -}}
{{- $ss := $gc.storage.sqlserver -}}
{{- $db := default (dict) $gc.storage.database -}}
{{- $controllerHost := printf "%s-controller" (include "gateway-operator.fullname" .) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway-operator.fullname" . }}-config
  labels:
    {{- include "gateway-operator.resourceLabels" (list . .Values.gateway.configMap.labels) | nindent 4 }}
  {{- with (include "gateway-operator.annotations" (list . .Values.gateway.configMap.annotations)) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  config.toml: |
    [controller.server]
    api_port = {{ $gc.server.api_port }}
    xds_port = {{ $gc.server.xds_port }}
    shutdown_timeout = {{ $gc.server.shutdown_timeout | quote }}
    gateway_id = {{ $gc.server.gateway_id | quote }}

    [controller.admin_server]
    enabled = {{ $gc.admin_server.enabled }}
    port = {{ $gc.admin_server.port }}
    allowed_ips = [{{- range $i, $ip := $gc.admin_server.allowed_ips }}{{- if gt $i 0 }}, {{ end }}{{ $ip | quote }}{{- end }}]

    [controller.admin_server.pprof]
    enabled = {{ $gc.admin_server.pprof.enabled }}
    block_profile_rate = {{ $gc.admin_server.pprof.block_profile_rate }}
    mutex_profile_fraction = {{ $gc.admin_server.pprof.mutex_profile_fraction }}

    [controller.policy_server]
    port = {{ $gc.policy_server.port }}

    [controller.policy_server.tls]
    enabled = {{ $gc.policy_server.tls.enabled }}
    cert_file = {{ $gc.policy_server.tls.cert_file | quote }}
    key_file = {{ $gc.policy_server.tls.key_file | quote }}

    [controller.storage]
    type = {{ $gc.storage.type | quote }}

    [controller.storage.sqlite]
    path = {{ $gc.storage.sqlite.path | quote }}

    {{- if eq $gc.storage.type "postgres" }}
    [controller.storage.postgres]
    {{- if $pg.dsn }}
    dsn = {{ $pg.dsn | quote }}
    {{- else }}
    host = {{ required "gateway.config.controller.storage.postgres.host is required when storage.type is \"postgres\" and dsn is unset" $pg.host | quote }}
    port = {{ $pg.port | int }}
    database = {{ required "gateway.config.controller.storage.postgres.database is required when storage.type is \"postgres\" and dsn is unset" $pg.database | quote }}
    user = {{ required "gateway.config.controller.storage.postgres.user is required when storage.type is \"postgres\" and dsn is unset" $pg.user | quote }}
    password = {{ `'{{ env "APIP_GW_CONTROLLER_STORAGE_POSTGRES_PASSWORD" "" }}'` }}
    sslmode = {{ $pg.sslmode | default "require" | quote }}
    connect_timeout = {{ $pg.connect_timeout | default "5s" | quote }}
    max_open_conns = {{ $pg.max_open_conns | default 25 | int }}
    max_idle_conns = {{ $pg.max_idle_conns | default 5 | int }}
    conn_max_lifetime = {{ $pg.conn_max_lifetime | default "30m" | quote }}
    conn_max_idle_time = {{ $pg.conn_max_idle_time | default "5m" | quote }}
    application_name = {{ $pg.application_name | default "gateway-controller" | quote }}
    {{- end }}
    {{- end }}

    {{- if eq $gc.storage.type "sqlserver" }}
    [controller.storage.database]
    driver = {{ coalesce $db.driver "sqlserver" | quote }}
    {{- $sqlDsn := coalesce $db.dsn $ss.dsn }}
    {{- if $sqlDsn }}
    dsn = {{ $sqlDsn | quote }}
    {{- else }}
    host = {{ required "gateway.config.controller.storage.database.host (or storage.sqlserver.host) is required when storage.type is \"sqlserver\" and dsn is unset" (coalesce $db.host $ss.host) | quote }}
    port = {{ coalesce $db.port $ss.port 1433 | int }}
    database = {{ required "gateway.config.controller.storage.database.database (or storage.sqlserver.database) is required when storage.type is \"sqlserver\" and dsn is unset" (coalesce $db.database $ss.database) | quote }}
    user = {{ required "gateway.config.controller.storage.database.user (or storage.sqlserver.user) is required when storage.type is \"sqlserver\" and dsn is unset" (coalesce $db.user $ss.user) | quote }}
    password = {{ `'{{ env "APIP_GW_CONTROLLER_STORAGE_DATABASE_PASSWORD" "" }}'` }}
    connect_timeout = {{ coalesce $db.connect_timeout $ss.connect_timeout "5s" | quote }}
    max_open_conns = {{ coalesce $db.max_open_conns $ss.max_open_conns 25 | int }}
    max_idle_conns = {{ coalesce $db.max_idle_conns $ss.max_idle_conns 5 | int }}
    conn_max_lifetime = {{ coalesce $db.conn_max_lifetime $ss.conn_max_lifetime "30m" | quote }}
    conn_max_idle_time = {{ coalesce $db.conn_max_idle_time $ss.conn_max_idle_time "5m" | quote }}
    application_name = {{ coalesce $db.application_name $ss.application_name "gateway-controller" | quote }}
    [controller.storage.database.options]
    encrypt = {{ coalesce (index $db.options "encrypt") $ss.encrypt "disable" | quote }}
    trust_server_certificate = {{ (coalesce (index $db.options "trust_server_certificate") (toString (default true $ss.trust_server_certificate))) | quote }}
    {{- end }}
    {{- end }}

    [controller.policies]
    definitions_path = {{ $gc.policies.definitions_path | quote }}
    {{- if $gc.policies.build_manifest_path }}
    build_manifest_path = {{ $gc.policies.build_manifest_path | quote }}
    {{- end }}

    {{- if $gc.llm }}
    [controller.llm]
    {{- if $gc.llm.template_definitions_path }}
    template_definitions_path = {{ $gc.llm.template_definitions_path | quote }}
    {{- end }}
    {{- end }}

    [controller.controlplane]
    host = {{ .Values.gateway.controller.controlPlane.host | default "" | quote }}
    token = {{ `'{{ env "APIP_GW_CONTROLLER_CONTROLPLANE_TOKEN" "" }}'` }}
    insecure_skip_verify = {{ $gc.controlplane.insecure_skip_verify }}
    reconnect_initial = {{ $gc.controlplane.reconnect_initial | quote }}
    reconnect_max = {{ $gc.controlplane.reconnect_max | quote }}
    polling_interval = {{ $gc.controlplane.polling_interval | quote }}
    deployment_sync_enabled = {{ $gc.controlplane.deployment_sync_enabled }}
    sync_batch_size = {{ $gc.controlplane.sync_batch_size }}
    gateway_name = {{ $gc.controlplane.gateway_name | quote }}
    apim_oauth2_client_id = {{ $gc.controlplane.apim_oauth2_client_id | quote }}
    apim_oauth2_client_secret = {{ $gc.controlplane.apim_oauth2_client_secret | quote }}
    apim_oauth2_username = {{ $gc.controlplane.apim_oauth2_username | quote }}
    apim_oauth2_password = {{ $gc.controlplane.apim_oauth2_password | quote }}

    {{- if $gc.event_hub }}
    [controller.event_hub]
    poll_interval = {{ $gc.event_hub.poll_interval | quote }}
    cleanup_interval = {{ $gc.event_hub.cleanup_interval | quote }}
    retention_period = {{ $gc.event_hub.retention_period | quote }}

    [controller.event_hub.database]
    max_open_conns = {{ $gc.event_hub.database.max_open_conns }}
    max_idle_conns = {{ $gc.event_hub.database.max_idle_conns }}
    conn_max_lifetime = {{ $gc.event_hub.database.conn_max_lifetime | quote }}
    conn_max_idle_time = {{ $gc.event_hub.database.conn_max_idle_time | quote }}
    {{- end }}

    {{- range $gc.encryption.providers }}
    [[controller.encryption.providers]]
    type = {{ .type | quote }}
    {{- range .keys }}
    [[controller.encryption.providers.keys]]
    version = {{ .version | quote }}
    file = {{ .file | quote }}
    {{- end }}
    {{- end }}

    [router]
    gateway_host = {{ $router.gateway_host | quote }}
    listener_port = {{ $router.listener_port }}
    https_enabled = {{ $router.https_enabled }}
    https_port = {{ $router.https_port }}
    tracing_service_name = {{ $router.tracing_service_name | default "" | quote }}

    [router.vhosts.main]
    {{- if $router.vhosts.main.domains }}
    domains = [{{- range $i, $d := $router.vhosts.main.domains }}{{- if gt $i 0 }}, {{ end }}{{ $d | quote }}{{- end }}]
    {{- end }}
    default = {{ $router.vhosts.main.default | quote }}

    [router.vhosts.sandbox]
    {{- if $router.vhosts.sandbox.domains }}
    domains = [{{- range $i, $d := $router.vhosts.sandbox.domains }}{{- if gt $i 0 }}, {{ end }}{{ $d | quote }}{{- end }}]
    {{- end }}
    default = {{ $router.vhosts.sandbox.default | quote }}

    [router.access_logs]
    enabled = {{ $router.access_logs.enabled }}
    format = {{ $router.access_logs.format | quote }}
    {{- if eq $router.access_logs.format "json" }}
    json_fields = { {{- $first := true }}{{- range $key, $value := $router.access_logs.json_fields }}{{- if not $first }}, {{ end }}{{- $first = false }}{{ $key }} = {{ $value | quote }}{{- end }} }
    {{- end }}
    {{- if eq $router.access_logs.format "text" }}
    text_format = {{ $router.access_logs.text_format | quote }}
    {{- end }}

    [router.downstream_tls]
    cert_path = {{ $router.downstream_tls.cert_path | quote }}
    key_path = {{ $router.downstream_tls.key_path | quote }}
    minimum_protocol_version = {{ $router.downstream_tls.minimum_protocol_version | quote }}
    maximum_protocol_version = {{ $router.downstream_tls.maximum_protocol_version | quote }}
    ciphers = {{ $router.downstream_tls.ciphers | quote }}

    [router.upstream.tls]
    minimum_protocol_version = {{ $router.upstream.tls.minimum_protocol_version | quote }}
    maximum_protocol_version = {{ $router.upstream.tls.maximum_protocol_version | quote }}
    ciphers = {{ $router.upstream.tls.ciphers | quote }}
    trusted_cert_path = {{ $router.upstream.tls.trusted_cert_path | quote }}
    custom_certs_path = {{ $router.upstream.tls.custom_certs_path | quote }}
    verify_host_name = {{ $router.upstream.tls.verify_host_name }}
    disable_ssl_verification = {{ $router.upstream.tls.disable_ssl_verification }}

    [router.upstream.timeouts]
    route_timeout_ms = {{ $router.upstream.timeouts.route_timeout_ms }}
    route_idle_timeout_ms = {{ $router.upstream.timeouts.route_idle_timeout_ms }}
    connect_timeout_ms = {{ $router.upstream.timeouts.connect_timeout_ms }}

    {{- if $router.lua }}
    [router.lua.request_transformation]
    {{- if $router.lua.request_transformation.script_path }}
    script_path = {{ $router.lua.request_transformation.script_path | quote }}
    {{- end }}
    {{- end }}

    [router.http_listener]
    server_header_transformation = {{ $router.http_listener.server_header_transformation | quote }}
    server_header_value = {{ $router.http_listener.server_header_value | quote }}

    [router.http_listener.timeouts]
    request_timeout = {{ $router.http_listener.timeouts.request_timeout | quote }}
    request_headers_timeout = {{ $router.http_listener.timeouts.request_headers_timeout | quote }}
    stream_idle_timeout = {{ $router.http_listener.timeouts.stream_idle_timeout | quote }}
    idle_timeout = {{ $router.http_listener.timeouts.idle_timeout | quote }}

    [router.policy_engine]
    mode = {{ $router.policy_engine.mode | quote }}
    host = {{ $router.policy_engine.host | default "" | quote }}
    port = {{ $router.policy_engine.port | default 9001 }}
    timeout_ms = {{ $router.policy_engine.timeout_ms }}
    route_cache_action = {{ $router.policy_engine.route_cache_action | quote }}
    message_timeout_ms = {{ $router.policy_engine.message_timeout_ms }}

    {{- if $router.policy_engine.tls }}
    [router.policy_engine.tls]
    enabled = {{ $router.policy_engine.tls.enabled }}
    {{- if $router.policy_engine.tls.enabled }}
    cert_path = {{ $router.policy_engine.tls.cert_path | quote }}
    key_path = {{ $router.policy_engine.tls.key_path | quote }}
    ca_path = {{ $router.policy_engine.tls.ca_path | quote }}
    server_name = {{ $router.policy_engine.tls.server_name | quote }}
    skip_verify = {{ $router.policy_engine.tls.skip_verify }}
    {{- end }}
    {{- end }}

    {{- if $gc.auth }}
    {{- if $gc.auth.basic }}
    [controller.auth.basic]
    enabled = {{ $gc.auth.basic.enabled }}
    {{- if $gc.auth.basic.users }}
    {{- range $gc.auth.basic.users }}
    [[controller.auth.basic.users]]
    username = {{ .username | quote }}
    password = {{ .password | quote }}
    password_hashed = {{ .password_hashed | default false }}
    roles = [{{- range $i, $role := .roles }}{{- if gt $i 0 }}, {{ end }}{{ $role | quote }}{{- end }}]
    {{- end }}
    {{- end }}
    {{- end }}
    {{- if $gc.auth.idp }}
    [controller.auth.idp]
    enabled = {{ $gc.auth.idp.enabled }}
    jwks_url = {{ $gc.auth.idp.jwks_url | quote }}
    issuer = {{ $gc.auth.idp.issuer | quote }}
    roles_claim = {{ $gc.auth.idp.roles_claim | quote }}
    {{- if $gc.auth.idp.role_mapping }}
    [controller.auth.idp.role_mapping]
    {{- range $key, $value := $gc.auth.idp.role_mapping }}
    {{- if kindIs "slice" $value }}
    {{ $key }} = [{{- range $i, $v := $value }}{{- if gt $i 0 }}, {{ end }}{{ $v | quote }}{{- end }}]
    {{- else }}
    {{ $key }} = {{ $value | quote }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}

    [controller.logging]
    level = {{ $gc.logging.level | quote }}
    format = {{ $gc.logging.format | quote }}

    [controller.metrics]
    enabled = {{ .Values.gateway.controller.metrics.enabled }}
    port = {{ .Values.gateway.controller.metrics.port }}

    [policy_engine.server]
    extproc_port = {{ $pe.server.extproc_port }}

    [policy_engine.admin]
    enabled = {{ $pe.admin.enabled }}
    port = {{ $pe.admin.port }}
    allowed_ips = [{{- range $i, $ip := $pe.admin.allowed_ips }}{{- if gt $i 0 }}, {{ end }}{{ $ip | quote }}{{- end }}]

    [policy_engine.admin.pprof]
    enabled = {{ $pe.admin.pprof.enabled }}
    block_profile_rate = {{ $pe.admin.pprof.block_profile_rate }}
    mutex_profile_fraction = {{ $pe.admin.pprof.mutex_profile_fraction }}

    [policy_engine.config_mode]
    mode = {{ $pe.config_mode.mode | quote }}

    [policy_engine.xds]
    # server_address is set via -xds-server flag (injected by gateway-runtime entrypoint)
    connect_timeout = {{ $pe.xds.connect_timeout | quote }}
    request_timeout = {{ $pe.xds.request_timeout | quote }}
    initial_reconnect_delay = {{ $pe.xds.initial_reconnect_delay | quote }}
    max_reconnect_delay = {{ $pe.xds.max_reconnect_delay | quote }}

    [policy_engine.xds.tls]
    enabled = {{ $pe.xds.tls.enabled }}

    [policy_engine.file_config]
    path = {{ $pe.file_config.path | quote }}

    [policy_engine.logging]
    level = {{ $pe.logging.level | quote }}
    format = {{ $pe.logging.format | quote }}

    [policy_engine.metrics]
    enabled = {{ $pe.metrics.enabled }}
    port = {{ $pe.metrics.port }}

    [policy_engine.python_executor]
    timeout = {{ $pe.python_executor.timeout | quote }}

    [policy_engine.python_executor.server]
    mode = {{ $pe.python_executor.server.mode | quote }}
    port = {{ $pe.python_executor.server.port }}
    host = {{ $pe.python_executor.server.host | quote }}

    {{- if .Values.gateway.config.analytics }}
    {{- $analyticsEnabled := and (kindIs "bool" .Values.gateway.config.analytics.enabled) .Values.gateway.config.analytics.enabled }}
    [analytics]
    enabled = {{ $analyticsEnabled }}
    {{- if .Values.gateway.config.analytics.publishers }}
    {{- range $name, $publisher := .Values.gateway.config.analytics.publishers }}
    [analytics.publishers.{{ $name }}]
    {{- range $key, $value := $publisher }}
    {{ $key }} = {{ kindIs "string" $value | ternary ($value | quote) $value }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- if .Values.gateway.config.analytics.grpc_event_server }}
    [analytics.grpc_event_server]
    host = "127.0.0.1"
    buffer_flush_interval = {{ .Values.gateway.config.analytics.grpc_event_server.buffer_flush_interval | quote }}
    buffer_size_bytes = {{ .Values.gateway.config.analytics.grpc_event_server.buffer_size_bytes }}
    grpc_request_timeout = {{ .Values.gateway.config.analytics.grpc_event_server.grpc_request_timeout | quote }}
    server_port = {{ .Values.gateway.config.analytics.grpc_event_server.server_port }}
    shutdown_timeout = {{ .Values.gateway.config.analytics.grpc_event_server.shutdown_timeout | quote }}
    public_key_path = {{ .Values.gateway.config.analytics.grpc_event_server.public_key_path | quote }}
    private_key_path = {{ .Values.gateway.config.analytics.grpc_event_server.private_key_path | quote }}
    als_plain_text = {{ .Values.gateway.config.analytics.grpc_event_server.als_plain_text }}
    max_message_size = {{ .Values.gateway.config.analytics.grpc_event_server.max_message_size }}
    max_header_limit = {{ .Values.gateway.config.analytics.grpc_event_server.max_header_limit }}
    {{- end }}
    {{- end }}

    {{- if .Values.gateway.config.collector }}
    [collector]
    {{- if .Values.gateway.config.collector.request_body }}
    request_body = {{ .Values.gateway.config.collector.request_body }}
    {{- end }}
    {{- if .Values.gateway.config.collector.response_body }}
    response_body = {{ .Values.gateway.config.collector.response_body }}
    {{- end }}
    {{- if .Values.gateway.config.collector.request_headers }}
    request_headers = {{ .Values.gateway.config.collector.request_headers }}
    {{- end }}
    {{- if .Values.gateway.config.collector.response_headers }}
    response_headers = {{ .Values.gateway.config.collector.response_headers }}
    {{- end }}
    {{- if .Values.gateway.config.collector.ignore_path_prefixes }}
    ignore_path_prefixes = [{{- range $i, $p := .Values.gateway.config.collector.ignore_path_prefixes }}{{- if gt $i 0 }}, {{ end }}{{ $p | quote }}{{- end }}]
    {{- end }}

    {{- if .Values.gateway.config.collector.server }}
    [collector.server]
    {{- if .Values.gateway.config.collector.server.mode }}
    mode = {{ .Values.gateway.config.collector.server.mode | quote }}
    {{- end }}
    {{- if .Values.gateway.config.collector.server.buffer_flush_interval }}
    buffer_flush_interval = {{ .Values.gateway.config.collector.server.buffer_flush_interval | int64 }}
    {{- end }}
    {{- if .Values.gateway.config.collector.server.buffer_size_bytes }}
    buffer_size_bytes = {{ .Values.gateway.config.collector.server.buffer_size_bytes | int64 }}
    {{- end }}
    {{- if .Values.gateway.config.collector.server.grpc_request_timeout }}
    grpc_request_timeout = {{ .Values.gateway.config.collector.server.grpc_request_timeout | int64 }}
    {{- end }}
    {{- if .Values.gateway.config.collector.server.shutdown_timeout }}
    shutdown_timeout = {{ .Values.gateway.config.collector.server.shutdown_timeout | quote }}
    {{- end }}
    {{- if .Values.gateway.config.collector.server.public_key_path }}
    public_key_path = {{ .Values.gateway.config.collector.server.public_key_path | quote }}
    {{- end }}
    {{- if .Values.gateway.config.collector.server.private_key_path }}
    private_key_path = {{ .Values.gateway.config.collector.server.private_key_path | quote }}
    {{- end }}
    {{- if kindIs "bool" .Values.gateway.config.collector.server.als_plain_text }}
    als_plain_text = {{ .Values.gateway.config.collector.server.als_plain_text }}
    {{- end }}
    {{- if .Values.gateway.config.collector.server.max_message_size }}
    max_message_size = {{ .Values.gateway.config.collector.server.max_message_size | int64 }}
    {{- end }}
    {{- if .Values.gateway.config.collector.server.max_header_limit }}
    max_header_limit = {{ .Values.gateway.config.collector.server.max_header_limit | int64 }}
    {{- end }}
    {{- end }}
    {{- end }}

    {{- if .Values.gateway.config.traffic_logging }}
    {{- $trafficLoggingEnabled := and (kindIs "bool" .Values.gateway.config.traffic_logging.enabled) .Values.gateway.config.traffic_logging.enabled }}
    [traffic_logging]
    enabled = {{ $trafficLoggingEnabled }}
    {{- if .Values.gateway.config.traffic_logging.masked_headers }}
    masked_headers = [{{- range $i, $h := .Values.gateway.config.traffic_logging.masked_headers }}{{- if gt $i 0 }}, {{ end }}{{ $h | quote }}{{- end }}]
    {{- end }}
    {{- if .Values.gateway.config.traffic_logging.max_payload_size }}
    max_payload_size = {{ .Values.gateway.config.traffic_logging.max_payload_size | int64 }}
    {{- end }}
    {{- if .Values.gateway.config.traffic_logging.request_headers }}
    request_headers = {{ .Values.gateway.config.traffic_logging.request_headers }}
    {{- end }}
    {{- if .Values.gateway.config.traffic_logging.request_body }}
    request_body = {{ .Values.gateway.config.traffic_logging.request_body }}
    {{- end }}
    {{- if .Values.gateway.config.traffic_logging.response_headers }}
    response_headers = {{ .Values.gateway.config.traffic_logging.response_headers }}
    {{- end }}
    {{- if .Values.gateway.config.traffic_logging.response_body }}
    response_body = {{ .Values.gateway.config.traffic_logging.response_body }}
    {{- end }}
    {{- if .Values.gateway.config.traffic_logging.exclude_fields }}
    exclude_fields = [{{- range $i, $f := .Values.gateway.config.traffic_logging.exclude_fields }}{{- if gt $i 0 }}, {{ end }}{{ $f | quote }}{{- end }}]
    {{- end }}
    {{- end }}

    {{- if .Values.gateway.config.tracing }}
    [tracing]
    enabled = {{ .Values.gateway.config.tracing.enabled }}
    endpoint = {{ .Values.gateway.config.tracing.endpoint | quote }}
    insecure = {{ .Values.gateway.config.tracing.insecure }}
    service_version = {{ .Values.gateway.config.tracing.service_version | quote }}
    batch_timeout = {{ .Values.gateway.config.tracing.batch_timeout | quote }}
    max_export_batch_size = {{ .Values.gateway.config.tracing.max_export_batch_size }}
    sampling_rate = {{ .Values.gateway.config.tracing.sampling_rate }}
    {{- end }}

    {{- if .Values.gateway.config.subscriptions }}
    [subscriptions]
    enable_validation = {{ .Values.gateway.config.subscriptions.enable_validation }}
    {{- end }}

    {{- if .Values.gateway.gatewayRuntime.policies.llmPricing.enabled }}
    [policy_configurations.llm_cost_v1]
    pricing_file = "/etc/policy-engine/llm-pricing/model_prices.json"
    {{- end }}

    {{- if .Values.gateway.config.policy_configurations }}
{{ dict "policy_configurations" .Values.gateway.config.policy_configurations | toToml | indent 4 }}
    {{- end }}

    {{- if .Values.gateway.config.api_key }}
    [api_key]
    api_keys_per_user_per_api = {{ .Values.gateway.config.api_key.api_keys_per_user_per_api }}
    algorithm = {{ .Values.gateway.config.api_key.algorithm | quote }}
    min_key_length = {{ .Values.gateway.config.api_key.min_key_length }}
    max_key_length = {{ .Values.gateway.config.api_key.max_key_length }}
    issuer = {{ .Values.gateway.config.api_key.issuer | quote }}
    {{- end }}

    {{- if .Values.gateway.config.immutable_gateway }}
    [immutable_gateway]
    enabled = {{ .Values.gateway.config.immutable_gateway.enabled }}
    artifacts_dir = {{ .Values.gateway.config.immutable_gateway.artifacts_dir | quote }}
    {{- end }}

    {{- if .Values.gateway.config.mcp }}
    [mcp]
    append_resource_path_to_backend = {{ .Values.gateway.config.mcp.append_resource_path_to_backend }}
    {{- end }}

