# Default values for the Open Choreo Gateway chart.
# This file is intended to be exhaustive and well documented; adjust per environment.

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

# WSO2 Subscription parameters (https://wso2.com/subscription/)
wso2:
  subscription:
    # Name of a docker-registry Secret (in the release namespace) holding credentials
    # for registry.wso2.com. Setting this enables WSO2 subscription mode:
    #   1. The secret is added to every component's imagePullSecrets.
    #   2. Default `ghcr.io/wso2/api-platform/*` image repositories are rewritten to
    #      `registry.wso2.com/wso2-api-platform/*`, so the released WSO2 images at
    #      https://docker.wso2.com/ are pulled instead.
    # Explicit image.repository overrides are preserved as-is.
    #
    # Create the secret with:
    #   kubectl create secret docker-registry wso2-subscription-creds \
    #     --docker-server=registry.wso2.com \
    #     --docker-username=<wso2-email> \
    #     --docker-password=<wso2-password-or-token>
    imagePullSecret: ""

commonLabels: {}
commonAnnotations: {}

serviceAccount:
  create: true
  annotations: {}
  name: ""
  # Mount the service account token into pods by default (Kubernetes default: true).
  # Individual pods can override via gateway.<component>.deployment.automountServiceAccountToken.
  automountServiceAccountToken: true

## moved to each component's deployment block below

# Component-level configuration

gateway:
  # Enable development mode across gateway components.
  # Do NOT enable in production — relaxes security checks (e.g. encryption key enforcement).
  developmentMode: false

  # Shared configuration mounted as:
  #   - gateway-controller: /etc/gateway-controller/config.toml
  #   - gateway-runtime (policy engine): /etc/policy-engine/config.toml
  config:
    controller:
      auth:
        basic:
          enabled: true
          users:
            - username: "admin"
              password: "admin"
              password_hashed: false
              roles: ["admin"]
        idp:
          enabled: false
          jwks_url: ""
          issuer: ""
          roles_claim: "scope"
          role_mapping: {}
      # Server configuration
      server:
        # REST API port for gateway management
        api_port: 9090

        # xDS gRPC port for Envoy communication
        xds_port: 18000

        # Graceful shutdown timeout
        shutdown_timeout: 15s

        # Unique identifier for the gateway instance
        gateway_id: "platform-gateway-id"

      # Dedicated admin/debug HTTP server (config dump, xDS sync status). Already
      # effectively active today even though this block was previously absent from
      # config.toml — see defaultConfig() in pkg/config/config.go. Adding it here
      # only makes the existing implicit default explicit and overridable.
      admin_server:
        enabled: true
        port: 9092
        allowed_ips: ["*"]
        pprof:
          # Go runtime profiling (net/http/pprof) served on the admin server, off by
          # default. When enabling, also restrict allowed_ips above or reach it via
          # `kubectl port-forward` (see gateway.controller.service.expose.admin).
          enabled: false
          block_profile_rate: 0
          mutex_profile_fraction: 0

      # Policy xDS Server configuration
      policy_server:
        # Policy xDS gRPC port for policy distribution
        port: 18001

        # TLS configuration for secure policy xDS communication
        tls:
          # Enable or disable TLS
          enabled: false

          # Path to TLS certificate file (required if TLS is enabled)
          cert_file: "./certs/server.crt"

          # Path to TLS private key file (required if TLS is enabled)
          key_file: "./certs/server.key"

      # Storage configuration
      storage:
        # Storage type: "sqlite", "postgres", "sqlserver"
        # - sqlite: Single-instance embedded database backed by a PersistentVolumeClaim
        # - postgres: External PostgreSQL database; enables multi-replica controller deployments
        # - sqlserver: External SQL Server database; enables multi-replica controller deployments
        type: sqlite

        # SQLite configuration (used when type=sqlite)
        sqlite:
          path: ./data/gateway.db

        # PostgreSQL configuration (used when type=postgres)
        # Password is injected separately via gateway.controller.postgres.passwordSecretRef
        postgres:
          # Full DSN takes precedence over individual fields when set.
          # Example: "postgres://user:password@host:5432/dbname?sslmode=require"
          dsn: ""

          host: ""
          port: 5432
          database: ""
          user: ""

          # SSL mode: disable, allow, prefer, require, verify-ca, verify-full
          # Use "require" or stronger in production.
          sslmode: require

          connect_timeout: 5s
          max_open_conns: 25
          max_idle_conns: 5
          conn_max_lifetime: 30m
          conn_max_idle_time: 5m
          application_name: gateway-controller

        # Global database configuration (used for type=sqlserver).
        # Password is injected separately via gateway.controller.sqlserver.passwordSecretRef.
        # This shape maps to [controller.storage.database] in config.toml.
        database:
          driver: sqlserver
          # Full DSN takes precedence over individual fields when set.
          # Example: "sqlserver://user:password@host:1433?database=gateway&encrypt=disable&TrustServerCertificate=true"
          dsn: ""

          host: ""
          port: 1433
          database: ""
          user: ""

          connect_timeout: 5s
          max_open_conns: 25
          max_idle_conns: 5
          conn_max_lifetime: 30m
          conn_max_idle_time: 5m
          application_name: gateway-controller

          options:
            # Encryption mode: disable, false, true, strict
            encrypt: disable
            trust_server_certificate: "true"

        # Legacy SQL Server configuration (backward compatible fallback).
        # Prefer gateway.config.controller.storage.database for new deployments.
        sqlserver:
          dsn: ""
          host: ""
          port: 1433
          database: ""
          user: ""
          encrypt: disable
          trust_server_certificate: true
          connect_timeout: 5s
          max_open_conns: 25
          max_idle_conns: 5
          conn_max_lifetime: 30m
          conn_max_idle_time: 5m
          application_name: gateway-controller

      # Policy configuration
      policies:
        # Directory containing policy definitions
        definitions_path: ./default-policies
        # Path to build-manifest.yaml for custom policy detection
        build_manifest_path: ./build-manifest.yaml

      # LLM provider template configuration
      llm:
        # Directory containing default LLM provider prompt templates
        template_definitions_path: ./default-llm-provider-templates

      # Control plane connection configuration
      # Note: host and token are set via gateway.controller.controlPlane and rendered as env vars in the deployment.
      controlplane:
        # Skip TLS certificate verification for the control plane connection (insecure, dev/test only)
        insecure_skip_verify: false

        # Initial delay before retrying a failed control plane connection
        reconnect_initial: 1s

        # Maximum delay between reconnection attempts (exponential backoff cap)
        reconnect_max: 5m

        # How often to reconcile state with the control plane
        polling_interval: 15m

        # Push API deployment events to the control plane
        deployment_sync_enabled: true

        # Number of deployments to fetch per batch during startup sync
        sync_batch_size: 50

        # Friendly name shown for this gateway in the APIM control plane
        gateway_name: ""

        # OAuth2 Option 1: Client Credentials flow
        apim_oauth2_client_id: ""
        apim_oauth2_client_secret: ""

        # OAuth2 Option 2: Resource Owner Password Credentials flow
        apim_oauth2_username: ""
        apim_oauth2_password: ""

      # EventHub: poll-based eventual-consistency layer used to sync state across
      # multiple controller replicas (only relevant when storage.type is postgres or
      # sqlserver and replicaCount > 1, but always configured/valid).
      event_hub:
        # Interval at which events are polled from the database
        poll_interval: 3s
        # Interval at which old events are cleaned up
        cleanup_interval: 10m
        # How long events are retained before being deleted
        retention_period: 1h
        # Connection pool settings for the EventHub database connection
        database:
          max_open_conns: 5
          max_idle_conns: 2
          conn_max_lifetime: 30m
          conn_max_idle_time: 5m

      # Encryption provider configuration for secret management.
      # File paths must match the mount path set in gateway.controller.encryptionKeys.mountPath.
      encryption:
        providers:
          - type: aesgcm
            keys:
              - version: aesgcm256-v1
                # Path to the binary key file — must match the mounted secret key filename
                file: /app/data/aesgcm-keys/default-aesgcm256-v1.bin

      # Logging configuration
      logging:
        # Log level: "debug", "info", "warn", or "error"
        level: debug

        # Log format: "json" or "text"
        # - json: Structured JSON format (recommended for production)
        # - text: Human-readable text format (recommended for development)
        format: json

    # Router (Envoy) configuration
    router:
      # Gateway host for incoming requests
      gateway_host: "*"

      # Virtual-host domain configuration
      vhosts:
        main:
          # Explicit domain list for the main vhost (e.g. ["api.example.com"]).
          # Empty (default) relies on the `default` pattern below.
          domains: []
          default: "*"
        sandbox:
          domains: []
          default: "sandbox-*"

      # Access logs configuration
      access_logs:
        # Enable or disable access logs
        enabled: true

        # Log format: "json" or "text"
        # - json: Structured JSON format (recommended for log aggregation)
        # - text: Human-readable text format
        format: json

        # JSON format fields - key-value pairs for structured logging
        # Uses Envoy command operators: https://www.envoyproxy.io/docs/envoy/latest/configuration/observability/access_log/usage
        json_fields:
          t: "%START_TIME%"
          meth: "%REQ(:METHOD)%"
          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
          proto: "%PROTOCOL%"
          respCd: "%RESPONSE_CODE%"
          respFlg: "%RESPONSE_FLAGS%"
          bytesRx: "%BYTES_RECEIVED%"
          bytesTx: "%BYTES_SENT%"
          dur: "%DURATION%"
          upSvcT: "%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%"
          xff: "%REQ(X-FORWARDED-FOR)%"
          ua: "%REQ(USER-AGENT)%"
          reqId: "%REQ(X-REQUEST-ID)%"
          host: "%REQ(:AUTHORITY)%"
          upHost: "%UPSTREAM_HOST%"
          upProto: "%UPSTREAM_PROTOCOL%"
          upPath: "%REQ(:PATH)%"
          respCdDtl: "%RESPONSE_CODE_DETAILS%"
          connTrmDtl: "%CONNECTION_TERMINATION_DETAILS%"
          reqTxDur: "%REQUEST_TX_DURATION%"
          respTxDur: "%RESPONSE_TX_DURATION%"
          reqDur: "%REQUEST_DURATION%"
          respDur: "%RESPONSE_DURATION%"

        # Text format template - used when format is "text"
        # Uses Envoy command operators: https://www.envoyproxy.io/docs/envoy/latest/configuration/observability/access_log/usage
        text_format: |
          [%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%" %REQ(:PATH)% %UPSTREAM_PROTOCOL% %RESPONSE_CODE% %RESPONSE_FLAGS% %RESPONSE_CODE_DETAILS% %CONNECTION_TERMINATION_DETAILS% %BYTES_RECEIVED% %BYTES_SENT% %DURATION% %REQUEST_TX_DURATION% %RESPONSE_TX_DURATION% %REQUEST_DURATION% %RESPONSE_DURATION% "%REQ(X-FORWARDED-FOR)%" "%REQ(USER-AGENT)%" "%REQ(X-REQUEST-ID)%" "%REQ(:AUTHORITY)%" "%UPSTREAM_HOST%"

      # Listener port for incoming HTTP traffic (Envoy proxy port)
      listener_port: 8080

      # HTTPS listener configuration
      https_enabled: true  # Enable/disable HTTPS listener
      https_port: 8443      # HTTPS listener port

      # Downstream TLS configuration (for HTTPS listener)
      downstream_tls:
        # Path to server certificate (PEM format)
        cert_path: "./listener-certs/default-listener.crt"

        # Path to server private key (PEM format)
        key_path: "./listener-certs/default-listener.key"

        # Minimum TLS protocol version (TLS1_0, TLS1_1, TLS1_2, TLS1_3)
        minimum_protocol_version: TLS1_2

        # Maximum TLS protocol version (TLS1_0, TLS1_1, TLS1_2, TLS1_3)
        maximum_protocol_version: TLS1_3

        # Cipher suites (comma-separated)
        ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256,ECDHE-RSA-AES128-GCM-SHA256,ECDHE-ECDSA-AES128-SHA,ECDHE-RSA-AES128-SHA,AES128-GCM-SHA256,AES128-SHA,ECDHE-ECDSA-AES256-GCM-SHA384,ECDHE-RSA-AES256-GCM-SHA384,ECDHE-ECDSA-AES256-SHA,ECDHE-RSA-AES256-SHA,AES256-GCM-SHA384,AES256-SHA"

      # Upstream configuration (TLS and timeouts for Envoy upstream)
      upstream:
        # TLS configuration for upstream connections
        tls:
          minimum_protocol_version: TLS1_2
          maximum_protocol_version: TLS1_3
          ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256,ECDHE-RSA-AES128-GCM-SHA256,ECDHE-ECDSA-AES128-SHA,ECDHE-RSA-AES128-SHA,AES128-GCM-SHA256,AES128-SHA,ECDHE-ECDSA-AES256-GCM-SHA384,ECDHE-RSA-AES256-GCM-SHA384,ECDHE-ECDSA-AES256-SHA,ECDHE-RSA-AES256-SHA,AES256-GCM-SHA384,AES256-SHA"
          trusted_cert_path: /etc/ssl/certs/ca-certificates.crt
          custom_certs_path: ./certificates  # Directory containing custom trusted certificates (e.g., self-signed certs)
          verify_host_name: true
          disable_ssl_verification: false

        # Timeout configurations for upstream connections (milliseconds)
        timeouts:
          route_timeout_ms: 60000
          route_idle_timeout_ms: 300000
          connect_timeout_ms: 5000

      # HTTP Connection Manager (downstream) configuration: server-header handling and timeouts
      http_listener:
        # Server header handling: APPEND_IF_ABSENT | OVERWRITE | PASS_THROUGH
        server_header_transformation: OVERWRITE
        # Value written for the Server response header
        server_header_value: "WSO2 API Platform"

        # Downstream (client-facing) timeouts. A value of "0s" disables the timeout.
        timeouts:
          # Max duration for the entire downstream request (0s = disabled)
          request_timeout: "0s"
          # Max duration to receive the complete request headers (0s = disabled)
          request_headers_timeout: "0s"
          # Idle timeout for a single HTTP stream/request
          stream_idle_timeout: "5m"
          # Idle timeout for the downstream connection
          idle_timeout: "1h"

      tracing_service_name: router

      # Lua script configuration
      lua:
        request_transformation:
          # Do NOT set the deprecated top-level lua_script_path alias — use this
          # nested path only (config.go documents lua_script_path as deprecated).
          script_path: ./lua/request_transformation.lua

      # Policy Engine ext_proc filter configuration
      policy_engine:
        # Connection mode: "uds" (Unix domain socket, default) or "tcp"
        mode: uds

        # Timeout for gRPC service connection (in milliseconds)
        timeout_ms: 60000

        # Route cache action: DEFAULT, RETAIN, or CLEAR
        # RETAIN: Maintain the route cache across requests (recommended for performance)
        route_cache_action: RETAIN

        # Message timeout for policy engine processing (in milliseconds)
        message_timeout_ms: 60000

        # TLS configuration for policy engine connection
        tls:
          # Enable TLS for secure communication with policy engine
          enabled: false

          # Client certificate path (for mutual TLS authentication)
          cert_path: ""

          # Client private key path (for mutual TLS authentication)
          key_path: ""

          # CA certificate path (for server certificate validation)
          ca_path: ""

          # Server name for SNI (optional, defaults to host)
          server_name: ""

          # Skip server certificate verification (insecure, development only)
          skip_verify: false

    policy_engine:
      server:
        # ext_proc port for gRPC server
        extproc_port: 9001

      # Admin HTTP server configuration
      admin:
        # Enable admin HTTP server for debugging endpoints
        enabled: true

        # Port for admin HTTP server
        port: 9002

        # IP addresses allowed to access the admin API
        # Defaults to localhost only for security
        allowed_ips:
          - "*"
          - "127.0.0.1"

        pprof:
          # Go runtime profiling (net/http/pprof), off by default. When enabling,
          # also restrict allowed_ips above or reach it via port-forward.
          enabled: false
          block_profile_rate: 0
          mutex_profile_fraction: 0

      config_mode:
        # Configuration mode: "file" or "xds"
        # - file: Load policy chains from static YAML file
        # - xds: Subscribe to xDS server for dynamic configuration updates
        mode: xds

      # xDS client configuration
      xds:
        # server_address is set via -xds-server flag (from GATEWAY_CONTROLLER_HOST env var)

        # Connection timeout for establishing initial connection
        connect_timeout: 10s

        # Request timeout for individual xDS requests
        request_timeout: 5s

        # Initial delay before reconnecting after connection failure
        initial_reconnect_delay: 1s

        # Maximum delay between reconnection attempts (exponential backoff)
        max_reconnect_delay: 60s

        # TLS configuration for xDS connection
        tls:
          enabled: false
          # cert_path: /path/to/client-cert.pem
          # key_path: /path/to/client-key.pem
          # ca_path: /path/to/ca-cert.pem

      # File-based configuration (not used in xDS mode)
      file_config:
        path: ""

      # Logging configuration
      logging:
        # Log level: debug, info, warn, error
        level: info

        # Log format: json, text
        format: json

      # Prometheus metrics server (policy-engine side)
      metrics:
        # Defaults to false to match the policy-engine binary's own code default
        # (MetricsConfig.Enabled in its defaultConfig()) — NOT config-template.toml's
        # shipped default of true — so behavior for existing deployments is unchanged.
        enabled: false
        # NOTE: keep in sync with gateway.gatewayRuntime.service.ports.policyEngineMetrics
        port: 9003

      # Python policy executor bridge
      python_executor:
        # Timeout for a single Python policy execution
        timeout: 30s
        server:
          # Connection mode: "uds" (default) or "tcp"
          mode: uds
          # Port (only used when mode=tcp)
          port: 9010
          # Host (only used when mode=tcp)
          host: localhost

    # Static API artifacts bundled with the gateway (see docs/gateway/immutable-gateway.md)
    immutable_gateway:
      enabled: false
      artifacts_dir: "/etc/api-platform-gateway/immutable_gateway/artifacts"

    # Application-level API-key subscription validation. Absent by default — the
    # subscriptionValidation system policy stays uninjected. Uncomment to enable:
    # subscriptions:
    #   enable_validation: true

    # API key configuration (used by the api-key-auth policy)
    api_key:
      # Number of active API keys allowed per user per API
      api_keys_per_user_per_api: 10
      # Hashing algorithm used to store API keys (currently only "sha256")
      algorithm: sha256
      # Minimum / maximum accepted length for an external API key value
      min_key_length: 36
      max_key_length: 128
      # When non-empty, only API keys whose issuer claim matches (or is unset) are
      # accepted by the api-key-auth policy. Defaults to "" (accept any issuer) to
      # match the gateway-controller's own code default. config-template.toml ships
      # "api-platform-devportal" instead; set this explicitly to that value if this
      # gateway should only accept keys minted by the bundled WSO2 Developer Portal —
      # do not adopt it as the chart default, or existing deployments minting/accepting
      # keys with a different or absent issuer would start being rejected.
      issuer: ""

    # MCP (Model Context Protocol) proxy configuration
    mcp:
      # Restore legacy behaviour of appending "/mcp" to the backend upstream path.
      # Default (false) forwards to exactly the configured upstream path.
      append_resource_path_to_backend: false

  # Raw TOML string to append to the generated config.toml
  # Use this for additional configuration not covered by the structured values above
  # Example:
  #   config_toml: |
  #     [custom_section]
  #     key = "value"
  config_toml: ""

  # metadata for the generated shared ConfigMap (annotations / labels)
  configMap:
    annotations: {}
    labels: {}

  controller:
    image:
      repository: ghcr.io/wso2/api-platform/gateway-controller
      tag: "1.2.0-alpha2"
      pullPolicy: Always
    imagePullSecrets: []
    service:
      type: ClusterIP
      annotations: {}
      labels: {}
      ports:
        rest: 9090
        xds: 18000
        policy: 18001
        admin: 9092
        metrics: 9091
      # Publish admin/debug ports on the controller Service. Off by default — the admin
      # server serves config_dump and xds_sync_status, so keep it pod-internal (reach it
      # via `kubectl port-forward`) unless you need in-cluster Service access. Liveness/
      # readiness probes are unaffected: they hit the container port directly, not the Service.
      expose:
        admin: false
      # Static cluster IP (e.g. "None" for a headless Service). Empty = auto-assign.
      clusterIP: ""
      # External traffic policy: "Cluster" or "Local".
      # Only rendered when type is LoadBalancer or NodePort.
      externalTrafficPolicy: ""
      # Load balancer implementation class. Only rendered when type is LoadBalancer.
      loadBalancerClass: ""
      # CIDR ranges allowed to reach the load balancer. Only rendered when type is LoadBalancer.
      loadBalancerSourceRanges: []
      # IP family policy: SingleStack, PreferDualStack or RequireDualStack. Empty = cluster default.
      ipFamilyPolicy: ""
      # IP families, e.g. ["IPv4"], ["IPv6"] or ["IPv4", "IPv6"]. Empty = cluster default.
      ipFamilies: []
      # Static nodePort per named service port. Only rendered when type is NodePort or
      # LoadBalancer; empty = auto-allocate.
      nodePorts:
        rest: ""
        xds: ""
        policy: ""
        admin: ""
        metrics: ""
    controlPlane:
      # Control plane endpoint. Used directly as the HTTPS/WSS authority, so include
      # a non-default port here (e.g. "host.docker.internal:8443"); 443 is assumed if omitted.
      host: host.docker.internal:8443
      token:
        value: ""
        secretName: ""
        key: token
    # TLS certificate configuration for downstream (listener) HTTPS
    tls:
      # Enable TLS certificate management
      enabled: true
      # Certificate provisioning method: "cert-manager", "secret", or "none"
      # - cert-manager: Use cert-manager to automatically provision certificates
      # - secret: Use an existing Kubernetes secret containing tls.crt and tls.key
      # - none: No TLS configuration (certificates must be provided manually)
      certificateProvider: cert-manager
      # cert-manager configuration (used when certificateProvider=cert-manager)
      certManager:
        # Create a Certificate resource
        create: true
        # Create a self-signed Issuer automatically
        # If true, a self-signed Issuer will be created with the release name
        # If false, you must provide an existing Issuer/ClusterIssuer via issuerRef
        createIssuer: true
        # Issuer reference for cert-manager
        # Note: If createIssuer=true, the 'name' field is ignored and the chart generates a unique name
        # Only set this if createIssuer=false to reference an existing Issuer/ClusterIssuer
        issuerRef:
          name: selfsigned-issuer  # Ignored when createIssuer=true
          # Use "Issuer" for namespace-scoped issuer (recommended)
          # Use "ClusterIssuer" for cluster-wide issuer
          kind: Issuer
          # group: cert-manager.io  # Optional, defaults to cert-manager.io
        # Certificate common name
        commonName: localhost
        # DNS names for the certificate
        dnsNames:
          - localhost
          - "*.localhost"
        # Certificate duration (default: 2160h = 90 days)
        duration: 2160h
        # Certificate renewal time (default: 720h = 30 days before expiry)
        renewBefore: 720h
      # Secret configuration (used when certificateProvider=secret)
      secret:
        # Name of existing secret containing tls.crt and tls.key
        name: gateway-tls
        # Key names in the secret
        certKey: tls.crt
        keyKey: tls.key
    # Upstream certificate configuration for backend TLS verification
    upstreamCerts:
      # Enable custom upstream certificates
      enabled: false
      # Existing secret containing custom CA certificates
      # Secret should contain one or more keys with PEM-encoded certificates
      secretName: ""
      # Existing ConfigMap containing custom CA certificates
      # ConfigMap should contain one or more keys with PEM-encoded certificates
      configMapName: ""
    # Encryption key configuration for secret management (AES-GCM keys).
    # Required when developmentMode is false — the chart will fail rendering if not enabled.
    encryptionKeys:
      # Enable mounting encryption keys from a Kubernetes secret
      enabled: false
      # Name of the existing secret containing the key file(s) as binary data.
      # Create with: kubectl create secret generic <name> --from-file=default-aesgcm256-v1.bin=<path>
      secretName: ""
      # Mount path inside the container — must match controller.encryption.providers[].keys[].file paths
      mountPath: /app/data/aesgcm-keys
    logging:
      level: info
    storage:
      type: sqlite
      sqlitePath: ./data/gateway.db
    # PostgreSQL password secret reference (used when gateway.config.controller.storage.type=postgres).
    # The password is injected as an env var from a Kubernetes secret rather than stored in the ConfigMap.
    # Create with: kubectl create secret generic <name> --from-literal=password='<db-password>'
    postgres:
      passwordSecretRef:
        name: ""
        key: password
    # SQL Server password secret reference (used when gateway.config.controller.storage.type=sqlserver).
    # The password is injected as an env var from a Kubernetes secret rather than stored in the ConfigMap.
    # Create with: kubectl create secret generic <name> --from-literal=password='<db-password>'
    sqlserver:
      passwordSecretRef:
        name: ""
        key: password
    metrics:
      # Whether the controller's own Prometheus metrics HTTP server actually starts.
      # Defaults to false to match the gateway-controller binary's own code default
      # (Controller.Metrics.Enabled in defaultConfig()) — NOT config-template.toml's
      # shipped default of true — so this chart's behavior does not silently change
      # for existing deployments upgrading past this release. Set to true to expose
      # Prometheus metrics on `port` below.
      enabled: false
      port: 9091
    persistence:
      enabled: true
      existingClaim: ""
      accessModes:
        - ReadWriteOnce
      size: 100Mi
      storageClass: ""
      # Extra labels for the PersistentVolumeClaim.
      labels: {}
      # Extra annotations for the PersistentVolumeClaim (merged with commonAnnotations;
      # these win on conflict). Example — keep the claim across helm uninstall:
      #   annotations:
      #     helm.sh/resource-policy: keep
      annotations: {}
    deployment:
      enabled: true
      replicaCount: 1
      volumeMountPath: /app/data
      extraEnv: []
      # extraEnvFrom:
      #   - secretRef:
      #       name: my-secret
      extraEnvFrom: []
      env:
        xdsServerAddress: ""
      extraVolumeMounts: []
      extraVolumes: []
      labels: {}
      annotations: {}
      podAnnotations: {}
      podLabels: {}
      priorityClassName: ""
      livenessProbe:
        httpGet:
          # Admin API is served under /api/admin/v1 (see gateway-controller admin OpenAPI spec).
          path: /api/admin/v1/health
          port: admin
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /api/admin/v1/health
          port: admin
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 3
      # Optional startup probe for slow-starting environments. Uncomment to enable.
      # startupProbe:
      #   httpGet:
      #     path: /api/admin/v1/health
      #     port: admin
      #   periodSeconds: 5
      #   failureThreshold: 30
      # Resource limits and requests
      # Uncomment and adjust based on your workload
      resources: {}
        # limits:
        #   cpu: 500m
        #   memory: 512Mi
        # requests:
        #   cpu: 250m
        #   memory: 256Mi
      podSecurityContext: {}
      securityContext: {}
      nodeSelector: {}
      tolerations: []
      affinity: {}
      # Topology spread constraints (list of topologySpreadConstraint objects).
      # Example:
      #   - maxSkew: 1
      #     topologyKey: topology.kubernetes.io/zone
      #     whenUnsatisfiable: ScheduleAnyway
      #     labelSelector:
      #       matchLabels:
      #         app.kubernetes.io/component: controller
      topologySpreadConstraints: []
      # Deployment update strategy (full apps/v1 DeploymentStrategy object).
      # Empty = Kubernetes default (RollingUpdate, 25% maxSurge / 25% maxUnavailable).
      # Example:
      #   type: RollingUpdate
      #   rollingUpdate:
      #     maxSurge: 1
      #     maxUnavailable: 0
      strategy: {}
      # Seconds the pod is given to terminate gracefully. Uncomment to override the
      # Kubernetes default (30).
      # terminationGracePeriodSeconds: 30
      # Additional /etc/hosts entries (list of hostAlias objects).
      hostAliases: []
      # Pod DNS policy: ClusterFirst, Default, ClusterFirstWithHostNet or None.
      # Empty = Kubernetes default.
      dnsPolicy: ""
      # Pod DNS configuration (nameservers / searches / options); used with dnsPolicy.
      dnsConfig: {}
      # Override service account token automounting for this pod (takes precedence
      # over serviceAccount.automountServiceAccountToken). Uncomment to set.
      # automountServiceAccountToken: false
    # Horizontal Pod Autoscaler for the controller.
    # Requires gateway.config.controller.storage.type=postgres — SQLite does not support multiple replicas.
    # When enabled, replicaCount is managed by HPA and the Deployment's replicas field is omitted.
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      # Target average CPU utilization (percentage). Unset or 0 to disable.
      targetCPUUtilizationPercentage: 80
      # Target average memory utilization (percentage). Unset or 0 to disable.
      targetMemoryUtilizationPercentage: ""
      # Additional custom metrics (autoscaling/v2 MetricSpec objects).
      customMetrics: []
      # Scale-up / scale-down behavior tuning (autoscaling/v2 HorizontalPodAutoscalerBehavior).
      behavior: {}
    # Pod Disruption Budget for the controller.
    # minAvailable and maxUnavailable are mutually exclusive; set only one.
    podDisruptionBudget:
      enabled: false
      # Minimum number of pods that must remain available during a disruption.
      # Accepts an integer or a percentage string (e.g. "50%").
      minAvailable: 1
      # Maximum number of pods that may be unavailable during a disruption.
      # Accepts an integer or a percentage string (e.g. "25%").
      maxUnavailable: ""

  # Gateway Runtime - Router (Envoy) and Policy Engine in a single container,
  # communicating via Unix domain socket (UDS)
  gatewayRuntime:
    image:
      repository: ghcr.io/wso2/api-platform/gateway-runtime
      tag: "1.2.0-alpha2"
      pullPolicy: Always
    imagePullSecrets: []
    service:
      type: LoadBalancer
      annotations: {}
      labels: {}
      ports:
        http: 8080
        https: 8443
        routerAdmin: 9901
        policyEngineAdmin: 9002
        policyEngineMetrics: 9003
      # Publish the runtime admin/debug ports on the Service. Off by default — these serve
      # config_dump and health; keep them pod-internal unless needed. Probes are unaffected.
      expose:
        # Router (Envoy) admin: exposes MUTATING endpoints (/quitquitquit, /healthcheck/fail,
        # /runtime_modify) — leave OFF unless you fully trust in-cluster network access.
        routerAdmin: false
        # Policy-engine admin: config_dump + health.
        policyEngineAdmin: false
      # Static cluster IP (e.g. "None" for a headless Service). Empty = auto-assign.
      clusterIP: ""
      # External traffic policy: "Cluster" or "Local". "Local" preserves client source IPs.
      # Only rendered when type is LoadBalancer or NodePort.
      externalTrafficPolicy: ""
      # Load balancer implementation class. Only rendered when type is LoadBalancer.
      loadBalancerClass: ""
      # CIDR ranges allowed to reach the load balancer. Only rendered when type is LoadBalancer.
      loadBalancerSourceRanges: []
      # IP family policy: SingleStack, PreferDualStack or RequireDualStack. Empty = cluster default.
      ipFamilyPolicy: ""
      # IP families, e.g. ["IPv4"], ["IPv6"] or ["IPv4", "IPv6"]. Empty = cluster default.
      ipFamilies: []
      # Static nodePort per named service port. Only rendered when type is NodePort or
      # LoadBalancer; empty = auto-allocate.
      nodePorts:
        http: ""
        https: ""
        routerAdmin: ""
        policyEngineAdmin: ""
        policyEngineMetrics: ""
    # Policy-related file mounts for the gateway runtime
    policies:
      # LLM pricing data for the llm_cost_v1 policy.
      # Mounted read-only at /etc/policy-engine/llm-pricing/model_prices.json.
      # A built-in model_prices.json is bundled with this chart and used by default.
      # Reference in config.toml: [policy_configurations.llm_cost_v1] pricing_file = "/etc/policy-engine/llm-pricing/model_prices.json"
      llmPricing:
        enabled: true
        # Override with an existing ConfigMap containing a key "model_prices.json".
        # When set, the built-in ConfigMap is not created and this one is used instead.
        configMapName: ""

    deployment:
      enabled: true
      replicaCount: 1
      env:
        gatewayControllerHost: ""
        logLevel: info
        moesifKey: ""
      extraEnv: []
      # extraEnvFrom:
      #   - configMapRef:
      #       name: my-config-map
      extraEnvFrom: []
      extraVolumeMounts: []
      extraVolumes: []
      labels: {}
      annotations: {}
      podAnnotations: {}
      podLabels: {}
      priorityClassName: ""
      livenessProbe:
        exec:
          command: ["health-check.sh"]
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        exec:
          command: ["health-check.sh"]
        initialDelaySeconds: 10
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 6
      # Optional startup probe for slow-starting environments. Uncomment to enable.
      # startupProbe:
      #   exec:
      #     command: ["health-check.sh"]
      #   periodSeconds: 5
      #   failureThreshold: 30
      # Resource limits and requests
      # Uncomment and adjust based on your workload
      resources: {}
        # limits:
        #   cpu: 1000m
        #   memory: 1Gi
        # requests:
        #   cpu: 500m
        #   memory: 512Mi
      podSecurityContext: {}
      securityContext: {}
      nodeSelector: {}
      tolerations: []
      affinity: {}
      # Topology spread constraints (list of topologySpreadConstraint objects).
      # Example:
      #   - maxSkew: 1
      #     topologyKey: topology.kubernetes.io/zone
      #     whenUnsatisfiable: ScheduleAnyway
      #     labelSelector:
      #       matchLabels:
      #         app.kubernetes.io/component: gateway-runtime
      topologySpreadConstraints: []
      # Deployment update strategy (full apps/v1 DeploymentStrategy object).
      # Empty = Kubernetes default (RollingUpdate, 25% maxSurge / 25% maxUnavailable).
      # Example:
      #   type: RollingUpdate
      #   rollingUpdate:
      #     maxSurge: 1
      #     maxUnavailable: 0
      strategy: {}
      # Seconds the pod is given to terminate gracefully — allow time for Envoy to
      # drain in-flight connections. Uncomment to override the Kubernetes default (30).
      # terminationGracePeriodSeconds: 30
      # Additional /etc/hosts entries (list of hostAlias objects).
      hostAliases: []
      # Pod DNS policy: ClusterFirst, Default, ClusterFirstWithHostNet or None.
      # Empty = Kubernetes default.
      dnsPolicy: ""
      # Pod DNS configuration (nameservers / searches / options); used with dnsPolicy.
      dnsConfig: {}
      # Override service account token automounting for this pod (takes precedence
      # over serviceAccount.automountServiceAccountToken). Uncomment to set.
      # automountServiceAccountToken: false
    # Horizontal Pod Autoscaler for the gateway runtime.
    # When enabled, replicaCount is managed by HPA and the Deployment's replicas field is omitted.
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      # Target average CPU utilization (percentage). Unset or 0 to disable.
      targetCPUUtilizationPercentage: 70
      # Target average memory utilization (percentage). Unset or 0 to disable.
      targetMemoryUtilizationPercentage: ""
      # Additional custom metrics (autoscaling/v2 MetricSpec objects).
      customMetrics: []
      # Scale-up / scale-down behavior tuning (autoscaling/v2 HorizontalPodAutoscalerBehavior).
      behavior: {}
    # Pod Disruption Budget for the gateway runtime.
    # minAvailable and maxUnavailable are mutually exclusive; set only one.
    podDisruptionBudget:
      enabled: false
      # Minimum number of pods that must remain available during a disruption.
      # Accepts an integer or a percentage string (e.g. "50%").
      minAvailable: 1
      # Maximum number of pods that may be unavailable during a disruption.
      # Accepts an integer or a percentage string (e.g. "25%").
      maxUnavailable: ""
