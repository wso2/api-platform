{{- $controller := .Values.eventGateway.controller -}}
{{- $deployment := $controller.deployment -}}
{{- if and (not .Values.eventGateway.developmentMode) $deployment.enabled }}
{{- if not $controller.encryptionKeys.enabled }}
{{- fail "eventGateway.controller.encryptionKeys must be enabled when eventGateway.developmentMode is false. Either set eventGateway.developmentMode=true or configure eventGateway.controller.encryptionKeys with a Kubernetes secret containing the AES-GCM key." }}
{{- end }}
{{- if and $controller.encryptionKeys.enabled (empty (trim (default "" $controller.encryptionKeys.secretName))) }}
{{- fail "eventGateway.controller.encryptionKeys.secretName must be set to a valid Kubernetes secret name when eventGateway.controller.encryptionKeys.enabled is true." }}
{{- end }}
{{- if empty (trim (default "" $controller.controlPlane.host)) }}
{{- fail "eventGateway.controller.controlPlane.host must be set to your control plane hostname or IP when eventGateway.developmentMode is false. Either set eventGateway.developmentMode=true or provide a valid host via eventGateway.controller.controlPlane.host." }}
{{- end }}
{{- end }}
{{- if $deployment.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "event-gateway.fullname" . }}-controller
  labels:
    {{- include "event-gateway.componentLabels" (list . "controller" $deployment.labels) | nindent 4 }}
  {{- $annotations := merge (deepCopy (default (dict) $deployment.annotations)) (default (dict) .Values.commonAnnotations) }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ $deployment.replicaCount }}
  selector:
    matchLabels:
      {{- include "event-gateway.componentSelectorLabels" (list . "controller") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $deployment.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "event-gateway.componentSelectorLabels" (list . "controller") | nindent 8 }}
      {{- $podAnnotations := merge (deepCopy (default (dict) $deployment.podAnnotations)) (default (dict) .Values.commonAnnotations) }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/event-gateway/gateway-config.yaml") . | sha256sum }}
        {{- with $podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "event-gateway.serviceAccountName" . }}
      {{- $globalPullSecrets := default (list) .Values.imagePullSecrets }}
      {{- $componentPullSecrets := default (list) $controller.imagePullSecrets }}
      {{- $pullSecrets := concat $globalPullSecrets $componentPullSecrets }}
      {{- if $pullSecrets }}
      imagePullSecrets:
        {{- range $pullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with $deployment.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $deployment.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with $deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway-controller
          image: "{{ $controller.image.repository }}:{{ $controller.image.tag }}"
          imagePullPolicy: {{ $controller.image.pullPolicy }}
          {{- with $deployment.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - "-config"
            - "/etc/gateway-controller/config.toml"
          env:
            - name: APIP_GW_CONTROLPLANE_HOST
              value: {{ $controller.controlPlane.host | quote }}
            - name: APIP_GW_CONTROLPLANE_PORT
              value: {{ printf "%d" (int $controller.controlPlane.port) | quote }}
            - name: APIP_GW_GATEWAY_REGISTRATION_TOKEN
              {{- if $controller.controlPlane.token.secretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $controller.controlPlane.token.secretName }}
                  key: {{ $controller.controlPlane.token.key | default "token" }}
              {{- else }}
              value: {{ $controller.controlPlane.token.value | quote }}
              {{- end }}
            - name: APIP_GW_CONTROLLER_LOGGING_LEVEL
              value: {{ $controller.logging.level | quote }}
            - name: APIP_GW_CONTROLLER_STORAGE_TYPE
              value: {{ $controller.storage.type | quote }}
            - name: APIP_GW_CONTROLLER_STORAGE_SQLITE_PATH
              value: {{ $controller.storage.sqlitePath | quote }}
            - name: APIP_GW_CONTROLLER_METRICS_PORT
              value: {{ printf "%d" (int $controller.metrics.port) | quote }}
            - name: APIP_GW_DEVELOPMENT_MODE
              value: {{ .Values.eventGateway.developmentMode | toString | quote }}
            # Event gateway specific settings
            - name: APIP_GW_ROUTER_EVENT__GATEWAY_ENABLED
              value: {{ .Values.eventGateway.config.controller.eventGatewayConfig.enabled | toString | quote }}
            - name: APIP_GW_ROUTER_EVENT__GATEWAY_WEBSUB__HUB_URL
              {{- if .Values.eventGateway.gatewayRuntime.tls.enabled }}
              value: {{ default (printf "https://%s-gateway-runtime:%d" (include "event-gateway.fullname" .) (int .Values.eventGateway.gatewayRuntime.service.ports.websubHttps)) .Values.eventGateway.config.controller.eventGatewayConfig.websubHubUrl | quote }}
              {{- else }}
              value: {{ default (printf "http://%s-gateway-runtime:%d" (include "event-gateway.fullname" .) (int .Values.eventGateway.gatewayRuntime.service.ports.websubHttp)) .Values.eventGateway.config.controller.eventGatewayConfig.websubHubUrl | quote }}
              {{- end }}
            - name: APIP_GW_ROUTER_EVENT__GATEWAY_WEBSUB__HUB_PORT
              value: {{ .Values.eventGateway.config.controller.eventGatewayConfig.websubHubPort | toString | quote }}
            - name: APIP_GW_ROUTER_EVENT__GATEWAY_WEBSUB__HUB__LISTENER__PORT
              value: {{ .Values.eventGateway.config.controller.eventGatewayConfig.websubHubListenerPort | toString | quote }}
            - name: APIP_GW_ROUTER_EVENT__GATEWAY_TIMEOUT__SECONDS
              value: {{ .Values.eventGateway.config.controller.eventGatewayConfig.timeoutSeconds | toString | quote }}
            - name: APIP_GW_ROUTER_EVENT__GATEWAY_WEBSUB__TLS__CERT__FILE
              value: {{ .Values.eventGateway.config.controller.eventGatewayConfig.listenerCertFile | quote }}
            - name: APIP_GW_ROUTER_EVENT__GATEWAY_WEBSUB__TLS__KEY__FILE
              value: {{ .Values.eventGateway.config.controller.eventGatewayConfig.listenerKeyFile | quote }}
            {{- range $deployment.extraEnv }}
            - {{- toYaml . | nindent 14 }}
            {{- end }}
          {{- with $deployment.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: rest
              containerPort: {{ $controller.service.ports.rest }}
              protocol: TCP
            - name: xds
              containerPort: {{ $controller.service.ports.xds }}
              protocol: TCP
            - name: policy
              containerPort: {{ $controller.service.ports.policy }}
              protocol: TCP
            - name: admin
              containerPort: {{ $controller.service.ports.admin }}
              protocol: TCP
            - name: metrics
              containerPort: {{ $controller.service.ports.metrics }}
              protocol: TCP
          livenessProbe:
            {{- toYaml $deployment.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml $deployment.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml ($deployment.resources | default dict) | nindent 12 }}
          volumeMounts:
            - name: controller-data
              mountPath: {{ $deployment.volumeMountPath }}
            - name: controller-config
              mountPath: /etc/gateway-controller/config.toml
              subPath: config.toml
            - name: listener-certs
              mountPath: {{ $controller.listenerCerts.mountPath }}
              readOnly: true
            {{- if $controller.encryptionKeys.enabled }}
            - name: encryption-keys
              mountPath: {{ $controller.encryptionKeys.mountPath }}
              readOnly: true
            {{- end }}
            {{- range $deployment.extraVolumeMounts }}
            - {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: controller-data
          {{- if $controller.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ if $controller.persistence.existingClaim }}{{ $controller.persistence.existingClaim }}{{ else }}{{ include "event-gateway.fullname" . }}-controller-data{{ end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: controller-config
          configMap:
            name: {{ include "event-gateway.fullname" . }}-controller-config
            items:
              - key: config.toml
                path: config.toml
        {{- $listenerSecretName := $controller.listenerCerts.secretName }}
        {{- if not $listenerSecretName }}
        {{- $rtTls := .Values.eventGateway.gatewayRuntime.tls }}
        {{- if and $rtTls.enabled (eq $rtTls.certificateProvider "cert-manager") }}
        {{- $listenerSecretName = printf "%s-runtime-tls" (include "event-gateway.fullname" .) }}
        {{- else if and $rtTls.enabled (eq $rtTls.certificateProvider "secret") }}
        {{- $listenerSecretName = $rtTls.secret.name }}
        {{- end }}
        {{- end }}
        {{- if $listenerSecretName }}
        - name: listener-certs
          secret:
            secretName: {{ $listenerSecretName }}
            items:
              - key: {{ $controller.listenerCerts.certKey }}
                path: default-listener.crt
              - key: {{ $controller.listenerCerts.keyKey }}
                path: default-listener.key
        {{- else }}
        - name: listener-certs
          emptyDir: {}
        {{- end }}
        {{- if $controller.encryptionKeys.enabled }}
        - name: encryption-keys
          secret:
            secretName: {{ $controller.encryptionKeys.secretName }}
        {{- end }}
        {{- range $deployment.extraVolumes }}
        - {{- toYaml . | nindent 10 }}
        {{- end }}
{{- end }}
