---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: mcps.gateway.api-platform.wso2.com
spec:
  group: gateway.api-platform.wso2.com
  names:
    kind: Mcp
    listKind: McpList
    plural: mcps
    shortNames:
    - mcp
    singular: mcp
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Mcp is the Schema for the mcps API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec is the MCP proxy configuration.
            properties:
              context:
                description: Context is the base path for routes (must start with
                  /).
                pattern: ^/[a-zA-Z0-9\-._~!$&'()*+,;=:@%/]*[^/]$
                type: string
              deploymentState:
                description: DeploymentState toggles whether the proxy is router-attached.
                enum:
                - deployed
                - undeployed
                type: string
              displayName:
                description: DisplayName is a human-readable MCP proxy name.
                type: string
              policies:
                description: Policies are MCP proxy-level policies.
                items:
                  description: Policy defines a policy attachment as embedded in RestApi
                    or APIConfigData.
                  properties:
                    executionCondition:
                      description: ExecutionCondition Expression controlling conditional
                        execution of the policy
                      type: string
                    name:
                      description: Name Name of the policy
                      type: string
                    params:
                      description: Params Arbitrary parameters for the policy (free-form
                        key/value structure)
                      x-kubernetes-preserve-unknown-fields: true
                    version:
                      description: Version Semantic version of the policy (for example,
                        v1)
                      pattern: ^v\d+$
                      type: string
                  required:
                  - name
                  - version
                  type: object
                type: array
              prompts:
                description: Prompts lists optional prompts exposed by this MCP proxy.
                items:
                  description: MCPPrompt mirrors the management-API MCPPrompt schema.
                  properties:
                    arguments:
                      description: Arguments is the optional argument list.
                      items:
                        description: MCPPromptArgument describes one input argument
                          for an MCP prompt.
                        properties:
                          description:
                            description: Description is an optional argument description.
                            type: string
                          name:
                            description: Name is the argument name.
                            type: string
                          required:
                            description: Required marks the argument as mandatory.
                            type: boolean
                          title:
                            description: Title is an optional human-readable label.
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                    description:
                      description: Description is an optional description.
                      type: string
                    name:
                      description: Name is the unique prompt identifier.
                      type: string
                    title:
                      description: Title is an optional human-readable name.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              resources:
                description: Resources lists optional MCP resources exposed by this
                  proxy.
                items:
                  description: MCPResource mirrors the management-API MCPResource
                    schema.
                  properties:
                    description:
                      description: Description is an optional description.
                      type: string
                    mimeType:
                      description: MimeType is an optional MIME type.
                      type: string
                    name:
                      description: Name is a human-readable resource name.
                      type: string
                    size:
                      description: Size is the optional size in bytes.
                      format: int64
                      type: integer
                    title:
                      description: Title is an optional human-readable label.
                      type: string
                    uri:
                      description: Uri is a unique identifier for the resource.
                      type: string
                  required:
                  - name
                  - uri
                  type: object
                type: array
              specVersion:
                description: SpecVersion is the MCP specification version.
                type: string
              tools:
                description: Tools lists optional tools exposed by this MCP proxy.
                items:
                  description: MCPTool mirrors the management-API MCPTool schema.
                  properties:
                    description:
                      description: Description is the human-readable functional description.
                      type: string
                    inputSchema:
                      description: InputSchema is the JSON Schema for input parameters.
                      type: string
                    name:
                      description: Name is the unique tool identifier.
                      type: string
                    outputSchema:
                      description: OutputSchema is the optional JSON Schema for the
                        output.
                      type: string
                    title:
                      description: Title is an optional human-readable label.
                      type: string
                  required:
                  - description
                  - inputSchema
                  - name
                  type: object
                type: array
              upstream:
                description: Upstream is the MCP backend.
                properties:
                  auth:
                    description: Auth configures upstream credentials.
                    properties:
                      header:
                        description: Header is the HTTP header to set on outbound
                          requests.
                        type: string
                      type:
                        description: Type identifies the auth scheme. Only api-key
                          is currently supported.
                        enum:
                        - api-key
                        type: string
                      value:
                        description: Value sources the credential plaintext.
                        properties:
                          value:
                            description: |-
                              Value is the inline plaintext value. Avoid for production use; prefer
                              ValueFrom so the secret is stored in a Kubernetes Secret.
                            type: string
                          valueFrom:
                            description: |-
                              ValueFrom selects a key from a Kubernetes Secret in the same namespace
                              as the owning CR.
                            properties:
                              key:
                                description: The key of the secret to select from.  Must
                                  be a valid secret key.
                                type: string
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                              optional:
                                description: Specify whether the Secret or its key
                                  must be defined
                                type: boolean
                            required:
                            - key
                            type: object
                            x-kubernetes-map-type: atomic
                        type: object
                        x-kubernetes-validations:
                        - message: exactly one of value or valueFrom must be set
                          rule: has(self.value) != has(self.valueFrom)
                    required:
                    - type
                    - value
                    type: object
                  hostRewrite:
                    description: HostRewrite controls how the Host header is handled.
                    enum:
                    - auto
                    - manual
                    type: string
                  ref:
                    description: Ref is the name of a predefined upstream definition.
                    type: string
                  url:
                    description: Url is the direct backend URL.
                    type: string
                type: object
              upstreamDefinitions:
                description: |-
                  UpstreamDefinitions is the list of reusable upstream definitions (with optional
                  connect timeout) that upstream.ref can reference.
                items:
                  description: |-
                    UpstreamDefinition is a reusable upstream configuration with an optional connect
                    timeout and load-balancing targets. Referenced from an upstream via its `ref` field.
                    Mirrors the management-API UpstreamDefinition schema.
                  properties:
                    basePath:
                      description: BasePath Base path prefix prepended to all requests
                        routed through this upstream (e.g. /api/v2).
                      type: string
                    name:
                      description: Name Unique identifier for this upstream definition
                        (referenced by upstream.ref).
                      maxLength: 100
                      minLength: 1
                      pattern: ^[a-zA-Z0-9\-_]+$
                      type: string
                    timeout:
                      description: Timeout Optional timeout configuration for this
                        upstream (connect timeout).
                      properties:
                        connect:
                          description: Connect Connection-establishment timeout duration
                            (e.g. "5s", "500ms"). "0s" disables.
                          pattern: ^\d+(\.\d+)?(ms|s|m|h)$
                          type: string
                      type: object
                    upstreams:
                      description: Upstreams List of backend targets with optional
                        weights for load balancing.
                      items:
                        description: UpstreamTarget is a single backend target within
                          an UpstreamDefinition.
                        properties:
                          url:
                            description: Url Backend URL (host and port only; path
                              comes from the definition's basePath).
                            pattern: ^https?://[a-zA-Z0-9\-._~:/?#\[\]@!$&'()*+,;=%]+$
                            type: string
                          weight:
                            description: Weight Weight for load balancing (optional,
                              default 100).
                            maximum: 100
                            minimum: 0
                            type: integer
                        required:
                        - url
                        type: object
                      minItems: 1
                      type: array
                  required:
                  - name
                  - upstreams
                  type: object
                type: array
              version:
                description: Version is the MCP proxy semantic version.
                pattern: ^v?([0-9]+)(\.[0-9]+)?(\.[0-9]+)?(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$
                type: string
              vhost:
                description: Vhost is the virtual host for routing.
                type: string
            required:
            - displayName
            - upstream
            - version
            type: object
          status:
            description: |-
              ResourceStatus carries the controller-managed lifecycle fields shared by
              the new management-API CRDs.

              For UUID-keyed kinds (Subscription, SubscriptionPlan, Certificate) the
              gateway-controller assigns Id on first deploy; controllers persist it and
              use it to address the resource for subsequent update/delete calls.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  resource's state. The standard types are Accepted and Programmed.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              id:
                description: |-
                  Id is the gateway-issued identifier for UUID-keyed resources. When
                  set the controller addresses the resource via PUT/DELETE /<plural>/{id}.
                type: string
              lastUpdateTime:
                description: LastUpdateTime is the last time the status was updated.
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
