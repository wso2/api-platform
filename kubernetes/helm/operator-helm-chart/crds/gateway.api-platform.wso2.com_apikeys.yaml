---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: apikeys.gateway.api-platform.wso2.com
spec:
  group: gateway.api-platform.wso2.com
  names:
    kind: ApiKey
    listKind: ApiKeyList
    plural: apikeys
    shortNames:
    - apik
    singular: apikey
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ApiKey is the Schema for the apikeys API.

          The key handle in the management API is the CR's metadata.name. The
          nested REST path is built from spec.parentRef.kind + spec.parentRef.name.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ApiKeySpec mirrors the management-API APIKeyCreationRequest payload, with
              the optional inline ApiKey expressed as a SecretValueSource for external-
              key injection (so the value need not be inlined in the CR).
            properties:
              apiKey:
                description: |-
                  ApiKey is an optional pre-generated key value (>= 36 chars). When
                  supplied the gateway hashes the value rather than generating its own.
                properties:
                  value:
                    description: |-
                      Value is the inline plaintext value. Avoid for production use; prefer
                      ValueFrom so the secret is stored in a Kubernetes Secret.
                    type: string
                  valueFrom:
                    description: |-
                      ValueFrom selects a key from a Kubernetes Secret in the same namespace
                      as the owning CR.
                    properties:
                      key:
                        description: The key of the secret to select from.  Must be
                          a valid secret key.
                        type: string
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                      optional:
                        description: Specify whether the Secret or its key must be
                          defined
                        type: boolean
                    required:
                    - key
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
                x-kubernetes-validations:
                - message: exactly one of value or valueFrom must be set
                  rule: has(self.value) != has(self.valueFrom)
              displayName:
                description: DisplayName is a human-readable label for the key.
                type: string
              expiresAt:
                description: |-
                  ExpiresAt is an optional absolute expiry time.
                  Mutually exclusive with expiresIn: the ApiKey spec CEL rule
                  "!has(self.expiresAt) || !has(self.expiresIn)" rejects manifests that set both.
                format: date-time
                type: string
              expiresIn:
                description: |-
                  ExpiresIn is an optional duration after which the key expires.
                  Mutually exclusive with expiresAt: the ApiKey spec CEL rule
                  "!has(self.expiresAt) || !has(self.expiresIn)" rejects manifests that set both.
                properties:
                  duration:
                    description: Duration is the magnitude of the expiry duration
                      (must be positive).
                    format: int64
                    minimum: 1
                    type: integer
                  unit:
                    description: Unit is the time unit of the expiry duration.
                    enum:
                    - seconds
                    - minutes
                    - hours
                    - days
                    - weeks
                    - months
                    type: string
                required:
                - duration
                - unit
                type: object
              externalRefId:
                description: ExternalRefId is an optional reference id for tracing.
                type: string
              issuer:
                description: Issuer optionally constrains regeneration to a single
                  portal.
                type: string
              maskedApiKey:
                description: |-
                  MaskedApiKey is an optional masked rendering of an externally
                  generated key, used purely for display by portals.
                type: string
              parentRef:
                description: ParentRef identifies the resource the key is issued under.
                properties:
                  kind:
                    description: Kind selects the parent resource kind.
                    enum:
                    - RestApi
                    - LlmProvider
                    - LlmProxy
                    type: string
                  name:
                    description: Name is the parent resource handle (metadata.name).
                    type: string
                required:
                - kind
                - name
                type: object
            required:
            - parentRef
            type: object
            x-kubernetes-validations:
            - message: expiresAt and expiresIn are mutually exclusive
              rule: '!has(self.expiresAt) || !has(self.expiresIn)'
          status:
            description: |-
              ResourceStatus carries the controller-managed lifecycle fields shared by
              the new management-API CRDs.

              For UUID-keyed kinds (Subscription, SubscriptionPlan, Certificate) the
              gateway-controller assigns Id on first deploy; controllers persist it and
              use it to address the resource for subsequent update/delete calls.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  resource's state. The standard types are Accepted and Programmed.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              id:
                description: |-
                  Id is the gateway-issued identifier for UUID-keyed resources. When
                  set the controller addresses the resource via PUT/DELETE /<plural>/{id}.
                type: string
              lastUpdateTime:
                description: LastUpdateTime is the last time the status was updated.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
