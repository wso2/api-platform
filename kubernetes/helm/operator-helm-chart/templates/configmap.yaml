apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway-operator.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "gateway-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  config.yaml: |
    gateway:
      helm_chart_name: {{ .Values.gateway.helm.chartName | quote }}
      helm_chart_version: {{ .Values.gateway.helm.chartVersion | quote }}
{{- if .Values.gateway.helm.chartPath }}
      helm_chart_path: {{ .Values.gateway.helm.chartPath | quote }}
{{- end }}
      helm_values_file_path: {{ .Values.gateway.helm.valuesFilePath | quote }}
      insecure_registry: {{ .Values.gateway.helm.insecureRegistry | default false }}
      plain_http: {{ .Values.gateway.helm.plainHTTP | default false }}
{{- with .Values.gateway.helm.registryCredentialsSecret }}
{{- if .name }}
      registry_credentials_secret:
        name: {{ .name | quote }}
        namespace: {{ .namespace | default $.Release.Namespace | quote }}
        username_key: {{ .usernameKey | default "username" | quote }}
        password_key: {{ .passwordKey | default "password" | quote }}
{{- end }}
{{- end }}
    reconciliation:
      sync_period: {{ .Values.reconciliation.syncPeriod | default "10m" | quote }}
      max_concurrent_reconciles: {{ .Values.reconciliation.maxConcurrentReconciles | default 1 }}
      max_retry_attempts: {{ .Values.reconciliation.maxRetryAttempts | default 10 }}
      initial_backoff: {{ .Values.reconciliation.initialBackoff | default "1s" | quote }}
      max_backoff_duration: {{ .Values.reconciliation.maxBackoffDuration | default "60s" | quote }}
    logging:
      level: {{ .Values.logging.level | quote }}
      format: {{ .Values.logging.format | quote }}
    gateway_api:
      gateway_class_names:
{{- range .Values.gatewayApi.managedGatewayClassNames }}
        - {{ . | quote }}
{{- end }}
      cluster_domain: {{ .Values.gatewayApi.clusterDomain | default "cluster.local" | quote }}
