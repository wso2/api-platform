{{/*
CustomResourceDefinitions are cluster-scoped, so the apply-crds hook Job
needs this regardless of whether .Values.watchNamespaces restricts the
operator's own manager-role to a namespaced Role (see role.yaml/clusterrole.yaml).

This must itself be a pre-install,pre-upgrade hook (weighted before the
operator-crds ConfigMap and apply-crds Job) — normal, non-hook resources are
only applied AFTER pre-install/pre-upgrade hooks run, so on `helm upgrade` a
plain ClusterRoleBinding here would not exist yet when the hook Job tries to
use it.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "gateway-operator.fullname" . }}-crd-manager-role
  labels:
    app.kubernetes.io/name: {{ include "gateway-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "gateway-operator.fullname" . }}-crd-manager-rolebinding
  labels:
    app.kubernetes.io/name: {{ include "gateway-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "gateway-operator.fullname" . }}-crd-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
