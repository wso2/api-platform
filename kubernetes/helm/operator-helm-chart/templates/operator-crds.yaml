{{/*
Operator CRDs, staged as a ConfigMap for operator-crds-apply-job.yaml to
kubectl-apply.

The CRDs are served at two versions (v1 storage, v1alpha1 served) with
conversion strategy None: the v1alpha1 and v1 schemas are field-identical
(the promotion changed only the version label, see api/v1alpha1/conversion.go),
so no real field transformation is needed. If a future change to these types
actually requires per-field conversion, revisit this in favor of a real
conversion webhook (the Hub()/ConvertTo()/ConvertFrom() Go types are already
in place for that — see kubernetes/gateway-operator/api/v1alpha1/conversion.go).

This ConfigMap (and the Job that applies it) exist instead of rendering the
CRDs directly as ordinary Helm-tracked resources, and instead of Helm's
built-in crds/ directory, because:
  - crds/ is only applied on `helm install`, never updated on `helm upgrade`,
    so an existing install would never receive the new v1 version.
  - Rendering the CRDs as normal templated resources would fail on both
    fresh installs and upgrades for any CRD that already exists from an
    older chart's crds/ directory, since crds/-installed objects never carry
    Helm's ownership annotations ("resource already exists and is not
    managed by this release").
kubectl apply (in operator-crds-apply-job.yaml) doesn't check Helm's
ownership bookkeeping at all, so it works uniformly for fresh installs and
upgrades regardless of how (or whether) the CRD previously existed.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway-operator.fullname" . }}-operator-crds
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "gateway-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
{{- range $path, $_ := .Files.Glob "files/operator-crds/*.yaml" }}
{{- $crd := $.Files.Get $path | fromYaml }}
{{- $_ := set $crd.spec "conversion" (dict "strategy" "None") }}
  {{ base $path }}: |
{{ toYaml $crd | indent 4 }}
{{- end }}
