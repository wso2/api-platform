{{- if .Values.gatewayApi.installStandardCRDs }}
{{- $paths := list
  "files/gateway-api-standard/gatewayclasses.gateway.networking.k8s.io.yaml"
  "files/gateway-api-standard/gateways.gateway.networking.k8s.io.yaml"
  "files/gateway-api-standard/grpcroutes.gateway.networking.k8s.io.yaml"
  "files/gateway-api-standard/httproutes.gateway.networking.k8s.io.yaml"
  "files/gateway-api-standard/referencegrants.gateway.networking.k8s.io.yaml"
}}
{{- range $p := $paths }}
{{- $crd := fromYaml ($.Files.Get $p) }}
{{- $existing := lookup "apiextensions.k8s.io/v1" "CustomResourceDefinition" "" $crd.metadata.name }}
{{- $ownedByThisRelease := false }}
{{- if $existing }}
  {{- $relName := index $existing.metadata.annotations "meta.helm.sh/release-name" }}
  {{- $relNs := index $existing.metadata.annotations "meta.helm.sh/release-namespace" }}
  {{- $managedBy := index $existing.metadata.labels "app.kubernetes.io/managed-by" }}
  {{- if and (eq $relName $.Release.Name) (eq $relNs $.Release.Namespace) (eq $managedBy "Helm") }}
    {{- $ownedByThisRelease = true }}
  {{- end }}
{{- end }}
{{- if or (not $existing) $ownedByThisRelease }}
---
{{ $.Files.Get $p }}
{{- end }}
{{- end }}
{{- end }}
