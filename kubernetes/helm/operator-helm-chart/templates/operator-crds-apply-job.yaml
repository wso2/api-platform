{{/*
Applies the CRDs staged in the operator-crds ConfigMap directly via kubectl,
bypassing Helm's own resource-ownership tracking (see the comment in
operator-crds.yaml for why). Runs before every install and upgrade so
existing clusters — including ones whose CRDs came from an older chart
version's crds/ directory — always end up with the current CRD content.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "gateway-operator.fullname" . }}-apply-crds"
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "gateway-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: "{{ include "gateway-operator.fullname" . }}-apply-crds"
    spec:
      serviceAccountName: {{ include "gateway-operator.fullname" . }}-crd-manager
      restartPolicy: Never
      containers:
        - name: apply-crds
          image: "{{ .Values.cleanupJob.image.repository }}:{{ .Values.cleanupJob.image.tag }}"
          imagePullPolicy: {{ .Values.cleanupJob.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Applying gateway-operator CRDs..."
              for f in /crds/*.yaml; do
                echo "  kubectl apply --server-side -f $f"
                kubectl apply --server-side --force-conflicts -f "$f"
              done
              echo "CRDs applied."
          volumeMounts:
            - name: crds
              mountPath: /crds
      volumes:
        - name: crds
          configMap:
            name: {{ include "gateway-operator.fullname" . }}-operator-crds
