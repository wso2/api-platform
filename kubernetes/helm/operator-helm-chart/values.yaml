replicaCount: 1

# Namespaces to watch (cluster-wide if empty)
watchNamespaces: []

# Override the chart name used for resource naming
nameOverride: ""
# Override the full name used for resource naming
fullnameOverride: ""

# Kubernetes Gateway API (gateway.networking.k8s.io) — standard-channel CRDs v1.3.0.
# Leave false if Gateway API CRDs already exist (cloud add-on, Traefik "crd" chart, etc.).
# Setting true when those CRDs are owned by another Helm release fails with:
# "exists and cannot be imported into the current release: invalid ownership metadata".
# Duplicate CRDs can also cause server-side apply conflicts on upgrade.
# Set true only when no gateway*.gateway.networking.k8s.io CRDs are present yet.
gatewayApi:
  installStandardCRDs: true
  # Passed through to operator config.yaml as gateway_api.gateway_class_names (Gateway API / HTTPRoute flow).
  managedGatewayClassNames:
    - wso2-api-platform
  # Cluster DNS suffix for HTTPRoute → Service upstream URLs (<svc>.<ns>.svc.<clusterDomain>:<port>).
  # Override with CLUSTER_DOMAIN on the operator Pod to take precedence over this file.
  clusterDomain: cluster.local

image:
  # repository: ghcr.io/wso2/api-platform/gateway-operator
  # For local registry: host.docker.internal:5000/gateway-operator
  repository: ghcr.io/wso2/api-platform/gateway-operator
  tag: "0.6.0"
  pullPolicy: Always  # Uses locally loaded image from nerdctl load

serviceAccount:
  create: true
  name: controller-manager

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Debug settings: if enabled, the container will run under dlv (delve) for remote debugging.
debug:
  enabled: false
  # port to listen on when debug enabled
  port: 2345
  # use the same image by default; if your build image doesn't include dlv, set a debugImage
  debugImage: ""

# Pod-level security context defaults. Many images run as root by default; set
# runAsNonRoot: true only if your image runs as a non-root user. The chart will
# still force runAsUser: 0 when debug.enabled=true (Delve needs root privileges).
securityContext:
  runAsNonRoot: true
  # If you want the pod to run as a specific uid, set this (e.g. 1000). Leave
  # null to not set runAsUser and let the image default decide.
  runAsUser: 10001
  seccompProfile:
    type: RuntimeDefault

# Operator config.yaml contents (YAML block, indented)
gateway:
  controlPlaneHost: "http://platform-api:3001"
  helm:
    chartName: "oci://ghcr.io/wso2/api-platform/helm-charts/gateway"
    chartVersion: "1.0.0"
    valuesFilePath: "/config/gateway_values.yaml"
    # Allow insecure connections to OCI registries (skips TLS verification, still uses HTTPS)
    insecureRegistry: false
    # Use plain HTTP instead of HTTPS for OCI registries (for local/test registries)
    plainHTTP: false
  # Gateway chart values that will be used when deploying gateways
  # Users can override these values during helm install/upgrade
  values:
    # Default values for the Open Choreo Gateway chart.
    # This file is intended to be exhaustive and well documented; adjust per environment.

    nameOverride: ""
    fullnameOverride: ""

    imagePullSecrets: []

    commonLabels: {}
    commonAnnotations: {}

    serviceAccount:
      create: true
      annotations: {}
      name: ""

    ## moved to each component's deployment block below

    # Component-level configuration

    # Merged by the gateway-operator Helm client when a per-Gateway/APIGateway ConfigMap is
    # used: operator pod loads this file first, then deep-merges overlay YAML. Keep platform fixes
    # (probes, auth paths, images) here; the released gateway chart stays default upstream.
    gateway:
      # For default operator-managed installs, keep development mode on to avoid
      # requiring encryption key secret bootstrap during quick-start/demo flows.
      developmentMode: true
      # Shared configuration for gateway-controller and policy-engine
      # This config is mounted to both components as /configs/config.yaml
      config:
        controller:
          auth:
            basic:
              enabled: true
              users:
                - username: "admin"
                  password: "admin"
                  password_hashed: false
                  roles: ["admin"]
            idp:
              enabled: false
              roles_claim: ""
              role_mapping: {}
          # Server configuration
          server:
            # REST API port for gateway management
            api_port: 9090

            # xDS gRPC port for Envoy communication
            xds_port: 18000

            # Graceful shutdown timeout
            shutdown_timeout: 15s

            # Unique identifier for the gateway instance
            gateway_id: "platform-gateway-id"

          # Policy xDS Server configuration
          policy_server:
            # Policy xDS gRPC port for policy distribution
            port: 18001

            # TLS configuration for secure policy xDS communication
            tls:
              # Enable or disable TLS
              enabled: false

              # Path to TLS certificate file (required if TLS is enabled)
              cert_file: "./certs/server.crt"

              # Path to TLS private key file (required if TLS is enabled)
              key_file: "./certs/server.key"

          # Storage configuration
          storage:
            # Storage type: "sqlite", "postgres" (future), or "memory"
            # - sqlite: Use SQLite embedded database for persistence
            # - postgres: Use PostgreSQL database for persistence (future support)
            # - memory: No persistent storage, all configs lost on restart (useful for testing)
            type: sqlite

            # SQLite configuration (used when type=sqlite)
            sqlite:
              path: ./data/gateway.db

          # Policy configuration
          policies:
            # Directory containing policy definitions
            definitions_path: ./default-policies

          # Logging configuration
          logging:
            # Log level: "debug", "info", "warn", or "error"
            level: debug

            # Log format: "json" or "text"
            # - json: Structured JSON format (recommended for production)
            # - text: Human-readable text format (recommended for development)
            format: json

        # Router (Envoy) configuration
        router:
          # Gateway host for incoming requests
          gateway_host: "*"

          # Access logs configuration
          access_logs:
            # Enable or disable access logs
            enabled: true

            # Log format: "json" or "text"
            # - json: Structured JSON format (recommended for log aggregation)
            # - text: Human-readable text format
            format: json

            # JSON format fields - key-value pairs for structured logging
            # Uses Envoy command operators: https://www.envoyproxy.io/docs/envoy/latest/configuration/observability/access_log/usage
            json_fields:
              start_time: "%START_TIME%"
              meth: "%REQ(:METHOD)%"
              path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
              protocol: "%PROTOCOL%"
              response_code: "%RESPONSE_CODE%"
              response_flags: "%RESPONSE_FLAGS%"
              response_flags_long: "%RESPONSE_FLAGS_LONG%"
              bytes_received: "%BYTES_RECEIVED%"
              bytes_sent: "%BYTES_SENT%"
              duration: "%DURATION%"
              upstream_service_time: "%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%"
              x_forwarded_for: "%REQ(X-FORWARDED-FOR)%"
              user_agent: "%REQ(USER-AGENT)%"
              request_id: "%REQ(X-REQUEST-ID)%"
              authority: "%REQ(:AUTHORITY)%"
              upstream_host: "%UPSTREAM_HOST%"
              upstream_cluster: "%UPSTREAM_CLUSTER%"

            # Text format template - used when format is "text"
            # Uses Envoy command operators: https://www.envoyproxy.io/docs/envoy/latest/configuration/observability/access_log/usage
            text_format: |
              [%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%" %RESPONSE_CODE% %RESPONSE_FLAGS% %BYTES_RECEIVED% %BYTES_SENT% %DURATION% "%REQ(X-FORWARDED-FOR)%" "%REQ(USER-AGENT)%" "%REQ(X-REQUEST-ID)%" "%REQ(:AUTHORITY)%" "%UPSTREAM_HOST%"

          # Listener port for incoming HTTP traffic (Envoy proxy port)
          listener_port: 8080

          # HTTPS listener configuration
          https_enabled: true  # Enable/disable HTTPS listener
          https_port: 8443      # HTTPS listener port

          # Downstream TLS configuration (for HTTPS listener)
          downstream_tls:
            # Path to server certificate (PEM format)
            cert_path: "./listener-certs/default-listener.crt"

            # Path to server private key (PEM format)
            key_path: "./listener-certs/default-listener.key"

            # Minimum TLS protocol version (TLS1_0, TLS1_1, TLS1_2, TLS1_3)
            minimum_protocol_version: TLS1_2

            # Maximum TLS protocol version (TLS1_0, TLS1_1, TLS1_2, TLS1_3)
            maximum_protocol_version: TLS1_3

            # Cipher suites (comma-separated)
            ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256,ECDHE-RSA-AES128-GCM-SHA256,ECDHE-ECDSA-AES128-SHA,ECDHE-RSA-AES128-SHA,AES128-GCM-SHA256,AES128-SHA,ECDHE-ECDSA-AES256-GCM-SHA384,ECDHE-RSA-AES256-GCM-SHA384,ECDHE-ECDSA-AES256-SHA,ECDHE-RSA-AES256-SHA,AES256-GCM-SHA384,AES256-SHA"

          # Upstream configuration (TLS and timeouts for Envoy upstream)
          upstream:
            # TLS configuration for upstream connections
            tls:
              minimum_protocol_version: TLS1_2
              maximum_protocol_version: TLS1_3
              ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256,ECDHE-RSA-AES128-GCM-SHA256,ECDHE-ECDSA-AES128-SHA,ECDHE-RSA-AES128-SHA,AES128-GCM-SHA256,AES128-SHA,ECDHE-ECDSA-AES256-GCM-SHA384,ECDHE-RSA-AES256-GCM-SHA384,ECDHE-ECDSA-AES256-SHA,ECDHE-RSA-AES256-SHA,AES256-GCM-SHA384,AES256-SHA"
              trusted_cert_path: /etc/ssl/certs/ca-certificates.crt
              custom_certs_path: ./certificates  # Directory containing custom trusted certificates (e.g., self-signed certs)
              verify_host_name: true
              disable_ssl_verification: false

            # Timeout configurations for upstream connections (milliseconds)
            timeouts:
              route_timeout_ms: 60000
              route_idle_timeout_ms: 300000
              connect_timeout_ms: 5000

          # Policy Engine ext_proc filter configuration
          policy_engine:
            # Connection mode: "uds" (Unix domain socket, default) or "tcp"
            mode: uds

            # Omit host for unified gateway-runtime (Envoy talks to policy-engine over UDS).
            # Do not set host to the split-chart-only Service name (e.g. policy-engine).
            port: 9001

            # Timeout for gRPC service connection (in milliseconds)
            timeout_ms: 60000

            # Failure mode: false = fail closed (deny requests on error), true = fail open (allow requests on error)
            failure_mode_allow: false

            # Route cache action: DEFAULT, RETAIN, or CLEAR
            # RETAIN: Maintain the route cache across requests (recommended for performance)
            route_cache_action: RETAIN

            # Allow per-route override of ext_proc configuration
            allow_mode_override: true

            # Message timeout for policy engine processing (in milliseconds)
            message_timeout_ms: 60000

            # TLS configuration for policy engine connection
            tls:
              # Enable TLS for secure communication with policy engine
              enabled: false

              # Client certificate path (for mutual TLS authentication)
              cert_path: ""

              # Client private key path (for mutual TLS authentication)
              key_path: ""

              # CA certificate path (for server certificate validation)
              ca_path: ""

              # Server name for SNI (optional, defaults to host)
              server_name: ""

              # Skip server certificate verification (insecure, development only)
              skip_verify: false

        policy_engine:
          server:
            # Port for ext_proc gRPC server (receives requests from Envoy)
            extproc_port: 9001

          # Admin HTTP server configuration
          admin:
            # Enable admin HTTP server for debugging endpoints
            enabled: true

            # Port for admin HTTP server
            port: 9002

            # IP addresses allowed to access the admin API
            # Defaults to localhost only for security
            allowed_ips:
              - "*"
              - "127.0.0.1"

          config_mode:
            # Configuration mode: "file" or "xds"
            # - file: Load policy chains from static YAML file
            # - xds: Subscribe to xDS server for dynamic configuration updates
            mode: xds

          # xDS client configuration
          xds:
            # server_address is set via -xds-server flag (from GATEWAY_CONTROLLER_HOST env var)

            # Connection timeout for establishing initial connection
            connect_timeout: 10s

            # Request timeout for individual xDS requests
            request_timeout: 5s

            # Initial delay before reconnecting after connection failure
            initial_reconnect_delay: 1s

            # Maximum delay between reconnection attempts (exponential backoff)
            max_reconnect_delay: 60s

            # TLS configuration for xDS connection
            tls:
              enabled: false
              # cert_path: /path/to/client-cert.pem
              # key_path: /path/to/client-key.pem
              # ca_path: /path/to/ca-cert.pem

          # File-based configuration (not used in xDS mode)
          file_config:
            path: ""

          # Logging configuration
          logging:
            # Log level: debug, info, warn, error
            level: debug

            # Log format: json, text
            format: json

        policy_configurations: {}

      # metadata for the generated shared ConfigMap (annotations / labels)
      configMap:
        annotations: {}
        labels: {}

      controller:
        image:
          repository: ghcr.io/wso2/api-platform/gateway-controller
          tag: "1.0.0"
          pullPolicy: Always
        imagePullSecrets: []
        service:
          type: ClusterIP
          annotations: {}
          labels: {}
          ports:
            rest: 9090
            xds: 18000
            policy: 18001
            admin: 9092
            metrics: 9091
        controlPlane:
          host: host.docker.internal
          port: 8443
          token:
            value: ""
            secretName: ""
            key: token
        # TLS certificate configuration for downstream (listener) HTTPS
        tls:
          # Enable TLS certificate management
          enabled: true
          # Certificate provisioning method: "cert-manager", "secret", or "none"
          # - cert-manager: Use cert-manager to automatically provision certificates
          # - secret: Use an existing Kubernetes secret containing tls.crt and tls.key
          # - none: No TLS configuration (certificates must be provided manually)
          certificateProvider: cert-manager
          # cert-manager configuration (used when certificateProvider=cert-manager)
          certManager:
            # Create a Certificate resource
            create: true
            # Create a self-signed Issuer automatically
            # If true, a self-signed Issuer will be created with the release name
            # If false, you must provide an existing Issuer/ClusterIssuer via issuerRef
            createIssuer: true
            # Issuer reference for cert-manager
            # Note: If createIssuer=true, the 'name' field is ignored and the chart generates a unique name
            # Only set this if createIssuer=false to reference an existing Issuer/ClusterIssuer
            issuerRef:
              name: selfsigned-issuer  # Ignored when createIssuer=true
              # Use "Issuer" for namespace-scoped issuer (recommended)
              # Use "ClusterIssuer" for cluster-wide issuer
              kind: Issuer
              # group: cert-manager.io  # Optional, defaults to cert-manager.io
            # Certificate common name
            commonName: localhost
            # DNS names for the certificate
            dnsNames:
              - localhost
              - "*.localhost"
            # Certificate duration (default: 2160h = 90 days)
            duration: 2160h
            # Certificate renewal time (default: 720h = 30 days before expiry)
            renewBefore: 720h
          # Secret configuration (used when certificateProvider=secret)
          secret:
            # Name of existing secret containing tls.crt and tls.key
            name: gateway-tls
            # Key names in the secret
            certKey: tls.crt
            keyKey: tls.key
        # Upstream certificate configuration for backend TLS verification
        upstreamCerts:
          # Enable custom upstream certificates
          enabled: false
          # Existing secret containing custom CA certificates
          # Secret should contain one or more keys with PEM-encoded certificates
          secretName: ""
          # Existing ConfigMap containing custom CA certificates
          # ConfigMap should contain one or more keys with PEM-encoded certificates
          configMapName: ""
        logging:
          level: info
        storage:
          type: sqlite
          sqlitePath: ./data/gateway.db
        metrics:
          port: 9091
        persistence:
          enabled: true
          existingClaim: ""
          accessModes:
            - ReadWriteOnce
          size: 100Mi
          storageClass: ""
        deployment:
          enabled: true
          replicaCount: 1
          volumeMountPath: /app/data
          extraEnv: []
          env:
            xdsServerAddress: ""
          extraVolumeMounts: []
          extraVolumes: []
          labels: {}
          annotations: {}
          podAnnotations: {}
          podLabels: {}
          priorityClassName: ""
          # Use named port admin (controller admin HTTP server), not rest. GET /health on :9090
          # goes through Gin + basic auth and returns 401 for kube-probe; standalone chart defaults
          # use admin :9092 where /health is probe-safe.
          # Admin API is served under /api/admin/v0.9 (see gateway-controller admin OpenAPI spec).
          livenessProbe:
            httpGet:
              path: /api/admin/v0.9/health
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/admin/v0.9/health
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # Resource limits and requests
          # Uncomment and adjust based on your workload
          resources: {}
            # limits:
            #   cpu: 500m
            #   memory: 512Mi
            # requests:
            #   cpu: 250m
            #   memory: 256Mi
          podSecurityContext: {}
          securityContext: {}
          nodeSelector: {}
          tolerations: []
          affinity: {}

      gatewayRuntime:
        image:
          repository: ghcr.io/wso2/api-platform/gateway-runtime
          tag: "1.0.0"
          pullPolicy: Always
        imagePullSecrets: []
        service:
          type: ClusterIP
          annotations: {}
          labels: {}
          ports:
            http: 8080
            https: 8443
            envoyAdmin: 9901
            policyEngineAdmin: 9002
            policyEngineMetrics: 9003
        deployment:
          enabled: true
          replicaCount: 1
          env:
            gatewayControllerHost: ""
            logLevel: info
            moesifKey: ""
          extraEnv: []
          extraEnvFrom: []
          extraVolumeMounts: []
          extraVolumes: []
          labels: {}
          annotations: {}
          podAnnotations: {}
          podLabels: {}
          priorityClassName: ""
          # Probe tuning for Envoy bootstrap:
          # - readiness checks Envoy /ready on admin port
          # - liveness stays loose and uses policy-engine /health
          # - startup probe absorbs xDS/CDS bootstrap delay before readiness/liveness gates
          livenessProbe:
            exec:
              command: ["health-check.sh"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["health-check.sh"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          # Resource limits and requests
          # Uncomment and adjust based on your workload
          resources: {}
            # limits:
            #   cpu: 500m
            #   memory: 512Mi
            # requests:
            #   cpu: 250m
            #   memory: 256Mi
          podSecurityContext: {}
          securityContext: {}
          nodeSelector: {}
          tolerations: []
          affinity: {}

reconciliation:
  enabled: true
  interval: 300
  # Passed through to operator config.yaml as reconciliation.max_concurrent_reconciles (must be >= 1).
  maxConcurrentReconciles: 1
logging:
  level: "info"
  format: "json"

cleanupJob:
  image:
    repository: bitnami/kubectl
    tag: latest
    pullPolicy: IfNotPresent
