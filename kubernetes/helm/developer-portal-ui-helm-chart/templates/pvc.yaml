{{- $dp := .Values -}}
{{- $persistence := $dp.persistence -}}
{{- if and $dp.deployment.enabled $persistence.enabled (not $persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "apip.developerPortal.fullname" . }}-data
  labels:
    {{- include "apip.componentLabels" (list . "developer-portal" $persistence.labels) | nindent 4 }}
  {{- with (include "apip.annotations" (list . $persistence.annotations)) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- range $persistence.accessModes }}
    - {{ . }}
    {{- end }}
  resources:
    requests:
      storage: {{ $persistence.size }}
  {{- if $persistence.storageClass }}
  storageClassName: {{ $persistence.storageClass | quote }}
  {{- end }}
{{- end }}

