{{- $dp := .Values -}}
{{- $deployment := $dp.deployment -}}
{{- $cfg := $dp.config -}}
{{- $auth := $cfg.auth -}}
{{- $secrets := $dp.secrets -}}
{{- $tls := $dp.tls -}}
{{- $selfSigned := eq $tls.certificateProvider "selfSigned" -}}
{{- $tlsFromSecret := or (eq $tls.certificateProvider "cert-manager") (eq $tls.certificateProvider "secret") -}}
{{- $secretName := include "apip.developerPortal.secretName" . -}}
{{- $imageTag := default .Chart.AppVersion $dp.image.tag -}}
{{- $certDir := $tls.mountPath -}}
{{- $jwtKeyDir := regexReplaceAll "/[^/]+$" $auth.publicKeyPath "" -}}
{{- if $deployment.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "apip.developerPortal.fullname" . }}
  labels:
    {{- include "apip.componentLabels" (list . "developer-portal" $deployment.labels) | nindent 4 }}
  {{- with (include "apip.annotations" (list . $deployment.annotations)) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ $deployment.replicaCount }}
  {{- with $deployment.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "apip.componentSelectorLabels" (list . "developer-portal") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "apip.componentPodLabels" (list . "developer-portal" $deployment.podLabels) | nindent 8 }}
      {{- with (merge (dict) (default (dict) $deployment.podAnnotations) (default (dict) .Values.global.commonAnnotations)) }}
      annotations:
        {{- include "apip.renderStringMap" . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "apip.serviceAccountName" . }}
      {{- with (include "apip.componentImagePullSecretsBlock" (dict "root" . "componentPullSecrets" $dp.imagePullSecrets)) }}
      {{- . | nindent 6 }}
      {{- end }}
      {{- with $deployment.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $deployment.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with $deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $deployment.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if hasKey $deployment "terminationGracePeriodSeconds" }}
      terminationGracePeriodSeconds: {{ $deployment.terminationGracePeriodSeconds }}
      {{- end }}
      {{- with $deployment.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $deployment.dnsPolicy }}
      dnsPolicy: {{ . }}
      {{- end }}
      {{- with $deployment.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if hasKey $deployment "automountServiceAccountToken" }}
      automountServiceAccountToken: {{ $deployment.automountServiceAccountToken }}
      {{- end }}
      containers:
        - name: devportal
          image: {{ include "apip.componentImage" (dict "root" . "repository" $dp.image.repository "defaultRepository" "ghcr.io/wso2/api-platform/developer-portal" "tag" $imageTag) | quote }}
          imagePullPolicy: {{ $dp.image.pullPolicy }}
          {{- with $deployment.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            # Config is delivered via the mounted config.toml (see configmap.yaml);
            # only secrets are injected here, resolved into that config by its
            # {{ "{{ env \"APIP_DP_*\" }}" }} tokens.
            - name: APIP_DP_SECURITY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ $secrets.keys.encryptionKey }}
            - name: APIP_DP_SECURITY_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ $secrets.keys.sessionSecret }}
            {{- if eq $cfg.database.type "postgres" }}
            - name: APIP_DP_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ $secrets.keys.databasePassword }}
            {{- end }}
            {{- if $secrets.hasServiceApiKeyValue }}
            - name: APIP_DP_SECURITY_SERVICE_API_KEY_VALUE
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ $secrets.keys.serviceApiKeyValue }}
            {{- end }}
            {{- if and (ne $auth.idp.clientId "") $secrets.hasIdpClientSecret }}
            - name: APIP_DP_AUTH_IDP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ $secrets.keys.idpClientSecret }}
            {{- end }}
            {{- range $deployment.extraEnv }}
            - {{- toYaml . | nindent 14 }}
            {{- end }}
          {{- with $deployment.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $dp.containerPort }}
              protocol: TCP
          livenessProbe:
            {{- toYaml $deployment.livenessProbe | nindent 12 }}
          {{- with $deployment.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            {{- toYaml $deployment.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml ($deployment.resources | default dict) | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ $deployment.volumeMountPath }}
            - name: certs
              mountPath: {{ $certDir }}
              {{- if $tlsFromSecret }}
              readOnly: true
              {{- end }}
            - name: config
              mountPath: /app/configs/config.toml
              subPath: config.toml
            {{- if $secrets.hasPublicKey }}
            - name: platform-api-key
              mountPath: {{ $jwtKeyDir }}
              readOnly: true
            {{- end }}
            {{- with $deployment.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: data
          {{- if $dp.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ if $dp.persistence.existingClaim }}{{ $dp.persistence.existingClaim }}{{ else }}{{ include "apip.developerPortal.fullname" . }}-data{{ end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: certs
          {{- if $tlsFromSecret }}
          secret:
            {{- if eq $tls.certificateProvider "cert-manager" }}
            secretName: {{ include "apip.developerPortal.fullname" . }}-tls
            {{- else }}
            secretName: {{ $tls.secret.name }}
            {{- end }}
            items:
              - key: {{ if eq $tls.certificateProvider "cert-manager" }}tls.crt{{ else }}{{ $tls.secret.certKey }}{{ end }}
                path: server.crt
              - key: {{ if eq $tls.certificateProvider "cert-manager" }}tls.key{{ else }}{{ $tls.secret.keyKey }}{{ end }}
                path: server.key
          {{- else }}
          # selfSigned: writable dir where the entrypoint generates server.crt/server.key.
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ include "apip.developerPortal.fullname" . }}-config
            items:
              - key: config.toml
                path: config.toml
        {{- if $secrets.hasPublicKey }}
        # Platform API RS256 public key (PEM) mounted for auth.local.public_key_path,
        # used to verify Platform API-issued tokens. Tokens are asymmetric — there
        # is no shared HMAC secret.
        - name: platform-api-key
          secret:
            secretName: {{ $secretName }}
            items:
              - key: {{ $secrets.keys.publicKey }}
                path: {{ base $auth.publicKeyPath }}
        {{- end }}
        {{- with $deployment.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}

