# ============================================================================
# developer-portal — component chart values
# ============================================================================
# The Developer Portal (Node.js app). It has its OWN database (separate from the
# Platform API's) and authenticates users against the Platform API. Released on
# its own; used as an umbrella subchart or standalone.
#
#   global.*   Cross-cutting settings. Under an umbrella these come from the
#              umbrella; the block below is the STANDALONE default, overridden
#              when nested.
#   (rest)     This component's own settings. Structured config here is rendered
#              into APIP_DP_* environment variables on the container.
#
# `enabled` is read by the umbrella's dependency condition (ignored standalone).

# ----------------------------------------------------------------------------
# global — STANDALONE defaults only (an umbrella's global.* overrides these)
# ----------------------------------------------------------------------------
global:
  nameOverride: ""
  fullnameOverride: ""
  commonLabels: {}
  commonAnnotations: {}
  imagePullSecrets: []
  serviceAccount:
    # Standalone default is `false` → pods use the namespace "default" SA (this
    # component ships no ServiceAccount template; the umbrella creates one).
    create: false
    name: ""
    annotations: {}
    automountServiceAccountToken: true
  wso2:
    subscription:
      imagePullSecret: ""
  platformApi:
    port: 9243
    tlsEnabled: true

# ----------------------------------------------------------------------------
# Component toggle + container image
# ----------------------------------------------------------------------------
# Install the Developer Portal. Opt in per install (the umbrella sets this).
enabled: false
image:
  repository: ghcr.io/wso2/api-platform/developer-portal
  tag: "1.0.0-alpha2"
  pullPolicy: IfNotPresent
# Pull secrets for THIS component only (merged with global.imagePullSecrets).
imagePullSecrets: []

# ----------------------------------------------------------------------------
# config — rendered into /app/configs/config.toml under [developer_portal.*]
# (portals/developer-portal/configs/config-template.toml). Non-secret values are
# literals; secrets come from the referenced Secret via APIP_DP_* env tokens.
# ----------------------------------------------------------------------------
config:
  server:
    # Public URL browsers use to reach the portal (scheme follows the TLS setting).
    # Leave "" to derive it from the service + TLS; set it when fronting with a
    # real hostname so login redirects and asset URLs are correct.
    baseUrl: ""
  logging:
    level: info                  # debug | info | warn | error
    format: text                 # text | json
    consoleOnly: true            # log to stdout only (no file)

  # --- Database (the portal's OWN store, separate from the Platform API's) ---
  database:
    # sqlite   → file on the PVC; single replica; HPA unavailable.
    # postgres → external server (configured below); enables multi-replica + HPA.
    type: sqlite
    # SQLite file (type=sqlite). Must sit under the mounted data volume.
    file: /app/data/devportal.db
    # PostgreSQL connection (type=postgres only). The password is NOT here — it
    # comes from the Secret key secrets.keys.databasePassword. Leave host empty
    # for sqlite.
    host: ""
    port: 5432
    database: devportal          # database (schema) name → rendered as `name`
    user: postgres               # login role; password from the Secret
    sslmode: disable             # disable | require | verify-ca | verify-full
    sslRootCert: ""              # CA cert — used by verify-ca / verify-full
    # Connection-pool tuning (postgres only).
    maxOpenConns: 50
    minOpenConns: 2
    poolIdleTimeoutMs: 10000
    poolConnectionTimeoutMs: 30000
    poolRequestTimeoutMs: 30000

  # --- Security ---
  security:
    roleValidation: false        # enforce role checks on incoming tokens
    # A shared API key some server-to-server callers present in a header.
    serviceApiKey:
      enabled: true
      headerName: x-wso2-api-key
      # The key value itself lives in the Secret (secrets.keys.serviceApiKeyValue),
      # wired only when secrets.hasServiceApiKeyValue is true.

  # --- How the portal reaches the Platform API ---
  platformApi:
    # Leave "" to derive the in-cluster Platform API URL automatically. Set to
    # target an external Platform API.
    baseUrl: ""
    # Skip TLS verification on the portal → Platform API hop. Secure by default;
    # enable only for local dev against a self-signed Platform API cert
    # (values-local.yaml sets this true). In production supply a real/trusted cert.
    insecure: false

  # --- Authentication ---
  auth:
    # Filesystem path where the Platform API's RS256 public key PEM is mounted;
    # used (auth.local mode) to verify Platform API-issued tokens. The key is
    # supplied via the Secret (secrets.keys.publicKey) when secrets.hasPublicKey
    # is true, and mounted at this path.
    publicKeyPath: /etc/devportal/keys/jwt_public.pem
    # JWT claim-name mappings — which token claim carries each field.
    claimMappings:
      organization: org_name     # claim carrying the org ID
      roles: roles               # claim carrying the user's roles
      groups: groups
    # OIDC login (optional). Rendered as auth.mode=idp when idp.clientId is set;
    # otherwise the portal uses local (Platform API) login. The client secret
    # comes from the Secret (secrets.keys.idpClientSecret), wired only when
    # secrets.hasIdpClientSecret=true.
    idp:
      name: ""
      issuer: ""
      authorizationUrl: ""
      tokenUrl: ""
      userInfoUrl: ""
      jwksUrl: ""
      clientId: ""
      callbackUrl: ""
      logoutUrl: ""
      scope: "openid profile email"
      audience: ""
      certificate: ""            # PEM to pin the IDP's signing cert (optional)
      signUpUrl: ""
      logoutRedirectUri: ""
      orgCallback: false         # redirect to the org's own landing page after login
      silentSso: true
      tokenRefreshTimeoutMs: 10000
      # Map IDP role names to the portal's internal roles (idp mode).
      roles:
        admin: admin
        subscriber: Internal/subscriber
        superAdmin: superAdmin

  organization:
    defaultName: default                    # default organization name; "" disables auto-seeding
    autoCreateSubscriptionPlans: true       # auto-create Bronze/Silver/Gold/Unlimited/AsyncUnlimited

  # --- Webhook delivery tuning (global) ---
  webhooksDelivery:
    pollIntervalMs: 2000
    batchSize: 50
    signatureToleranceSec: 300

  # --- "Try It" console (calls user-supplied endpoints; SSRF-sensitive) ---
  tryout:
    enabled: true
    # false → only https:// endpoints may be called.
    allowHttpEndpoints: true
    # Deny-by-default: allow the portal to call private/internal addresses only
    # when the gateway legitimately sits on a private address, after confirming
    # only intended services are reachable. Link-local/cloud-metadata addresses
    # are refused regardless.
    allowPrivateEndpoints: false
    tlsSkipVerify: false         # development only
    timeoutMs: 15000
    maxRequestBytes: 1048576     # 1 MiB
    maxResponseBytes: 5242880    # 5 MiB

# Escape hatch: raw config.toml appended verbatim (env vars still override it).
configToml: ""

# ----------------------------------------------------------------------------
# secrets — reference to a pre-created Kubernetes Secret (REQUIRED)
# ----------------------------------------------------------------------------
# The chart never creates or embeds secret values. Point existingSecret at a
# Secret made by ./generate-secrets.sh. Render FAILS if it's unset. Required keys:
# ENCRYPTION_KEY and SESSION_SECRET (both 64-char hex; the portal fails closed at
# startup without them). Optional keys — DB password (postgres), OIDC client
# secret, service API key value, and the Platform API RS256 public key PEM (to
# verify Platform API-issued tokens; tokens are asymmetric, so there is no shared
# HMAC secret) — are wired only when the matching has* flag below is true.
# `keys` maps each logical name to the key inside that Secret.
secrets:
  existingSecret: ""
  keys:
    encryptionKey: ENCRYPTION_KEY          # → APIP_DP_SECURITY_ENCRYPTION_KEY
    sessionSecret: SESSION_SECRET          # → APIP_DP_SECURITY_SESSION_SECRET
    databasePassword: DATABASE_PASSWORD    # → APIP_DP_DATABASE_PASSWORD (postgres)
    idpClientSecret: IDP_CLIENT_SECRET     # → APIP_DP_AUTH_IDP_CLIENT_SECRET (idp mode)
    serviceApiKeyValue: SERVICE_API_KEY_VALUE  # → APIP_DP_SECURITY_SERVICE_API_KEY_VALUE
    publicKey: jwt_public.pem              # mounted file → config.auth.publicKeyPath
  # Flip to true ONLY if the referenced Secret actually carries that optional key,
  # so the deployment wires it. generate-secrets.sh sets these for you in the
  # values-secrets.yaml it writes.
  hasPublicKey: true
  hasIdpClientSecret: false
  hasServiceApiKeyValue: false

# ----------------------------------------------------------------------------
# service — how the portal is exposed
# ----------------------------------------------------------------------------
service:
  type: LoadBalancer            # LoadBalancer | NodePort | ClusterIP
  annotations: {}
  labels: {}
  port: 3000
  clusterIP: ""
  externalTrafficPolicy: ""
  loadBalancerClass: ""
  loadBalancerSourceRanges: []
  ipFamilyPolicy: ""
  ipFamilies: []
  nodePort: ""

# Port the portal process listens on.
containerPort: 3000

# ----------------------------------------------------------------------------
# tls — certificate for the portal's HTTPS listener (APIP_DP_TLS_*)
# ----------------------------------------------------------------------------
tls:
  # selfSigned   → the app auto-generates a self-signed pair at startup (demo).
  # secret       → mount an existing Secret's tls.crt / tls.key.
  # cert-manager → provision a Certificate via cert-manager and mount it.
  certificateProvider: selfSigned
  # Where certs are mounted / read from (matches APIP_DP_TLS_CERTFILE etc.).
  mountPath: /app/certs
  certManager:
    create: true
    createIssuer: true
    issuerRef:
      name: selfsigned-issuer
      kind: Issuer
    commonName: devportal.localhost
    dnsNames:
      - devportal.localhost
      - "*.localhost"
    duration: 2160h
    renewBefore: 720h
  secret:
    name: devportal-tls          # used when certificateProvider=secret
    certKey: tls.crt
    keyKey: tls.key

# ----------------------------------------------------------------------------
# persistence — the PVC backing SQLite
# ----------------------------------------------------------------------------
persistence:
  enabled: true                 # required for database.type=sqlite
  existingClaim: ""             # reuse a PVC you created yourself instead
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  storageClass: ""              # "" = cluster default StorageClass
  labels: {}
  # Annotations for the PVC ONLY (rendered only when persistence.enabled). The
  # resource-policy=keep annotation makes the PVC — and its data — SURVIVE
  # `helm uninstall`; a later `helm install` with the SAME release name re-adopts
  # it. To intentionally wipe it:
  #   kubectl delete pvc <release>-developer-portal-data
  # Set to {} if you'd rather the PVC be deleted on uninstall.
  annotations:
    helm.sh/resource-policy: keep

# ----------------------------------------------------------------------------
# deployment — the pod/Deployment spec
# ----------------------------------------------------------------------------
deployment:
  enabled: true
  replicaCount: 1               # >1 requires database.type=postgres
  volumeMountPath: /app/data
  extraEnv: []
  extraEnvFrom: []
  extraVolumeMounts: []
  extraVolumes: []
  labels: {}
  annotations: {}
  podAnnotations: {}
  podLabels: {}
  priorityClassName: ""
  livenessProbe:
    httpGet: { path: /, port: http, scheme: HTTPS }
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet: { path: /, port: http, scheme: HTTPS }
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  # Set CPU requests if you enable the HPA, so it can compute utilization.
  resources: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  strategy: {}
  hostAliases: []
  dnsPolicy: ""
  dnsConfig: {}

# ----------------------------------------------------------------------------
# Autoscaling & disruption budget
# ----------------------------------------------------------------------------
# HorizontalPodAutoscaler. REQUIRES config.database.type=postgres — on sqlite the
# chart refuses to render it (SQLite is single-replica). Enable only after
# switching to postgres, and set deployment.resources.requests.cpu.
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80    # 0 or "" to disable CPU-based scaling
  targetMemoryUtilizationPercentage: "" # set a number to also scale on memory
  customMetrics: []                     # extra autoscaling/v2 MetricSpec entries
  behavior: {}                          # autoscaling/v2 scaleUp/scaleDown tuning

# PodDisruptionBudget. Only meaningful at replicaCount >= 2 (with one replica
# minAvailable: 1 blocks node drains). Set exactly ONE of the two below.
podDisruptionBudget:
  enabled: false
  minAvailable: 1               # integer or percentage string, e.g. "50%"
  maxUnavailable: ""            # integer or percentage string, e.g. "25%"

# Extra metadata for the generated ConfigMap.
configMap:
  annotations: {}
  labels: {}
