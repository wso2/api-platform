# Triggers the operator: Helm installs release named platform-gw-gateway, then registers the gateway-controller Service.
# Per-Gateway Helm values (platform-gw-values) enable cert-manager–issued listener TLS so Envoy serves HTTPS (8443).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gw
  namespace: gateway-api-demo
  annotations:
    # Prevent this Gateway from matching RestApi CRs intended for APIGateway (CRD mode) in mixed demos.
    # RestApi selection uses GatewayRegistry APISelector; default for Gateway is Cluster.
    gateway.api-platform.wso2.com/api-selector: '{"scope":"LabelSelector","matchLabels":{"gateway.api-platform.wso2.com/restapi-target":"k8s"}}'
  labels:
    app.kubernetes.io/part-of: gateway-api-operator-demo
spec:
  gatewayClassName: wso2-api-platform
  # spec.infrastructure.annotations / labels are propagated to the gateway-runtime Service
  # by the operator. The reserved "service-type" annotation drives gateway.gatewayRuntime.service.type.
  infrastructure:
    labels:
      environment: dev
      team: platform
    annotations:
      # gateway.api-platform.wso2.com/service-type: LoadBalancer
      prometheus.io/scrape: "true"
  listeners:
    - name: http
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      port: 8443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: Same
