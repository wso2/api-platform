# Secret + APIPolicy: subscription-validation with subscriptionKeyHeader from Secret (operator resolves
# valueFrom before POST to gateway-controller; Secret watch re-reconciles HTTPRoute on data changes).
#
# Apply together with 03-httproute-secret-policy.yaml (order between Secret and APIPolicy does not matter).
apiVersion: v1
kind: Secret
metadata:
  name: httproute-demo-policy-credentials
  namespace: gateway-api-demo
  labels:
    app.kubernetes.io/part-of: gateway-api-httproute-policies-demo
type: Opaque
stringData:
  subscriptionKey: My-Key
---
apiVersion: gateway.api-platform.wso2.com/v1alpha1
kind: APIPolicy
metadata:
  name: httproute-demo-rule-secret-params
  namespace: gateway-api-demo
  labels:
    app.kubernetes.io/part-of: gateway-api-httproute-policies-demo
spec:
  policies:
    - name: subscription-validation
      version: v1
      params:
        subscriptionKeyHeader:
          valueFrom:
            name: httproute-demo-policy-credentials
            valueKey: subscriptionKey
