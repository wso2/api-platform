# Secret + APIPolicy: subscription-validation with subscriptionKeyHeader resolved from a Secret
# via the k8s-native `valueFrom.secretKeyRef` shape (mirrors PodSpec `env[].valueFrom.secretKeyRef`).
# The operator resolves valueFrom to a string before POSTing to gateway-controller, and the Secret
# watch re-reconciles the HTTPRoute when the Secret's data changes.
#
# Apply together with 03-httproute-secret-policy.yaml (order between Secret and APIPolicy does not matter).
apiVersion: v1
kind: Secret
metadata:
  name: httproute-demo-policy-credentials
  namespace: gateway-api-demo
  labels:
    app.kubernetes.io/part-of: gateway-api-httproute-policies-demo
type: Opaque
stringData:
  subscriptionKey: My-Key
---
apiVersion: gateway.api-platform.wso2.com/v1alpha1
kind: APIPolicy
metadata:
  name: httproute-demo-rule-secret-params
  namespace: gateway-api-demo
  labels:
    app.kubernetes.io/part-of: gateway-api-httproute-policies-demo
spec:
  policies:
    - name: subscription-validation
      version: v1
      params:
        subscriptionKeyHeader:
          valueFrom:
            secretKeyRef:
              name: httproute-demo-policy-credentials
              key: subscriptionKey
              # namespace: <optional; defaults to the APIPolicy namespace>
        # ConfigMap values use the symmetric shape:
        # someParam:
        #   valueFrom:
        #     configMapKeyRef:
        #       name: some-config
        #       key: some-key
