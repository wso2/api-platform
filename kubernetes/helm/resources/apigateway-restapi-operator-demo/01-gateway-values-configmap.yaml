apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-gateway-values
  namespace: apigateway-demo
data:
  # The operator expects this key to be named exactly `values.yaml`.
  # These are *overrides* deep-merged into the operator's default gateway_values.yaml.
  values.yaml: |
    gateway:
      controller:
        encryptionKeys:
          enabled: true
          secretName: gateway-encryption-keys
      gatewayRuntime:
        service:
          type: ClusterIP

