apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-backend
  namespace: apigateway-demo
  labels:
    app.kubernetes.io/name: mcp-server-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-server-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-server-backend
    spec:
      containers:
        - name: mcp-server-backend
          image: rakhitharr/mcp-everything:v3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server-backend
  namespace: apigateway-demo
  labels:
    app.kubernetes.io/name: mcp-server-backend
spec:
  selector:
    app.kubernetes.io/name: mcp-server-backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
