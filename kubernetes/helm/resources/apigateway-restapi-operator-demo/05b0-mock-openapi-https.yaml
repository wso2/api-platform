apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-openapi-prism-openapi-yaml
  namespace: apigateway-demo
  labels:
    app.kubernetes.io/name: mock-openapi
data:
  openapi.yaml: |
    openapi: 3.0.3
    info:
      title: Demo LLM Mock (gateway/it/mock-api parity — OpenAI chat)
      version: 1.0.0
    paths:
      /health:
        get:
          summary: Health check
          responses:
            "200":
              description: Service is healthy
      /openai/v1/chat/completions:
        post:
          summary: Create chat completion
          operationId: createChatCompletion
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - model
                    - messages
                  properties:
                    model:
                      type: string
                    messages:
                      type: array
                      items:
                        type: object
                        required:
                          - role
                          - content
                        properties:
                          role:
                            type: string
                            enum:
                              - system
                              - user
                              - assistant
                          content:
                            type: string
          responses:
            "200":
              description: Successful response
              content:
                application/json:
                  example:
                    id: chatcmpl-B9MBs8CjcvOU2jLn4n570S5qMJKcT
                    object: chat.completion
                    created: 1741569952
                    model: gpt-4.1-2025-04-14
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: "Hello! How can I assist you today?"
                          refusal: null
                          annotations: []
                        logprobs: null
                        finish_reason: stop
                    usage:
                      prompt_tokens: 19
                      completion_tokens: 10
                      total_tokens: 29
                      prompt_tokens_details:
                        cached_tokens: 0
                        audio_tokens: 0
                      completion_tokens_details:
                        reasoning_tokens: 0
                        audio_tokens: 0
                        accepted_prediction_tokens: 0
                        rejected_prediction_tokens: 0
                    service_tier: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-openapi-https-nginx-conf
  namespace: apigateway-demo
  labels:
    app.kubernetes.io/name: mock-openapi-https
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 8443 ssl;
        server_name mock-openapi-https;
        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        location / {
          proxy_pass http://mock-openapi:4010;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto https;
          proxy_set_header Connection "";
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-openapi
  namespace: apigateway-demo
  labels:
    app.kubernetes.io/name: mock-openapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-openapi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-openapi
    spec:
      containers:
        - name: prism
          image: stoplight/prism:5.14.3
          args:
            - mock
            - /api/openapi.yaml
            - --host
            - "0.0.0.0"
            - --errors
            - --verboseLevel
            - info
          env:
            - name: TMPDIR
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - name: http
              containerPort: 4010
          volumeMounts:
            - name: openapi
              mountPath: /api/openapi.yaml
              subPath: openapi.yaml
              readOnly: true
            - name: prism-tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 4010
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4010
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: openapi
          configMap:
            name: mock-openapi-prism-openapi-yaml
        - name: prism-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mock-openapi
  namespace: apigateway-demo
  labels:
    app.kubernetes.io/name: mock-openapi
spec:
  selector:
    app.kubernetes.io/name: mock-openapi
  ports:
    - name: http
      port: 4010
      targetPort: 4010
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-openapi-https
  namespace: apigateway-demo
  labels:
    app.kubernetes.io/name: mock-openapi-https
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-openapi-https
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-openapi-https
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
          ports:
            - name: https
              containerPort: 8443
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tls
              mountPath: /etc/nginx/certs
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-logs
              mountPath: /var/log/nginx
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: nginx-conf
          configMap:
            name: mock-openapi-https-nginx-conf
        - name: tls
          secret:
            secretName: mock-openapi-https-tls
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mock-openapi-https
  namespace: apigateway-demo
  labels:
    app.kubernetes.io/name: mock-openapi-https
spec:
  selector:
    app.kubernetes.io/name: mock-openapi-https
  ports:
    - name: https
      port: 9449
      targetPort: 8443
