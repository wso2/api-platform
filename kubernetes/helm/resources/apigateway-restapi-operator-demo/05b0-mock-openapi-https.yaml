# --------------------------------------------------------------------
# OpenAI-compatible HTTP mock + HTTPS terminator (composition matches
# gateway/it/docker-compose.test.yaml: prism `mock-openapi` + nginx
# `mock-openapi-https`). Prism serves /health and /openai/v1/chat/completions on
# :4010 using a bundled spec aligned with gateway/it/mock-api/paths/openai/chat.yaml.
# Nginx listens on 8443; Service exposes port 9449 (avoids clashes with Rancher on 9443).
# LlmProvider URL:
#   https://mock-openapi-https:9449/openai/v1
#
# Integration tests compose file: gateway/it/docker-compose.test.yaml — services
# `mock-openapi` (Stoplight Prism on :4010 + ./mock-api) and `mock-openapi-https`
# (nginx:1.25 TLS; IT compose publishes host 9443→8443 — this demo uses Service 9449→8443).
#
# This manifest is Kubernetes-native Prism + nginx with a bundled OpenAPI and a
# small demo TLS Secret (SANs include both demo namespaces).
#
# Deploy in the same namespace as gateway workloads (typically apigateway-demo).
# Apply before 05b-llm-resources.yaml. See README "LLM upstream mock".
# --------------------------------------------------------------------

