apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-backend
  namespace: apigateway-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-backend
  template:
    metadata:
      labels:
        app: hello-backend
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0
          args:
            - "-text=hello from apigateway + restapi demo"
            - "-listen=:5678"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: hello-backend
  namespace: apigateway-demo
spec:
  selector:
    app: hello-backend
  ports:
    - name: http
      port: 5678
      targetPort: 5678

