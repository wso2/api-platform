{{- $ui := .Values -}}
{{- $cfg := $ui.config -}}
{{- if $ui.deployment.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "apip.aiWorkspace.fullname" . }}-config
  labels:
    {{- include "apip.componentLabels" (list . "ai-workspace" $ui.configMap.labels) | nindent 4 }}
  {{- with (include "apip.annotations" (list . $ui.configMap.annotations)) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  config.toml: |
    domain = {{ $cfg.domain | quote }}
    default_org_region = {{ $cfg.defaultOrgRegion | quote }}
    auth_mode = {{ $cfg.authMode | quote }}
    {{- with $cfg.controlplaneHost }}
    controlplane_host = {{ . | quote }}
    {{- end }}
    platform_gateway_versions = {{ $cfg.platformGatewayVersions | quote }}
    {{- if eq $cfg.authMode "oidc" }}

    # --- OIDC (client secret is injected via environment, never written here) ---
    oidc_authority = {{ $cfg.oidc.authority | quote }}
    oidc_client_id = {{ $cfg.oidc.clientId | quote }}
    {{- with $cfg.oidc.redirectUrl }}
    oidc_redirect_url = {{ . | quote }}
    {{- end }}
    {{- with $cfg.oidc.postLogoutRedirectUrl }}
    oidc_post_logout_redirect_url = {{ . | quote }}
    {{- end }}
    {{- with $cfg.oidc.scope }}
    oidc_scope = {{ . | quote }}
    {{- end }}
    oidc_username_claim = {{ $cfg.oidc.usernameClaim | quote }}
    oidc_org_id_claim = {{ $cfg.oidc.orgIdClaim | quote }}
    oidc_org_name_claim = {{ $cfg.oidc.orgNameClaim | quote }}
    oidc_org_handle_claim = {{ $cfg.oidc.orgHandleClaim | quote }}
    {{- end }}
    {{- with $ui.configToml }}

    {{ . | nindent 4 | trim }}
    {{- end }}
{{- end }}

