# Local development values for the ai-workspace-ui chart.
# Usage (standalone):
#   helm install ai-workspace-ui ./ai-workspace-ui-helm-chart -f values-local.yaml
#
# Overrides the defaults for local development:
# - developmentMode on (self-signed TLS, basic/file-based login)
# - locally-built image (latest tag, IfNotPresent pull policy)
global:
  developmentMode: true

image:
  tag: "latest"
  pullPolicy: IfNotPresent
