# Local development values for the ai-workspace-ui chart.
# Usage (standalone, from kubernetes/helm/):
#   helm install ai-workspace-ui ./ai-workspace-ui-helm-chart \
#     -f ai-workspace-ui-helm-chart/values.yaml -f ai-workspace-ui-helm-chart/values-local.yaml
#
# Overrides the defaults for local development:
# - locally-built image (latest tag, IfNotPresent pull policy)
# - debug logging; skip TLS verification to the Platform API's self-signed cert
image:
  tag: "latest"
  pullPolicy: IfNotPresent

config:
  logging:
    level: debug
  controlPlane:
    tlsSkipVerify: true
