# GatewayClass the conformance suite is pointed at via `-gateway-class wso2-api-platform`.
# Its controllerName must match the operator's PlatformGatewayControllerName so the
# operator reconciles Gateways of this class and provisions the gateway-runtime.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: wso2-api-platform
spec:
  controllerName: gateway.api-platform.wso2.com/gateway-operator
