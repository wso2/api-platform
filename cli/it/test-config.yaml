    # End-to-end flow: apiproject init -> devportal build -> rest-api publish ->
    # api-key generate -> sub-plan publish -> subscription create.
    e2e:
      - id: DP-E2E-001
        name: build publish key plan subscribe end to end
        enabled: true
        requires: [CLI, DEVPORTAL]
