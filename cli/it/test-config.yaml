# CLI Integration Test Configuration
# ===================================
# Enable/disable tests and view their dependencies.
# Set 'enabled: false' to skip specific tests.
# Phase 1 infrastructure starts automatically based on enabled test dependencies.
#
# Infrastructure IDs:
#   CLI            - CLI binary (ap)
#   GATEWAY_IMAGES - Gateway Docker images (built from source)
#   GATEWAY        - Gateway stack (controller, router, policy-engine, sample-backend)
#   MCP_SERVER     - MCP server backend

# Infrastructure configuration
infrastructure:
  compose_file: ../../gateway/it/docker-compose.test.yaml
  startup_timeout: 120s
  health_check_interval: 5s
  docker_registry: localhost:5000
  image_tag: test-v1.0.0

# Test definitions with dependencies
tests:
  gateway:
    manage:
      - id: GW-MANAGE-001
        name: gateway add with valid parameters
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-MANAGE-002
        name: gateway add without name flag
        enabled: true
        requires: [CLI]

      - id: GW-MANAGE-003
        name: gateway add with invalid server URL
        enabled: true
        requires: [CLI]

      - id: GW-MANAGE-004
        name: gateway add duplicate name
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-MANAGE-005
        name: gateway list
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-MANAGE-006
        name: gateway list when empty
        enabled: true
        requires: [CLI]

      - id: GW-MANAGE-007
        name: gateway remove existing
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-MANAGE-008
        name: gateway remove non-existent
        enabled: true
        requires: [CLI]

      - id: GW-MANAGE-009
        name: gateway use existing
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-MANAGE-010
        name: gateway use non-existent
        enabled: true
        requires: [CLI]

      - id: GW-MANAGE-011
        name: gateway current
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-MANAGE-012
        name: gateway current when none set
        enabled: true
        requires: [CLI]

      - id: GW-MANAGE-013
        name: gateway health
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-MANAGE-014
        name: gateway health unreachable
        enabled: true
        requires: [CLI]

    apply:
      - id: GW-APPLY-001
        name: apply valid API yaml
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-APPLY-002
        name: apply invalid yaml format
        enabled: true
        requires: [CLI]

      - id: GW-APPLY-003
        name: apply missing file
        enabled: true
        requires: [CLI]

      - id: GW-APPLY-004
        name: apply valid MCP yaml
        enabled: true
        requires: [CLI, GATEWAY, MCP_SERVER]

    api:
      - id: GW-API-001
        name: api list
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-API-002
        name: api list empty
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-API-003
        name: api get existing
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-API-004
        name: api get non-existent
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-API-005
        name: api delete existing
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-API-006
        name: api delete non-existent
        enabled: true
        requires: [CLI, GATEWAY]

    mcp:
      - id: GW-MCP-001
        name: mcp generate valid server
        enabled: true
        requires: [CLI, MCP_SERVER]

      - id: GW-MCP-002
        name: mcp generate invalid server URL
        enabled: true
        requires: [CLI]

      - id: GW-MCP-003
        name: mcp generate unreachable server
        enabled: true
        requires: [CLI]

      - id: GW-MCP-004
        name: mcp list
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-MCP-005
        name: mcp list empty
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-MCP-006
        name: mcp get existing
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-MCP-007
        name: mcp get non-existent
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-MCP-008
        name: mcp delete existing
        enabled: true
        requires: [CLI, GATEWAY]

      - id: GW-MCP-009
        name: mcp delete non-existent
        enabled: true
        requires: [CLI, GATEWAY]

    build:
      - id: GW-BUILD-001
        name: build invalid manifest
        enabled: true
        requires: [CLI]

      - id: GW-BUILD-002
        name: build missing manifest file
        enabled: true
        requires: [CLI]

  # Developer portal CLI command tests.
  # The DEVPORTAL infrastructure starts a postgres + developer-portal stack from
  # portals/developer-portal/it/docker-compose.test.yaml (port 3000 published).
  # Requires the developer-portal :test image to be built first
  # (see `make build-devportal-image`).
  #
  # Scenarios tagged @wip in the feature files are SKIPPED regardless of the flags
  # below (they depend on server-side changes / fixtures not yet in place, e.g.
  # application APIs and the API publish artifact).
  devportal:
    manage:
      - id: DP-MANAGE-001
        name: devportal add with api-key auth
        enabled: true
        requires: [CLI]

      - id: DP-MANAGE-002
        name: devportal add without server flag
        enabled: true
        requires: [CLI]

      - id: DP-MANAGE-003
        name: devportal add with invalid auth type
        enabled: true
        requires: [CLI]

      - id: DP-MANAGE-004
        name: devportal list
        enabled: true
        requires: [CLI]

      - id: DP-MANAGE-005
        name: devportal list when empty
        enabled: true
        requires: [CLI]

      - id: DP-MANAGE-006
        name: devportal use existing
        enabled: true
        requires: [CLI]

      - id: DP-MANAGE-007
        name: devportal use non-existent
        enabled: true
        requires: [CLI]

      - id: DP-MANAGE-008
        name: devportal current
        enabled: true
        requires: [CLI]

      - id: DP-MANAGE-009
        name: devportal current when none set
        enabled: true
        requires: [CLI]

      - id: DP-MANAGE-010
        name: devportal remove existing
        enabled: true
        requires: [CLI]

      - id: DP-MANAGE-011
        name: devportal remove non-existent
        enabled: true
        requires: [CLI]

      - id: DP-MANAGE-012
        name: devportal health
        enabled: true
        requires: [CLI, DEVPORTAL]

      - id: DP-MANAGE-013
        name: devportal health unreachable
        enabled: true
        requires: [CLI]

    organization:
      - id: DP-ORG-001
        name: org list
        enabled: true
        requires: [CLI, DEVPORTAL]

      - id: DP-ORG-002
        name: org get seeded organization
        enabled: true
        requires: [CLI, DEVPORTAL]

      - id: DP-ORG-003
        name: org get without org flag
        enabled: true
        requires: [CLI, DEVPORTAL]

      - id: DP-ORG-004
        name: org create (wip)
        enabled: false
        requires: [CLI, DEVPORTAL]

      - id: DP-ORG-005
        name: org delete (wip)
        enabled: false
        requires: [CLI, DEVPORTAL]

    api:
      - id: DP-API-001
        name: rest-api list
        enabled: true
        requires: [CLI, DEVPORTAL]

      - id: DP-API-002
        name: rest-api list without org flag
        enabled: true
        requires: [CLI, DEVPORTAL]

      - id: DP-API-003
        name: rest-api get without flags
        enabled: true
        requires: [CLI, DEVPORTAL]

      - id: DP-API-004
        name: rest-api publish (wip)
        enabled: false
        requires: [CLI, DEVPORTAL]

      - id: DP-API-005
        name: rest-api get (wip)
        enabled: false
        requires: [CLI, DEVPORTAL]

      - id: DP-API-006
        name: rest-api delete (wip)
        enabled: false
        requires: [CLI, DEVPORTAL]

    subscription:
      - id: DP-SUB-001
        name: subscription list
        enabled: true
        requires: [CLI, DEVPORTAL]

      - id: DP-SUB-002
        name: subscription list without org flag
        enabled: true
        requires: [CLI, DEVPORTAL]

      - id: DP-SUB-003
        name: subscription create without flags
        enabled: true
        requires: [CLI, DEVPORTAL]

      - id: DP-SUB-004
        name: subscription create (wip)
        enabled: false
        requires: [CLI, DEVPORTAL]

      - id: DP-SUB-005
        name: subscription delete (wip)
        enabled: false
        requires: [CLI, DEVPORTAL]

    apikey:
      - id: DP-APIKEY-001
        name: api-key get without flags
        enabled: true
        requires: [CLI, DEVPORTAL]

      - id: DP-APIKEY-002
        name: api-key generate (wip)
        enabled: false
        requires: [CLI, DEVPORTAL]

      - id: DP-APIKEY-003
        name: api-key get (wip)
        enabled: false
        requires: [CLI, DEVPORTAL]

    application:
      - id: DP-APP-001
        name: application create without flags
        enabled: true
        requires: [CLI, DEVPORTAL]

      - id: DP-APP-002
        name: application create (wip - server alignment pending)
        enabled: false
        requires: [CLI, DEVPORTAL]

      - id: DP-APP-003
        name: application list (wip - server alignment pending)
        enabled: false
