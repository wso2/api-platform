# Developer Portal Configuration
#
# Only settings that differ from the built-in defaults need to be listed here —
# see configs/config-template.toml for the full list of available keys and
# their default values.
#
# Precedence (lowest to highest):
#   1. Built-in defaults (src/config/configDefaults.js)
#   2. This file, with any {{ env }} / {{ file }} references resolved
#
# There is no automatic APIP_DP_* environment-variable override — an env var (or
# a mounted file) only takes effect where a key below explicitly references it,
# using Handlebars-style template syntax as the value. Use single-quoted TOML
# literal strings (as below) so the inner double quotes need no escaping:
#
#   platform_api_url = '{{ env "APIP_DP_AUTH_LOCAL_PLATFORM_API_URL" }}'
#   encryption_key = '{{ file "/secrets/devportal/encryption-key" }}'
#
#   {{ env "NAME" }}            -> NAME's value. FAILS CLOSED (aborts startup) if
#                                   NAME is unset or empty — it does not fall
#                                   through to the built-in default shown above.
#   {{ env "NAME" "default" }}  -> NAME's value if set, else the literal
#                                   "default".
#   {{ file "/path" }}          -> contents of /path, trimmed. Always required —
#                                   a missing/unreadable/disallowed file is a
#                                   hard startup error.
#
# Partial substitution works too: 'foo-{{ env "X" }}' resolves to "foo-bar" if
# X=bar. See src/config/configLoader.js for the full implementation.
#
# This file's own fallbacks (the third arg to {{ env "NAME" "default" }} below)
# are intentionally wired for the Docker Compose topology (docker-compose.yaml),
# NOT for src/config/configDefaults.js's generic, dependency-free defaults —
# e.g. server.https.enabled defaults to true here (a real cert is bind-mounted at
# /etc/devportal/tls) vs. false in configDefaults.js (no cert available for a
# bare `npm start`). configDefaults.js's DEFAULTS only take effect for keys this
# file doesn't list at all (idp, organization, uploads, etc.), or if this file
# itself were absent entirely (e.g. the packaged `pkg` binary run standalone) —
# see configDefaults.js's own comment for why its values stay generic.
#
# Running locally without Docker? Use `npm run start:local` instead of
# `npm start` (package.json) — it overrides server.https.enabled and auth.local.* to
# values that make sense outside Compose, all in one place.
# Plain `npm start` inherits this file's Compose-oriented defaults as-is and
# will fail trying to read a TLS cert path that only exists in the containers.

[developer_portal.server]
port = '{{ env "APIP_DP_SERVER_PORT" "3000" }}'

# Single listener on server.port; enabled toggles whether it terminates TLS. Set
# enabled=false only when a trusted upstream (proxy/LB/ingress) terminates TLS —
# the listener then serves plain HTTP on that port. cert_file/key_file must point
# at a real pair when enabled=true (no self-signed fallback).
[developer_portal.server.https]
enabled   = '{{ env "APIP_DP_SERVER_HTTPS_ENABLED" "true" }}'
cert_file = '{{ env "APIP_DP_SERVER_HTTPS_CERT_FILE" "/etc/devportal/tls/cert.pem" }}'
key_file  = '{{ env "APIP_DP_SERVER_HTTPS_KEY_FILE" "/etc/devportal/tls/key.pem" }}'

[developer_portal.logging]
level        = '{{ env "APIP_DP_LOGGING_LEVEL" "info" }}'   # debug | info | warn | error
format       = '{{ env "APIP_DP_LOGGING_FORMAT" "text" }}'  # text | json
console_only = '{{ env "APIP_DP_LOGGING_CONSOLE_ONLY" "true" }}'

[developer_portal.database]
driver = '{{ env "APIP_DP_DATABASE_DRIVER" "sqlite" }}'   # sqlite | postgres
# SQLite path. Relative — resolves to /app/data/devportal.db under Compose (cwd
# /app), matching the sqlite_data volume mount at /app/data; Docker creates that
# directory itself as the volume's mount point, so no extra step is needed there.
# `npm start` (cwd = repo root) resolves this to ./data/devportal.db instead —
# that directory does NOT get created automatically; see README's
# "Development (npm start)" section.
path = '{{ env "APIP_DP_DATABASE_PATH" "./data/devportal.db" }}'
# PostgreSQL connection — used when driver = "postgres" (e.g. the
# docker-compose.postgres.yaml override sets these).
host     = '{{ env "APIP_DP_DATABASE_HOST" "localhost" }}'
port     = '{{ env "APIP_DP_DATABASE_PORT" "5432" }}'
name     = '{{ env "APIP_DP_DATABASE_NAME" "devportal" }}'
user     = '{{ env "APIP_DP_DATABASE_USER" "postgres" }}'
password = '{{ env "APIP_DP_DATABASE_PASSWORD" "" }}'

[developer_portal.security]
# Required — devportal fails closed at startup if either doesn't resolve to a
# 64-char hex string. Generate with: openssl rand -hex 32
encryption_key = '{{ env "APIP_DP_SECURITY_ENCRYPTION_KEY" }}'
session_secret = '{{ env "APIP_DP_SECURITY_SESSION_SECRET" }}'

[developer_portal.auth.local]
# The upstream Platform API. Used for local auth credential validation when
# auth.mode = "local".
platform_api_url = '{{ env "APIP_DP_AUTH_LOCAL_PLATFORM_API_URL" "https://platform-api:9243" }}'
# The Platform API's RS256 public key — the matching half of its
# [platform_api.auth.jwt].private_key. A PEM is multi-line and cannot survive an
# env file, so the *path* is the env-overridable part and the PEM itself is read
# from disk: scripts/setup.sh generates the keypair and docker-compose.yaml mounts
# it at /etc/devportal/keys (on the {{ file }} allowlist). `npm run start:local`
# overrides the path to the host-side copy in resources/keys.
jwt_public_key   = '{{ file (env "APIP_DP_AUTH_LOCAL_JWT_PUBLIC_KEY_FILE" "/etc/devportal/keys/jwt_public.pem") }}'
tls_skip_verify  = '{{ env "APIP_DP_AUTH_LOCAL_TLS_SKIP_VERIFY" "true" }}'
