# Developer Portal Configuration
#
# Only settings that differ from the built-in defaults need to be listed here —
# see configs/config-template.toml for the full list of available keys and
# their default values.
#
# Precedence (lowest to highest):
#   1. Built-in defaults (src/config/configDefaults.js)
#   2. This file, with any {{ env }} / {{ file }} references resolved
#
# There is no automatic APIP_DP_* environment-variable override — an env var (or
# a mounted file) only takes effect where a key below explicitly references it,
# using Handlebars-style template syntax as the value. Use single-quoted TOML
# literal strings (as below) so the inner double quotes need no escaping:
#
#   base_url       = '{{ env "APIP_DP_SERVER_BASEURL" }}'
#   encryption_key = '{{ file "/secrets/devportal/encryption-key" }}'
#
#   {{ env "NAME" }}            -> NAME's value. FAILS CLOSED (aborts startup) if
#                                   NAME is unset or empty — it does not fall
#                                   through to the built-in default shown above.
#   {{ env "NAME" "default" }}  -> NAME's value if set, else the literal
#                                   "default".
#   {{ file "/path" }}          -> contents of /path, trimmed. Always required —
#                                   a missing/unreadable/disallowed file is a
#                                   hard startup error.
#
# Partial substitution works too: 'foo-{{ env "X" }}' resolves to "foo-bar" if
# X=bar. See src/config/configLoader.js for the full implementation.
#
# This file's own fallbacks (the third arg to {{ env "NAME" "default" }} below)
# are intentionally wired for the Docker Compose topology (docker-compose.yaml),
# NOT for src/config/configDefaults.js's generic, dependency-free defaults —
# e.g. tls.enabled defaults to true here (a real cert is bind-mounted at
# /etc/devportal/tls) vs. false in configDefaults.js (no cert available for a
# bare `npm start`). configDefaults.js's DEFAULTS only take effect for keys this
# file doesn't list at all (idp, organization, uploads, etc.), or if this file
# itself were absent entirely (e.g. the packaged `pkg` binary run standalone) —
# see configDefaults.js's own comment for why its values stay generic.
#
# Running locally without Docker? Use `npm run start:local` instead of
# `npm start` (package.json) — it overrides tls.enabled, server.base_url, and
# platform_api.* to values that make sense outside Compose, all in one place.
# Plain `npm start` inherits this file's Compose-oriented defaults as-is and
# will fail trying to read a TLS cert path that only exists in the containers.

[server]
base_url = '{{ env "APIP_DP_SERVER_BASEURL" "https://localhost:3000" }}'

[tls]
enabled   = '{{ env "APIP_DP_TLS_ENABLED" "true" }}'
cert_file = '{{ env "APIP_DP_TLS_CERTFILE" "/etc/devportal/tls/cert.pem" }}'
key_file  = '{{ env "APIP_DP_TLS_KEYFILE" "/etc/devportal/tls/key.pem" }}'
ca_file   = '{{ env "APIP_DP_TLS_CAFILE" "/etc/devportal/tls/cert.pem" }}'

[logging]
console_only = '{{ env "APIP_DP_LOGGING_CONSOLEONLY" "true" }}'

[database]
# Relative — resolves to /app/data/devportal.db under Compose (cwd /app),
# matching the sqlite_data volume mount at /app/data; Docker creates that
# directory itself as the volume's mount point, so no extra step is needed
# there. `npm start` (cwd = repo root) resolves this to ./data/devportal.db
# instead — that directory does NOT get created automatically; see README's
# "Development (npm start)" section.
file = '{{ env "APIP_DP_DATABASE_FILE" "./data/devportal.db" }}'

[platform_api]
# Used for local auth credential validation when idp.client_id is empty.
base_url   = '{{ env "APIP_DP_PLATFORMAPI_BASEURL" "https://platform-api:9243" }}'
jwt_secret = '{{ env "APIP_DP_PLATFORMAPI_JWTSECRET" "" }}'
insecure   = '{{ env "APIP_DP_PLATFORMAPI_INSECURE" "true" }}'

[security]
# Required — devportal fails closed at startup if either doesn't resolve to a
# 64-char hex string. Generate with: openssl rand -hex 32
encryption_key = '{{ env "APIP_DP_SECURITY_ENCRYPTIONKEY" }}'
session_secret = '{{ env "APIP_DP_SECURITY_SESSIONSECRET" }}'
