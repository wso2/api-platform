# =============================================================================
# DEVELOPER PORTAL CONFIGURATION TEMPLATE
# =============================================================================
# Documentation reference only — enumerates every supported config.toml key
# with its default value, as plain literals. See configs/config.toml for the
# concrete file this project actually ships, which wires some of these same
# keys up to environment variables using the syntax below.
#
# Precedence (lowest to highest):
#   1. Built-in defaults (src/config/configDefaults.js)
#   2. configs/config.toml, with any {{ env }} / {{ file }} references resolved
#
# There is no automatic environment-variable override. A key's value comes
# from an env var or a file ONLY if you explicitly say so, using Handlebars-
# style template syntax as the value. Use single-quoted TOML literal strings
# (as below) so the inner double quotes need no backslash-escaping:
#
#   platform_api_url = '{{ env "APIP_DP_AUTH_LOCAL_PLATFORM_API_URL" }}'
#   encryption_key = '{{ file "/secrets/devportal/encryption-key" }}'
#
#   {{ env "NAME" }}            -> NAME's value. FAILS CLOSED (aborts startup)
#                                   if NAME is unset or empty — it does not
#                                   fall through to the built-in default shown
#                                   below.
#   {{ env "NAME" "default" }}  -> NAME's value if set, else the literal
#                                   "default".
#   {{ file "/path" }}          -> contents of /path, trimmed. Always
#                                   required — a missing/unreadable/
#                                   disallowed file is a hard startup error.
#
# Partial substitution works too: 'foo-{{ env "X" }}' resolves to "foo-bar"
# if X=bar.

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================
# Single listener on server.port. https.enabled toggles whether it terminates
# TLS itself; set enabled=false only when a trusted upstream (proxy/LB/ingress)
# terminates TLS — the listener then serves plain HTTP on that port.
# cert_file/key_file are required only when enabled=true (no self-signed fallback).

[developer_portal.server]
base_url = '{{ env "APIP_DP_SERVER_BASE_URL" "https://localhost:9543" }}'
port = 9543

[developer_portal.server.https]
enabled = false
cert_file = "./resources/security/client-truststore.pem"
key_file = "./resources/security/private-key.pem"

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================

[developer_portal.logging]
level = "info"          # debug | info | warn | error
format = "text"         # text | json
console_only = true     # true: log to stdout only. false: also write rotating log files to disk

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
# Supported types: sqlite (default), postgres.

[developer_portal.database]
driver = "sqlite"             # sqlite | postgres | mssql
path = "./devportal.db"       # SQLite only
host = "localhost"            # PostgreSQL / MSSQL only
port = 5432                   # PostgreSQL / MSSQL only (Change to 1433 for MSSQL)
name = "devportal"            # PostgreSQL / MSSQL only
user = "postgres"             # PostgreSQL / MSSQL only
password = ""                 # PostgreSQL / MSSQL only
ssl_mode = "disable"          # PostgreSQL / MSSQL only: disable | verify-full
ssl_root_cert = "./resources/security/ca.pem"   # CA cert - used by verify-full

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================

[developer_portal.security]
encryption_key = ""     # 64-char hex — AES-256-GCM key for encrypting secrets at rest
session_secret = ""     # 64-char hex — express-session signing secret

# Static shared-secret header for calling the devportal's own REST API.
[developer_portal.security.service_api_key]
enabled = true
header_name = "x-wso2-api-key"
value = ""

# =============================================================================
# AUTHENTICATION
# =============================================================================
# A mode gate plus the two backends it selects between: local (the default) and
# idp. Configure the block matching your chosen mode; the other is ignored.

[developer_portal.auth]
# "local" — username/password validated against the Platform API control plane
# ([developer_portal.auth.local] below). "idp" — external OIDC IDP (auth.idp below).
mode = "local"          # local | idp
role_validation = false # Enforce per-operation role validation

# JWT claim name mappings — which token claim carries each field.
# Dot-notation supported for nested claims (e.g. "realm_access.roles").
[developer_portal.auth.claim_mappings]
organization = "org_name"   # claim carrying the org ID
roles = "roles"             # claim carrying the user's roles
groups = "groups"

# Local auth backend (the Platform API control plane) — used when auth.mode =
# "local". Leave platform_api_url empty to disable local auth entirely.
[developer_portal.auth.local]
platform_api_url = ""
public_key_path = ""    # path to the Platform API's RS256 public key PEM
tls_skip_verify = false

# Identity provider (OAuth2 / OIDC) — used when auth.mode = "idp".
[developer_portal.auth.idp]
name = "IS"
issuer = "https://localhost:9443/oauth2/token"
authorization_url = "https://localhost:9443/oauth2/authorize"
token_url = "https://localhost:9443/oauth2/token"
user_info_url = "https://localhost:9443/oauth2/userinfo"
client_id = ""
client_secret = ""
audience = ""
callback_url = "http://localhost:9543/default/callback"
scope = "openid profile email"
sign_up_url = ""
logout_url = "https://localhost:9443/oidc/logout"
logout_redirect_uri = "http://localhost:9543/default"
certificate = ""
jwks_url = "https://localhost:9443/oauth2/jwks"
token_refresh_timeout_ms = 10000
silent_sso = true      # Enable silent SSO
org_callback = false   # Redirect to the org's own landing page after login

# Maps IDP role names to devportal's internal roles.
[developer_portal.auth.idp.roles]
admin = "admin"
subscriber = "Internal/subscriber"
super_admin = "superAdmin"

# =============================================================================
# PAGE ACCESS RULES
# =============================================================================
# Additions only — the portal always protects its own pages (applications,
# api-keys, subscriptions, settings) regardless of what's listed here. Use these
# lists to require login/authorization for a custom page you've added, e.g. a
# design-mode page or a custom static route. Patterns are glob-matched (minimatch)
# against the request URL and merged with (never replace) the built-in list.
#
# [developer_portal.page_access_rules]
# authenticated = ["**/my-custom-page"]
# authorized = ["**/my-custom-page"]

# =============================================================================
# ORGANIZATION CONFIGURATION
# =============================================================================
# Bootstraps a default organization on startup (idempotent).

[developer_portal.organization]
default_name = "default"                 # "" disables auto-seeding
auto_create_subscription_plans = true    # Auto-create Bronze/Silver/Gold/Unlimited/AsyncUnlimited

# =============================================================================
# DESIGN MODE CONFIGURATION
# =============================================================================
# Local, file-based preview mode — APIs/layouts load from disk instead of the
# database. For content authoring and theming workflows only; do not enable
# in a production environment. Disabled (commented) by default.

# [developer_portal.design_mode]
# enabled = false
# path_to_layout = "./src/defaultContent/"
# api_samples_path = "./samples/apis/"
# mcp_samples_path = "./samples/mcps/"
# subscription_plans_path = "./samples/subscription-plans.yaml"
# applications_path = "./samples/applications.yaml"

# =============================================================================
# WEBHOOKS CONFIGURATION (gateway event delivery)
# =============================================================================
# Global delivery tuning only — subscribers are per-organization, managed via
# the Webhook Subscribers API, not this file. Each delivery is attempted
# exactly once; there is no retry/backoff.

[developer_portal.webhooks.delivery]
poll_interval_ms = 2000
batch_size = 50
signature_tolerance_sec = 300

# =============================================================================
# API TRY-IT PROXY
# =============================================================================
# The "Try It" panel on an API's specification page runs in the browser and
# calls the API's registered endpoint, which is a different origin from the
# portal — so the browser blocks the response unless that endpoint returns CORS
# headers naming this portal. Rather than requiring every gateway and backend to
# trust the portal origin, the panel is pointed at a same-origin proxy that makes
# the call server-side.
#
# The proxy will only call a URL contained by one of the endpoints registered for
# that API (production/sandbox) — a caller cannot choose an arbitrary host.
# Link-local and cloud-metadata addresses (169.254.169.254 and friends) are
# refused at connection time regardless of the settings below.

[developer_portal.tryout]
enabled = true
allow_http_endpoints = true    # false: only https:// endpoints may be called
allow_private_endpoints = true # false: refuse endpoints resolving to private/loopback ranges
tls_skip_verify = false        # development only
timeout_ms = 15000
max_request_bytes = 1048576    # 1 MiB
max_response_bytes = 5242880   # 5 MiB
