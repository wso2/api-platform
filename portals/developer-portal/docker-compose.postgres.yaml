# PostgreSQL override for the development variant.
#
# Usage:
#   docker compose -f docker-compose.yaml -f docker-compose.postgres.yaml up
#
# This file merges with docker-compose.yaml:
#   - Adds the postgres service.
#   - Overrides devportal DB env vars to point at postgres.
#   - Adds a postgres depends_on condition to devportal.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: devportal
      POSTGRES_PASSWORD: devportal
      POSTGRES_DB: devportal
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devportal -d devportal"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  devportal:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APIP_DP_DATABASE_TYPE: postgres
      APIP_DP_DATABASE_HOST: postgres
      APIP_DP_DATABASE_PORT: 5432
      APIP_DP_DATABASE_USERNAME: devportal
      APIP_DP_DATABASE_PASSWORD: devportal
      APIP_DP_DATABASE_NAME: devportal
      APIP_DP_DATABASE_FILE: ""

volumes:
  postgres_data:
