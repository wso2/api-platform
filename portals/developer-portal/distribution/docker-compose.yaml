# Developer Portal — standalone distribution variant (assembled by `make dist`).
# Uses pre-built images from GHCR. For the build-from-source variant see
# the docker-compose.yml one level up.
#
# Quick start:
#   1. (Optional) Edit configs/config-platform-api.toml to adjust users/org as needed
#      — ships with a default admin/admin user, ready to use as-is.
#   2. docker compose up
#   3. Open https://localhost:3000/default/views/default  (accept the self-signed cert warning)
#      Login with a user defined in configs/config-platform-api.toml (default: admin / admin)
#
# Secrets:
#   Set AUTH_JWT_SECRET_KEY in your shell or in a .env file to persist login sessions
#   across Platform API restarts. When unset a random key is generated at startup.
#
# Configuration:
#   Edit configs/config.yaml to customise devportal settings.
#   Edit configs/config-platform-api.toml to customise Platform API settings (users, org, etc.).
#   Every devportal config value can also be overridden via a DP_* env var.
#   Create a .env file next to this file for persistent overrides.
#
# Demo mode (on by default):
#   demo=false docker compose up
#   Disables the "Seed sample APIs" button in Settings and the onboarding prompt.
#
# Database:
#   SQLite is used by default — no external database required.
#   To switch to PostgreSQL:
#     1. Uncomment the `postgres` service below.
#     2. Replace the DP_DB_* SQLite block in the `devportal` service with
#        the PostgreSQL block that is commented out beneath it.
#
# TLS:
#   A self-signed certificate is generated automatically on first start and stored
#   in the certs_data volume. Your browser will show a security warning — click
#   "Proceed" (or "Advanced → Proceed") to continue.
#   To use your own certificate, replace the certs_data volume with a bind-mount:
#     - ./my-certs:/app/certs:ro
#   and ensure it contains server.crt and server.key.

services:
  # ── Platform API (Go HTTPS backend — handles local auth) ────────────────────
  platform-api:
    image: ghcr.io/wso2/api-platform/platform-api:0.11.0-SNAPSHOT
    container_name: platform-api
    restart: unless-stopped
    command: ["-config", "/etc/platform-api/config-platform-api.toml"]
    environment:
      - AUTH_JWT_SECRET_KEY=${AUTH_JWT_SECRET_KEY:-}
    volumes:
      - ./configs/config-platform-api.toml:/etc/platform-api/config-platform-api.toml:ro
      - platform-api-data:/app/data
    ports:
      - "9243:9243"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9243/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - devportal-network

  # ── PostgreSQL (optional) ────────────────────────────────────────────────────
  # Uncomment this service and replace the DP_DB_* block in `devportal` below
  # with the PostgreSQL block to switch from SQLite to PostgreSQL.
  #
  # postgres:
  #   image: postgres:16
  #   environment:
  #     POSTGRES_USER: devportal
  #     POSTGRES_PASSWORD: devportal
  #     POSTGRES_DB: devportal
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ./database:/docker-entrypoint-initdb.d:ro
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U devportal -d devportal"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 15s
  #   networks:
  #     - devportal-network

  devportal:
    image: ghcr.io/wso2/api-platform/developer-portal:0.3.0-SNAPSHOT
    depends_on:
      platform-api:
        condition: service_healthy
      # Uncomment when using PostgreSQL:
      # postgres:
      #   condition: service_healthy
    ports:
      - "3000:3000"   # Developer Portal UI (HTTPS)
    volumes:
      # Mount config from the configs/ directory.
      - ./configs/config.yaml:/app/configs/config.yaml:ro
      # Persist the SQLite database file across container restarts.
      - sqlite_data:/app/data
      # Persist the auto-generated TLS certificate across container restarts.
      # To use your own cert, replace with: - ./my-certs:/app/certs:ro
      - certs_data:/app/certs
    environment:
      # ── Database: SQLite (default) ───────────────────────────────────────────
      DP_DB_DIALECT: sqlite
      DP_DB_STORAGE: /app/data/devportal.db

      # ── Database: PostgreSQL (optional) ─────────────────────────────────────
      # Remove the SQLite block above and uncomment this block to use PostgreSQL.
      # Also uncomment the `postgres` service and `depends_on` above.
      #
      # DP_DB_DIALECT: postgres
      # DP_DB_HOST: postgres
      # DP_DB_PORT: 5432
      # DP_DB_USERNAME: devportal
      # DP_DB_PASSWORD: devportal
      # DP_DB_DATABASE: devportal

      # HTTPS — a self-signed cert is generated automatically on first start.
      # To switch back to plain HTTP, set DP_ADVANCED_HTTP=true and DP_BASEURL=http://localhost:3000.
      DP_ADVANCED_HTTP: "false"
      DP_BASEURL: "https://localhost:3000"
      DP_SERVERCERTS_PATHTOCERT: "/app/certs/server.crt"
      DP_SERVERCERTS_PATHTOPK: "/app/certs/server.key"
      DP_SERVERCERTS_PATHTOCA: "/app/certs/server.crt"

      # Seed a default organization on startup (idempotent)
      DP_DEFAULTORGNAME: "default"

      # Demo mode — on by default. When enabled, the Settings > Manage APIs page
      # shows a "Seed sample APIs" button and admins get a one-time onboarding
      # prompt to deploy sample APIs/MCPs. Disable with:
      #   demo=false docker compose up
      DP_DEMO_ENABLED: "${demo:-true}"

      # Auto-generate default subscription plans for every new org
      DP_GENERATEDEFAULTSUBPLANS: "true"

      # Log to console only (no rotating log files)
      DP_LOGGING_CONSOLEONLY: "true"

      # Platform API — used for local auth credential validation.
      # Set DP_PLATFORMAPI_JWTSECRET to the same value as AUTH_JWT_SECRET_KEY so
      # the devportal can verify Platform API JWTs locally (no per-request login call).
      DP_PLATFORMAPI_BASEURL: "https://platform-api:9243"
      DP_PLATFORMAPI_JWTSECRET: ${AUTH_JWT_SECRET_KEY:-}
      DP_PLATFORMAPI_INSECURE: "true"   # Platform API uses a self-signed cert in this dev setup

      # AES-256-GCM key for encrypting subscription tokens and webhook secrets at rest.
      # Generate once with: openssl rand -hex 32
      # Store in .env as: DP_ADVANCED_ENCRYPTIONKEY=<64-char hex>
      # Must remain stable across restarts — changing it makes existing encrypted data unreadable.
      DP_ADVANCED_ENCRYPTIONKEY: ${DP_ADVANCED_ENCRYPTIONKEY:-}
    env_file:
      - path: .env
        required: false   # Optional — create a .env file to add your own overrides
    networks:
      - devportal-network

volumes:
  sqlite_data:
    driver: local
  certs_data:
    driver: local
  platform-api-data:
    driver: local
  # postgres_data:      # Uncomment when using PostgreSQL
  #   driver: local

networks:
  devportal-network:
    driver: bridge
