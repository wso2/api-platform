apiVersion: devportal.api-platform.wso2.com/v1
kind: RestApi

metadata:
  name: catalog-api-v1.0

spec:
  type: REST
  displayName: Catalog API
  version: v1.0
  description: Sample product catalog API. Requires API key authentication. Subscribe to a Gold or Bronze plan — no subscription token header required in requests.
  provider: WSO2
  status: PUBLISHED
  referenceID: catalog-api-v1.0

  tags:
    - catalog
    - api-key
    - subscription

  labels:
    - default

  subscriptionPlans:
    - Gold
    - Bronze

  visibility: PUBLIC
  agentVisibility: VISIBLE
  visibleGroups: []

  businessInformation:
    businessOwner: Platform Owner
    businessOwnerEmail: support@example.com
    technicalOwner: API Team
    technicalOwnerEmail: architecture@example.com

  endpoints:
    sandboxUrl: http://localhost:8080/catalog
    productionUrl: http://localhost:8080/catalog
