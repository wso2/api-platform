apiVersion: devportal.api-platform.wso2.com/v1
kind: SOAP

metadata:
  name: leisure-soap-v1.0

spec:
  type: SOAP
  displayName: Leisure Activities API
  version: v1.0
  description: Search and book leisure activities — sports, wellness, entertainment, and outdoor experiences — via a SOAP/WSDL interface.
  status: PUBLISHED

  tags:
    - soap
    - leisure
    - booking
    - activities

  labels:
    - default

  subscriptionPlans:
    - Gold
    - Silver

  agentVisibility: VISIBLE

  businessInformation:
    businessOwner: Platform Owner
    businessOwnerEmail: support@example.com
    technicalOwner: API Team
    technicalOwnerEmail: architecture@example.com

  endpoints:
    productionUrl: https://leisure.example.com/services/LeisureService
    sandboxUrl: http://localhost:8082/services/LeisureService
