# Platform API only — for local development with npm start
#
# Quick start:
#   1. Run ./setup.sh once — generates the required secrets into api-platform.env
#      (also read directly by `npm start` below) and configs/config-platform-api.toml.
#   2. Build the Platform API image from source (../../platform-api):
#        cd ../../platform-api && make build
#      This is required — the published 0.10.0 image on ghcr.io predates the
#      /auth/login endpoint that the username/password login form here uses.
#   3. docker compose -f docker-compose.platform-api.yaml up -d
#   4. npm start
#   5. Open http://localhost:3000
#      Login with the admin credentials ./setup.sh printed.
#
# There is no ephemeral/demo fallback — the Platform API fails closed at startup
# if APIP_CP_ENCRYPTION_KEY or APIP_CP_AUTH_JWT_SECRET_KEY is missing (both are
# generated by ./setup.sh into api-platform.env and loaded here via env_file:).

services:
  # One-shot init container: generates the TLS pair the platform-api HTTPS
  # listener requires (the server no longer generates a self-signed fallback).
  platform-api-certgen:
    image: alpine/openssl
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        [ -f /certs/cert.pem ] && [ -f /certs/key.pem ] && exit 0
        openssl req -x509 -newkey rsa:2048 -sha256 -days 365 -nodes \
          -keyout /certs/key.pem -out /certs/cert.pem \
          -subj "/O=WSO2 API Platform/CN=platform-api" \
          -addext "subjectAltName=DNS:localhost,DNS:platform-api,IP:127.0.0.1"
    volumes:
      - platform-api-certs:/certs

  platform-api:
    image: ghcr.io/wso2/api-platform/platform-api:0.11.0
    container_name: platform-api
    restart: unless-stopped
    command: ["-config", "/etc/platform-api/config-platform-api.toml"]
    env_file:
      - path: api-platform.env
        required: false   # APIP_CP_ENCRYPTION_KEY / APIP_CP_AUTH_JWT_SECRET_KEY /
                           # AUTH_FILE_BASED_USERS live here — run ./setup.sh to generate it.
    volumes:
      - ./configs/config-platform-api.toml:/etc/platform-api/config-platform-api.toml:ro
      - platform-api-data:/app/data
      - platform-api-certs:/app/data/certs
    ports:
      - "9243:9243"
    depends_on:
      platform-api-certgen:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9243/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  platform-api-data:
  platform-api-certs:
