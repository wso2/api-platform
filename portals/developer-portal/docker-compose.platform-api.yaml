# Platform API only — for local development with npm start
#
# Quick start:
#   1. Build the Platform API image from source (../../platform-api):
#        cd ../../platform-api && make build
#      This is required — the published 0.10.0 image on ghcr.io predates the
#      /auth/login endpoint that the username/password login form here uses.
#   2. docker compose -f docker-compose.platform-api.yaml up -d
#   3. npm start
#   4. Open http://localhost:3000
#      Login: admin / admin
#
# AUTH_JWT_SECRET_KEY (signs login sessions; share the same value with the devportal's
# APIP_DP_PLATFORMAPI_JWTSECRET) and ENCRYPTION_KEY (encrypts data at rest) are both REQUIRED —
# set them in your shell or a .env file. Both are 32-byte keys (64 hex chars / base64 —
# openssl rand -hex 32). The Platform API fails to start if either is missing.

services:
  platform-api:
    image: ghcr.io/wso2/api-platform/platform-api:0.11.0
    container_name: platform-api
    restart: unless-stopped
    command: ["-config", "/etc/platform-api/config-platform-api.toml"]
    volumes:
      - ./configs/config-platform-api.toml:/etc/platform-api/config-platform-api.toml:ro
      - platform-api-data:/app/data
    ports:
      - "9243:9243"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9243/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  platform-api-data:
