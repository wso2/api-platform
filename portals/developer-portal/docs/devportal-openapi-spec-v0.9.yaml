      required:
        - id
        - displayName
        - type
      properties:
        id:
          type: string
          description: >-
            Desired handle for the plan (unique per org), stored as-is. When the plan is created from a
            SubscriptionPlan YAML artifact instead, the handle is always taken from `metadata.name`.
          example: Gold
        refId:
          type: string
          description: Platform API subscription plan UUID to associate with this plan.
        displayName:
          type: string
        description:
          type: string
        type:
          type: string
          enum:
            - requestcount
            - eventcount
          description: Service accepts case-insensitive `requestcount` or `eventcount`.
        requestCount:
          oneOf:
            - type: integer
            - type: string
          description: Required for request-count plans. Use -1 for unlimited.
        eventCount:
          oneOf:
            - type: integer
            - type: string
          description: Required for event-count plans. Use -1 for unlimited.
    LabelRequest:
      type: object
      required:
        - id
        - displayName
      properties:
        id:
          type: string
          example: premium
          description: Desired handle for the label (unique per org), stored as-is.
        displayName:
          type: string
          example: Premium APIs
      additionalProperties: false
    ApplicationRequest:
      type: object
      required:
        - displayName
        - description
      properties:
        displayName:
          type: string
