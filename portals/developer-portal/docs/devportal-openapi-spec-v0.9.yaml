    post:
      tags:
        - Subscriptions
      operationId: regenerateSubscriptionToken
      summary: Regenerate subscription token
      description: >-
        Regenerates the subscription token, immediately invalidating the old one. A
        `subscription.token_regenerated` webhook event is published to the organization's
        configured webhook subscribers so they can update the token at the gateway.
        The new plaintext token is returned in the response.
      responses:
        "200":
          $ref: "#/components/responses/SubscriptionResponse"
        "404":
          $ref: "#/components/responses/SimpleNotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:subscription_manage
  /apis/{apiId}/api-keys/generate:
    parameters:
      - $ref: "#/components/parameters/apiId"
    post:
      tags:
        - API Keys
      operationId: generateApiKey
      summary: Generate an API key
      description: >-
        Generates an API key stored in the Developer Portal (devportal is source of truth). The plaintext secret is
        returned once in the response and never persisted. A `apikey.generated` webhook event is published to the
        organization's configured webhook subscribers so they can register the key (e.g. with a gateway). Key `id`
        must match `^[a-z0-9][a-z0-9_-]{0,127}$`, and `expiresAt` must include a timezone when sent as an ISO-8601
        string.
      requestBody:
        $ref: "#/components/requestBodies/ApiKeyBody"
      responses:
        "201":
          description: Generated API key. The plaintext `key` is returned exactly once.
          headers:
            Location:
              description: URL of the generated API key resource.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyResponse"
              example:
                keyId: key-12345
                id: weather_prod_key
                displayName: Weather Prod Key
                key: ak_dGhpcyBpcyBub3QgYSByZWFsIGtleQ
                expiresAt: "2026-12-31T23:59:59Z"
                status: ACTIVE
        "400":
          $ref: "#/components/responses/SimpleBadRequest"
        "403":
          $ref: "#/components/responses/SimpleForbidden"
        "404":
          $ref: "#/components/responses/SimpleNotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_key_create
            - dp:api_key_manage
  /apis/{apiId}/api-keys:
    parameters:
      - $ref: "#/components/parameters/apiId"
    get:
      tags:
        - API Keys
      operationId: listApiKeys
      summary: List API keys
      description: Lists API keys for the given API.
      parameters:
        - $ref: "#/components/parameters/appIdQueryOptional"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          $ref: "#/components/responses/ApiKeyListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_key_read
            - dp:api_key_manage
  /apis/{apiId}/api-keys/regenerate:
    parameters:
      - $ref: "#/components/parameters/apiId"
    post:
      tags:
        - API Keys
      operationId: regenerateApiKey
      summary: Regenerate an API key
      description: >-
        Regenerates the secret for an existing API key identified by `keyId` in the request body. An
        `apikey.regenerated` webhook event is published to the organization's configured webhook subscribers so they
        can invalidate the old secret (e.g. at a gateway). The new plaintext secret is returned once and never persisted.
      requestBody:
        $ref: "#/components/requestBodies/ApiKeyRegenerateBody"
      responses:
        "200":
          $ref: "#/components/responses/ApiKeyGenerateResponse"
        "403":
          $ref: "#/components/responses/SimpleForbidden"
        "404":
          $ref: "#/components/responses/SimpleNotFound"
        "409":
          description: The key has already been revoked and cannot be regenerated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleErrorResponse"
              example:
                code: "409"
                message: Cannot regenerate a revoked key
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_key_update
            - dp:api_key_manage
  /apis/{apiId}/api-keys/revoke:
    parameters:
      - $ref: "#/components/parameters/apiId"
    post:
      tags:
        - API Keys
      operationId: revokeApiKey
      summary: Revoke an API key
      description: >-
        Revokes an existing API key identified by `keyId` in the request body. An `apikey.revoked` webhook event is
        published to the organization's configured webhook subscribers so they can immediately reject requests
        carrying the key (e.g. at a gateway).
      requestBody:
        $ref: "#/components/requestBodies/ApiKeyRevokeBody"
      responses:
        "204":
          description: API key revoked successfully.
        "403":
          $ref: "#/components/responses/SimpleForbidden"
        "404":
          $ref: "#/components/responses/SimpleNotFound"
        "409":
          description: The key has already been revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleErrorResponse"
              example:
                code: "409"
                message: Key already revoked or not found
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_key_revoke
            - dp:api_key_manage
  /apis/{apiId}/api-keys/associate:
    parameters:
      - $ref: "#/components/parameters/apiId"
    post:
      tags:
        - API Keys
      operationId: associateApiKeyApplication
      summary: Associate an API key with an application
      description: >-
        Associates (or re-associates) an existing API key with an application, for analytics attribution only — it
        has no effect on the key's validity or authorization. An `apikey.application_updated` webhook event is
        published once for this key, with a payload of `{ key_id, application }`.
      requestBody:
        $ref: "#/components/requestBodies/ApiKeyAssociateBody"
      responses:
        "200":
          description: Association updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyApplicationResponse"
        "400":
          $ref: "#/components/responses/SimpleBadRequest"
        "403":
          $ref: "#/components/responses/SimpleForbidden"
        "404":
          $ref: "#/components/responses/SimpleNotFound"
        "409":
          description: The key has already been revoked and cannot be associated with an application.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleErrorResponse"
              example:
                code: "409"
                message: Cannot associate a revoked key
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_key_update
            - dp:api_key_manage
  /apis/{apiId}/api-keys/dissociate:
    parameters:
      - $ref: "#/components/parameters/apiId"
    post:
      tags:
        - API Keys
      operationId: removeApiKeyApplication
      summary: Remove an API key's application association
      description: >-
        Removes the application association from an API key identified by `keyId` in the request body, if any. An
