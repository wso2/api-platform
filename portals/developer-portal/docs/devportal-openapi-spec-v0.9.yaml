      additionalProperties: false
    SubscriptionChangePlanRequest:
      type: object
      required:
        - planId
      properties:
        apiId:
          type: string
          description: >-
            Developer Portal API ID the subscription belongs to. Optional — if provided, it is validated
            against the API derived from the existing subscription record and the request is rejected with
            400 if they don't match. It is never used as a fallback: if the API cannot be derived from the
            subscription record, the request fails with 400 regardless of this value.
          example: weather-api-v1
        planId:
          type: string
          description: Developer Portal subscription plan ID to switch to.
          example: Gold
      additionalProperties: false
    SubscriptionResponse:
      type: object
      description: Subscription payload.
      properties:
        subscriptionId:
          type: string
