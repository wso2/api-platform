          example: Asgardeo
        type:
          type: string
          enum:
            - ASGARDEO
            - WSO2IS
            - KEYCLOAK
            - GENERIC_OIDC
          example: ASGARDEO
        tokenEndpoint:
          type: string
          format: uri
          example: https://api.asgardeo.io/t/myorg/oauth2/token
      additionalProperties: false
    WebhookSubscriberRequest:
      type: object
      required:
        - displayName
        - targetUrl
      properties:
        name:
          type: string
          description: Unique name within the organization.
          example: Production Gateway
        targetUrl:
          type: string
          format: uri
          description: Target URL events are POSTed to. Must be unique within the organization.
          example: https://gateway.example.com/devportal-webhook
        secret:
          type: string
          description: Shared secret used to sign outgoing payloads (HMAC). Stored encrypted; never returned in responses.
          example: <shared-secret>
        publicKey:
          type: string
          description: >-
            PEM-encoded public key. When set, secret event payloads (apikey.*, subscription.*) are additionally
            encrypted to this key so only the subscriber can read the plaintext key.
        events:
          type: array
          items:
            type: string
          description: >-
            Glob-style event type allowlist (only a trailing `*` wildcard is supported, e.g. `apikey.*`). Omit or leave
            empty to receive all event types.
          example:
            - apikey.*
            - subscription.*
        enabled:
          type: boolean
          default: true
          example: true
        timeoutMs:
          type: integer
          default: 5000
          example: 5000
      additionalProperties: false
    WebhookSubscriberResponseSchema:
      type: object
      description: Webhook subscriber configuration. The secret is never included.
      properties:
        id:
          type: string
          description: Webhook subscriber UUID.
          example: sub-uuid-12345
        orgId:
          type: string
          example: org-12345
        name:
          type: string
          example: Production Gateway
        targetUrl:
          type: string
          format: uri
          example: https://gateway.example.com/devportal-webhook
        enabled:
          type: boolean
          example: true
        events:
          type: array
          items:
            type: string
          example:
            - apikey.*
            - subscription.*
        timeoutMs:
          type: integer
          example: 5000
        hasSecret:
          type: boolean
          description: Whether a secret is configured for HMAC-signing outgoing payloads.
          example: true
        hasPublicKey:
          type: boolean
          description: Whether a public key is configured for envelope-encrypting secret event payloads.
          example: false
        createdBy:
          type: string
          description: >-
            Identity of the user who created this webhook subscriber, or `deleted_user` if that user's IDP
            reference no longer exists. Present on single-resource GET responses and list items.
          example: alice@example.com
        updatedBy:
          type: string
          description: >-
            Identity of the user who last updated this webhook subscriber, or `deleted_user` if that user's IDP
            reference no longer exists. Present on single-resource GET responses only, omitted on list items.
          example: alice@example.com
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    WebhookSubscriberDeliverySummary:
      type: object
      description: A single delivery attempt made to a webhook subscriber.
      properties:
        deliveryId:
          type: string
          example: del-abc123
        eventType:
          type: string
          nullable: true
          example: apikey.generated
        occurredAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum:
            - PENDING
            - IN_FLIGHT
            - DELIVERED
            - FAILED
          example: DELIVERED
        lastHttpStatus:
          type: integer
          nullable: true
          example: 200
        lastError:
          type: string
          nullable: true
        lastAttemptAt:
          type: string
          format: date-time
          nullable: true
        deliveredAt:
          type: string
          format: date-time
          nullable: true
    AppKeyMappingRequest:
      type: object
      required:
        - keyManager
        - consumerKey
      properties:
        keyManager:
          type: string
          example: Resident Key Manager
        type:
          type: string
          enum:
            - PRODUCTION
            - SANDBOX
          default: PRODUCTION
          example: PRODUCTION
        consumerKey:
          type: string
          description: >-
            The OAuth client_id, created directly in the key manager. The portal does not store or persist the client
            secret — it is supplied per-request when generating a token and is only seen transiently during that request.
          example: consumer-key-123
      additionalProperties: false
    ViewCreateRequest:
      type: object
      required:
        - id
        - labels
      properties:
        id:
          type: string
          description: Desired handle for the view (unique per org), stored as-is.
          example: partner-apis
        displayName:
          type: string
          description: Optional display name. Defaults to the handle when omitted.
          example: Partner APIs
        labels:
          type: array
          minItems: 1
          description: Label names to attach to the view.
          items:
            type: string
          example:
            - partner
            - public
      additionalProperties: false
    ViewUpdateRequest:
      type: object
      properties:
        displayName:
          type: string
          example: Partner and Public APIs
        labels:
          type: array
          description: >-
            Full desired set of label names for the view. Labels present here but not currently attached are
            attached; labels currently attached but absent here are detached. Omit to leave labels unchanged.
          items:
            type: string
          example:
            - partner
            - premium
      additionalProperties: false
    OAuthGenerateTokenRequest:
      type: object
      description: >-
        OAuth access token generation payload. `consumerSecret` is required — the portal uses it to call the
        Authorization Server token endpoint directly.
      required:
        - consumerSecret
      properties:
        consumerSecret:
          type: string
          description: >-
            Client secret for the OAuth application. Not stored by the portal — the caller must supply it on each token
            generation request.
          example: my-consumer-secret
        scopes:
          type: array
          items:
            type: string
          example:
            - weather.read
        validityPeriod:
          type: integer
          example: 3600
      additionalProperties: true
    ApplicationOAuthKeyResponse:
      type: object
      description: OAuth key mapping payload.
      properties:
        keyMappingId:
          type: string
          example: km-12345
        keyManager:
          type: string
          example: Resident Key Manager
        type:
          type: string
          example: PRODUCTION
        consumerKey:
          type: string
          example: consumer-key-123
        tokenEndpoint:
          type: string
          format: uri
          example: https://api.asgardeo.io/t/myorg/oauth2/token
      additionalProperties: true
    OAuthTokenResponse:
      type: object
      description: >-
        Access token response proxied from the key manager's token endpoint. Field names are the portal's own
        camelCase, not the underlying OAuth2 token response's snake_case.
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.example
        validityTime:
          type: integer
          nullable: true
          description: Token lifetime in seconds, as reported by the key manager (`expires_in`).
          example: 3600
        tokenScopes:
          type: array
          items:
            type: string
          example:
            - weather.read
      additionalProperties: true
    APIWorkflowCreateResponse:
      type: object
      properties:
        id:
          type: string
          example: workflow-12345
        displayName:
          type: string
          example: Weather onboarding
        status:
          type: string
          enum:
            - DRAFT
            - PUBLISHED
          example: PUBLISHED
      additionalProperties: false
    APIWorkflowResponse:
      type: object
      properties:
        id:
          type: string
          example: workflow-12345
          description: The workflow's handle (unique per org and view). Not the internal database uuid.
        displayName:
          type: string
          example: Weather onboarding
        description:
          type: string
        agentPrompt:
          type: string
        status:
          type: string
          enum:
            - DRAFT
            - PUBLISHED
          example: PUBLISHED
        agentVisibility:
          type: string
          enum:
            - VISIBLE
            - HIDDEN
          example: VISIBLE
        contentType:
          type: string
          enum:
            - ARAZZO
            - MD
        apiWorkflowDefinition:
          type: string
          nullable: true
        markdownContent:
          type: string
          nullable: true
        createdAt:
          type: string
          example: May 7, 2026
        updatedAt:
          type: string
          nullable: true
      additionalProperties: false
    APIWorkflowPromptResponse:
      type: object
      properties:
        agentPrompt:
          type: string
      additionalProperties: false
    APIWorkflowCreateRequest:
      type: object
      required:
        - displayName
        - description
      properties:
        displayName:
          type: string
          example: Weather onboarding
        id:
          type: string
          description: Desired handle for the workflow (unique per org and view), stored as-is.
          example: weather-onboarding
        description:
          type: string
          example: Guides users through the Weather API onboarding workflow.
        agentPrompt:
          type: string
          example: Follow this workflow to onboard a Weather API user.
        status:
          type: string
          enum:
            - DRAFT
            - PUBLISHED
          default: PUBLISHED
          example: PUBLISHED
        agentVisibility:
          type: string
          enum:
            - VISIBLE
            - HIDDEN
          default: VISIBLE
          example: VISIBLE
        contentType:
          type: string
          enum:
            - ARAZZO
            - MD
          default: ARAZZO
        apiWorkflowDefinition:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
          description: JSON/YAML Arazzo content when `contentType` is `ARAZZO`.
        markdownContent:
          type: string
          description: Markdown content when `contentType` is `MD`.
    APIWorkflowUpdateRequest:
      type: object
      properties:
        displayName:
          type: string
          example: Weather onboarding v2
        id:
          type: string
          description: Desired handle for the workflow (unique per org and view), stored as-is.
          example: weather-onboarding-v2
        description:
          type: string
          example: Updated Weather API onboarding workflow.
        agentPrompt:
          type: string
        status:
          type: string
          enum:
            - DRAFT
            - PUBLISHED
          example: PUBLISHED
        agentVisibility:
          type: string
          enum:
            - VISIBLE
            - HIDDEN
          example: VISIBLE
        contentType:
          type: string
          enum:
            - ARAZZO
            - MD
        apiWorkflowDefinition:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
        markdownContent:
          type: string
    APIWorkflowPromptRequest:
      type: object
      required:
        - displayName
        - description
      properties:
        displayName:
          type: string
          example: Weather onboarding
        description:
          type: string
          example: Guides users through the Weather API onboarding workflow.
        apis:
          type: array
          items:
            type: object
            additionalProperties: true
        orgHandle:
          type: string
          example: acme
        viewName:
          type: string
          default: default
          example: default
        id:
          type: string
          description: The workflow's (would-be) handle, used only to build the workflow detail URL referenced in the generated prompt.
          example: weather-onboarding
    WebhookEventDelivery:
      type: object
      description: A single webhook delivery attempt.
      properties:
        deliveryId:
          type: string
          example: del-abc123
        subscriberId:
          type: string
          example: sub-xyz789
        targetUrl:
          type: string
          nullable: true
          example: https://example.com/webhook
        status:
          type: string
          enum:
            - PENDING
            - IN_FLIGHT
            - DELIVERED
            - FAILED
          example: DELIVERED
        lastHttpStatus:
          type: integer
          nullable: true
          example: 200
        lastError:
          type: string
          nullable: true
        lastAttemptAt:
          type: string
          format: date-time
          nullable: true
        deliveredAt:
          type: string
          format: date-time
          nullable: true
      additionalProperties: false
    WebhookEvent:
      type: object
      description: A webhook event with its delivery rows.
      properties:
        eventId:
          type: string
          example: evt-abc123
        eventType:
          type: string
          example: apikey.generated
        orgId:
          type: string
          example: org-default
        aggregateType:
          type: string
          example: apikey
        aggregateId:
          type: string
          example: key-12345
        status:
          type: string
          enum:
            - PENDING
            - DISPATCHED
            - ALL_DELIVERED
            - FAILED
          example: ALL_DELIVERED
        occurredAt:
          type: string
          format: date-time
        deliveries:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventDelivery"
      additionalProperties: false
