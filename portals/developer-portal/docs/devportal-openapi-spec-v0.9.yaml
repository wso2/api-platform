        - idpRefId
      properties:
        displayName:
          type: string
          example: Acme Corporation
        businessOwner:
          type: string
        businessOwnerContact:
          type: string
        businessOwnerEmail:
          type: string
          format: email
        id:
          type: string
          description: Desired handle for the organization (unique), stored as-is. Used in portal URLs.
          example: acme
        idpRefId:
          type: string
          description: >-
            The organization claim value asserted by the configured Identity Provider at SSO login. Must exactly
