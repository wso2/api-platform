          type: array
          items:
            type: string
        removedLabels:
          type: array
          items:
            type: string
        owners:
          $ref: "#/components/schemas/ApiOwnersResponse"
        apiImageMetadata:
          $ref: "#/components/schemas/ApiImageMetadataResponse"
        tags:
          type: array
          items:
            type: string
        labels:
          type: array
          items:
            type: string
