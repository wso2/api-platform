openapi: 3.0.3
info:
  title: WSO2 API Developer Portal Core - Devportal Routes
  version: 0.9.0
  description: |
    Fine-grained Developer Portal API for managing organizations,
    API metadata and content, applications, subscriptions, application appKeyMappings, and API flows.

    All resources, including organization lifecycle endpoints
    (`/api/v0.9/organizations`, `/api/v0.9/organizations/{orgId}`), are served under `/api/v0.9`.
    Operations declare the least-privilege OAuth2 scopes required for each resource action.
servers:
  - url: https://localhost:3000/api/v0.9
    description: Local HTTPS server
  - url: http://localhost:3000/api/v0.9
    description: Local development server
tags:
  - name: Organizations
  - name: Organization Content
  - name: APIs
  - name: API Content
  - name: MCP Servers
  - name: MCP Server Content
  - name: MCP Server Keys
  - name: Subscription Plans
  - name: Labels
  - name: Applications
  - name: Subscriptions
  - name: API Keys
  - name: Views
  - name: Application Keys
  - name: API Workflows
  - name: Key Managers
  - name: Webhook Events
  - name: Webhook Subscribers
paths:
  /organizations:
    post:
      tags:
        - Organizations
      summary: Create an organization
      description: >-
        Creates a Developer Portal organization and initializes its default portal configuration, default label, default
        view, and default subscription plans when configured.
      operationId: createOrganization
      requestBody:
        $ref: "#/components/requestBodies/OrganizationCreateBody"
      responses:
        "201":
          description: Organization created successfully.
          headers:
            Location:
              description: URL of the created organization.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:org_create
            - dp:org_manage
    get:
      tags:
        - Organizations
      summary: List organizations
      description: Returns all Developer Portal organizations visible to the admin context.
      operationId: getOrganizations
      responses:
        "200":
          $ref: "#/components/responses/OrganizationListResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:org_read
            - dp:org_manage
  /organizations/{orgId}:
    parameters:
      - $ref: "#/components/parameters/orgId"
    put:
      tags:
        - Organizations
      summary: Update an organization
      description: Updates organization metadata, claim mappings, role mappings, and portal configuration.
      operationId: updateOrganization
      requestBody:
        $ref: "#/components/requestBodies/OrganizationUpdateBody"
      responses:
        "200":
          $ref: "#/components/responses/OrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:org_update
            - dp:org_manage
    get:
      tags:
        - Organizations
      summary: Get an organization
      description: >-
        Retrieves a single organization by organization ID, organization name, organization handle, or organization
        identifier.
      operationId: getOrganization
      responses:
        "200":
          $ref: "#/components/responses/OrganizationResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:org_read
            - dp:org_manage
    delete:
      tags:
        - Organizations
      summary: Delete an organization
      description: Deletes an organization and returns no response body when deletion succeeds.
      operationId: deleteOrganization
      responses:
        "204":
          description: Organization deleted successfully.
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:org_delete
            - dp:org_manage
  /views/{viewId}/asset:
    parameters:
      - $ref: "#/components/parameters/viewId"
    get:
      tags:
        - Organization Content
      summary: Get a theme asset
      description: >-
        Retrieves a single organization theme asset (CSS, image, etc.) by `fileType` and `fileName` query parameters.
        The response content type is derived from the stored file type and extension.
      operationId: getOrgAsset
      parameters:
        - $ref: "#/components/parameters/orgContentFileTypeQuery"
        - $ref: "#/components/parameters/orgContentFileNameQuery"
        - $ref: "#/components/parameters/filePathQuery"
      responses:
        "200":
          $ref: "#/components/responses/OrganizationContentAssetResponse"
        "400":
          description: Invalid or missing `fileType`/`fileName` query parameters.
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: No matching organization content asset was found.
          content:
            text/plain:
              schema:
                type: string
      security: []
  /views/{viewId}/apply-theme:
    parameters:
      - $ref: "#/components/parameters/viewId"
    post:
      tags:
        - Organization Content
      summary: Apply a theme
      description: >-
        Uploads a ZIP file and atomically replaces the view's theme assets. Only the assets contained in the
        uploaded ZIP are present afterward.
      operationId: applyTheme
      requestBody:
        $ref: "#/components/requestBodies/FileUploadBody"
      responses:
        "200":
          $ref: "#/components/responses/OrganizationContentUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:org_content_manage
            - dp:org_manage
  /views/{viewId}/reset-theme:
    parameters:
      - $ref: "#/components/parameters/viewId"
    post:
      tags:
        - Organization Content
      summary: Reset theme to defaults
      description: Deletes all stored theme assets for the view, reverting it to built-in defaults.
      operationId: resetTheme
      responses:
        "204":
          description: Theme reset successfully.
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:org_content_manage
            - dp:org_manage
  /apis:
    post:
      tags:
        - APIs
      summary: Create API metadata
      description: >-
        Creates Developer Portal API metadata from either a full API artifact ZIP, an API metadata YAML file (`api.yaml`
        / `devportal.yaml` / `mcp.yaml`), or an `apiMetadata` JSON string. An API definition file is required unless
        supplied by the artifact ZIP. The YAML `spec` block accepts: `displayName`, `version`, `description`, `type`,
        `status`, `agentVisibility`, `tags`, `labels`,
        `referenceId`, `endpoints` (sandboxUrl, productionUrl), `businessInformation` (owners), and `subscriptionPlans`.
        The service also stores labels, subscription plan mappings, image metadata, and schema definitions for
        GraphQL APIs when provided. MCP servers must be created via `POST /api/v0.9/mcp-servers` instead — a
        request whose resolved `type` is `MCP` is rejected with `400`.

        `subscriptionPlans` links existing org-level plans to this API by name — it does not create plans. In YAML it is
        a string array (`["Gold", "Silver"]`). In the JSON `apiMetadata` field it is an object array where only
        `id` is used (`[{"id":"Gold"}]`); extra fields such as `planId`, `displayName`, or `requestCount`
        are ignored.
      operationId: createApiMetadata
      requestBody:
        $ref: "#/components/requestBodies/ApiMetadataMultipartBody"
      responses:
        "201":
          $ref: "#/components/responses/ApiMetadataCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_create
            - dp:api_manage
    get:
      tags:
        - APIs
      summary: List API metadata
      description: >-
        Lists API metadata for an organization. The service supports exact filters by API name, version, and tags,
        free-text search with `query`, and view filtering. Unknown query parameters are rejected. MCP-typed records
        are never returned here — use `GET /api/v0.9/mcp-servers`.
      operationId: getAllApiMetadataForOrganization
      parameters:
        - $ref: "#/components/parameters/apiSearchQuery"
        - $ref: "#/components/parameters/apiNameQuery"
        - $ref: "#/components/parameters/apiVersionQuery"
        - $ref: "#/components/parameters/apiTagsQuery"
        - $ref: "#/components/parameters/apiViewQuery"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          $ref: "#/components/responses/ApiMetadataListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_read
            - dp:api_manage
  /apis/{apiId}:
    parameters:
      - $ref: "#/components/parameters/apiId"
    get:
      tags:
        - APIs
      summary: Get API metadata
      description: Retrieves a single API metadata record by Developer Portal API ID.
      operationId: getApiMetadata
      responses:
        "200":
          $ref: "#/components/responses/ApiMetadataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/TextMessageResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_read
            - dp:api_manage
    put:
      tags:
        - APIs
      summary: Update API metadata
      description: >-
        Updates Developer Portal API metadata and its stored definition. Accepts the same YAML spec fields and
        `apiMetadata` JSON format as the create operation. The update flow can also adjust label mappings, subscription
        plan mappings, schema definitions, and image metadata. Status changes to unpublished are rejected when active
        subscriptions exist.
      operationId: updateApiMetadata
      requestBody:
        $ref: "#/components/requestBodies/ApiMetadataMultipartBody"
      responses:
        "200":
          $ref: "#/components/responses/ApiMetadataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_update
            - dp:api_manage
    delete:
      tags:
        - APIs
      summary: Delete API metadata
      description: Deletes API metadata when the API has no active subscriptions.
      operationId: deleteApiMetadata
      responses:
        "200":
          $ref: "#/components/responses/TextMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_delete
            - dp:api_manage
  /subscription-plans:
    get:
      tags:
        - Subscription Plans
      summary: List subscription plans
      description: >-
        Lists subscription plans for an organization. When `name` is supplied, only the matching plan (if any) is
        returned. Plan names are unique within an organization.
      operationId: listSubscriptionPlans
      parameters:
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Filter by exact plan name. Returns an array of zero or one items.
      responses:
        "200":
          $ref: "#/components/responses/SubscriptionPlanListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:sub_plan_read
            - dp:sub_plan_manage
    post:
      tags:
        - Subscription Plans
      summary: Create subscription plans
      description: >-
        Creates one subscription plan when the request body is an object, or multiple subscription plans when the body
        is an array. Bulk creation returns a message instead of creating plans when `generateDefaultSubPlans` is
        enabled.
      operationId: addSubscriptionPlans
      requestBody:
        $ref: "#/components/requestBodies/SubscriptionPlanBody"
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "201":
          $ref: "#/components/responses/SubscriptionPlanMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:sub_plan_create
            - dp:sub_plan_manage
    put:
      tags:
        - Subscription Plans
      summary: Upsert subscription plans
      description: >-
        Upserts one subscription plan when the request body is an object, or multiple plans when the body is an array. A
        single plan update returns `200` when an existing plan is updated and `201` when a new plan is created. Bulk
        updates return a message when `generateDefaultSubPlans` is enabled.
      operationId: putSubscriptionPlans
      requestBody:
        $ref: "#/components/requestBodies/SubscriptionPlanBody"
      responses:
        "200":
          $ref: "#/components/responses/SubscriptionPlanPutResponse"
        "201":
          $ref: "#/components/responses/SubscriptionPlanMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:sub_plan_update
            - dp:sub_plan_manage
  /subscription-plans/{planId}:
    parameters:
      - $ref: "#/components/parameters/planId"
    get:
      tags:
        - Subscription Plans
      summary: Get a subscription plan
      operationId: getSubscriptionPlan
      description: Retrieves a single subscription plan by `planId`.
      responses:
        "200":
          $ref: "#/components/responses/SubscriptionPlanResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:sub_plan_read
            - dp:sub_plan_manage
    delete:
      tags:
        - Subscription Plans
      summary: Delete a subscription plan
      operationId: deleteSubscriptionPlan
      description: Deletes a subscription plan by `planId`.
      responses:
        "204":
          description: Subscription plan deleted successfully.
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:sub_plan_delete
            - dp:sub_plan_manage
  /apis/{apiId}/assets:
    parameters:
      - $ref: "#/components/parameters/apiId"
    post:
      tags:
        - API Content
      summary: Upload API content
      description: |
        Uploads the static content package for an API.

        The `apiContent` ZIP must contain at least one of these root directories:
        - `web/` for API landing-page assets such as markdown, HTML, CSS, JavaScript, and images.
        - `docs/` for downloadable API documents.

        Use `docMetadata` to add external document links that are stored alongside uploaded documents.
        Use `imageMetadata` to map uploaded images to API image roles such as the API icon.
      operationId: createApiContent
      requestBody:
        $ref: "#/components/requestBodies/ApiContentZipMultipartBody"
      responses:
        "201":
          $ref: "#/components/responses/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_content_create
            - dp:api_content_manage
    put:
      tags:
        - API Content
      summary: Replace API content
      description: |
        Replaces or adds static content files for an existing API.

        The upload format is the same as `POST /api/v0.9/apis/{apiId}/assets`.
        Existing files with the same stored `type` and `fileName` are updated; new files are created.
        Image metadata is updated only when image metadata can be resolved from the upload or request body.
      operationId: replaceApiContent
      requestBody:
        $ref: "#/components/requestBodies/ApiContentZipMultipartBody"
      responses:
        "201":
          $ref: "#/components/responses/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_content_update
            - dp:api_content_manage
    get:
      tags:
        - API Content
      summary: Get an API content file
      description: |
        Retrieves a single stored API content file.

        The `type` query parameter selects the stored content category and `fileName` selects the file
        within that category. Text files and external document links are returned as text. Image files are
        returned as binary content with a media type derived from the file extension.
      operationId: getApiContentFile
      security:
        - OAuth2Security:
            - dp:api_content_read
            - dp:api_content_manage
      parameters:
        - $ref: "#/components/parameters/apiContentTypeQuery"
        - $ref: "#/components/parameters/apiContentFileNameQuery"
      responses:
        "200":
          $ref: "#/components/responses/APIContentAssetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/TextMessageResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags:
        - API Content
      summary: Delete API content files
      description: |
        Deletes stored API content.

        Send both `type` and `fileName` to delete one file. Send only `type` to delete all stored content
        files matching that content category for the API.
      operationId: deleteApiContentFile
      parameters:
        - $ref: "#/components/parameters/apiContentTypeQuery"
        - $ref: "#/components/parameters/fileNameQuery"
      responses:
        "204":
          description: API content deleted successfully.
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/TextMessageResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_content_delete
            - dp:api_content_manage
  /labels:
    post:
      tags:
        - Labels
      summary: Create a label
      description: Creates a label for the organization.
      operationId: createLabel
      requestBody:
        $ref: "#/components/requestBodies/LabelBody"
      responses:
        "201":
          description: The created label.
          headers:
            Location:
              description: URL of the created label.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabelResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:label_create
            - dp:label_manage
    get:
      tags:
        - Labels
      summary: List labels
      description: Returns all labels configured for the organization.
      operationId: listLabels
      responses:
        "200":
          $ref: "#/components/responses/LabelsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:label_read
            - dp:label_manage
  /labels/{labelId}:
    get:
      tags:
        - Labels
      summary: Get a label
      description: Retrieves a single label by handle.
      operationId: getLabel
      parameters:
        - $ref: "#/components/parameters/labelId"
      responses:
        "200":
          $ref: "#/components/responses/LabelResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:label_read
            - dp:label_manage
    put:
      tags:
        - Labels
      summary: Update a label
      description: Updates an existing label by handle.
      operationId: updateLabel
      parameters:
        - $ref: "#/components/parameters/labelId"
      requestBody:
        $ref: "#/components/requestBodies/LabelBody"
      responses:
        "200":
          $ref: "#/components/responses/LabelResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:label_update
            - dp:label_manage
    delete:
      tags:
        - Labels
      summary: Delete a label
      description: Deletes a label by handle.
      operationId: deleteLabel
      parameters:
        - $ref: "#/components/parameters/labelId"
      responses:
        "204":
          description: Label deleted successfully.
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:label_delete
            - dp:label_manage
  /applications:
    get:
      tags:
        - Applications
      summary: List applications for the authenticated user
      description: Returns all applications owned by the authenticated user in the specified organization.
      operationId: listApplications
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          $ref: "#/components/responses/ApplicationListResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:app_read
            - dp:app_manage
    post:
      tags:
        - Applications
      summary: Create an application
      description: >-
        Creates a Developer Portal application in the specified organization. The request may be JSON, multipart form
        fields, or an application YAML file in the `application` multipart field. An `application.created` webhook
        event is published to the organization's configured webhook subscribers.
      operationId: saveApplication
      requestBody:
        $ref: "#/components/requestBodies/ApplicationMultipartBody"
      responses:
        "201":
          description: Application DTO.
          headers:
            Location:
              description: URL of the created application.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResponse"
              example:
                id: my-weather-app
                displayName: Weather App
                description: Application used to call Weather APIs.
                appKeyMappings: []
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:app_create
            - dp:app_manage
  /applications/{applicationId}:
    parameters:
      - $ref: "#/components/parameters/applicationId"
    get:
      tags:
        - Applications
      summary: Get an application
      description: Returns the details of a single application owned by the authenticated user.
      operationId: getApplication
      responses:
        "200":
          $ref: "#/components/responses/ApplicationResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:app_read
            - dp:app_manage
    put:
      tags:
        - Applications
      summary: Update an application
      description: >-
        Updates an application owned by the authenticated user in the specified organization. The request may be JSON,
        multipart form fields, or an application YAML file in the `application` multipart field. An `application.updated`
        webhook event is published.
      operationId: updateApplication
      requestBody:
        $ref: "#/components/requestBodies/ApplicationMultipartBody"
      responses:
        "200":
          $ref: "#/components/responses/ApplicationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:app_update
            - dp:app_manage
    delete:
      tags:
        - Applications
      summary: Delete an application
      description: >-
        Deletes an application owned by the authenticated user. Before removing the application record the service will
        make a best-effort attempt to revoke registered OAuth clients with their respective key managers and deletes all
        stored key mappings; failures are logged as warnings and do not abort deletion. An `application.deleted`
        webhook event is published, plus one `apikey.application_updated` event (with a cleared association) per API
        key that was associated with the application.
      operationId: deleteApplication
      responses:
        "200":
          $ref: "#/components/responses/TextMessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:app_delete
            - dp:app_manage
  /subscriptions:
    post:
      tags:
        - Subscriptions
      operationId: createSubscription
      summary: Create a subscription
      description: >-
        Creates a subscription for an API. The API must exist in the Developer Portal and have subscription plans
        enabled. The subscription is owned by the authenticated user.
      requestBody:
        $ref: "#/components/requestBodies/SubscriptionCreateBody"
      responses:
        "201":
          description: Subscription DTO.
          headers:
            Location:
              description: URL of the created subscription.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
              example:
                subscriptionId: sub-12345
                apiId: weather-api-v1
                subscriptionToken: a3f1e8b2c4d6e8f0a1b3c5d7e9f10b2c4d6e8f0a1b3c5d7e9f10b2c4d6e8f0a1
                subscriptionPlanName: Gold
                status: ACTIVE
                createdBy: alice@example.com
                createdAt: "2026-05-07T08:30:00Z"
        "400":
          $ref: "#/components/responses/SimpleBadRequest"
        "404":
          $ref: "#/components/responses/SimpleNotFound"
        "409":
          $ref: "#/components/responses/SimpleConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:subscription_create
            - dp:subscription_manage
    get:
      tags:
        - Subscriptions
      operationId: listSubscriptions
      summary: List subscriptions
      description: >-
        Lists subscriptions owned by the authenticated user. When `apiId` is provided, results are additionally filtered
        by the Developer Portal API ID.
      parameters:
        - $ref: "#/components/parameters/apiIdQueryOptional"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          $ref: "#/components/responses/SubscriptionListResponse"
        "404":
          description: Returned when `apiId` is provided but does not match an existing API.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleErrorResponse"
              example:
                code: "404"
                message: Not Found
                description: API not found
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:subscription_read
            - dp:subscription_manage
  /subscriptions/{subId}:
    parameters:
      - $ref: "#/components/parameters/subId"
    get:
      tags:
        - Subscriptions
      operationId: getSubscription
      summary: Get a subscription
      description: Retrieves a single subscription by subscription ID.
      responses:
        "200":
          $ref: "#/components/responses/SubscriptionResponse"
        "404":
          $ref: "#/components/responses/SimpleNotFound"
        "500":
