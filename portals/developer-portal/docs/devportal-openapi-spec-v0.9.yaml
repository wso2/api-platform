  schemas:
    Pagination:
      type: object
      description: Standard pagination metadata returned with collection responses.
      required:
        - total
        - limit
        - offset
      properties:
        total:
          type: integer
          description: Total number of records matching the query.
          example: 42
        limit:
          type: integer
          description: Maximum number of records returned in this response.
          example: 20
        offset:
          type: integer
          description: Number of records skipped before this page.
          example: 0
      additionalProperties: false
    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    GenericValue:
      nullable: true
      oneOf:
        - type: object
          additionalProperties: true
        - type: array
          items: {}
        - type: string
        - type: number
        - type: boolean
    GenericObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      required:
        - status
        - code
        - message
      properties:
        status:
          type: string
          enum:
            - error
          description: Always "error" for error responses.
        code:
          type: string
          pattern: ^[A-Z][A-Z0-9_]*$
          description: Machine-readable SCREAMING_SNAKE_CASE catalog code.
          example: ORG_NOT_FOUND
        message:
          type: string
          description: Human-readable error message.
        errors:
          type: array
          description: Optional per-field validation errors.
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
              message:
                type: string
            additionalProperties: false
      additionalProperties: false
    SimpleErrorResponse:
      type: object
      description: >-
        Ad hoc error shape used by the Subscriptions and API Keys handlers, which build error bodies inline instead of
        going through the shared error formatter. `code` is the HTTP status code as a string, not a catalog code.
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: "404"
        message:
          type: string
          example: Not Found
        description:
          type: string
          nullable: true
          example: Subscription not found
      additionalProperties: false
    ValidationErrorList:
      type: array
      items:
        $ref: "#/components/schemas/ValidationError"
    ValidationError:
      type: object
      required:
        - status
        - code
        - message
      properties:
        status:
          type: string
          enum:
            - error
        code:
          type: string
          pattern: ^[A-Z][A-Z0-9_]*$
          description: Machine-readable catalog code.
          example: COMMON_VALIDATION_ERROR
        message:
          type: string
          example: Input validation failed.
        errors:
          type: array
          description: Per-field validation errors.
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
              message:
                type: string
            additionalProperties: false
      additionalProperties: false
    OrganizationResponse:
      type: object
      properties:
        id:
          type: string
          description: The organization's handle (unique). Not the internal database uuid.
          example: acme
        displayName:
          type: string
          example: Acme Corporation
        businessOwner:
          type: string
          nullable: true
        businessOwnerContact:
          type: string
          nullable: true
        businessOwnerEmail:
          type: string
          format: email
          nullable: true
        idpRefId:
          type: string
          description: >-
            The organization claim value asserted by the configured Identity Provider at SSO login. On every login,
            the portal matches the authenticated user's org claim against this value to resolve which organization
            they belong to — it must exactly match the IDP's claim, or login fails for that org's users. Distinct
            from `cpRefId`, which is unrelated to authentication.
        cpRefId:
          type: string
          nullable: true
          description: >-
            Control Plane reference ID. Included in outbound webhook event payloads so subscribers can correlate
            this organization with its Control Plane (Platform API) counterpart. Not used for authentication or
            org resolution.
        configuration:
          type: object
          description: >-
            Organization portal configuration. Always includes `devportalMode`; may contain
            additional free-form keys set by the caller.
          properties:
            devportalMode:
              type: string
              enum:
                - DEFAULT
                - MCP_SERVERS_ONLY
                - APIS_ONLY
              description: Controls the mode of the developer portal.
          additionalProperties: true
          example:
            devportalMode: DEFAULT
      additionalProperties: false
    OrganizationContentUploadResponse:
      type: object
      required:
        - id
        - fileName
      properties:
        id:
          type: string
        fileName:
          type: string
          description: Original ZIP file name uploaded in the `file` multipart field.
      additionalProperties: false
    OrganizationContentListItemResponse:
      type: object
      properties:
        id:
          type: string
        fileName:
          type: string
        fileContent:
          type: string
          nullable: true
          description: UTF-8 content string returned for stored organization content records.
      additionalProperties: false
    ApiMetadataCreateResponse:
      allOf:
        - $ref: "#/components/schemas/ApiInfoResponse"
        - type: object
          properties:
            id:
              type: string
              description: The API's handle (unique per org). Not the internal database uuid.
            refId:
              type: string
              nullable: true
              description: >-
                Platform API (Control Plane) reference ID for this API. Used for MCP registry visibility filtering
                and included in outbound webhook event payloads. Null/absent for APIs that exist only in the
                Developer Portal and are not registered with the Platform API — e.g. MCP servers published via the
                registry.
            endPoints:
              $ref: "#/components/schemas/ApiEndpointsResponse"
            subscriptionPlans:
              type: array
              items:
                $ref: "#/components/schemas/SubscriptionPlanResponse"
          additionalProperties: true
    ApiMetadataResponse:
      allOf:
        - $ref: "#/components/schemas/ApiInfoResponse"
        - type: object
          properties:
            id:
              type: string
              description: The API's handle (unique per org). Not the internal database uuid.
            refId:
              type: string
              nullable: true
              description: >-
                Platform API (Control Plane) reference ID for this API. Used for MCP registry visibility filtering
                and included in outbound webhook event payloads. Null/absent for APIs that exist only in the
                Developer Portal and are not registered with the Platform API — e.g. MCP servers published via the
                registry.
            dataSource:
              type: string
              nullable: true
              description: >-
                Indicates which content matched the search term: `METADATA` if the match was in the API's own
                metadata, or a content type (e.g. a value from the API Content `type` field) if the match was
                inside an uploaded content file. Only computed by getAllApiMetadataForOrganization when both the
                `query` search parameter is supplied and the database is PostgreSQL — absent on SQLite (the dev
                default) and absent from every other operation (get/create/update single API).
            planId:
              type: string
            endPoints:
              $ref: "#/components/schemas/ApiEndpointsResponse"
            subscriptionPlans:
              type: array
              items:
                $ref: "#/components/schemas/SubscriptionPlanResponse"
            createdBy:
              type: string
              description: >-
                Identity of the user who created this API, or `deleted_user` if that user's IDP reference no longer
                exists. Present on single-resource GET responses and list items.
              example: alice@example.com
            updatedBy:
              type: string
              description: >-
                Identity of the user who last updated this API, or `deleted_user` if that user's IDP reference no
                longer exists. Present on single-resource GET responses only, omitted on list items.
              example: alice@example.com
            createdAt:
              type: string
              format: date-time
              example: "2026-05-07T08:30:00Z"
            updatedAt:
              type: string
              format: date-time
              example: "2026-05-07T08:30:00Z"
          additionalProperties: true
    ApiInfoResponse:
      type: object
      description: >-
        Fields are returned at the root of ApiMetadataResponse / ApiMetadataCreateResponse (not nested under an
        `apiInfo` key) — this schema exists only to share the field set between the two via `allOf`.
      properties:
        name:
          type: string
        apiTitle:
          type: string
          nullable: true
        remotes:
          type: array
          items:
            type: object
            additionalProperties: true
        version:
          type: string
        status:
          type: string
          enum:
            - PUBLISHED
            - DEPRECATED
          description: API lifecycle status.
          example: PUBLISHED
        description:
          type: string
        type:
          type: string
          enum:
            - REST
            - SOAP
            - MCP
            - WS
            - WEBSUB
            - GRAPHQL
        referenceId:
          type: string
          nullable: true
