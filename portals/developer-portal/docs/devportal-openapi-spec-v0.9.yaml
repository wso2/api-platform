      summary: Revoke an MCP server API key
      description: >-
        Revokes an existing MCP server API key identified by `keyId` in the request body. Mirrors
        `POST /api/v0.9/apis/{apiId}/api-keys/revoke`.
      requestBody:
        $ref: "#/components/requestBodies/ApiKeyRevokeBody"
      responses:
        "204":
          description: API key revoked successfully.
        "403":
          $ref: "#/components/responses/SimpleForbidden"
        "404":
          $ref: "#/components/responses/SimpleNotFound"
        "409":
          description: The key has already been revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleErrorResponse"
              example:
                code: "409"
                message: Key already revoked or not found
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:mcp_key_revoke
            - dp:mcp_key_manage
  /mcp-servers/{mcpServerId}/api-keys/associate:
    parameters:
      - $ref: "#/components/parameters/mcpServerId"
    post:
      tags:
        - MCP Server Keys
      operationId: associateMcpServerApiKeyApplication
      summary: Associate an MCP server API key with an application
      description: >-
        Associates (or re-associates) an existing MCP server API key with an application, for analytics attribution
        only. Mirrors `POST /api/v0.9/apis/{apiId}/api-keys/associate`.
      requestBody:
        $ref: "#/components/requestBodies/ApiKeyAssociateBody"
      responses:
        "200":
          description: Association updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyApplicationResponse"
        "400":
          $ref: "#/components/responses/SimpleBadRequest"
        "403":
          $ref: "#/components/responses/SimpleForbidden"
        "404":
          $ref: "#/components/responses/SimpleNotFound"
        "409":
          description: The key has already been revoked and cannot be associated with an application.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleErrorResponse"
              example:
                code: "409"
                message: Cannot associate a revoked key
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:mcp_key_update
            - dp:mcp_key_manage
  /mcp-servers/{mcpServerId}/api-keys/dissociate:
    parameters:
      - $ref: "#/components/parameters/mcpServerId"
    post:
      tags:
        - MCP Server Keys
      operationId: removeMcpServerApiKeyApplication
      summary: Remove an MCP server API key's application association
      description: >-
        Removes the application association from an MCP server API key identified by `keyId` in the request body, if
        any. Mirrors `POST /api/v0.9/apis/{apiId}/api-keys/dissociate`.
      requestBody:
        $ref: "#/components/requestBodies/ApiKeyDissociateBody"
      responses:
        "204":
          description: Association removed (or none existed).
        "403":
          $ref: "#/components/responses/SimpleForbidden"
        "404":
          $ref: "#/components/responses/SimpleNotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:mcp_key_update
            - dp:mcp_key_manage
  /applications/{applicationId}/api-keys:
    parameters:
      - $ref: "#/components/parameters/applicationId"
    get:
      tags:
        - API Keys
      operationId: listApplicationApiKeys
      summary: List API keys associated with an application
      description: >-
        Lists all API keys (across every API) currently associated with the given application. Unlike
        `listApiKeys`, no `apiId` filter is required.
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          $ref: "#/components/responses/ApiKeyListResponse"
        "404":
          $ref: "#/components/responses/SimpleNotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:api_key_read
            - dp:api_key_manage
  /views:
    post:
      tags:
        - Views
      operationId: addView
      summary: Create a view
      description: >-
        Creates a Developer Portal view for an organization and associates it with the supplied label names. If
        `name` is omitted, the service stores the view's handle as its name.
      requestBody:
        $ref: "#/components/requestBodies/ViewCreateBody"
      responses:
        "201":
          $ref: "#/components/responses/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:view_create
            - dp:view_manage
    get:
      tags:
        - Views
      operationId: getAllViews
      summary: List views
      description: Lists all views configured for the organization. Each view includes the label names attached to it.
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          $ref: "#/components/responses/ViewsResponse"
        "404":
          $ref: "#/components/responses/TextMessageResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:view_read
            - dp:view_manage
  /views/{viewId}:
    parameters:
      - $ref: "#/components/parameters/viewId"
    put:
      tags:
        - Views
      operationId: updateView
      summary: Update a view
      description: >-
        Updates the view display name and/or label associations. When `labels` is supplied, it fully replaces the
        view's label set — labels present in the list are attached and any others are detached. The service returns
        the accepted request payload.
      requestBody:
        $ref: "#/components/requestBodies/ViewUpdateBody"
      responses:
        "200":
          $ref: "#/components/responses/ViewUpdateEchoResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:view_update
            - dp:view_manage
    get:
      tags:
        - Views
      operationId: getView
      summary: Get a view
      description: Retrieves one view by its `viewId` handle, including the label names attached to that view.
      responses:
        "200":
          $ref: "#/components/responses/ViewResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/TextMessageResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:view_read
            - dp:view_manage
    delete:
      tags:
        - Views
      operationId: deleteView
      summary: Delete a view
      description: Deletes a view by its `viewId` handle. A missing view is returned as a not-found error.
      responses:
        "204":
          description: View deleted successfully.
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:view_delete
            - dp:view_manage
  /applications/{applicationId}/generate-keys:
    parameters:
      - $ref: "#/components/parameters/applicationId"
    post:
      tags:
        - Application Keys
      operationId: generateApplicationKeys
      summary: Map an OAuth client_id to a Developer Portal application
      description: >-
        Maps an OAuth client_id — created directly in the selected key manager — to the specified application. The
        portal does not create or register OAuth clients; it only stores the client_id reference and later proxies
        token requests for it.
      requestBody:
        $ref: "#/components/requestBodies/AppKeyMappingBody"
      responses:
        "200":
          $ref: "#/components/responses/ApplicationKeyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:app_key_create
            - dp:app_key_manage
  /applications/{applicationId}/oauth-keys/{keyMappingId}/generate-token:
    parameters:
      - $ref: "#/components/parameters/applicationId"
      - $ref: "#/components/parameters/keyMappingId"
    post:
      tags:
        - Application Keys
      operationId: generateOAuthKeys
      summary: Generate an OAuth access token
      description: >-
        Generates an access token for an existing application OAuth key mapping. The portal calls the Authorization
        Server token endpoint directly using the client appKeyMappings supplied in `consumerSecret`.
      requestBody:
        $ref: "#/components/requestBodies/OAuthGenerateTokenBody"
      responses:
        "200":
          $ref: "#/components/responses/OAuthTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:app_key_create
            - dp:app_key_manage
  /applications/{applicationId}/oauth-keys/{keyMappingId}:
    parameters:
      - $ref: "#/components/parameters/applicationId"
      - $ref: "#/components/parameters/keyMappingId"
    delete:
      tags:
        - Application Keys
      operationId: revokeOAuthKeys
      summary: Remove an OAuth client_id mapping
      description: >-
        Removes the local client_id mapping for an application. This does not affect the OAuth client in the key
        manager — that client is owned and managed externally.
      responses:
        "200":
          $ref: "#/components/responses/MessageOrGenericResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:app_key_revoke
  /views/{viewId}/api-workflows:
    parameters:
      - $ref: "#/components/parameters/viewId"
    post:
      tags:
        - API Workflows
      operationId: createApiWorkflow
      summary: Create an API workflow
      description: >-
        Creates an API workflow in the selected view. If `id` is omitted, the service generates one from the display name.
        `ARAZZO` content is parsed from JSON or YAML; invalid Arazzo content returns a bad request.
      requestBody:
        $ref: "#/components/requestBodies/APIWorkflowCreateBody"
      responses:
        "201":
          $ref: "#/components/responses/APIWorkflowCreateResponse"
        "400":
          $ref: "#/components/responses/MessageResponse"
        "409":
          $ref: "#/components/responses/MessageResponse"
        "500":
          $ref: "#/components/responses/MessageResponse"
      security:
        - OAuth2Security:
            - dp:api_workflow_create
            - dp:api_workflow_manage
    get:
      tags:
        - API Workflows
      operationId: getAllApiWorkflows
      summary: List API workflows
      description: Lists all API workflows for the selected organization view.
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          $ref: "#/components/responses/APIWorkflowListResponse"
        "500":
          $ref: "#/components/responses/MessageResponse"
      security:
        - OAuth2Security:
            - dp:api_workflow_read
            - dp:api_workflow_manage
  /views/{viewId}/api-workflows/{apiWorkflowId}:
    parameters:
      - $ref: "#/components/parameters/viewId"
      - $ref: "#/components/parameters/apiWorkflowId"
    get:
      tags:
        - API Workflows
      operationId: getApiWorkflow
      summary: Get an API workflow
      description: Retrieves a single API workflow by ID from the selected view.
      responses:
        "200":
          $ref: "#/components/responses/APIWorkflowResponse"
        "404":
          $ref: "#/components/responses/MessageResponse"
        "500":
          $ref: "#/components/responses/MessageResponse"
      security:
        - OAuth2Security:
            - dp:api_workflow_read
            - dp:api_workflow_manage
    put:
      tags:
        - API Workflows
      operationId: updateApiWorkflow
      summary: Update an API workflow
      description: Updates API workflow metadata and content for the selected view. Duplicate handles return a conflict.
      requestBody:
        $ref: "#/components/requestBodies/APIWorkflowUpdateBody"
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "400":
          $ref: "#/components/responses/MessageResponse"
        "404":
          $ref: "#/components/responses/MessageResponse"
        "409":
          $ref: "#/components/responses/MessageResponse"
        "500":
          $ref: "#/components/responses/MessageResponse"
      security:
        - OAuth2Security:
            - dp:api_workflow_update
            - dp:api_workflow_manage
    delete:
      tags:
        - API Workflows
      operationId: deleteApiWorkflow
      summary: Delete an API workflow
      description: Deletes an API workflow from the selected view.
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "404":
          $ref: "#/components/responses/MessageResponse"
        "500":
          $ref: "#/components/responses/MessageResponse"
      security:
        - OAuth2Security:
            - dp:api_workflow_delete
            - dp:api_workflow_manage
  /views/{viewId}/api-workflows/generate-prompt:
    parameters:
      - $ref: "#/components/parameters/viewId"
    post:
      tags:
        - API Workflows
      operationId: generatePrompt
      summary: Generate an API workflow agent prompt
      description: >-
        Generates the default agent prompt text for a proposed API workflow using the supplied name, description, APIs, and
        view context.
      requestBody:
        $ref: "#/components/requestBodies/APIWorkflowPromptBody"
      responses:
        "200":
          $ref: "#/components/responses/APIWorkflowPromptResponse"
        "500":
          $ref: "#/components/responses/MessageResponse"
      security:
        - OAuth2Security:
            - dp:api_workflow_create
            - dp:api_workflow_manage
  /key-managers:
    post:
      tags:
        - Key Managers
      summary: Create a key manager
      description: >-
        Creates a key manager configuration for the organization. If `id` is omitted, the service generates one from
        the display name. Accepts either a `application/json` body or a `multipart/form-data` upload with a
        `keymanager` field containing the KeyManager YAML file. OAuth applications are created directly in the key
        manager itself, outside the portal — the portal only needs the token endpoint to proxy `client_appKeyMappings`
        token requests.
      operationId: createKeyManager
      requestBody:
        $ref: "#/components/requestBodies/KeyManagerBody"
      responses:
        "201":
          description: Key manager configuration response.
          headers:
            Location:
              description: URL of the created key manager.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyManagerResponseSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:km_create
            - dp:km_manage
    get:
      tags:
        - Key Managers
      summary: List key managers
      operationId: getKeyManagers
      description: >-
        Returns key manager configurations for the organization. Admins receive the full configuration for every key
        manager, including disabled ones; other callers receive the minimal, developer-facing view of enabled key
        managers only, with no admin credentials. Admin appKeyMappings are never included in the response.
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          $ref: "#/components/responses/KeyManagerListResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:km_read
  /key-managers/{kmId}:
    parameters:
      - $ref: "#/components/parameters/kmId"
    get:
      tags:
        - Key Managers
      summary: Get a key manager
      description: Retrieves a single key manager configuration by ID.
      operationId: getKeyManager
      responses:
        "200":
          $ref: "#/components/responses/KeyManagerResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:km_read
            - dp:km_manage
    put:
      tags:
        - Key Managers
      summary: Update a key manager
      description: >-
        Updates an existing key manager configuration. Accepts either a `application/json` body or a
        `multipart/form-data` upload with a `keymanager` YAML file. Only supplied fields are updated; omitted fields
        retain their stored values.
      operationId: updateKeyManager
      requestBody:
        $ref: "#/components/requestBodies/KeyManagerUpdateBody"
      responses:
        "200":
          $ref: "#/components/responses/KeyManagerResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:km_update
            - dp:km_manage
    delete:
      tags:
        - Key Managers
      summary: Delete a key manager
      description: Deletes a key manager configuration by ID.
      operationId: deleteKeyManager
      responses:
        "204":
          description: Key manager deleted successfully.
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:km_delete
            - dp:km_manage
  /webhook-subscribers:
    post:
      tags:
        - Webhook Subscribers
      summary: Create a webhook subscriber
      description: >-
        Registers a webhook subscriber for the organization. Event deliveries (apikey.*, subscription.*, etc.)
        matching the subscriber's events filter are fanned out to its target URL. The `secret`, if provided, is
        encrypted at rest using AES-256-GCM.
      operationId: createWebhookSubscriber
      requestBody:
        $ref: "#/components/requestBodies/WebhookSubscriberBody"
      responses:
        "201":
          description: Webhook subscriber configuration response.
          headers:
            Location:
              description: URL of the created webhook subscriber.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscriberResponseSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:webhook_subscriber_create
            - dp:webhook_subscriber_manage
    get:
      tags:
        - Webhook Subscribers
      summary: List webhook subscribers
      description: Returns all webhook subscriber configurations for the organization. Secrets are never included in the response.
      operationId: getWebhookSubscribers
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          $ref: "#/components/responses/WebhookSubscriberListResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:webhook_subscriber_read
            - dp:webhook_subscriber_manage
  /webhook-subscribers/{subscriberId}:
    parameters:
      - $ref: "#/components/parameters/subscriberId"
    get:
      tags:
        - Webhook Subscribers
      summary: Get a webhook subscriber
      description: Retrieves a single webhook subscriber configuration by ID.
      operationId: getWebhookSubscriber
      responses:
        "200":
          $ref: "#/components/responses/WebhookSubscriberResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:webhook_subscriber_read
            - dp:webhook_subscriber_manage
    put:
      tags:
        - Webhook Subscribers
      summary: Update a webhook subscriber
      description: >-
        Updates an existing webhook subscriber configuration. Only supplied fields are updated; omitted fields retain
        their stored values.
      operationId: updateWebhookSubscriber
      requestBody:
        $ref: "#/components/requestBodies/WebhookSubscriberUpdateBody"
      responses:
        "200":
          $ref: "#/components/responses/WebhookSubscriberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:webhook_subscriber_update
            - dp:webhook_subscriber_manage
    delete:
      tags:
        - Webhook Subscribers
      summary: Delete a webhook subscriber
      description: Deletes a webhook subscriber configuration by ID.
      operationId: deleteWebhookSubscriber
      responses:
        "204":
          description: Webhook subscriber deleted successfully.
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:webhook_subscriber_delete
            - dp:webhook_subscriber_manage
  /webhook-subscribers/{subscriberId}/deliveries:
    parameters:
      - $ref: "#/components/parameters/subscriberId"
    get:
      tags:
        - Webhook Subscribers
      summary: List recent deliveries for a webhook subscriber
      description: Returns the most recent webhook delivery attempts for a single subscriber, newest first.
      operationId: getWebhookSubscriberDeliveries
      responses:
        "200":
          description: Recent delivery attempts for this webhook subscriber.
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      $ref: "#/components/schemas/WebhookSubscriberDeliverySummary"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:webhook_subscriber_read
            - dp:webhook_subscriber_manage
  /webhook-events:
    get:
      tags:
        - Webhook Events
      operationId: listWebhookEvents
      summary: List webhook events
      description: >-
        Returns a paginated list of webhook events for the organization. Each event includes a summary of its delivery
        rows. Requires dp:event_read scope.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - PENDING
              - DISPATCHED
              - ALL_DELIVERED
              - FAILED
          description: Filter events by status.
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          $ref: "#/components/responses/WebhookEventListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:event_read
  /webhook-events/{eventId}:
    parameters:
      - $ref: "#/components/parameters/eventId"
    get:
      tags:
        - Webhook Events
      operationId: getWebhookEvent
      summary: Get a webhook event
      description: Returns a single webhook event with the full details of all its delivery rows. Requires dp:event_read scope.
      responses:
        "200":
          $ref: "#/components/responses/WebhookEventResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - OAuth2Security:
            - dp:event_read
components:
  securitySchemes:
    OAuth2Security:
      type: oauth2
      description: >-
        OAuth2/OIDC access token with fine-grained Developer Portal scopes. Each operation declares the exact
        resource/action scope it requires.
      flows:
        authorizationCode:
          authorizationUrl: https://localhost:9443/oauth2/authorize
          tokenUrl: https://localhost:9443/oauth2/token
          scopes:
            dp:org_read: Read organizations.
            dp:org_create: Create organizations.
            dp:org_update: Update organizations.
            dp:org_delete: Delete organizations.
            dp:org_manage: Manage organizations (including creating, updating, and deleting).
            dp:org_content_read: Read organization theme assets.
            dp:org_content_manage: Apply or reset organization theme.
            dp:api_read: Read API metadata.
            dp:api_create: Create API metadata.
            dp:api_update: Update API metadata.
            dp:api_delete: Delete API metadata.
            dp:api_manage: Manage API metadata.
            dp:api_content_read: Read API content.
            dp:api_content_create: Create API content.
            dp:api_content_update: Update API content.
            dp:api_content_delete: Delete API content.
