    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: >-
        API key authentication. Server-side authorization should bind each key to the same fine-grained permissions used
        by OAuth2 scopes.
  parameters:
    orgId:
      name: orgId
      in: path
      required: true
      schema:
        type: string
        example: acme
      description: The organization's handle (also matches by name or IDP reference ID). Not the internal database uuid.
    fileType:
      name: fileType
      in: path
      required: true
      schema:
        type: string
    apiId:
      name: apiId
      in: path
      required: true
      schema:
        type: string
        example: weather-api-v1
      description: The API's handle (unique per org). Resolves only to REST/SOAP/WS/WebSub/GraphQL APIs — MCP servers are addressed via `/mcp-servers`.
    mcpServerId:
      name: mcpServerId
      in: path
      required: true
      schema:
        type: string
        example: weather-mcp-v1
      description: The MCP server's handle (unique per org).
    planId:
      name: planId
      in: path
      required: true
      schema:
        type: string
        example: Gold
      description: The subscription plan's handle (unique per org).
    subId:
      name: subId
      in: path
      required: true
      schema:
        type: string
    eventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
      description: Webhook event identifier.
    applicationId:
      name: applicationId
      in: path
      required: true
      schema:
        type: string
        example: my-weather-app
      description: The application's handle (unique per org).
    keyMappingId:
      name: keyMappingId
      in: path
      required: true
      schema:
        type: string
    kmId:
      name: kmId
      in: path
      required: true
      schema:
        type: string
        example: Asgardeo
      description: The key manager's handle (its `id` in request/response payloads), not the internal database uuid.
    subscriberId:
      name: subscriberId
      in: path
      required: true
      schema:
        type: string
        example: sub-uuid-12345
      description: Webhook subscriber ID (UUID).
    viewId:
      name: viewId
      in: path
      required: true
      schema:
        type: string
        example: default
      description: The view's handle (unique per org). Not the internal database uuid.
    apiWorkflowId:
      name: apiWorkflowId
      in: path
      required: true
      schema:
        type: string
        example: workflow-12345
      description: The API workflow's handle (unique per org and view).
    apiContentTypeQuery:
      name: type
      in: query
      required: true
      schema:
        type: string
        example: document
      description: >-
        Stored API content type selector. Common values are `web`, `document`, `image`, and `link`, depending on how the
        uploaded ZIP content was classified.
    apiContentFileNameQuery:
      name: fileName
      in: query
      required: true
      schema:
        type: string
        example: getting-started.md
      description: Stored API content file name to retrieve.
    fileNameQuery:
      name: fileName
      in: query
      required: false
      schema:
        type: string
        example: getting-started.md
      description: File name selector used to delete a single stored API content file.
    orgContentFileNameQuery:
      name: fileName
      in: query
      required: true
      schema:
        type: string
      description: Stored organization content file name.
    orgContentFileTypeQuery:
      name: fileType
      in: query
      required: true
      schema:
        type: string
      description: Organization content file type, such as style, image, text, template, or partial.
    filePathQuery:
      name: filePath
      in: query
      required: false
      schema:
        type: string
      description: Optional relative content path used together with `fileType` and `fileName`.
    apiSearchQuery:
      name: query
      in: query
      required: false
      schema:
        type: string
        example: weather
      description: Free-text API metadata search term.
    apiNameQuery:
      name: apiName
      in: query
      required: false
      schema:
        type: string
        example: Weather API
      description: Exact API name filter.
    apiVersionQuery:
      name: version
      in: query
      required: false
      schema:
        type: string
        example: v1
      description: Exact API version filter.
    apiTagsQuery:
      name: tags
      in: query
      required: false
      schema:
        type: string
        example: weather,public
      description: Comma-separated tag names. Matches APIs tagged with any of the given names.
    apiViewQuery:
      name: view
      in: query
      required: false
      schema:
        type: string
        example: default
      description: Developer Portal view name used to filter visible APIs.
    apiIdQueryRequired:
      name: apiId
      in: query
      required: true
      schema:
        type: string
        example: weather-api-v1
      description: Developer Portal API ID.
    apiIdQueryOptional:
      name: apiId
      in: query
      required: false
      schema:
        type: string
        example: weather-api-v1
      description: Optional Developer Portal API ID used to filter results.
    appIdQueryOptional:
      name: appId
      in: query
      required: false
      schema:
        type: string
        example: my-weather-app
      description: Optional application ID used to filter API keys associated with that application.
    labelId:
      name: labelId
      in: path
      required: true
      schema:
        type: string
        example: premium
      description: The label's handle (its `id` in request/response payloads), not the internal database uuid.
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Maximum number of records to return.
    offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Number of records to skip before returning results.
  requestBodies:
    OrganizationCreateBody:
      required: true
      description: >-
        Organization creation payload. Send JSON or an organization YAML file in the `organization` multipart field.
        The JSON example below applies only to the `application/json` content type. When an organization YAML
        **file** is uploaded instead, its content must use `kind: Organization` with the nested shape
        `metadata.name` (handle, any top-level `id` is ignored) and `spec.displayName`; all other fields
        (including `cpRefId`) are read from `spec`. The YAML `spec` block additionally accepts `labels` (array of
        `{name, displayName}`) and `views` (array of `{id, displayName, labels}` — `id` becomes the view's handle) to
        bootstrap labels and views at creation time — these are not available via the `application/json` content
        type.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OrganizationCreateRequest"
          example:
            displayName: Acme Corporation
            businessOwner: Jane Doe
            businessOwnerContact: +1-202-555-0147
            businessOwnerEmail: jane.doe@acme.example
            id: acme
            idpRefId: ACME
        multipart/form-data:
          schema:
            type: object
            required:
              - organization
            properties:
              organization:
                type: string
                format: binary
                description: "Organization YAML file (kind: Organization)."
          examples:
            yamlFile:
              summary: Organization YAML upload
              value:
                organization: org.yaml
    OrganizationUpdateBody:
      required: true
      description: >-
        Organization update payload. Send JSON or an organization YAML file in the `organization` multipart field.
        The JSON example below applies only to the `application/json` content type. When an organization YAML
        **file** is uploaded instead, its content must use `kind: Organization` with the nested shape
        `metadata.name` (handle, any top-level `id` is ignored) and `spec.displayName`; all other fields
        (including `cpRefId`) are read from `spec`. The YAML `spec` block additionally accepts `labels` (upserted by
        name) and `views` (upserted by `id`, which becomes the view's handle, with `labels` replacing the view's
        label set) — these are not available via the `application/json` content type.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OrganizationUpdateRequest"
        multipart/form-data:
          schema:
            type: object
            required:
              - organization
            properties:
              organization:
                type: string
                format: binary
                description: "Organization YAML file (kind: Organization)."
          examples:
            yamlFile:
              summary: Organization YAML upload
              value:
                organization: org.yaml
    SubscriptionPlanBody:
      required: true
      description: >-
        Subscription plan payload. Send a single object for single create/upsert, or a non-empty array for bulk
        create/upsert. The service currently processes plans with `type` set to `requestcount` or `eventcount`.
        Alternatively, upload a YAML file in the `subscriptionPlan` multipart field; use `kind: SubscriptionPlan` for a
        single plan or `kind: SubscriptionPlanList` with an `items` array for bulk operations.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/SubscriptionPlanRequest"
              - type: array
                minItems: 1
                items:
                  $ref: "#/components/schemas/SubscriptionPlanRequest"
        multipart/form-data:
          schema:
            type: object
            properties:
              subscriptionPlan:
                type: string
                format: binary
                description: >-
                  Subscription plan YAML file. Use `kind: SubscriptionPlan` for a single plan or `kind:
                  SubscriptionPlanList` (with an `items` array) for bulk operations.
          examples:
            singlePlan:
              summary: Single subscription plan YAML upload
              value:
                subscriptionPlan: plan.yaml
            planList:
              summary: Bulk subscription plan YAML upload
              value:
                subscriptionPlan: plans.yaml
    LabelBody:
      required: true
      description: Label payload.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LabelRequest"
          example:
            id: premium
            displayName: Premium APIs
    SubscriptionCreateBody:
      required: true
      description: Subscription creation payload. `apiId` is the Developer Portal API ID.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubscriptionCreateRequest"
          example:
            apiId: weather-api-v1
            subscriptionPlanId: Gold
    SubscriptionUpdateBody:
      required: true
      description: Subscription status update payload.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubscriptionUpdateRequest"
          example:
            status: ACTIVE
    SubscriptionChangePlanBody:
      required: true
      description: Subscription plan change payload. `planId` is the Developer Portal subscription plan ID.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubscriptionChangePlanRequest"
          example:
            planId: Gold
    ApiKeyBody:
      required: true
      description: >-
        API key payload. `id` must be lowercase and may contain numbers, underscores, and hyphens. `displayName` is
        an optional human-readable label that defaults to `id` when omitted. `expiresAt` can be an ISO-8601 datetime
        with timezone, epoch seconds, or epoch milliseconds. The parent resource (API or MCP server, depending on the
        path) is identified by the corresponding path parameter.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiKeyRequest"
          examples:
            expiringKey:
              summary: Generate an expiring key
              value:
                id: weather_prod_key
                expiresAt: "2026-12-31T23:59:59Z"
            nonExpiringKey:
              summary: Generate a key without expiry
              value:
                id: weather_sandbox_key
    ApiKeyRegenerateBody:
      required: true
      description: >-
        Identifies the API key to regenerate by its `keyId`. `expiresAt` is optional and, if provided,
        updates the key's expiry; the key's `id`/`displayName` cannot be changed by this operation.
      content:
        application/json:
          schema:
            type: object
            required:
              - keyId
            properties:
              keyId:
                type: string
                description: The key's handle — the `id` returned by generate or list.
                example: weather_prod_key
              expiresAt:
                oneOf:
                  - type: string
                    format: date-time
                  - type: number
                description: >-
                  New expiry for the key. Can be an ISO-8601 datetime with timezone, epoch seconds, or
                  epoch milliseconds. Omit to leave the current expiry unchanged.
                example: "2027-01-01T00:00:00Z"
            additionalProperties: false
          example:
            keyId: weather_prod_key
    ApiKeyRevokeBody:
      required: true
      description: Identifies the API key to revoke by its `keyId`.
      content:
        application/json:
          schema:
            type: object
            required:
              - keyId
            properties:
              keyId:
                type: string
                description: The key's handle — the `id` returned by generate or list.
                example: weather_prod_key
            additionalProperties: false
          example:
            keyId: weather_prod_key
    ApiKeyAssociateBody:
      required: true
      description: Identifies the API key and the application to associate it with.
      content:
        application/json:
          schema:
            type: object
            required:
              - keyId
              - appId
            properties:
              keyId:
                type: string
                description: The key's handle — the `id` returned by generate or list.
                example: weather_prod_key
              appId:
                type: string
                description: Developer Portal application ID to associate the key with.
                example: my-weather-app
            additionalProperties: false
          example:
            keyId: weather_prod_key
            appId: my-weather-app
    ApiKeyDissociateBody:
      required: true
      description: Identifies the API key to remove the application association from.
      content:
        application/json:
          schema:
            type: object
            required:
              - keyId
            properties:
              keyId:
                type: string
                description: The key's handle — the `id` returned by generate or list.
                example: weather_prod_key
            additionalProperties: false
          example:
            keyId: weather_prod_key
    AppKeyMappingBody:
      required: true
      description: >-
        Maps an OAuth client_id — created directly in the key manager — to this application. The application is
        identified by the `applicationId` path parameter.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppKeyMappingRequest"
          examples:
            mapResidentOAuthClient:
              summary: Map an existing OAuth client_id using the resident key manager
              value:
                keyManager: Resident Key Manager
                type: PRODUCTION
                consumerKey: consumer-key-123
    ViewCreateBody:
      required: true
      description: View creation payload with the label names that should be visible in the view.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ViewCreateRequest"
          examples:
            partnerView:
              summary: Create a partner APIs view
              value:
                id: partner-apis
                displayName: Partner APIs
                labels:
                  - partner
                  - public
            internalView:
              summary: Create a view using the handle as display name
              value:
                id: internal-apis
                labels:
                  - internal
    ViewUpdateBody:
      required: true
      description: View update payload. Include only the display name or label changes that should be applied.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ViewUpdateRequest"
          examples:
            renameAndRelabel:
              summary: Rename a view and replace its labels
              value:
                displayName: Partner and Public APIs
                labels:
                  - partner
                  - premium
            relabelOnly:
              summary: Replace labels without renaming
              value:
                labels:
                  - beta
    OAuthGenerateTokenBody:
      required: false
      description: OAuth token generation payload. The portal calls the Authorization Server token endpoint directly.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OAuthGenerateTokenRequest"
          example:
            scopes:
              - weather.read
            validityPeriod: 3600
    KeyManagerBody:
      description: >-
        Key manager configuration payload. Submit as `application/json` or as `multipart/form-data` with a `keymanager`
        field containing a KeyManager YAML file.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/KeyManagerRequest"
          example:
            displayName: Asgardeo
            id: asgardeo-prod
            type: ASGARDEO
            enabled: true
            tokenEndpoint: https://api.asgardeo.io/t/myorg/oauth2/token
        multipart/form-data:
          schema:
            type: object
            properties:
              keymanager:
                type: string
                format: binary
                description: KeyManager YAML file.
    WebhookSubscriberBody:
      description: Webhook subscriber configuration payload.
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WebhookSubscriberRequest"
          example:
            name: Production Gateway
            url: https://gateway.example.com/devportal-webhook
            secret: <shared-secret>
            events:
              - apikey.*
              - subscription.*
            enabled: true
            timeoutMs: 5000
    WebhookSubscriberUpdateBody:
      description: Webhook subscriber update payload. All fields are optional; only supplied fields are updated.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WebhookSubscriberRequest"
    KeyManagerUpdateBody:
      description: >-
        Key manager update payload. All fields are optional; only supplied fields are updated. Submit as
        `application/json` or as `multipart/form-data` with a `keymanager` field containing a KeyManager YAML file.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/KeyManagerUpdateRequest"
          example:
            displayName: Asgardeo
            enabled: false
            tokenEndpoint: https://api.asgardeo.io/t/myorg/oauth2/token
        multipart/form-data:
          schema:
            type: object
            properties:
              keymanager:
                type: string
                format: binary
                description: KeyManager YAML file with partial update fields.
    APIWorkflowCreateBody:
      required: true
      description: >-
        API workflow creation payload. Use `contentType` `ARAZZO` for JSON/YAML workflow content or `MD` for Markdown
        workflow content.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIWorkflowCreateRequest"
          examples:
            arazzoWorkflow:
              summary: Create an Arazzo API workflow
              value:
                displayName: Weather onboarding
                id: weather-onboarding
                description: Guides users through the Weather API onboarding workflow.
                contentType: ARAZZO
                apiWorkflowDefinition:
                  arazzo: 1.0.1
                  info:
                    title: Weather onboarding
                    version: 1.0.0
                  workflows: []
            markdownWorkflow:
              summary: Create a Markdown API workflow
              value:
                displayName: Weather guide
                description: Human-readable guide for Weather API users.
                contentType: MD
                markdownContent: |-
                  # Weather guide
                  Use this workflow to onboard Weather API users.
    APIWorkflowUpdateBody:
      required: true
      description: API workflow update payload. Include only the fields that should change.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIWorkflowUpdateRequest"
          example:
            displayName: Weather onboarding v2
            status: PUBLISHED
            agentVisibility: VISIBLE
    APIWorkflowPromptBody:
      required: true
      description: API workflow prompt-generation payload.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIWorkflowPromptRequest"
          example:
            displayName: Weather onboarding
            description: Guides users through the Weather API onboarding workflow.
            orgHandle: acme
            viewName: default
            id: weather-onboarding
            apis:
              - name: Weather API
                version: v1
    FileUploadBody:
      required: true
      description: ZIP file upload. Organization content uploads are limited to 50 MB.
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - file
            properties:
              file:
                type: string
                format: binary
                description: ZIP file containing organization theme assets.
    ApiMetadataMultipartBody:
      required: true
      description: >-
        API metadata upload. Send either `artifact`, or `api` with `apiDefinition`, or `apiMetadata` with
        `apiDefinition`. `schemaDefinition` is used for MCP APIs and GraphQL schema updates.
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              api:
                type: string
                format: binary
                description: API metadata YAML file.
              apiDefinition:
                type: string
                format: binary
                description: API definition file.
              artifact:
                type: string
                format: binary
                description: Full API ZIP artifact containing metadata and definition files.
              schemaDefinition:
                type: string
                format: binary
                description: Schema definition file, used by MCP APIs.
              apiMetadata:
                type: string
                description: >-
                  JSON string accepted by the service when the `api` YAML file is not supplied. Accepted top-level
                  fields: `name`, `version`, `description`, `type`,
                  `agentVisibility`, `status`, `referenceId`, `id`, `tags`, `labels`,
                  `owners`, `endPoints` (productionURL, sandboxURL), and `subscriptionPlans` (array of `{
                  id }` objects — only `id` is read; the plan must already exist in the organization). `id` becomes
                  the API's stored handle; when the API is created from a YAML artifact instead, the handle is
                  always taken from `metadata.name`.
                example: >-
                  {"name":"Weather API","version":"v1","description":"Weather forecast
                  API","type":"REST","agentVisibility":"VISIBLE",
                  "status":"PUBLISHED","tags":["weather"],"labels":["default"],"endPoints":{
                  "productionURL":"https://api.example.com/weather",
                  "sandboxURL":"https://sandbox.example.com/weather"},"subscriptionPlans":[{"id":"Gold"}]}
    ApiContentZipMultipartBody:
      required: true
      description: |
        API content ZIP upload.

        Expected ZIP structure:
        - `web/`: optional API landing-page files and images.
        - `docs/`: optional downloadable documents.

        At least one of `web/` or `docs/` must exist at the ZIP root.
        `docMetadata` and `imageMetadata` are JSON strings because they are submitted as multipart form fields.
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - apiContent
            properties:
              apiContent:
                type: string
                format: binary
                description: ZIP upload field named `apiContent`.
              docMetadata:
                type: string
                description: Optional JSON string containing API document link metadata.
                example: "[{\"name\":\"External guide\",\"url\":\"https://example.com/docs/guide\",\"type\":\"LINK\"}]"
              imageMetadata:
                type: string
                description: Optional JSON string containing API image metadata.
                example: "{\"api-icon\":\"icon.png\"}"
    ApplicationMultipartBody:
      required: true
      description: >-
        Application payload. Send JSON, multipart form fields, or an application YAML file in the `application` field.
        The JSON example below (`displayName`, `id`, `description`) applies only to the `application/json` content
        type. When an application YAML **file** is uploaded instead, its content must use the nested shape
        `metadata.name` (handle) and `spec.displayName` / `spec.description` — any top-level `id` inside that YAML
        file is ignored.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApplicationRequest"
          example:
            displayName: Weather App
            id: my-weather-app
            description: Application used to call Weather APIs.
        multipart/form-data:
          schema:
            type: object
            properties:
              application:
                type: string
                format: binary
                description: Application YAML file field named `application`.
              displayName:
                type: string
                description: Application display name when sending form fields instead of YAML.
              id:
                type: string
                description: >-
                  Immutable, org-scoped slug for the application, stored as its handle. Optional — defaults to
                  `displayName` when omitted.
              description:
                type: string
          examples:
            formFields:
              summary: Multipart form fields
              value:
                displayName: Weather App
                id: my-weather-app
                description: Application used to call Weather APIs.
            yamlFile:
              summary: Application YAML upload
              value:
                application: application.yaml
