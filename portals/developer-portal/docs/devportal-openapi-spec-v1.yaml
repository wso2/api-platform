        callbackUrl:
          type: string
          format: uri
          example: https://app.example.com/callback
      additionalProperties: true
    OAuthTokenResponse:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.example
