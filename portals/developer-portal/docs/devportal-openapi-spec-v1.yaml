    WebhookSubscriberRequest:
      type: object
      required:
        - name
        - url
      properties:
        name:
          type: string
          description: Unique name within the organization.
          example: Production Gateway
        url:
          type: string
          format: uri
          description: Target URL events are POSTed to. Must be unique within the organization.
          example: https://gateway.example.com/devportal-webhook
        secret:
          type: string
          description: Shared secret used to sign outgoing payloads (HMAC). Stored encrypted; never returned in responses.
          example: <shared-secret>
        publicKey:
          type: string
          description: >-
            PEM-encoded public key. When set, secret event payloads (apikey.*, subscription.*) are additionally
            encrypted to this key so only the subscriber can read the plaintext key.
        events:
          type: array
          items:
            type: string
          description: >-
            Glob-style event type allowlist (only a trailing `*` wildcard is supported, e.g. `apikey.*`). Omit or leave
            empty to receive all event types.
          example:
            - apikey.*
            - subscription.*
        enabled:
          type: boolean
          default: true
          example: true
        timeoutMs:
          type: integer
          default: 5000
          example: 5000
      additionalProperties: false
    WebhookSubscriberResponseSchema:
      type: object
      description: Webhook subscriber configuration. The secret is never included.
      properties:
        id:
          type: string
          description: Webhook subscriber UUID.
          example: sub-uuid-12345
        orgId:
          type: string
          example: org-12345
        name:
          type: string
          example: Production Gateway
        url:
          type: string
          format: uri
          example: https://gateway.example.com/devportal-webhook
        enabled:
          type: boolean
          example: true
        events:
          type: array
          items:
            type: string
          example:
            - apikey.*
            - subscription.*
        timeoutMs:
          type: integer
          example: 5000
        hasSecret:
          type: boolean
          description: Whether a secret is configured for HMAC-signing outgoing payloads.
          example: true
        hasPublicKey:
          type: boolean
          description: Whether a public key is configured for envelope-encrypting secret event payloads.
          example: false
    WebhookSubscriberDeliverySummary:
      type: object
      description: A single delivery attempt made to a webhook subscriber.
      properties:
        deliveryId:
          type: string
          example: del-abc123
        eventType:
          type: string
          nullable: true
          example: apikey.generated
        occurredAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum:
            - PENDING
            - IN_FLIGHT
            - DELIVERED
            - FAILED
            - DEAD_LETTERED
          example: DELIVERED
        attemptCount:
          type: integer
          example: 1
        lastHttpStatus:
          type: integer
          nullable: true
          example: 200
        lastError:
          type: string
          nullable: true
        lastAttemptAt:
          type: string
          format: date-time
          nullable: true
        deliveredAt:
          type: string
          format: date-time
          nullable: true
    AppKeyMappingRequest:
