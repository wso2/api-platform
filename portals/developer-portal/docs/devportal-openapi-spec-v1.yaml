        application/json:
          schema:
            type: object
            properties:
              list:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriptionResponse"
              pagination:
                $ref: "#/components/schemas/Pagination"
    ApiKeyGenerateResponse:
