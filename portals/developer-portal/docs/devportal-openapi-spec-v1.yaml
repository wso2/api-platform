      type: object
      required:
        - name
        - providerURL
      properties:
        name:
          type: string
        providerURL:
          type: string
          format: uri
      additionalProperties: false
    SubscriptionPlanRequest:
      type: object
      required:
        - planName
        - displayName
        - type
      properties:
        planID:
          type: string
          description: Optional external/APIM-assigned plan UUID.
        refId:
          type: string
          description: Platform API subscription plan UUID to associate with this plan.
        planName:
          type: string
        displayName:
          type: string
        description:
          type: string
        type:
          type: string
          enum:
            - requestcount
            - eventcount
          description: Service accepts case-insensitive `requestcount` or `eventcount`.
        requestCount:
          oneOf:
            - type: integer
            - type: string
          description: Required for request-count plans. Use -1 for unlimited.
        eventCount:
          oneOf:
            - type: integer
            - type: string
          description: Required for event-count plans. Use -1 for unlimited.
    LabelRequest:
      type: object
      required:
        - name
        - displayName
      properties:
        name:
          type: string
          example: premium
        displayName:
          type: string
          example: Premium APIs
      additionalProperties: false
    ApplicationRequest:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          example: Weather App
        description:
          type: string
          example: Application used to call Weather APIs.
        type:
          type: string
          default: WEB
          example: WEB
    SubscriptionCreateRequest:
      type: object
      required:
        - apiId
      properties:
        apiId:
          type: string
          description: Developer Portal API ID.
          example: api-7f4c2a6b
        subscriptionPlanId:
          type: string
          description: Developer Portal subscription plan ID.
          example: plan-7f4c2a6b
      additionalProperties: false
    SubscriptionUpdateRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
          example: ACTIVE
      additionalProperties: false
    SubscriptionResponse:
      type: object
      description: Subscription payload.
      properties:
        subscriptionId:
          type: string
          example: sub-12345
        apiId:
          type: string
          description: Developer Portal API ID.
          example: api-7f4c2a6b
        subscriptionToken:
          type: string
          description: Plaintext subscription token. Present on create and when the token has not been encrypted at rest.
          example: a3f1...
        subscriptionPlanName:
          type: string
          example: Gold
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
          example: ACTIVE
        createdBy:
          type: string
          description: Identity (sub claim) of the user who created the subscription.
          example: alice@example.com
        createdAt:
          type: string
          format: date-time
      additionalProperties: false
    ApiKeyRequest:
      type: object
      required:
        - apiId
        - name
      properties:
        apiId:
          type: string
          description: Developer Portal API ID.
          example: api-7f4c2a6b
        name:
          type: string
          pattern: ^[a-z0-9][a-z0-9_-]{0,127}$
          example: weather_prod_key
        subscriptionId:
          type: string
          description: Optional subscription ID to associate the key with.
          example: sub-abc123
        appId:
          type: string
          description: >-
            Optional application ID to associate the key with, for analytics attribution only — it has no effect on
            the key's validity or authorization. Must belong to the same organization and be owned by the caller.
          example: app-12345
        expiresAt:
          oneOf:
            - type: string
              format: date-time
            - type: number
          description: Optional ISO-8601 datetime with timezone, epoch seconds, or epoch milliseconds.
          example: "2026-12-31T23:59:59Z"
      additionalProperties: false
    ApiKeyMetadataResponse:
      type: object
      description: API key metadata returned by list operations. Secret material is omitted.
      properties:
        keyId:
          type: string
          description: Developer Portal key identifier.
          example: key-12345
        name:
          type: string
          example: weather_prod_key
        apiId:
          type: string
          description: Developer Portal API ID the key belongs to.
          example: api-7f4c2a6b
        appId:
          type: string
          nullable: true
          description: ID of the application this key is associated with, if any. Analytics attribution only.
          example: app-12345
        appName:
          type: string
          nullable: true
          description: Name of the associated application, if any.
          example: My Mobile App
        status:
          type: string
          enum:
            - ACTIVE
            - REVOKED
          example: ACTIVE
        expiresAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-12-31T23:59:59Z"
        createdAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
          nullable: true
      additionalProperties: true
    ApiKeyResponse:
      allOf:
        - $ref: "#/components/schemas/ApiKeyMetadataResponse"
        - type: object
          description: >-
            API key response returned by generate/regenerate. The plaintext secret is returned exactly once and never
            persisted — store it securely.
          properties:
            key:
              type: string
              description: One-time plaintext API key secret.
              example: ak_dGhpcyBpcyBub3QgYSByZWFsIGtleQ
    ApiKeyApplicationResponse:
      type: object
      properties:
        keyId:
          type: string
          example: key-12345
        application:
          type: object
          properties:
            id:
              type: string
              example: app-12345
            name:
              type: string
              example: My Mobile App
    KeyManagerRequest:
      type: object
      required:
        - name
        - type
        - tokenEndpoint
        - clientRegistrationEndpoint
        - adminClientId
        - adminClientSecret
      properties:
        name:
          type: string
          description: Unique name within the organization.
          example: Asgardeo
        type:
          type: string
          enum:
            - ASGARDEO
            - WSO2IS
            - KEYCLOAK
            - GENERIC_OIDC
          example: ASGARDEO
        enabled:
          type: boolean
          default: true
          example: true
        tokenEndpoint:
          type: string
          format: uri
          description: OAuth2 token endpoint. Used to obtain admin tokens and proxy developer token requests.
          example: https://api.asgardeo.io/t/myorg/oauth2/token
        clientRegistrationEndpoint:
          type: string
          format: uri
          description: DCR endpoint used to create, update, and delete OAuth clients on behalf of developers.
          example: https://api.asgardeo.io/t/myorg/api/identity/oauth2/dcr/v1.1/register
        issuer:
          type: string
          format: uri
          description: >-
            Issuer identifier. Used as a string to validate the `iss` claim in tokens issued by this KM. For Asgardeo
            and WSO2 IS this is the same URL as `tokenEndpoint`.
          example: https://api.asgardeo.io/t/myorg/oauth2/token
        jwksURL:
          type: string
          format: uri
          description: JWKS endpoint. Consumers and gateways fetch public keys from here to verify token signatures.
          example: https://api.asgardeo.io/t/myorg/oauth2/jwks
        adminClientId:
          type: string
          description: Client ID of the admin application used for DCR operations. Stored encrypted.
          example: <client-id>
        adminClientSecret:
          type: string
          description: Client secret of the admin application. Stored encrypted; never returned in responses.
          example: <client-secret>
        supportedGrantTypes:
          type: array
          items:
            type: string
          default:
            - client_credentials
          example:
            - client_credentials
            - authorization_code
            - refresh_token
        supportedScopes:
          type: array
          items:
            type: string
          default:
            - openid
          example:
            - openid
            - profile
        additionalProperties:
          type: object
          additionalProperties: true
          description: >-
            AS-specific extra configuration. For Asgardeo: `authorizeEndpoint`, `revokeEndpoint`, `logoutEndpoint`. For
            Keycloak: `realm`, `revokeEndpoint`, `logoutEndpoint`.
          example:
            authorizeEndpoint: https://api.asgardeo.io/t/myorg/oauth2/authorize
            revokeEndpoint: https://api.asgardeo.io/t/myorg/oauth2/revoke
            logoutEndpoint: https://api.asgardeo.io/t/myorg/oidc/logout
      additionalProperties: false
    KeyManagerUpdateRequest:
