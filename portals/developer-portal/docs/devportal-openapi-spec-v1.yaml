          example: https://api.asgardeo.io/t/myorg/api/identity/oauth2/dcr/v1.1/register
        issuer:
          type: string
          format: uri
          description: >-
            Issuer identifier. Used as a string to validate the `iss` claim in tokens issued by this KM. For Asgardeo
            and WSO2 IS this is the same URL as `tokenEndpoint`.
          example: https://api.asgardeo.io/t/myorg/oauth2/token
        jwksURL:
          type: string
          format: uri
          description: JWKS endpoint. Consumers and gateways fetch public keys from here to verify token signatures.
          example: https://api.asgardeo.io/t/myorg/oauth2/jwks
        adminClientId:
          type: string
          description: Client ID of the admin application used for DCR operations. Stored encrypted.
          example: <client-id>
        adminClientSecret:
          type: string
          description: Client secret of the admin application. Stored encrypted; never returned in responses.
          example: <client-secret>
        supportedGrantTypes:
          type: array
          items:
            type: string
          default:
            - client_credentials
          example:
            - client_credentials
            - authorization_code
            - refresh_token
        supportedScopes:
          type: array
          items:
            type: string
          default:
            - openid
          example:
            - openid
            - profile
        additionalProperties:
          type: object
          additionalProperties: true
          description: >-
            AS-specific extra configuration. For Asgardeo: `authorizeEndpoint`, `revokeEndpoint`, `logoutEndpoint`. For
            Keycloak: `realm`, `revokeEndpoint`, `logoutEndpoint`.
          example:
            authorizeEndpoint: https://api.asgardeo.io/t/myorg/oauth2/authorize
            revokeEndpoint: https://api.asgardeo.io/t/myorg/oauth2/revoke
