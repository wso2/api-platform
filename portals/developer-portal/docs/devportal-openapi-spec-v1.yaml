        keyManager:
          type: string
          example: Resident Key Manager
        keyType:
          type: string
          enum:
            - PRODUCTION
            - SANDBOX
          example: PRODUCTION
        grantTypesToBeSupported:
          type: array
          items:
            type: string
          example:
            - client_credentials
            - refresh_token
        callbackUrl:
          type: string
          format: uri
          example: https://app.example.com/callback
        scopes:
          type: array
