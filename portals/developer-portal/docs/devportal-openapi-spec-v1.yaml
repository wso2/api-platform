      required:
        - orgName
        - orgHandle
        - organizationIdentifier
      properties:
        orgName:
          type: string
        businessOwner:
          type: string
        businessOwnerContact:
          type: string
        businessOwnerEmail:
          type: string
          format: email
        orgHandle:
          type: string
          description: Public organization handle used in portal URLs.
        organizationIdentifier:
          type: string
