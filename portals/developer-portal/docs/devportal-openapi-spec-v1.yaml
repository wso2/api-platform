                $ref: "#/components/schemas/Pagination"
    KeyManagerResponse:
      description: Key manager configuration response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/KeyManagerResponseSchema"
    KeyManagerListResponse:
      description: List of key manager configurations.
      content:
        application/json:
          schema:
            type: object
            properties:
              list:
                type: array
                items:
                  $ref: "#/components/schemas/KeyManagerResponseSchema"
              pagination:
                $ref: "#/components/schemas/Pagination"
    KeyManagerPublicListResponse:
      description: List of enabled key managers (developer-facing, minimal view).
      content:
        application/json:
          schema:
            type: object
            properties:
              list:
                type: array
                items:
                  $ref: "#/components/schemas/KeyManagerPublicResponseSchema"
              pagination:
                $ref: "#/components/schemas/Pagination"
    WebhookSubscriberResponse:
      description: Webhook subscriber configuration response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WebhookSubscriberResponseSchema"
    WebhookSubscriberListResponse:
      description: List of webhook subscriber configurations.
      content:
        application/json:
          schema:
            type: object
            properties:
              list:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookSubscriberResponseSchema"
              pagination:
                $ref: "#/components/schemas/Pagination"
    ApplicationKeyResponse:
      description: Application OAuth key mapping response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApplicationOAuthKeyResponse"
          example:
            keyMappingId: km-12345
            keyManager: Resident Key Manager
            type: PRODUCTION
            consumerKey: consumer-key-123
            tokenEndpoint: https://api.asgardeo.io/t/myorg/oauth2/token
    OAuthTokenResponse:
      description: OAuth access token response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OAuthTokenResponse"
          example:
            accessToken: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.example
            validityTime: 3600
            tokenScopes:
              - weather.read
    MessageOrGenericResponse:
      description: Message or generic response payload.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/MessageResponse"
              - $ref: "#/components/schemas/GenericObject"
          example:
            message: Operation completed successfully
    APIFlowCreateResponse:
      description: Created API flow summary.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIFlowCreateResponse"
          example:
            apiFlowId: flow-12345
            name: Weather onboarding
            status: PUBLISHED
    APIFlowResponse:
      description: API flow DTO.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIFlowResponse"
          example:
            apiFlowId: flow-12345
            name: Weather onboarding
            handle: weather-onboarding
            description: Guides users through the Weather API onboarding workflow.
            agentPrompt: Follow this workflow to onboard a Weather API user.
            status: PUBLISHED
            agentVisibility: VISIBLE
            contentType: ARAZZO
            apiFlowDefinition: "{\"arazzo\":\"1.0.1\",\"info\":{\"title\":\"Weather onboarding\",\"version\":\"1.0.0\"},\"workflows\":[]}"
            markdownContent: null
            createdAt: May 7, 2026
            updatedAt: "2026-05-07T08:30:00Z"
    APIFlowListResponse:
      description: List of API flow DTOs.
      content:
        application/json:
          schema:
            type: object
            properties:
              list:
                type: array
                items:
                  $ref: "#/components/schemas/APIFlowResponse"
              pagination:
                $ref: "#/components/schemas/Pagination"
    APIFlowPromptResponse:
      description: Generated API flow agent prompt.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIFlowPromptResponse"
          example:
            agentPrompt: You are an API workflow assistant. Help the user complete Weather onboarding.
    TempArazzoFileResponse:
      description: Path of the temporary Arazzo file.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TempArazzoFileResponse"
          example:
            path: /tmp/arazzo-abc123/workflow.arazzo.yaml
    ViewResponse:
      description: View DTO response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ViewResponse"
          example:
            handle: partner-apis
            name: Partner APIs
            labels:
              - partner
              - public
    ViewsResponse:
      description: List of view DTOs.
      content:
        application/json:
          schema:
            type: object
            properties:
              list:
                type: array
                items:
                  $ref: "#/components/schemas/ViewResponse"
              pagination:
                $ref: "#/components/schemas/Pagination"
    ViewUpdateEchoResponse:
      description: Echo of the accepted view update payload.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ViewUpdateRequest"
          example:
            name: Partner and Public APIs
            addedLabels:
              - premium
            removedLabels:
              - internal
    WebhookEventListResponse:
      description: Paginated list of webhook events.
      content:
        application/json:
          schema:
            type: object
            properties:
              list:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookEvent"
              pagination:
                $ref: "#/components/schemas/Pagination"
    WebhookEventResponse:
      description: Single webhook event with full delivery details.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WebhookEvent"
  schemas:
    Pagination:
      type: object
      description: Standard pagination metadata returned with collection responses.
      required:
        - total
        - limit
        - offset
      properties:
        total:
          type: integer
          description: Total number of records matching the query.
          example: 42
        limit:
          type: integer
          description: Maximum number of records returned in this response.
          example: 20
        offset:
          type: integer
          description: Number of records skipped before this page.
          example: 0
      additionalProperties: false
    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    GenericValue:
      nullable: true
      oneOf:
        - type: object
          additionalProperties: true
        - type: array
          items: {}
        - type: string
        - type: number
        - type: boolean
    GenericObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      required:
        - status
        - code
        - message
      properties:
        status:
          type: string
          enum:
            - error
          description: Always "error" for error responses.
        code:
          type: string
          pattern: ^[A-Z][A-Z0-9_]*$
          description: Machine-readable SCREAMING_SNAKE_CASE catalog code.
          example: ORG_NOT_FOUND
        message:
          type: string
          description: Human-readable error message.
        errors:
          type: array
          description: Optional per-field validation errors.
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
              message:
                type: string
            additionalProperties: false
      additionalProperties: false
    SimpleErrorResponse:
      type: object
      description: >-
        Ad hoc error shape used by the Subscriptions and API Keys handlers, which build error bodies inline instead of
        going through the shared error formatter. `code` is the HTTP status code as a string, not a catalog code.
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: "404"
        message:
          type: string
          example: Not Found
        description:
          type: string
          nullable: true
          example: Subscription not found
      additionalProperties: false
    ValidationErrorList:
      type: array
      items:
        $ref: "#/components/schemas/ValidationError"
    ValidationError:
      type: object
      required:
        - status
        - code
        - message
      properties:
        status:
          type: string
          enum:
            - error
        code:
          type: string
          pattern: ^[A-Z][A-Z0-9_]*$
          description: Machine-readable catalog code.
          example: COMMON_VALIDATION_ERROR
        message:
          type: string
          example: Input validation failed.
        errors:
          type: array
          description: Per-field validation errors.
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
              message:
                type: string
            additionalProperties: false
      additionalProperties: false
    OrganizationResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        businessOwner:
          type: string
          nullable: true
        businessOwnerContact:
          type: string
          nullable: true
        businessOwnerEmail:
          type: string
          format: email
          nullable: true
        handle:
          type: string
        idpRefId:
          type: string
          description: >-
            The organization claim value asserted by the configured Identity Provider at SSO login. On every login,
            the portal matches the authenticated user's org claim against this value to resolve which organization
            they belong to — it must exactly match the IDP's claim, or login fails for that org's users. Distinct
            from `cpRefId`, which is unrelated to authentication.
        cpRefId:
          type: string
          nullable: true
          description: >-
            Control Plane reference ID. Included in outbound webhook event payloads so subscribers can correlate
            this organization with its Control Plane (Platform API) counterpart. Not used for authentication or
            org resolution.
        configuration:
          $ref: "#/components/schemas/GenericObject"
      additionalProperties: false
    OrganizationContentUploadResponse:
      type: object
      required:
        - id
        - fileName
      properties:
        id:
          type: string
        fileName:
          type: string
          description: Original ZIP file name uploaded in the `file` multipart field.
      additionalProperties: false
    OrganizationContentListItemResponse:
      type: object
      properties:
        id:
          type: string
        fileName:
          type: string
        fileContent:
          type: string
          nullable: true
          description: UTF-8 content string returned for stored organization content records.
      additionalProperties: false
    ApiMetadataCreateResponse:
      type: object
      properties:
        id:
          type: string
        refId:
          type: string
          nullable: true
          description: >-
            Platform API (Control Plane) reference ID for this API. Used for MCP registry visibility filtering and
            included in outbound webhook event payloads. Null/absent for APIs that exist only in the Developer
            Portal and are not registered with the Platform API — e.g. MCP servers published via the registry.
        handle:
          type: string
        apiInfo:
          $ref: "#/components/schemas/ApiInfoResponse"
        endPoints:
          $ref: "#/components/schemas/ApiEndpointsResponse"
        subscriptionPlans:
          type: array
          items:
            $ref: "#/components/schemas/SubscriptionPlanResponse"
      additionalProperties: true
    ApiMetadataResponse:
      type: object
      properties:
        id:
          type: string
        refId:
          type: string
          nullable: true
          description: >-
            Platform API (Control Plane) reference ID for this API. Used for MCP registry visibility filtering and
            included in outbound webhook event payloads. Null/absent for APIs that exist only in the Developer
            Portal and are not registered with the Platform API — e.g. MCP servers published via the registry.
        handle:
          type: string
        dataSource:
          type: string
          nullable: true
          description: >-
            Indicates which content matched the search term: `METADATA` if the match was in the API's own metadata,
            or a content type (e.g. a value from the API Content `type` field) if the match was inside an uploaded
            content file. Only computed by getAllApiMetadataForOrganization when both the `query` search parameter
            is supplied and the database is PostgreSQL — absent on SQLite (the dev default) and absent from every
            other operation (get/create/update single API).
        planId:
          type: string
        apiInfo:
          $ref: "#/components/schemas/ApiInfoResponse"
        endPoints:
          $ref: "#/components/schemas/ApiEndpointsResponse"
        subscriptionPlans:
          type: array
          items:
            $ref: "#/components/schemas/SubscriptionPlanResponse"
      additionalProperties: false
    ApiInfoResponse:
      type: object
      properties:
        name:
          type: string
        apiTitle:
          type: string
          nullable: true
        remotes:
          type: array
          items:
            type: object
            additionalProperties: true
        version:
          type: string
        status:
          type: string
          enum:
            - PUBLISHED
            - DEPRECATED
          description: API lifecycle status.
          example: PUBLISHED
        description:
          type: string
        type:
          type: string
          enum:
            - REST
            - SOAP
            - MCP
            - WS
            - WEBSUB
            - GRAPHQL
        referenceId:
          type: string
          nullable: true
          description: >-
            External reference ID. Present when the API was created from a `devportal.yaml` artifact whose `spec`
            block sets `referenceId` — the create response echoes the parsed YAML back, nested under `apiInfo`.
        handle:
          type: string
          nullable: true
          description: >-
            Present (nested under `apiInfo`) when the API was created from a `devportal.yaml` artifact — the parser
            sets it from `metadata.name`. Distinct from the top-level `apiHandle` on ApiMetadataResponse.
        agentVisibility:
          type: string
          enum:
            - VISIBLE
            - HIDDEN
        addedLabels:
          type: array
          items:
            type: string
        removedLabels:
          type: array
          items:
            type: string
        owners:
          $ref: "#/components/schemas/ApiOwnersResponse"
        apiImageMetadata:
          $ref: "#/components/schemas/ApiImageMetadataResponse"
        tags:
          type: array
          items:
            type: string
        labels:
          type: array
          items:
            type: string
      additionalProperties: false
    ApiOwnersResponse:
      type: object
      properties:
        technicalOwner:
          type: string
        businessOwner:
          type: string
        businessOwnerEmail:
          type: string
        technicalOwnerEmail:
          type: string
      additionalProperties: false
    ApiEndpointsResponse:
      type: object
      properties:
        sandboxURL:
          type: string
        productionURL:
          type: string
      additionalProperties: false
    ApiImageMetadataResponse:
      type: object
      additionalProperties:
        type: string
    SubscriptionPlanResponse:
      type: object
      properties:
        id:
          type: string
        handle:
          type: string
        name:
          type: string
        description:
          type: string
        requestCount:
          type: string
          nullable: true
          description: >-
            Always stored and returned as a string ("Unlimited" or a numeric string), regardless of the type
            (request-count or event-count) used to create the plan. Null if not set.
        refId:
          type: string
          nullable: true
          description: Platform API subscription plan UUID associated with this plan.
        orgId:
          type: string
      additionalProperties: false
    LabelResponse:
      type: object
      properties:
        id:
          type: string
          example: label-12345
        name:
          type: string
          example: premium
        displayName:
          type: string
          example: Premium APIs
      additionalProperties: false
    ApplicationResponse:
      type: object
      properties:
        id:
          type: string
          example: app-12345
        name:
          type: string
          example: Weather App
        description:
          type: string
          example: Application used to call Weather APIs.
        appKeyMappings:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationKeyMappingSummary"
      additionalProperties: false
    ApplicationKeyMappingSummary:
      type: object
      description: OAuth client ID mapping entry attached to an application.
      properties:
        asClientId:
          type: string
          description: OAuth client ID, created directly in the key manager and linked to this application.
          example: asgardeo-client-abc123
        kmId:
          type: string
          description: UUID of the key manager this client ID is linked to.
          example: km-uuid-12345
        type:
          type: string
          enum:
            - PRODUCTION
            - SANDBOX
          description: Key type for this mapping.
          example: PRODUCTION
      additionalProperties: false
    ViewResponse:
      type: object
      required:
        - handle
        - name
        - labels
      properties:
        handle:
          type: string
          example: partner-apis
        name:
          type: string
          example: Partner APIs
        labels:
          type: array
          items:
            type: string
          example:
            - partner
            - public
      additionalProperties: false
    OrganizationCreateRequest:
      type: object
      required:
        - name
        - handle
        - idpRefId
      properties:
        name:
          type: string
        businessOwner:
          type: string
        businessOwnerContact:
          type: string
        businessOwnerEmail:
          type: string
          format: email
        handle:
          type: string
          description: Public organization handle used in portal URLs.
        idpRefId:
          type: string
          description: >-
            The organization claim value asserted by the configured Identity Provider at SSO login. Must exactly
            match the IDP's org claim for that org's users, or login will fail. Distinct from `cpRefId`.
        cpRefId:
          type: string
          nullable: true
          description: >-
            Control Plane reference ID, included in outbound webhook event payloads. Not used for authentication.
        configuration:
          type: object
          properties:
            devportalMode:
              type: string
              enum:
                - DEFAULT
                - MCP_SERVERS_ONLY
                - APIS_ONLY
          additionalProperties: false
      additionalProperties: false
    OrganizationUpdateRequest:
      type: object
      required:
        - name
        - handle
        - idpRefId
      properties:
        name:
          type: string
        businessOwner:
          type: string
        businessOwnerContact:
          type: string
        businessOwnerEmail:
          type: string
          format: email
        handle:
          type: string
        idpRefId:
          type: string
          description: >-
            The organization claim value asserted by the configured Identity Provider at SSO login. Must exactly
            match the IDP's org claim for that org's users, or login will fail. Distinct from `cpRefId`.
        cpRefId:
          type: string
          nullable: true
          description: >-
            Control Plane reference ID, included in outbound webhook event payloads. Not used for authentication.
        configuration:
          type: object
          properties:
            devportalMode:
              type: string
              enum:
                - DEFAULT
                - MCP_SERVERS_ONLY
                - APIS_ONLY
          additionalProperties: false
    SubscriptionPlanRequest:
      type: object
      required:
        - handle
        - name
        - type
      properties:
        id:
          type: string
          description: Optional external/APIM-assigned plan UUID.
        refId:
          type: string
          description: Platform API subscription plan UUID to associate with this plan.
        handle:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum:
            - requestcount
            - eventcount
          description: Service accepts case-insensitive `requestcount` or `eventcount`.
        requestCount:
          oneOf:
            - type: integer
            - type: string
          description: Required for request-count plans. Use -1 for unlimited.
        eventCount:
          oneOf:
            - type: integer
            - type: string
          description: Required for event-count plans. Use -1 for unlimited.
    LabelRequest:
      type: object
      required:
        - name
        - displayName
      properties:
        name:
          type: string
          example: premium
        displayName:
          type: string
          example: Premium APIs
      additionalProperties: false
    ApplicationRequest:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          example: Weather App
        description:
          type: string
          example: Application used to call Weather APIs.
    SubscriptionCreateRequest:
      type: object
      required:
        - apiId
        - subscriptionPlanId
      properties:
        apiId:
          type: string
          description: Developer Portal API ID.
          example: api-7f4c2a6b
        subscriptionPlanId:
          type: string
          description: Developer Portal subscription plan ID.
          example: plan-7f4c2a6b
      additionalProperties: false
    SubscriptionUpdateRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
          example: ACTIVE
      additionalProperties: false
    SubscriptionResponse:
      type: object
      description: Subscription payload.
      properties:
        subscriptionId:
          type: string
          example: sub-12345
        apiId:
          type: string
          description: Developer Portal API ID.
          example: api-7f4c2a6b
        subscriptionToken:
          type: string
          nullable: true
          description: >-
            Plaintext subscription token, decrypted on every read (not just on create). Null if decryption fails
            (e.g. the encryption key changed since the token was stored).
          example: a3f1e8b2c4d6e8f0a1b3c5d7e9f10b2c4d6e8f0a1b3c5d7e9f10b2c4d6e8f0a1
        subscriptionPlanName:
          type: string
          example: Gold
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
          example: ACTIVE
        createdBy:
          type: string
          description: Identity (sub claim) of the user who created the subscription.
          example: alice@example.com
        createdAt:
          type: string
          format: date-time
      additionalProperties: false
    ApiKeyRequest:
      type: object
      required:
        - apiId
        - name
      properties:
        apiId:
          type: string
          description: Developer Portal API ID.
          example: api-7f4c2a6b
        name:
          type: string
          pattern: ^[a-z0-9][a-z0-9_-]{0,127}$
          example: weather_prod_key
        subscriptionId:
          type: string
          description: Optional subscription ID to associate the key with.
          example: sub-abc123
        appId:
          type: string
          description: >-
            Optional application ID to associate the key with, for analytics attribution only — it has no effect on
            the key's validity or authorization. Must belong to the same organization and be owned by the caller.
          example: app-12345
        expiresAt:
          oneOf:
            - type: string
              format: date-time
            - type: number
          description: Optional ISO-8601 datetime with timezone, epoch seconds, or epoch milliseconds.
          example: "2026-12-31T23:59:59Z"
      additionalProperties: false
    ApiKeyMetadataResponse:
      type: object
      description: API key metadata returned by list operations. Secret material is omitted.
      properties:
        keyId:
          type: string
          description: Developer Portal key identifier.
          example: key-12345
        name:
          type: string
          example: weather_prod_key
        apiId:
          type: string
          description: Developer Portal API ID the key belongs to.
          example: api-7f4c2a6b
        appId:
          type: string
          nullable: true
          description: ID of the application this key is associated with, if any. Analytics attribution only.
          example: app-12345
        appName:
          type: string
          nullable: true
          description: Name of the associated application, if any.
          example: My Mobile App
        status:
          type: string
          enum:
            - ACTIVE
            - REVOKED
          example: ACTIVE
        expiresAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-12-31T23:59:59Z"
        createdAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
          nullable: true
      additionalProperties: true
    ApiKeyResponse:
      type: object
      description: >-
        API key response returned by generate/regenerate only. Unlike ApiKeyMetadataResponse, this does not include
        apiId, appId, appName, createdAt, or revokedAt — generate/regenerate return only these five fields.
      properties:
        keyId:
          type: string
          description: Developer Portal key identifier.
          example: key-12345
        name:
          type: string
          example: weather_prod_key
        key:
          type: string
          description: One-time plaintext API key secret.
          example: ak_dGhpcyBpcyBub3QgYSByZWFsIGtleQ
        expiresAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-12-31T23:59:59Z"
        status:
          type: string
          enum:
            - ACTIVE
            - REVOKED
          example: ACTIVE
      additionalProperties: false
    ApiKeyApplicationResponse:
      type: object
      properties:
        keyId:
          type: string
          example: key-12345
        application:
          type: object
          properties:
            id:
              type: string
              example: app-12345
            name:
              type: string
              example: My Mobile App
    KeyManagerRequest:
      type: object
      required:
        - name
        - type
        - tokenEndpoint
      properties:
        name:
          type: string
          description: Unique name within the organization.
          example: Asgardeo
        type:
          type: string
          enum:
            - ASGARDEO
            - WSO2IS
            - KEYCLOAK
            - GENERIC_OIDC
          example: ASGARDEO
        enabled:
          type: boolean
          default: true
          example: true
        tokenEndpoint:
          type: string
          format: uri
          description: >-
            OAuth2 token endpoint. The OAuth application itself must be created directly in this key manager; the
            portal only proxies `client_appKeyMappings` token requests to this endpoint.
          example: https://api.asgardeo.io/t/myorg/oauth2/token
      additionalProperties: false
    KeyManagerUpdateRequest:
      type: object
      description: >-
        Partial update payload for a key manager. All fields are optional; only supplied fields are applied. Omitted
        fields retain their stored values.
      properties:
        name:
          type: string
          description: Unique name within the organization.
          example: Asgardeo
        type:
          type: string
          enum:
            - ASGARDEO
            - WSO2IS
            - KEYCLOAK
            - GENERIC_OIDC
          example: ASGARDEO
        enabled:
          type: boolean
          default: true
          example: true
        tokenEndpoint:
          type: string
          format: uri
          example: https://api.asgardeo.io/t/myorg/oauth2/token
      additionalProperties: false
    KeyManagerResponseSchema:
      type: object
      description: Key manager configuration.
      properties:
        id:
          type: string
          description: Key manager UUID.
          example: km-uuid-12345
        orgId:
          type: string
          example: org-12345
        name:
          type: string
          example: Asgardeo
        type:
          type: string
          enum:
            - ASGARDEO
            - WSO2IS
            - KEYCLOAK
            - GENERIC_OIDC
          example: ASGARDEO
        enabled:
          type: boolean
          example: true
        tokenEndpoint:
          type: string
          format: uri
          example: https://api.asgardeo.io/t/myorg/oauth2/token
      additionalProperties: false
    KeyManagerPublicResponseSchema:
      type: object
      description: Minimal developer-facing key manager view.
      properties:
        id:
          type: string
          example: km-uuid-12345
        name:
          type: string
          example: Asgardeo
        type:
          type: string
          enum:
            - ASGARDEO
            - WSO2IS
            - KEYCLOAK
            - GENERIC_OIDC
          example: ASGARDEO
        tokenEndpoint:
          type: string
          format: uri
          example: https://api.asgardeo.io/t/myorg/oauth2/token
      additionalProperties: false
    WebhookSubscriberRequest:
      type: object
      required:
        - name
        - targetUrl
      properties:
        name:
          type: string
          description: Unique name within the organization.
          example: Production Gateway
        targetUrl:
          type: string
          format: uri
          description: Target URL events are POSTed to. Must be unique within the organization.
          example: https://gateway.example.com/devportal-webhook
        secret:
          type: string
          description: Shared secret used to sign outgoing payloads (HMAC). Stored encrypted; never returned in responses.
          example: <shared-secret>
        publicKey:
          type: string
          description: >-
            PEM-encoded public key. When set, secret event payloads (apikey.*, subscription.*) are additionally
            encrypted to this key so only the subscriber can read the plaintext key.
        events:
          type: array
          items:
            type: string
          description: >-
            Glob-style event type allowlist (only a trailing `*` wildcard is supported, e.g. `apikey.*`). Omit or leave
            empty to receive all event types.
          example:
            - apikey.*
            - subscription.*
        enabled:
          type: boolean
          default: true
          example: true
        timeoutMs:
          type: integer
          default: 5000
          example: 5000
      additionalProperties: false
    WebhookSubscriberResponseSchema:
      type: object
      description: Webhook subscriber configuration. The secret is never included.
      properties:
        id:
          type: string
          description: Webhook subscriber UUID.
          example: sub-uuid-12345
        orgId:
          type: string
          example: org-12345
        name:
          type: string
          example: Production Gateway
        targetUrl:
          type: string
          format: uri
          example: https://gateway.example.com/devportal-webhook
        enabled:
          type: boolean
          example: true
        events:
          type: array
          items:
            type: string
          example:
            - apikey.*
            - subscription.*
        timeoutMs:
          type: integer
          example: 5000
        hasSecret:
          type: boolean
          description: Whether a secret is configured for HMAC-signing outgoing payloads.
          example: true
        hasPublicKey:
          type: boolean
          description: Whether a public key is configured for envelope-encrypting secret event payloads.
          example: false
    WebhookSubscriberDeliverySummary:
      type: object
      description: A single delivery attempt made to a webhook subscriber.
      properties:
        deliveryId:
          type: string
          example: del-abc123
        eventType:
          type: string
          nullable: true
          example: apikey.generated
        occurredAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum:
            - PENDING
            - IN_FLIGHT
            - DELIVERED
            - FAILED
          example: DELIVERED
        lastHttpStatus:
          type: integer
          nullable: true
          example: 200
        lastError:
          type: string
          nullable: true
        lastAttemptAt:
          type: string
          format: date-time
          nullable: true
        deliveredAt:
          type: string
          format: date-time
          nullable: true
    AppKeyMappingRequest:
      type: object
      required:
        - keyManager
        - consumerKey
      properties:
        keyManager:
          type: string
          example: Resident Key Manager
        type:
          type: string
          enum:
            - PRODUCTION
            - SANDBOX
          default: PRODUCTION
          example: PRODUCTION
        consumerKey:
          type: string
          description: >-
            The OAuth client_id, created directly in the key manager. The portal does not store or persist the client
            secret — it is supplied per-request when generating a token and is only seen transiently during that request.
          example: consumer-key-123
      additionalProperties: false
    ViewCreateRequest:
      type: object
      required:
        - handle
        - labels
      properties:
        handle:
          type: string
          example: partner-apis
        name:
          type: string
          description: Optional display name. Defaults to `handle` when omitted.
          example: Partner APIs
        labels:
          type: array
          minItems: 1
          description: Label names to attach to the view.
          items:
            type: string
          example:
            - partner
            - public
      additionalProperties: false
    ViewUpdateRequest:
      type: object
      properties:
        name:
          type: string
          example: Partner and Public APIs
        addedLabels:
          type: array
          description: Label names to attach to the view.
          items:
            type: string
          example:
            - premium
        removedLabels:
          type: array
          description: Label names to detach from the view.
          items:
            type: string
          example:
            - internal
      additionalProperties: false
    OAuthGenerateTokenRequest:
      type: object
      description: >-
        OAuth access token generation payload. `consumerSecret` is required — the portal uses it to call the
        Authorization Server token endpoint directly.
      required:
        - consumerSecret
      properties:
        consumerSecret:
          type: string
          description: >-
            Client secret for the OAuth application. Not stored by the portal — the caller must supply it on each token
            generation request.
          example: my-consumer-secret
        scopes:
          type: array
          items:
            type: string
          example:
            - weather.read
        validityPeriod:
          type: integer
          example: 3600
      additionalProperties: true
    ApplicationOAuthKeyResponse:
      type: object
      description: OAuth key mapping payload.
      properties:
        keyMappingId:
          type: string
          example: km-12345
        keyManager:
          type: string
          example: Resident Key Manager
        type:
          type: string
          example: PRODUCTION
        consumerKey:
          type: string
          example: consumer-key-123
        tokenEndpoint:
          type: string
          format: uri
          example: https://api.asgardeo.io/t/myorg/oauth2/token
      additionalProperties: true
    OAuthTokenResponse:
      type: object
      description: >-
        Access token response proxied from the key manager's token endpoint. Field names are the portal's own
        camelCase, not the underlying OAuth2 token response's snake_case.
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.example
        validityTime:
          type: integer
          nullable: true
          description: Token lifetime in seconds, as reported by the key manager (`expires_in`).
          example: 3600
        tokenScopes:
          type: array
          items:
            type: string
          example:
            - weather.read
      additionalProperties: true
    APIFlowCreateResponse:
      type: object
      properties:
        apiFlowId:
          type: string
          example: flow-12345
        name:
          type: string
          example: Weather onboarding
        status:
          type: string
          enum:
            - DRAFT
            - PUBLISHED
          example: PUBLISHED
      additionalProperties: false
    APIFlowResponse:
      type: object
      properties:
        apiFlowId:
          type: string
          example: flow-12345
        name:
          type: string
          example: Weather onboarding
        handle:
          type: string
          example: weather-onboarding
        description:
          type: string
        agentPrompt:
          type: string
        status:
          type: string
          enum:
            - DRAFT
