  schemas:
    Pagination:
      type: object
      description: Standard pagination metadata returned with collection responses.
      required:
        - total
        - limit
        - offset
      properties:
        total:
          type: integer
          description: Total number of records matching the query.
          example: 42
        limit:
          type: integer
          description: Maximum number of records returned in this response.
          example: 20
        offset:
          type: integer
          description: Number of records skipped before this page.
          example: 0
      additionalProperties: false
    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    GenericValue:
      nullable: true
      oneOf:
        - type: object
          additionalProperties: true
        - type: array
          items: {}
        - type: string
        - type: number
        - type: boolean
    GenericObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      required:
        - status
        - code
        - message
      properties:
        status:
          type: string
          enum:
            - error
          description: Always "error" for error responses.
        code:
          type: string
          pattern: ^[A-Z][A-Z0-9_]*$
          description: Machine-readable SCREAMING_SNAKE_CASE catalog code.
          example: ORG_NOT_FOUND
        message:
          type: string
          description: Human-readable error message.
        errors:
          type: array
          description: Optional per-field validation errors.
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
              message:
                type: string
            additionalProperties: false
      additionalProperties: false
    ValidationErrorList:
      type: array
      items:
        $ref: "#/components/schemas/ValidationError"
    ValidationError:
      type: object
      required:
        - status
        - code
        - message
      properties:
        status:
          type: string
          enum:
            - error
        code:
          type: string
          pattern: ^[A-Z][A-Z0-9_]*$
          description: Machine-readable catalog code.
          example: COMMON_VALIDATION_ERROR
        message:
          type: string
          example: Input validation failed.
        errors:
          type: array
          description: Per-field validation errors.
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
              message:
                type: string
            additionalProperties: false
      additionalProperties: false
    OrganizationResponse:
