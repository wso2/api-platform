        apiFlowDefinition:
          type: string
          nullable: true
        markdownContent:
          type: string
          nullable: true
        createdAt:
          type: string
          example: May 7, 2026
        updatedAt:
          type: string
          nullable: true
      additionalProperties: false
    APIFlowPromptResponse:
      type: object
      properties:
        agentPrompt:
          type: string
      additionalProperties: false
    TempArazzoFileResponse:
      type: object
