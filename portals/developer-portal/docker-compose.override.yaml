# Local source-build override — auto-merged by `docker compose up` alongside
# docker-compose.yaml (Compose's default file list). Never copied into the
# distribution zip (see Makefile's dist target), so the shipped zip always
# runs the published devportal image untouched.
#
# To run against the published image instead of building from source, pass
# `docker compose -f docker-compose.yaml up` to skip this file.

services:
  devportal:
    build: .
