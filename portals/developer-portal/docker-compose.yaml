# Developer Portal + Platform API - standalone release compose file. See README.md.

services:
  platform-api:
    image: ghcr.io/wso2/api-platform/platform-api:0.12.0
    container_name: platform-api
    restart: unless-stopped
    command: ["-config", "/etc/platform-api/config-platform-api.toml"]
    env_file:
      - path: api-platform.env
        required: true
        format: raw
    volumes:
      - ./configs/config-platform-api.toml:/etc/platform-api/config-platform-api.toml:ro
      - platform-api-data:/app/data
      - ./resources/certificates:/etc/platform-api/tls:ro
    ports:
      - "9243:9243"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9243/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - devportal-network

  devportal:
    image: ghcr.io/wso2/api-platform/developer-portal:1.0.0-alpha2-SNAPSHOT
    container_name: devportal
    restart: unless-stopped
    depends_on:
      platform-api:
        condition: service_healthy
    environment:
      # Per-invocation toggle (demo=false docker compose up) — config.toml can't
      # express this, since the value is chosen at compose-up time, not fixed.
      APIP_DP_DEMO_ENABLED: "${demo:-true}"
    env_file:
      - path: api-platform.env
        required: true
        format: raw
    volumes:
      - ./configs/config.toml:/app/configs/config.toml:ro
      - sqlite_data:/app/data
      - ./resources/certificates:/etc/devportal/tls:ro
    ports:
      - "3000:3000"
    networks:
      - devportal-network

volumes:
  sqlite_data:
    driver: local
  platform-api-data:
    driver: local

networks:
  devportal-network:
    driver: bridge
