# Developer Portal — Docker Compose (development / build-from-source variant)
#
# NOTE: distribution/docker-compose.yaml ships the standalone variant (pre-built image) — keep
#       devportal service config in sync there too. Documented differences that should
#       diverge: uses `build: .` here vs pre-built GHCR image in distribution.
#
# Quick start:
#   1. Run ./setup.sh once — generates the required secrets (devportal encryption/
#      session keys, the Platform API's encryption key, a shared JWT signing key,
#      and a random admin password) into api-platform.env, a self-signed TLS
#      certificate into resources/certificates, and configs/config-platform-api.toml
#      (gitignored). Safe to re-run — never overwrites an existing value.
#   2. Build the Platform API image from source (../../platform-api):
#        cd ../../platform-api && make build
#      Required — the published 0.10.0 image on ghcr.io predates the /auth/login
#      endpoint that the username/password login form here uses.
#   3. docker compose up
#   4. Open https://localhost:3000/default/views/default  (accept the self-signed cert warning)
#      Login with the admin credentials ./setup.sh printed.
#
# Secrets:
#   All required secrets are generated by ./setup.sh into api-platform.env (see
#   above) and loaded into each container via env_file:. There is no ephemeral/
#   demo fallback — both services fail closed at startup (clear error, non-zero
#   exit) if a required secret is missing.
#
# TLS:
#   ./setup.sh generates a self-signed certificate into resources/certificates on
#   the host, bind-mounted into the container. Your browser will show a security
#   warning — click "Proceed" (or "Advanced → Proceed") to continue.
#   devportal fails closed at startup if APIP_DP_TLS_ENABLED=true and no certificate
#   is found — it never generates one itself (see docker-entrypoint.sh).
#   To use your own certificate, put server.crt/server.key in resources/certificates,
#   or point the volume mount below at a different directory.
#
# Database:
#   SQLite is used by default — no external database required.
#   To switch to PostgreSQL, run with the postgres override file:
#     docker compose -f docker-compose.yaml -f docker-compose.postgres.yaml up
#
# Configuration:
#   Edit configs/config.toml to customise devportal settings. An env var only takes
#   effect where config.toml explicitly references it via {{ env "APIP_DP_..." }} —
#   see the syntax explanation at the top of that file.
#   Edit configs/config-platform-api.toml to customise Platform API settings (org,
#   users, etc.) — ./setup.sh generates it wired to api-platform.env; for a static,
#   no-dependencies starting point instead, copy configs/config-platform-api-template.toml.
#   Create an api-platform.env file at the project root for persistent overrides
#   (./setup.sh does this for you).
#
# Demo mode (on by default):
#   demo=false docker compose up
#   Disables the "Seed sample APIs" button in Settings and the onboarding prompt.

services:
  # ── Platform API (Go HTTPS backend — handles local auth) ────────────────────
  # One-shot init container: generates the TLS pair the platform-api HTTPS
  # listener requires (the server no longer generates a self-signed fallback).
  platform-api-certgen:
    image: alpine/openssl
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        [ -f /certs/cert.pem ] && [ -f /certs/key.pem ] && exit 0
        openssl req -x509 -newkey rsa:2048 -sha256 -days 365 -nodes \
          -keyout /certs/key.pem -out /certs/cert.pem \
          -subj "/O=WSO2 API Platform/CN=platform-api" \
          -addext "subjectAltName=DNS:localhost,DNS:platform-api,IP:127.0.0.1"
    volumes:
      - platform-api-certs:/certs

  platform-api:
    image: ghcr.io/wso2/api-platform/platform-api:0.11.0
    container_name: platform-api
    restart: unless-stopped
    command: ["-config", "/etc/platform-api/config-platform-api.toml"]
    env_file:
      - path: api-platform.env
        required: false   # APIP_CP_ENCRYPTION_KEY / APIP_CP_AUTH_JWT_SECRET_KEY /
                           # AUTH_FILE_BASED_USERS live here — run ./setup.sh to generate it.
    volumes:
      - ./configs/config-platform-api.toml:/etc/platform-api/config-platform-api.toml:ro
      - platform-api-data:/app/data
      - platform-api-certs:/app/data/certs
    ports:
      - "9243:9243"
    depends_on:
      platform-api-certgen:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9243/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  devportal:
    build: .
    image: ghcr.io/wso2/api-platform/developer-portal:1.0.0-alpha2-SNAPSHOT
    depends_on:
      platform-api:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      # Mount config from the configs/ directory.
      - ./configs/config.toml:/app/configs/config.toml:ro
      # Persist the SQLite database across container restarts.
      - sqlite_data:/app/data
      # Bind-mounted (not a named volume) so ./setup.sh can pre-seed the
      # self-signed certificate from the host before the container ever starts.
      - ./resources/certificates:/app/certs
    environment:
      # ── Database: SQLite (default) ───────────────────────────────────────────
      APIP_DP_DATABASE_FILE: /app/data/devportal.db

      # ── Database: PostgreSQL (optional) ─────────────────────────────────────
      # APIP_DP_DATABASE_TYPE: postgres
      # APIP_DP_DATABASE_HOST: postgres
      # APIP_DP_DATABASE_PORT: 5432
      # APIP_DP_DATABASE_USERNAME: devportal
      # APIP_DP_DATABASE_PASSWORD: devportal
      # APIP_DP_DATABASE_NAME: devportal

      # HTTPS — certificate generated by ./setup.sh (see TLS note above).
      # To switch back to plain HTTP, set APIP_DP_TLS_ENABLED=false and APIP_DP_SERVER_BASEURL=http://localhost:3000.
      APIP_DP_TLS_ENABLED: "true"
      APIP_DP_SERVER_BASEURL: "https://localhost:3000"
      APIP_DP_TLS_CERTFILE: "/app/certs/server.crt"
      APIP_DP_TLS_KEYFILE: "/app/certs/server.key"
      APIP_DP_TLS_CAFILE: "/app/certs/server.crt"

      # Demo mode — on by default. When enabled, the Settings > Manage APIs page
      # shows a "Seed sample APIs" button and admins get a one-time onboarding
      # prompt to deploy sample APIs/MCPs. Disable with:
      #   demo=false docker compose up
      APIP_DP_DEMO_ENABLED: "${demo:-true}"

      # Log to console only (no rotating log files)
      APIP_DP_LOGGING_CONSOLEONLY: "true"

      # Platform API — used for local auth credential validation.
      APIP_DP_PLATFORMAPI_BASEURL: "https://platform-api:9243"
      APIP_DP_PLATFORMAPI_INSECURE: "true"   # Platform API uses a self-signed cert in this dev setup
    env_file:
      # APIP_DP_SECURITY_ENCRYPTIONKEY, APIP_DP_SECURITY_SESSIONSECRET, and
      # APIP_DP_PLATFORMAPI_JWTSECRET (same value as platform-api's own
      # APIP_CP_AUTH_JWT_SECRET_KEY, under devportal's own env var name) live
      # here — run ./setup.sh to generate it. Do NOT add these as `environment:`
      # entries instead — compose's environment: always wins over env_file: for
      # the same key, even when interpolated to empty, so that would silently
      # blank them back out.
      - path: api-platform.env
        required: false

volumes:
  sqlite_data:
  platform-api-data:
  platform-api-certs:
