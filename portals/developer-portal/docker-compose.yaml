# Developer Portal + Platform API - standalone release compose file. See README.md.

services:
  platform-api:
    image: ghcr.io/wso2/api-platform/platform-api:0.13.0-SNAPSHOT
    container_name: platform-api
    restart: unless-stopped
    # platform-api reads its config from /etc/platform-api/config.toml. In the
    # monorepo that is bind-mounted from the Platform API's own source config
    # (below); `make dist` instead points this at the unified configs/config.toml
    # that carries both the [developer_portal] and [platform_api] sections, and
    # each service reads only its own section.
    command: ["-config", "/etc/platform-api/config.toml"]
    env_file:
      - path: api-platform.env
        required: true
        format: raw
    volumes:
      - ../../platform-api/config/config.toml:/etc/platform-api/config.toml:ro
      - platform-api-data:/app/data
      # Certs land under /app/data/certs to match the binary's compiled
      # default cert_file/key_file paths (./data/certs/{cert,key}.pem,
      # resolved against WORKDIR /app) — no cert path override needed.
      - ./resources/certificates:/app/data/certs:ro
      # RS256 JWT signing/verification keys, generated by scripts/setup.sh.
      # Mounted under /etc/platform-api/keys so config.toml's
      # {{ file "/etc/platform-api/keys/jwt_*.pem" }} references resolve (that
      # prefix is on the Platform API's {{ file }} allowlist).
      - ./resources/keys:/etc/platform-api/keys:ro
    ports:
      - "9243:9243"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9243/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - devportal-network

  devportal:
    image: ghcr.io/wso2/api-platform/developer-portal:1.0.0-beta-SNAPSHOT
    container_name: devportal
    restart: unless-stopped
    depends_on:
      platform-api:
        condition: service_healthy
    env_file:
      - path: api-platform.env
        required: true
        format: raw
    volumes:
      - ./configs/config.toml:/app/configs/config.toml:ro
      - sqlite_data:/app/data
      - ./resources/certificates:/etc/devportal/tls:ro
      # Public half of the RS256 JWT keypair generated by scripts/setup.sh — the
      # devportal verifies Platform API tokens with it. Only the public key is
      # needed here; the private key stays with the platform-api container.
      - ./resources/keys:/etc/devportal/keys:ro
    ports:
      - "3000:3000"
    networks:
      - devportal-network

  # Optional component — NOT started by the default `docker compose up`. The
  # Platform API above is shared, so a single stack can add AI Workspace without
  # a second Platform API. Enable it with:
  #   docker compose --profile ai-workspace up -d
  # It reads the SAME configs/config.toml the other services mount; each service
  # consumes only its own root table, so it reads [ai_workspace] and ignores
  # [developer_portal]/[platform_api] (and their {{ env }}/{{ file }} tokens).
  # That section is not shipped, so before enabling, add an [ai_workspace] section
  # to configs/config.toml — copy it from the bottom of configs/config-template.toml
  # (see README → "AI Workspace (optional)").
  ai-workspace:
    image: ghcr.io/wso2/api-platform/ai-workspace:1.0.0-beta-SNAPSHOT
    container_name: ai-workspace
    restart: unless-stopped
    profiles: ["ai-workspace"]
    depends_on:
      platform-api:
        condition: service_healthy
    env_file:
      - path: api-platform.env
        required: true
        format: raw
    volumes:
      # The same unified config the other services mount — AI Workspace reads only
      # its [ai_workspace] section. The image reads config from
      # /etc/ai-workspace/config.toml.
      - ./configs/config.toml:/etc/ai-workspace/config.toml:ro
      - ./resources/certificates:/etc/ai-workspace/tls:ro
    ports:
      - "5380:5380"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:5380/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - devportal-network

volumes:
  sqlite_data:
    driver: local
  platform-api-data:
    driver: local

networks:
  devportal-network:
    driver: bridge
