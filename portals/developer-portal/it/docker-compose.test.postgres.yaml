# Integration test Docker Compose — PostgreSQL variant.
#
# Usage (via Makefile):
#   make test-postgres      — run Cypress headlessly against PostgreSQL (CI)
#
# The devportal service uses the pre-built image tagged :test (set by make ensure-test-tag).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: devportal
      POSTGRES_PASSWORD: devportal
      POSTGRES_DB: devportal
    volumes:
      - ../database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devportal -d devportal"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - it-devportal-network

  platform-api:
    image: ghcr.io/wso2/api-platform/platform-api:0.12.0
    command: ["-config", "/etc/platform-api/config-platform-api.toml"]
    environment:
      APIP_CP_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      APIP_CP_AUTH_JWT_SECRET_KEY: "fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210"
    volumes:
      - ./configs/config-platform-api-it.toml:/etc/platform-api/config-platform-api.toml:ro
      - platform-api-data:/app/data
      # TLS pair generated once, host-side, by `make ensure-certs` (mirrors
      # ../scripts/setup.sh's approach for the production compose) — read-only,
      # 644-mode so the container's non-root user can read a host-owned file.
      - ./.certs:/app/data/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9243/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - it-devportal-network

  devportal:
    image: ${DOCKER_REGISTRY:-ghcr.io/wso2/api-platform}/developer-portal:test
    depends_on:
      postgres:
        condition: service_healthy
      platform-api:
        condition: service_healthy
    volumes:
      - ./test-config.toml:/app/configs/config.toml:ro
    environment:
      # DB-agnostic settings (tls/logging/api-key/org/platform-api) live in ./test-config.toml.
      APIP_DP_DATABASE_HOST: postgres
      APIP_DP_DATABASE_PORT: 5432
      APIP_DP_DATABASE_TYPE: postgres
      APIP_DP_DATABASE_USERNAME: devportal
      APIP_DP_DATABASE_PASSWORD: devportal
      APIP_DP_DATABASE_NAME: devportal
      APIP_DP_SERVER_BASEURL: "http://devportal:3000"
      # devportal fails closed at startup without these — fixed test-only values,
      # not meant to be reused outside this CI fixture.
      APIP_DP_SECURITY_ENCRYPTIONKEY: "7f40672c96fd437dc33550755e218d586014232ceb5b01c9405aab575bcb1f4a"
      APIP_DP_SECURITY_SESSIONSECRET: "527948cfb2478dbd4dfcd9d466df65d8c70511236fe63dba0da0f5385676f593"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - it-devportal-network

  cypress:
    image: cypress/included:13.17.0
    platform: ${CYPRESS_PLATFORM:-linux/amd64}
    depends_on:
      devportal:
        condition: service_healthy
    working_dir: /e2e
    shm_size: '2gb'
    environment:
      CYPRESS_BASE_URL: "http://devportal:3000"
      CYPRESS_API_KEY: "devportal-it-test-key"
    volumes:
      - ./ui:/e2e
      - ./reports:/e2e/reports
    networks:
      - it-devportal-network
    command: ["cypress", "run", "--headless", "--browser", "electron"]

  rest-api-tests:
    image: node:22-alpine
    depends_on:
      devportal:
        condition: service_healthy
    working_dir: /rest-api
    environment:
      DEVPORTAL_BASE_URL: "http://devportal:3000"
      DEVPORTAL_ORG_HANDLE: "default"
      DEVPORTAL_ADMIN_USERNAME: "admin"
      DEVPORTAL_ADMIN_PASSWORD: "admin"
      DEVPORTAL_PUBLISHER_USERNAME: "publisher"
      DEVPORTAL_PUBLISHER_PASSWORD: "publisher"
      DEVPORTAL_DEVELOPER_USERNAME: "developer"
      DEVPORTAL_DEVELOPER_PASSWORD: "developer"
      DEVPORTAL_DB_DIALECT: postgres
      DEVPORTAL_DB_HOST: postgres
      DEVPORTAL_DB_PORT: 5432
      DEVPORTAL_DB_USERNAME: devportal
      DEVPORTAL_DB_PASSWORD: devportal
      DEVPORTAL_DB_DATABASE: devportal
      # Reachable from inside the compose network by the webhook dispatcher.
      WEBHOOK_SINK_URL: "http://rest-api-tests:4500"
      MOCK_TOKEN_ENDPOINT_URL: "http://rest-api-tests:4504"
    volumes:
      - ./rest-api:/rest-api
      - ./reports:/rest-api/reports
    networks:
      - it-devportal-network
    # better-sqlite3 (an optionalDependency used only by the SQLite variant) is the
    # sole reason this image would need a native build toolchain — skip it here with
    # --omit=optional so the Postgres run needs no apk add python3/make/g++.
    command: ["sh", "-c", "npm install --no-audit --no-fund --omit=optional && npm test"]

networks:
  it-devportal-network:
    driver: bridge

volumes:
  platform-api-data:
