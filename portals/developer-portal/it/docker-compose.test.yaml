# Integration test Docker Compose for the Developer Portal.
#
# Usage (via Makefile):
#   make test      — run Cypress headlessly (CI)
#   make open      — open Cypress interactive UI against a locally running devportal
#
# The devportal service uses the pre-built image tagged :test (set by make ensure-test-tag).

services:
  devportal:
    image: ${DOCKER_REGISTRY:-ghcr.io/wso2/api-platform}/developer-portal:test
    environment:
      # SQLite — no external database required.
      APIP_DP_DATABASE_TYPE: sqlite
      APIP_DP_DATABASE_FILE: /tmp/devportal-it.db
      # Seed the default org on startup.
      APIP_DP_ORGANIZATION_DEFAULTNAME: "default"
      # Use plain HTTP inside the test network so Cypress doesn't need to trust a cert.
      APIP_DP_TLS_ENABLED: "false"
      APIP_DP_SERVER_BASEURL: "http://devportal:3000"
      APIP_DP_ORGANIZATION_AUTOCREATESUBSCRIPTIONPLANS: "true"
      APIP_DP_SECURITY_SERVICEAPIKEY_ENABLED: "true"
      APIP_DP_SECURITY_SERVICEAPIKEY_VALUE: "devportal-it-test-key"
      APIP_DP_LOGGING_CONSOLEONLY: "true"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - it-devportal-network

  cypress:
    image: cypress/included:13.17.0
    platform: ${CYPRESS_PLATFORM:-linux/amd64}
    depends_on:
      devportal:
        condition: service_healthy
    working_dir: /e2e
    shm_size: '2gb'
    environment:
      CYPRESS_BASE_URL: "http://devportal:3000"
      CYPRESS_API_KEY: "devportal-it-test-key"
    volumes:
      - .:/e2e
      - ./reports:/e2e/reports
    networks:
      - it-devportal-network
    command: ["cypress", "run", "--headless", "--browser", "electron"]

networks:
  it-devportal-network:
    driver: bridge
