# Integration test Docker Compose for the Developer Portal.
#
# Usage (via Makefile):
#   make test      — run Cypress headlessly (CI)
#   make open      — open Cypress interactive UI against a locally running devportal
#
# The devportal service uses the pre-built image tagged :test (set by make ensure-test-tag).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: devportal
      POSTGRES_PASSWORD: devportal
      POSTGRES_DB: devportal
    volumes:
      - ../artifacts/docker-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devportal -d devportal"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - it-devportal-network

  devportal:
    image: ${DOCKER_REGISTRY:-ghcr.io/wso2/api-platform}/developer-portal:test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DP_DB_HOST: postgres
      DP_DB_PORT: 5432
      DP_DB_DIALECT: postgres
      DP_DB_USERNAME: devportal
      DP_DB_PASSWORD: devportal
      DP_DB_DATABASE: devportal
      DP_SECRETS_DBSECRET: devportal
      # Use plain HTTP inside the test network so Cypress doesn't need to trust a cert.
      DP_ADVANCED_HTTP: "true"
      DP_BASEURL: "http://devportal:3000"
      DP_SEEDDEFAULTS: "true"
      DP_GENERATEDEFAULTSUBPOLICIES: "true"
      DP_ADVANCED_APIKEY_ENABLED: "true"
      DP_ADVANCED_APIKEY_KEYVALUE: "devportal-it-test-key"
      DP_LOGGING_CONSOLEONLY: "true"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - it-devportal-network

  cypress:
    image: cypress/included:13.17.0
    platform: ${CYPRESS_PLATFORM:-linux/amd64}
    depends_on:
      devportal:
        condition: service_healthy
    working_dir: /e2e
    shm_size: '2gb'
    environment:
      CYPRESS_BASE_URL: "http://devportal:3000"
      CYPRESS_API_KEY: "devportal-it-test-key"
    volumes:
      - .:/e2e
      - ./reports:/e2e/reports
    networks:
      - it-devportal-network
    command: ["cypress", "run", "--headless", "--browser", "electron"]

networks:
  it-devportal-network:
    driver: bridge
