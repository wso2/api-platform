#
# AI Workspace configuration
#
# This file is read by the AI Workspace container at startup. Keys are flat and
# map 1:1 to environment variables; environment variables always override values
# set here. Browser-safe values (the VITE_* keys) are surfaced to the SPA at
# runtime — never put secrets (e.g. the OIDC client secret) in this file; pass
# them via the environment / a .env file instead.
# --------------------------------------------------------------------

# --- General ---
# Domain shown in the browser address bar (host:port or just host for port 80/443).
domain = "localhost:5380"

# Default region assigned to new organizations on first login.
default_org_region = "us"

# --- Authentication ---
# UI auth mode: "basic" uses the Platform API's file-based login (quickstart);
# "oidc" delegates login to an external OIDC-compliant IDP (production).
auth_mode = "basic"

# --- OIDC (used when auth_mode = "oidc") ---
# The BFF is a confidential client; the client secret is NOT set here — pass it
# as OIDC_CLIENT_SECRET via the environment / .env. See README → "Testing with
# an IDP locally" for the full setup.
#
# Issuer URL — endpoints are auto-discovered from /.well-known/openid-configuration.
# oidc_authority = "https://api.asgardeo.io/t/<org>/oauth2/token"
# Client ID registered in your IDP.
# oidc_client_id = "your-client-id"

# Claim name mappings — must match the [auth.idp] claim names in
# config-platform-api.toml. Override only if your IDP uses different names.
# oidc_username_claim = "username"
# oidc_org_id_claim     = "org_id"
# oidc_org_name_claim   = "org_name"
# oidc_org_handle_claim = "org_handle"

# --- Platform API connectivity ---
# Base URL the UI uses for API calls. Relative path routed through the BFF proxy
# (/api-proxy → platform-api:9243) so the browser only talks to the app origin and
# never hits the platform-api self-signed cert directly. Use an absolute URL only
# when calling the Platform API directly.
platform_api_base_url = "/api-proxy/api/v0.9"

# Control-plane host — the externally reachable address gateways use to reach
# the Platform API. Shown in gateway setup instructions (keys.env, helm values).
controlplane_host = "host.docker.internal:9243"

# --- Gateway metadata ---
# Gateway versions shown in the create-gateway version selector (JSON array string).
platform_gateway_versions = '[{"version":"1.1","latestVersion":"v1.1.0","channel":"LTS"},{"version":"1.0","latestVersion":"v1.0.0","channel":"LTS"}]'
