#
# AI Workspace + Platform API — unified configuration file
#
# [platform_api.*] keys are read by the Platform API (Go binary).
# [ai_workspace.*] keys are read by the AI Workspace container at startup.
# Environment variables always override values set here.
#
# QUICK START (basic-auth mode — no external IDP needed):
#   1. Set [auth.jwt] secret_key to a random string.
#   2. Set [auth.basic_auth] enabled = true and configure users.
#   3. Run: docker compose up
#
# OIDC mode: keep basic_auth disabled, set [auth.idp] fields,
# and set [ai_workspace] auth_mode = "oidc" with oidc_* fields.
# --------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
log_level = "INFO"   # DEBUG | INFO | WARN | ERROR
dev_mode  = false
port      = "9243"

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
[database]
driver = "sqlite3"          # "sqlite3" or "postgres"
path   = "/app/data/api_platform.db"   # SQLite file path (ignored for postgres)

# PostgreSQL — uncomment when driver = "postgres"
# host     = "localhost"
# port     = 5432
# name     = "platform_api"
# user     = "platform_api"
# password = "change-me"
# ssl_mode = "disable"

# ---------------------------------------------------------------------------
# Authentication — Platform API
# ---------------------------------------------------------------------------

# JWT (local HMAC) — the default for self-hosted deployments.
# Disable when using an external IDP.
# Secret key is injected via AUTH_JWT_SECRET_KEY environment variable.
[auth.jwt]
enabled = true
issuer  = "platform-api"

# IDP (JWKS-based) — enable instead of JWT when using Asgardeo, Keycloak, etc.
[auth.idp]
enabled  = false
# jwks_url = "https://accounts.example.com/oauth2/jwks"
# issuer   = ["https://accounts.example.com"]
# audience = []

# Basic-auth — local username/password login. Ideal for initial setup.
# When enabled, IDP is not used.
[auth.basic_auth]
enabled = true

[auth.basic_auth.organization]
name   = "My Organization"
handle = "my-org"
region = "us"

[[auth.basic_auth.users]]
username      = "admin"
password_hash = "$2a$12$44E0X.EDG6J38jSj4XbEHOvUPukF.eVb4QBpt/59jA/u.ALe7p9Ba"
scopes        = "ap:organization:read ap:organization:manage ap:gateway:read ap:gateway:create ap:gateway:update ap:gateway:delete ap:gateway:manage ap:gateway:token:read ap:gateway:token:create ap:gateway:token:delete ap:gateway:token:manage ap:gateway:policy:read ap:gateway:policy:create ap:gateway:policy:delete ap:gateway:policy:manage ap:gateway:artifacts:read ap:gateway:manifest:read ap:rest_api:read ap:rest_api:create ap:rest_api:update ap:rest_api:delete ap:rest_api:manage ap:rest_api:import ap:rest_api:deployment:read ap:rest_api:deployment:create ap:rest_api:deployment:delete ap:rest_api:deployment:manage ap:rest_api:api_key:read ap:rest_api:api_key:create ap:rest_api:api_key:delete ap:rest_api:api_key:manage ap:llm_provider:read ap:llm_provider:create ap:llm_provider:update ap:llm_provider:delete ap:llm_provider:manage ap:llm_provider:api_key:read ap:llm_provider:api_key:create ap:llm_provider:api_key:delete ap:llm_provider:api_key:manage ap:llm_provider:deployment:read ap:llm_provider:deployment:create ap:llm_provider:deployment:delete ap:llm_provider:deployment:manage ap:llm_proxy:read ap:llm_proxy:create ap:llm_proxy:update ap:llm_proxy:delete ap:llm_proxy:manage ap:llm_proxy:deployment:read ap:llm_proxy:deployment:create ap:llm_proxy:deployment:delete ap:llm_proxy:deployment:manage ap:mcp_proxy:read ap:mcp_proxy:create ap:mcp_proxy:update ap:mcp_proxy:delete ap:mcp_proxy:manage ap:mcp_proxy:deployment:read ap:mcp_proxy:deployment:create ap:mcp_proxy:deployment:delete ap:mcp_proxy:deployment:manage ap:application:read ap:application:create ap:application:update ap:application:delete ap:application:manage ap:subscription:read ap:subscription:create ap:subscription:update ap:subscription:delete ap:subscription:manage ap:subscription_plan:read ap:subscription_plan:create ap:subscription_plan:update ap:subscription_plan:delete ap:subscription_plan:manage"

# ---------------------------------------------------------------------------
# TLS — Platform API
# ---------------------------------------------------------------------------
[tls]
cert_dir = "/app/data/certs"

# ---------------------------------------------------------------------------
# DevPortal integration — disable for standalone deployments
# ---------------------------------------------------------------------------
[default_devportal]
enabled = false

# ---------------------------------------------------------------------------
# AI Workspace
# ---------------------------------------------------------------------------
[ai_workspace]
# Domain shown in the browser address bar (host:port or just host for port 80/443).
domain = "localhost:8080"

# Authentication mode for the UI: "basic" (local) or "oidc" (external IDP).
auth_mode = "basic"

# Super-admin credentials for the UI login (basic auth mode only).
super_admin_username      = "admin"
super_admin_password_hash = "$2a$12$44E0X.EDG6J38jSj4XbEHOvUPukF.eVb4QBpt/59jA/u.ALe7p9Ba"

# --- OIDC mode (auth_mode = "oidc") ---
# OIDC issuer URL (auto-discovers endpoints from /.well-known/openid-configuration).
oidc_authority = ""
# OIDC client ID registered in your IDP.
oidc_client_id = ""

# Optional
default_org_region = "us"
sentry_env         = "PROD"
