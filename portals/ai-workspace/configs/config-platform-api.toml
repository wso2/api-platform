#
# Platform API configuration (Asgardeo / OIDC mode)
#
# This file is read by the Platform API (Go binary).
# Environment variables always override values set here.
#
# This file is configured for Asgardeo OIDC login with scope-based authorization.
# Replace <YOUR_ASGARDEO_ORG> with your actual Asgardeo organization name.
# --------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
log_level = "INFO"   # DEBUG | INFO | WARN | ERROR
dev_mode  = false
port      = "9243"

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
[database]
driver = "sqlite3"          # "sqlite3" or "postgres"
path   = "/app/data/api_platform.db"   # SQLite file path (ignored for postgres)

# PostgreSQL — uncomment when driver = "postgres"
# host     = "localhost"
# port     = 5432
# name     = "platform_api"
# user     = "platform_api"
# password = "change-me"
# ssl_mode = "disable"

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------

# JWT (local HMAC) — disabled in IDP mode; Asgardeo tokens are validated directly.
[auth.jwt]
enabled = false

# IDP (JWKS-based) — Asgardeo OIDC with scope-based authorization.
# Replace <YOUR_ASGARDEO_ORG> with your Asgardeo organization name.
[auth.idp]
enabled  = true
name     = "asgardeo"
jwks_url = "https://api.asgardeo.io/t/abcorgdefault/oauth2/jwks"
issuer   = ["https://api.asgardeo.io/t/abcorgdefault/oauth2/token"]
audience = []   # leave empty to skip audience check, or set to your client ID

# JWT claim name mappings — Asgardeo standard claim names.
organization_claim_name = "org_id"
org_name_claim_name     = "org_name"
org_handle_claim_name   = "org_handle"
user_id_claim_name      = "sub"
username_claim_name     = "username"
email_claim_name        = "email"
scope_claim_name        = "scope"

# Scope-based authorization: the token's "scope" claim must contain the
# required platform scopes. Ensure your Asgardeo application requests these scopes.
validation_mode = "scope"

# Basic-auth — disabled in IDP mode.
[auth.basic_auth]
enabled = false

# ---------------------------------------------------------------------------
# TLS
# ---------------------------------------------------------------------------
[tls]
cert_dir = "/app/data/certs"

# ---------------------------------------------------------------------------
# DevPortal integration — disable for standalone deployments
# ---------------------------------------------------------------------------
[default_devportal]
enabled = false
