#
# AI Workspace configuration template
#
# Copy this file to config.toml and edit the values for your deployment.
# This file is read by the AI Workspace container at startup.
# Environment variables always override values set here.
#
# QUICK START (basic-auth mode):
#   1. Copy this file to config.toml.
#   2. Set auth_mode = "basic" (uses the users defined in config-platform-api.toml).
#   3. Run: docker compose up
#
# OIDC mode: set auth_mode = "oidc" and fill in the oidc_* fields below.
# --------------------------------------------------------------------

# Domain shown in the browser address bar (host:port, or just host for port 80/443).
domain = "localhost:8080"

# Authentication mode for the UI: "basic" (local users) or "oidc" (external IDP).
auth_mode = "basic"

# --- OIDC mode (set auth_mode = "oidc" above to enable) ---
# OIDC issuer URL — endpoints are auto-discovered from /.well-known/openid-configuration.
# oidc_authority = "https://accounts.example.com"
# OIDC client ID registered in your IDP.
# oidc_client_id = "your-client-id"

# JWT claim name mappings — which token claim carries each user/org field.
# Override these only if your IDP uses different claim names. The org_* names
# must match the [auth.idp] claim names in config-platform-api.toml.
# oidc_username_claim   = "given_name,name,preferred_username,username"  # comma-separated; first present wins, then email, then sub
# oidc_email_claim      = "email"
# oidc_role_claim       = "platform_role"
# oidc_scope_claim      = "scope"
# oidc_org_id_claim     = "org_id"
# oidc_org_name_claim   = "org_name"
# oidc_org_handle_claim = "org_handle"

# Scopes the BFF requests at login (space-separated). Leave unset to request the
# full ap:* set (recommended). Override only to request a narrower set.
# oidc_scope = "openid profile email offline_access ap:organization:manage ..."

# BFF callback the IDP redirects to after login — must equal the redirect URI
# registered on the IDP application. Required in OIDC mode.
# oidc_redirect_url = "https://localhost:5380/api/auth/callback"

# Absolute URL the IDP redirects to after logout (must be pre-registered there).
# oidc_post_logout_redirect_url = "https://localhost:5380/login"

# NOTE: the OIDC client secret is intentionally NOT configured here. Set it via
# the OIDC_CLIENT_SECRET environment variable (e.g. in a .env file) so it never
# lands in a committed config file.

# Platform API base URL — used by the UI to make API calls. Use the relative
# nginx-proxy path (/api-proxy → platform-api:9243) so the browser only talks to
# the app origin and never hits the platform-api self-signed cert directly.
# Use an absolute URL (e.g. https://localhost:9243/api/v0.9) only when calling
# the platform API directly without the nginx proxy.
platform_api_base_url = "/api-proxy/api/v0.9"

# Control-plane host — the host:port that deployed gateways use to reach
# the Platform API. Shown in gateway setup instructions (keys.env, helm values).
# This must be the externally reachable address, not a relative/proxy path.
controlplane_host = "localhost:9243"

# Default region assigned to new organizations on first login.
default_org_region = "us"


# ====================================================================
# BFF (server-side) settings
#
# Everything below configures the Go BFF itself, not the browser SPA, and is
# never sent to the browser. All keys are optional — the shown values are the
# built-in defaults. Any matching environment variable overrides the value here.
# ====================================================================

# --- Listener & TLS ---
# Address the BFF listens on (host:port). The container publishes this port.
# bff_addr = ":5380"
# Use a self-signed certificate when no cert/key files are mounted.
# tls_self_signed = true
# Paths to a mounted TLS certificate and key (used instead of self-signed).
# tls_cert_file = "/etc/ai-workspace/tls/tls.crt"
# tls_key_file  = "/etc/ai-workspace/tls/tls.key"

# --- Upstream Platform API ---
# Base URL the BFF uses to reach the Platform API (server-to-server, NOT the
# browser path above). REQUIRED — set here or via the PLATFORM_API_URL env var.
# In docker compose this is the compose hostname; run locally use localhost.
# platform_api_url = "https://platform-api:9243"
# Accept the Platform API's self-signed certificate (dev/quickstart only).
# platform_api_tls_skip_verify = false
# File-based login path on the Platform API (basic-auth mode).
# platform_login_path = "/api/portal/v0.9/auth/login"
# Same-origin prefix the SPA calls; the BFF strips it before forwarding upstream.
# proxy_prefix = "/api/proxy"

# --- Session & cookie ---
# Server-side session store. Only "memory" is supported today ("redis" is future).
# session_store = "memory"
# Sliding idle window (Go duration, e.g. "30m"). Reserved — not enforced yet.
# session_idle_timeout = "30m"
# Hard cap on session lifetime regardless of activity/refresh (Go duration).
# session_absolute_ttl = "8h"
# Session cookie name.
# cookie_name = "_bff_session"
# Mark the session cookie Secure (HTTPS-only). Set false only for local HTTP.
# cookie_secure = true
# SameSite policy for the session cookie: "lax" | "strict" | "none".
# cookie_samesite = "lax"
# Custom header required on state-mutating requests (CSRF protection).
# csrf_header = "X-Requested-By"
