#
# AI Workspace configuration template
#
# Copy this file to config.toml and edit the values for your deployment.
# This file is read by the AI Workspace container at startup.
#
# HOW VALUES ARE RESOLVED
# Each value is an interpolation token, resolved once at startup:
#
#   key = '{{ env "APIP_AIW_KEY" "default" }}'
#          └── environment variable    └── value used when the variable is unset
#
# So any key can be overridden by setting its APIP_AIW_ variable — no edit to this
# file required. A plain literal (key = "value") works too; the token form simply
# makes the environment override visible in place.
#
# To source a value from a mounted file instead of the environment — the right
# choice for secrets — swap the token:
#
#   key = '{{ file "/secrets/ai-workspace/key" }}'
#
# A {{ file }} token is required and fails closed: if the file is missing, or lives
# outside the allowed source directories (/etc/ai-workspace and /secrets/ai-workspace
# by default; override with APIP_CONFIG_FILE_SOURCE_ALLOWLIST), the server refuses to
# start rather than run with an empty value. An {{ env }} token with no default
# behaves the same way.
#
# Never write a secret as a raw literal in this file, and never hardcode one in
# docker-compose.yaml.
#
# QUICK START (basic-auth mode):
#   1. Copy this file to config.toml.
#   2. Set auth_mode = "basic" (uses the users defined in config-platform-api.toml).
#   3. Run: docker compose up
#
# OIDC mode: set auth_mode = "oidc" and fill in the oidc_* fields below.
# --------------------------------------------------------------------

# Domain shown in the browser address bar (host:port, or just host for port 80/443).
domain = '{{ env "APIP_AIW_DOMAIN" "localhost:5380" }}'

# Authentication mode for the UI: "basic" (local users) or "oidc" (external IDP).
auth_mode = '{{ env "APIP_AIW_AUTH_MODE" "basic" }}'

# --- OIDC mode (set auth_mode = "oidc" above to enable) ---

# OIDC issuer URL — endpoints are auto-discovered from /.well-known/openid-configuration.
# oidc_authority = '{{ env "APIP_AIW_OIDC_AUTHORITY" "https://accounts.example.com" }}'

# OIDC client ID registered in your IDP.
# oidc_client_id = '{{ env "APIP_AIW_OIDC_CLIENT_ID" "your-client-id" }}'

# The confidential-client secret. It stays server-side and is never sent to the
# browser. Required in OIDC mode, and deliberately has no default: an unset variable
# fails startup rather than running with an empty credential.
# Prefer the {{ file }} form in production — the value then never enters the
# environment at all.
# oidc_client_secret = '{{ env "APIP_AIW_OIDC_CLIENT_SECRET" }}'
# oidc_client_secret = '{{ file "/secrets/ai-workspace/oidc_client_secret" }}'

# The callback the IDP redirects to after login — a server-side callback, not an SPA
# route. Must equal the redirect URI registered on the IDP application.
# oidc_redirect_url = '{{ env "APIP_AIW_OIDC_REDIRECT_URL" "https://localhost:5380/api/auth/callback" }}'

# Absolute URL the IDP redirects to after logout (must be pre-registered there).
# oidc_post_logout_redirect_url = '{{ env "APIP_AIW_OIDC_POST_LOGOUT_REDIRECT_URL" "https://localhost:5380/login" }}'

# Scopes requested at login (space-separated). Leave unset to request the full ap:*
# set (recommended). Override only to request a narrower set.
# oidc_scope = '{{ env "APIP_AIW_OIDC_SCOPE" "openid profile email offline_access ap:organization:manage ..." }}'

# Force the OIDC client on independently of auth_mode. Setting auth_mode = "oidc"
# already enables it, so this is rarely needed.
# oidc_enabled = '{{ env "APIP_AIW_OIDC_ENABLED" "false" }}'

# JWT claim name mappings — which token claim carries each user/org field. Override
# only if your IDP uses different claim names. The org_* names must match the
# [auth.idp] claim names in config-platform-api.toml.
# oidc_username_claim   = '{{ env "APIP_AIW_OIDC_USERNAME_CLAIM" "username" }}'
# oidc_email_claim      = '{{ env "APIP_AIW_OIDC_EMAIL_CLAIM" "email" }}'
# oidc_role_claim       = '{{ env "APIP_AIW_OIDC_ROLE_CLAIM" "platform_role" }}'
# oidc_scope_claim      = '{{ env "APIP_AIW_OIDC_SCOPE_CLAIM" "scope" }}'
# oidc_org_id_claim     = '{{ env "APIP_AIW_OIDC_ORG_ID_CLAIM" "org_id" }}'
# oidc_org_name_claim   = '{{ env "APIP_AIW_OIDC_ORG_NAME_CLAIM" "org_name" }}'
# oidc_org_handle_claim = '{{ env "APIP_AIW_OIDC_ORG_HANDLE_CLAIM" "org_handle" }}'

# Control-plane host — the host:port that deployed gateways use to reach the Platform
# API. Shown in gateway setup instructions (keys.env, helm values). Must be the
# externally reachable address, not a relative/proxy path.
controlplane_host = '{{ env "APIP_AIW_CONTROLPLANE_HOST" "localhost:9243" }}'

# Default region assigned to new organizations on first login.
default_org_region = '{{ env "APIP_AIW_DEFAULT_ORG_REGION" "us" }}'

# Gateway versions offered in the create-gateway version selector (JSON array string).
# Each entry: version (helm chart minor), latestVersion (image/chart tag shown to the
# user and used in the helm --version flag), channel ("STS" | "LTS"). The first entry
# is the default selection.
platform_gateway_versions = '{{ env "APIP_AIW_PLATFORM_GATEWAY_VERSIONS" "[{\"version\":\"1.2\",\"latestVersion\":\"v1.2.0-M1\",\"channel\":\"STS\"}]" }}'

# Verbose logging in the browser console.
# debug = '{{ env "APIP_AIW_DEBUG" "false" }}'


# ====================================================================
# Server settings
#
# Everything below configures the AI Workspace server itself. These values stay
# server-side and are never sent to the browser. All keys are optional — the value
# shown in each token's default position is the built-in default.
# ====================================================================

# --- Listener & TLS ---

# Address the server listens on (host:port). The container publishes this port.
# listen_addr = '{{ env "APIP_AIW_LISTEN_ADDR" ":5380" }}'

# Terminate TLS on this listener. Set false only when a trusted upstream (ingress
# controller, service-mesh sidecar) terminates TLS for you — no certificate is then
# read, generated, or required.
# tls_enabled = '{{ env "APIP_AIW_TLS_ENABLED" "true" }}'

# Use a self-signed certificate when no cert/key files are mounted.
# Ignored when tls_enabled = false. Never reached when APIP_DEMO_MODE=false.
# tls_self_signed = '{{ env "APIP_AIW_TLS_SELF_SIGNED" "true" }}'

# Paths to a mounted TLS certificate and key (used instead of self-signed).
# tls_cert_file = '{{ env "APIP_AIW_TLS_CERT_FILE" "/etc/ai-workspace/tls/tls.crt" }}'
# tls_key_file  = '{{ env "APIP_AIW_TLS_KEY_FILE" "/etc/ai-workspace/tls/tls.key" }}'

# --- Logging ---

# log_level  = '{{ env "APIP_AIW_LOG_LEVEL" "info" }}'    # debug | info | warn | error
# log_format = '{{ env "APIP_AIW_LOG_FORMAT" "text" }}'   # text | json

# --- Upstream Platform API ---

# Base URL used to reach the Platform API (server-to-server). REQUIRED. In docker
# compose this is the compose hostname; running locally, use localhost. Its
# http/https scheme decides whether the upstream hop uses TLS.
platform_api_url = '{{ env "APIP_AIW_PLATFORM_API_URL" "https://platform-api:9243" }}'

# Accept the Platform API's self-signed certificate (dev/quickstart only). Rejected
# when APIP_DEMO_MODE=false — trust the certificate with platform_api_ca_file instead.
# platform_api_tls_skip_verify = '{{ env "APIP_AIW_PLATFORM_API_TLS_SKIP_VERIFY" "false" }}'

# PEM bundle to trust for the upstream's TLS certificate. Appended to the system
# roots, so public CAs keep working.
# platform_api_ca_file = '{{ env "APIP_AIW_PLATFORM_API_CA_FILE" "" }}'

# File-based login path on the Platform API (basic-auth mode).
# platform_login_path = '{{ env "APIP_AIW_PLATFORM_LOGIN_PATH" "/api/portal/v0.9/auth/login" }}'

# Same-origin prefix the SPA calls; it is stripped before forwarding upstream. The
# browser's API base URL is derived from this, so the browser only ever talks to the
# app origin and never hits the platform-api certificate directly.
# proxy_prefix = '{{ env "APIP_AIW_PROXY_PREFIX" "/api/proxy" }}'

# Directory holding the built SPA (index.html + assets).
# static_dir = '{{ env "APIP_AIW_STATIC_DIR" "/app" }}'

# --- Session & cookie ---

# Server-side session store. Only "memory" is supported today ("redis" is future).
# session_store = '{{ env "APIP_AIW_SESSION_STORE" "memory" }}'

# Sliding idle window (Go duration, e.g. "30m"). Reserved — not enforced yet.
# session_idle_timeout = '{{ env "APIP_AIW_SESSION_IDLE_TIMEOUT" "30m" }}'

# Hard cap on session lifetime regardless of activity/refresh (Go duration).
# session_absolute_ttl = '{{ env "APIP_AIW_SESSION_ABSOLUTE_TTL" "8h" }}'

# Session cookie name.
# cookie_name = '{{ env "APIP_AIW_COOKIE_NAME" "_ai_workspace_session" }}'

# Mark the session cookie Secure (HTTPS-only). Set false only for local HTTP.
# cookie_secure = '{{ env "APIP_AIW_COOKIE_SECURE" "true" }}'

# SameSite policy for the session cookie: "lax" | "strict" | "none".
# cookie_samesite = '{{ env "APIP_AIW_COOKIE_SAMESITE" "lax" }}'

# Custom header required on state-mutating requests (CSRF protection).
# csrf_header = '{{ env "APIP_AIW_CSRF_HEADER" "X-Requested-By" }}'


# ====================================================================
# Environment-only settings (no config.toml key)
#
# These are read straight from the environment and have no key here, because each one
# is needed before (or independently of) the config file itself. They are NOT config
# keys, so the APIP_AIW_ prefix rule does not apply to them.
# ====================================================================
#
#   APIP_AIW_CONFIG_FILE Path to this file. Defaults to
#                        /etc/ai-workspace/config.toml (the container mount point).
#
#   APIP_CONFIG_FILE_SOURCE_ALLOWLIST
#                        Comma-separated directories a {{ file "..." }} token may
#                        read from. Replaces (not extends) the defaults
#                        /etc/ai-workspace and /secrets/ai-workspace. Shared by
#                        every component in the platform.
#
#   APIP_DEMO_MODE       "true" (default) relaxes startup checks for quickstart:
#                        basic auth is allowed and a self-signed TLS certificate
#                        is generated when none is mounted. Set "false" for
#                        production, which then requires OIDC, plus either a
#                        mounted certificate or tls_enabled = false above.
#                        The same variable drives the Platform API, so one value
#                        governs the whole stack.
