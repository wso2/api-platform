#
# AI Workspace configuration template
#
# Copy this file to config.toml and edit the values for your deployment. It is the
# only source of configuration, read by the AI Workspace container at startup.
#
# All settings live under [ai_workspace] / [ai_workspace.*], mirroring the Platform
# API's own [platform_api] / [platform_api.*] tables so one config.toml can hold both
# services side by side without their tables colliding.
#
# HOW VALUES ARE RESOLVED
# Each value is an interpolation token, resolved once at startup:
#
#   key = '{{ env "APIP_AIW_KEY" "default" }}'
#          └── environment variable    └── value used when the variable is unset
#
# The token is what reads the environment — a plain literal or a commented-out key
# ignores the variable entirely. By convention the variable name is the key's table
# path under [ai_workspace], uppercased with underscores, prefixed APIP_AIW_:
#
#   [ai_workspace] domain                    ->  APIP_AIW_DOMAIN
#   [ai_workspace.server.https] port         ->  APIP_AIW_SERVER_HTTPS_PORT
#   [ai_workspace.auth.oidc] client_id       ->  APIP_AIW_AUTH_OIDC_CLIENT_ID
#
# For secrets, source from a mounted file instead of the environment:
#
#   key = '{{ file "/secrets/ai-workspace/key" }}'
#
# Both {{ file }} and a required {{ env }} (no default) fail closed at startup — a
# missing file, a file outside the allowed source directories (/etc/ai-workspace and
# /secrets/ai-workspace; override with APIP_CONFIG_FILE_SOURCE_ALLOWLIST), or an unset
# required variable all refuse to start rather than run with an empty value.
#
# Never write a secret as a raw literal here or hardcode one in docker-compose.yaml.
#
# KEY ORDER
# Within each table: 1) the gate (enabled/mode), 2) required identity/connection keys
# (url, authority, client_id, client_secret), 3) optional behaviour, 4) TLS/trust last.
# Keep new keys in that order rather than appending to the end of a table.
#
# QUICK START (basic-auth mode):
#   1. Copy this file to config.toml.
#   2. Set [ai_workspace.auth] mode = "basic" (uses the users defined in
#      [platform_api.auth.file.users] in the same config.toml).
#   3. Run: docker compose up
#
# OIDC mode: set [ai_workspace.auth] mode = "oidc" and fill in [ai_workspace.auth.oidc].
# --------------------------------------------------------------------

[ai_workspace]

# ====================================================================
# Deployment identity
#
# These keys are browser-safe: they are the subset served to the SPA as
# window.__RUNTIME_CONFIG__. Never put a credential among them.
# ====================================================================

# Default region assigned to new organizations on first login.
default_org_region = "us"


# ---------------------------------------------------------------------------
# Server
#
# Everything in this table configures the AI Workspace server itself. These values
# stay server-side and are never sent to the browser, with two exceptions: domain
# (the SPA needs it to display the deployment's own address) and the
# [ai_workspace.auth.oidc] claim names (the SPA needs them to display user/org identity).
#
# All keys are optional: the value in each token's default position is the built-in
# default.
# ---------------------------------------------------------------------------

# Note: the directory serving the built SPA (index.html + assets) is not
# configurable here — the container always serves the copy baked in at /app.
# Local dev (`make bff-run`) points the BFF at a different build via the
# -static-dir CLI flag instead, since no deployment ever needs to override it.

# The plain-HTTP and HTTPS listeners are independent — enable either or both, each on
# its own port. Serve plain HTTP internally, HTTPS externally, or run both at once
# (e.g. to migrate clients between them without downtime). Both always bind all
# interfaces (there is no host to configure), and the container publishes whichever
# port(s) are enabled.
[ai_workspace.server]

# Domain shown in the browser address bar (host:port, or just host for port 80/443).
# Browser-safe — served to the SPA as APIP_AIW_SERVER_DOMAIN.
domain = "localhost:5380"

# Defaults: the HTTPS listener is on at 5380; the plain-HTTP listener is off. Enable
# the plain-HTTP listener only when a trusted upstream (ingress, service-mesh sidecar)
# terminates TLS, or for internal traffic — never expose it directly to untrusted
# networks.
#
# cert_file / key_file must point at a certificate pair when [server.https]
# enabled = true. Certificates are always required — there is no self-signed
# fallback. setup.sh generates a pair for the quickstart.
[ai_workspace.server.http]
enabled = false
port    = 5080

[ai_workspace.server.https]
enabled   = true
port      = 5380
cert_file = "/etc/ai-workspace/tls/cert.pem"
key_file  = "/etc/ai-workspace/tls/key.pem"


# ---------------------------------------------------------------------------
# Logging. level/format are this process's own logs; browser_debug is
# browser-safe — served to the SPA to control verbose console logging there.
# Level is matched case-insensitively; lowercase is canonical.
# ---------------------------------------------------------------------------
[ai_workspace.logging]

level         = "info"    # debug | info | warn | error
format        = "text"    # text | json
browser_debug = "false"


# ---------------------------------------------------------------------------
# Upstream Platform API (control plane) — the server-to-server hop the BFF proxies to.
# ---------------------------------------------------------------------------
[ai_workspace.control_plane]

# Base URL to reach the Platform API. REQUIRED. Use the compose hostname in docker
# compose, or localhost when running locally. The scheme decides if the hop uses TLS.
url = "https://platform-api:9243"

# Same-origin prefix the SPA calls; stripped before forwarding upstream, so the
# browser only ever talks to the app origin and never sees the platform-api cert.
proxy_prefix = "/proxy"

# Platform API's portal route prefix. BFF-initiated calls (e.g. file-based login) are
# built as this base path plus the route's own suffix, e.g. base + "/auth/login".
portal_base_path = "/api/portal/v0.9"

# --- Trust for the upstream's TLS certificate ---

# Accept the Platform API's self-signed certificate without verification (local dev
# only) — prefer ca_file instead.
tls_skip_verify = "false"

# PEM bundle to trust for the upstream's TLS certificate, appended to system roots.
ca_file = ""


# ---------------------------------------------------------------------------
# Gateway deployment info — browser-safe values the SPA shows in gateway setup
# instructions. Unlike [ai_workspace.control_plane] (the BFF's own hop), this is what
# an externally deployed gateway needs to reach the Platform API itself.
# ---------------------------------------------------------------------------
[ai_workspace.gateway]

# host:port that deployed gateways use to reach the Platform API, shown in setup
# instructions (keys.env, helm values). Must be externally reachable, not a proxy path.
controlplane_host = "localhost:9243"

# Gateway versions offered in the create-gateway version selector (JSON array string).
# Each entry: version (helm chart minor), latestVersion (image/chart tag, used in the
# helm --version flag), channel ("STS" | "LTS"). The first entry is the default.
platform_gateway_versions = "[{\"version\":\"1.2\",\"latestVersion\":\"v1.2.0-beta\",\"channel\":\"STS\"}]"



# ---------------------------------------------------------------------------
# Server-side session lifetime.
# ---------------------------------------------------------------------------
[ai_workspace.session]

# Session store. Only "memory" is supported today ("redis" is future).
store = "memory"

# Sliding idle window (Go duration, e.g. "30m"). Reserved — not enforced yet.
idle_timeout = "30m"

# Hard cap on session lifetime regardless of activity/refresh (Go duration).
absolute_ttl = "8h"


# ---------------------------------------------------------------------------
# Auth — chooses the login UX and gates the OIDC client below.
# ---------------------------------------------------------------------------
[ai_workspace.auth]

# Authentication mode for the UI: "basic" (local users) or "oidc" (external IDP).
# Choosing "oidc" enables the [ai_workspace.auth.oidc] table below.
mode = "basic"


# ---------------------------------------------------------------------------
# JWT claim name mappings — which token claim carries each user/org field. Applies to
# BOTH auth modes (a sibling of [ai_workspace.auth.oidc], not nested in it): in basic
# mode the Platform API signs JWTs using these same claim names, so the two services
# must agree. Mirrors [platform_api.auth.claim_mappings] in the same config.toml
# key for key — override only if your IDP uses different claim names.
# ---------------------------------------------------------------------------
[ai_workspace.auth.claim_mappings]

organization = "organization" # claim carrying the org ID
org_name     = "org_name"          # org display name
org_handle   = "org_handle"      # org URL slug
username     = "username"
email        = "email"
scope        = "scope"                # space-separated scope string
roles        = "roles"


# ---------------------------------------------------------------------------
# OIDC — set [ai_workspace.auth] mode = "oidc" above to enable.
#
# The BFF is a confidential client: it performs the whole handshake, and the client
# credentials never reach the browser.
# ---------------------------------------------------------------------------
[ai_workspace.auth.oidc]

# Force the OIDC client on independently of mode. Rarely needed — mode = "oidc"
# above already enables it.
enabled = "false"

# Issuer URL — endpoints are auto-discovered from /.well-known/openid-configuration.
authority = "https://accounts.example.com"

# Client ID registered in your IDP.
client_id = "your-client-id"

# Confidential-client secret. REQUIRED in OIDC mode with no default — an unset
# variable fails startup. Prefer the {{ file }} form in production.
client_secret = ""

# Server-side callback the IDP redirects to after login (not an SPA route). Must
# match the redirect URI registered on the IDP application.
redirect_url = "https://localhost:5380/api/auth/callback"

# Absolute URL the IDP redirects to after logout (must be pre-registered there).
post_logout_redirect_url = "https://localhost:5380/login"

# Scopes requested at login (space-separated). Defaults to the full ap:* set the
# Platform API authorizes against (recommended) — trim only what you need to
# restrict, and always keep offline_access or token refresh breaks.
scope = "openid profile email offline_access ap:organization:read ap:organization:manage ap:organization:subscription:read ap:project:read ap:project:create ap:project:update ap:project:delete ap:project:manage ap:application:read ap:application:create ap:application:update ap:application:delete ap:application:manage ap:application:api_key:read ap:application:api_key:create ap:application:api_key:delete ap:application:api_key:manage ap:application:association:read ap:application:association:create ap:application:association:delete ap:application:association:manage ap:application:association:api_key:read ap:gateway:read ap:gateway:create ap:gateway:update ap:gateway:delete ap:gateway:manage ap:gateway:token:read ap:gateway:token:create ap:gateway:token:delete ap:gateway:token:manage ap:gateway_custom_policy:read ap:gateway_custom_policy:create ap:gateway_custom_policy:delete ap:gateway_custom_policy:manage ap:gateway:artifact:read ap:gateway:manifest:read ap:rest_api:read ap:rest_api:create ap:rest_api:update ap:rest_api:delete ap:rest_api:manage ap:rest_api:import ap:rest_api:gateway:read ap:rest_api:gateway:create ap:rest_api:gateway:manage ap:rest_api:deployment:read ap:rest_api:deployment:create ap:rest_api:deployment:delete ap:rest_api:deployment:manage ap:rest_api:deployment:undeploy ap:rest_api:deployment:restore ap:rest_api:api_key:read ap:rest_api:api_key:create ap:rest_api:api_key:update ap:rest_api:api_key:delete ap:rest_api:api_key:manage ap:rest_api:publication:read ap:rest_api:publication:create ap:rest_api:publication:delete ap:devportal:read ap:devportal:create ap:devportal:update ap:devportal:delete ap:devportal:manage ap:subscription:read ap:subscription:create ap:subscription:update ap:subscription:delete ap:subscription:manage ap:subscription_plan:read ap:subscription_plan:create ap:subscription_plan:update ap:subscription_plan:delete ap:subscription_plan:manage ap:llm_template:read ap:llm_template:create ap:llm_template:update ap:llm_template:del