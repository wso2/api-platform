# ====================================================================
# Settings with no config key
#
# Read straight from the environment by the server itself (not through a token),
# since each is needed before or independently of the config file.
# ====================================================================
#
#   APIP_CONFIG_FILE_SOURCE_ALLOWLIST
#                        Comma-separated directories a {{ file "..." }} token may
#                        read from. Replaces the defaults /etc/ai-workspace and
#                        /secrets/ai-workspace. Shared by every component in the
#                        platform.
