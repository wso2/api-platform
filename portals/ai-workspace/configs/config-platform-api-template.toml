#
# Platform API configuration template
#
# Copy this file to config-platform-api.toml and edit the values for your
# deployment. This file is read by the Platform API (Go binary).
#
# This template lists EVERY key the Platform API reads, so it doubles as the
# configuration reference. Commented-out keys show the built-in default; the
# handful of uncommented keys are the quickstart choices. Deleting a key simply
# restores its default.
#
# Precedence: this file > built-in default.
#
# QUICK START (file-based auth mode — no external IDP needed):
#   1. Copy this file to config-platform-api.toml.
#   2. Generate two 32-byte keys: openssl rand -hex 32 (one for APIP_CP_ENCRYPTION_KEY,
#      one for APIP_CP_AUTH_JWT_SECRET_KEY).
#   3. Put both in `api-platform.env` file.
#      The encryption_key / secret_key fields below read them via {{ env "..." }}
#      tokens — never paste raw key values into this file.
#   4. Set [auth.file_based] enabled = true and configure users.
#   5. Run: docker compose up
#
# Secrets are resolved at load time from environment variables ({{ env "..." }}) or
# mounted files ({{ file "..." }}, preferred in production). Do not hardcode secret
# values in this file or as literals in docker-compose.yaml.
#
# OIDC mode: keep file_based disabled, set [auth.idp] fields,
# and set auth_mode = "oidc" in config.toml with oidc_* fields.
# --------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
log_level = "INFO"   # DEBUG | INFO | WARN | ERROR
port      = "9243"   # HTTP/HTTPS listen port for Platform API

# Log output encoding. Use "json" when shipping logs to an aggregator.
# log_format = "text"   # text | json

# Scope-based authorization for API endpoints. When true, every request must
# carry the OAuth2 scope its endpoint declares.
# Set to false only to temporarily bypass during development.
enable_scope_validation = true

# Paths to resources the binary loads at startup. The defaults are correct for
# the published container image; override only for a custom layout.
# db_schema_path                = "./internal/database/schema.sql"
# openapi_spec_path             = "./resources/openapi.yaml"
# llm_template_definitions_path = "./resources/default-llm-provider-templates"

# ---------------------------------------------------------------------------
# Encryption
# ---------------------------------------------------------------------------
# Single 32-byte key (64 hex chars or base64) used for ALL at-rest encryption
# (secrets, subscription tokens, WebSub HMAC secrets)
# Resolved from the APIP_CP_ENCRYPTION_KEY env var in `api-platform.env` file. Files preferred:
#   encryption_key = '{{ file "/secrets/platform-api/encryption_key" }}'
encryption_key = '{{ env "APIP_CP_ENCRYPTION_KEY" }}'

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
[database]
driver = "sqlite3"   # "sqlite3" or "postgres"

# SQLite — ignored when driver = "postgres".
path = "/app/data/api_platform.db"

# PostgreSQL — uncomment and set driver = "postgres" above to use
# host     = "localhost"
# port     = 5432
# name     = "platform_api"
# user     = "platform_api"
# password = '{{ file "/secrets/platform-api/postgres_password" }}'
# ssl_mode = "disable"   # "disable" | "require" | "verify-ca" | "verify-full"

# Connection pool — tune for production workloads
# max_open_conns    = 25    # maximum open connections
# max_idle_conns    = 10    # maximum idle connections in the pool
# conn_max_lifetime = 300   # seconds before a connection is recycled


# ---------------------------------------------------------------------------
# Authentication
#
# Exactly one of jwt / idp / file_based drives request authentication; enabling
# more than one real auth mode is rejected at startup.
# ---------------------------------------------------------------------------

# Paths that bypass the auth middleware entirely. The default list covers the
# health/metrics probes, the file-based login endpoint, and the internal gateway
# routes (which authenticate with a gateway token instead). Setting this key
# REPLACES the default list — include the defaults you still need.
# skip_paths is under [auth] comma-separated.
# [auth]
# skip_paths = ["/health", "/metrics", "/api/portal/v0.9/auth/login"]

# JWT (local HMAC) — the default for self-hosted deployments.
# Disable when delegating auth entirely to an external IDP.
# Resolved from APIP_CP_AUTH_JWT_SECRET_KEY in `api-platform.env` file;
# secret files preferred: secret_key = '{{ file "/secrets/platform-api/jwt_secret" }}'
[auth.jwt]
enabled    = true
issuer     = "platform-api"
secret_key = '{{ env "APIP_CP_AUTH_JWT_SECRET_KEY" }}'
# Skip signature verification. Defaults to true for the zero-config quickstart.
# NEVER set true in production.
# skip_validation = true

# IDP (JWKS-based) — enable instead of JWT when using Asgardeo, Keycloak, Auth0, etc.
[auth.idp]
enabled  = false
# name     = "asgardeo"                              # friendly name for logging
# jwks_url = "https://accounts.example.com/oauth2/jwks"
# issuer   = ["https://accounts.example.com"]       # list of accepted issuers
# audience — list of accepted "aud" values. When set, a token is rejected
# unless its "aud" claim contains at least one of these values. Leave empty
# to skip the check.
# audience = []

# Authorization mode: "scope" (default) checks the scope claim;
# "role" checks a roles claim at claim_mappings.roles_claim_path.
# validation_mode   = "scope"
# role_mappings_file = ""        # path to a YAML file mapping IDP roles to platform scopes

# JWT claim name mappings — configure to match your IDP's token structure.
[auth.idp.claim_mappings]
# organization_claim_name = "organization"   # claim carrying the org ID
# org_name_claim_name     = "org_name"       # claim carrying the org display name
# org_handle_claim_name   = "org_handle"     # claim carrying the org URL slug
# user_id_claim_name      = "sub"            # claim used as the user's unique ID
# username_claim_name     = "username"
# email_claim_name        = "email"
# scope_claim_name        = "scope"          # space-separated scope string
# roles_claim_path        = ""               # JSON path to roles array, e.g. "realm_access.roles"

# File-based auth — local username/password login. Ideal for initial / air-gapped setup
# When enabled, IDP is NOT used for Platform API authentication.
[auth.file_based]
enabled = true

[auth.file_based.organization]
id           = "default"          # Required: organization handle (URL-safe slug)
display_name = "Default"
region       = "us"
# Platform organization UUID, emitted as the `organization` claim in issued
# tokens. Generated at startup when unset; pin it to keep the organization
# stable across fresh databases.
# uuid = "99089a17-72e0-4dd8-a2f4-c8dfbb085295"

# Add one [[auth.file_based.users]] block per user.
# Generate a bcrypt hash with: htpasswd -bnBC 12 "" <password> | tr -d ':\n'
# The env-var equivalent (APIP_CP_AUTH_FILE_BASED_USERS) takes a JSON array instead.
[[auth.file_based.users]]
username      = "admin"
password_hash = "$2a$12$<bcrypt-hash-of-your-password>"
# Full scope set — trim to restrict permissions for this user.
scopes = "ap:organization:manage ap:gateway:manage ap:gateway_custom_policy:manage ap:rest_api:manage ap:llm_provider:manage ap:llm_proxy:manage ap:mcp_proxy:manage ap:webbroker_api:manage ap:websub_api:manage ap:application:manage ap:subscription:manage ap:subscription_plan:manage ap:project:manage ap:llm_template:manage ap:devportal:manage ap:api_key:read ap:secret:manage"

# Additional users — uncomment and repeat this block as needed
# [[auth.file_based.users]]
# username      = "readonly"
# password_hash = "$2a$12$<bcrypt-hash-of-your-password>"
# scopes        = "ap:organization:read ap:gateway:read ap:rest_api:read ap:llm_provider:read"

# ---------------------------------------------------------------------------
# Listeners (HTTP + HTTPS)
# ---------------------------------------------------------------------------
# The plain-HTTP and TLS listeners are independent — enable either or both, each
# on its own port. This follows the gateway router's http/https split, and lets
# you serve plain HTTP internally, HTTPS externally, or run both at once (e.g. to
# migrate clients between them without downtime).
#
# Defaults: the HTTPS listener is on at 9243; the plain-HTTP listener is off.
# Enable the plain-HTTP listener only when a trusted upstream (ingress,
# service-mesh sidecar) terminates TLS, or for internal traffic — never expose it
# directly to untrusted networks.
#
# https.cert_dir must contain cert.pem and key.pem when https.enabled = true and
# APIP_DEMO_MODE=false. In demo mode a self-signed pair is generated there.
#
# Override with HTTP_ENABLED / HTTP_PORT and HTTPS_ENABLED / HTTPS_PORT /
# HTTPS_CERT_DIR. Legacy TLS_ENABLED / TLS_CERT_DIR / PORT still map onto the
# HTTPS listener.
# [http]
# enabled = false
# port    = "9080"
# [https]
# enabled  = true
# port     = "9243"
# cert_dir = "/app/data/certs"

# ---------------------------------------------------------------------------
# Listener timeouts
# ---------------------------------------------------------------------------
# Bound the lifetime of a connection so a slow or idle peer cannot hold one open
# indefinitely (Slowloris). These apply to both listeners, which serve the same
# handler. Values are durations, e.g. "10s", "2m".
#
# 0 disables a timeout (net/http semantics). Disabling read or read_header
# removes the Slowloris protection — only do so behind a proxy that enforces its
# own bounds. Keep `write` generous: it bounds handler execution, and some
# handlers proxy slow upstreams (LLM completions, deployments).
#
# WebSocket routes are unaffected — the deadlines are cleared on upgrade.
#
# Override with TIMEOUTS_READ_HEADER / TIMEOUTS_READ / TIMEOUTS_WRITE /
# TIMEOUTS_IDLE.
# [timeouts]
# read_header = "10s"
# read        = "60s"
# write       = "120s"
# idle        = "120s"

# ---------------------------------------------------------------------------
# TLS
# ---------------------------------------------------------------------------
[tls]
# Terminate TLS on the Platform API listener. Set false only when a trusted
# upstream — an ingress controller or a service-mesh sidecar — terminates TLS
# for you. The listener then serves plain HTTP and no certificate is read or
# generated, so cert_dir may be left unmounted.
# enabled = true

# Directory where the Platform API reads cert.pem and key.pem. A self-signed
# pair is generated here on first startup in demo mode; when APIP_DEMO_MODE=false
# the certificates must already exist (or TLS must be disabled above).
cert_dir = "/app/data/certs"

# ---------------------------------------------------------------------------
# CORS
# ---------------------------------------------------------------------------
# Origins allowed to make credentialed cross-origin requests, e.g. the Developer
# Portal and AI Workspace origins. Unset (or ["*"]) is permitted only in demo
# mode; an explicit non-wildcard list is REQUIRED when APIP_DEMO_MODE=false.
# Env var is APIP_CP_CORS_ALLOWED_ORIGINS (comma-separated).
# [cors]
# allowed_origins = ["https://workspace.example.com", "https://devportal.example.com"]

# ---------------------------------------------------------------------------
# API Key
# ---------------------------------------------------------------------------
[api_key]
# Hashing algorithms accepted for API key verification.
# sha256 is the default; add "sha512" to accept both.
hashing_algorithms = ["sha256"]

# ---------------------------------------------------------------------------
# WebSocket
# ---------------------------------------------------------------------------
[websocket]
max_connections        = 1000   # global WebSocket connection limit
connection_timeout     = 30     # seconds before an idle connection is closed
rate_limit_per_min     = 1000   # maximum messages per minute per connection
max_connections_per_org = 3     # maximum concurrent WebSocket connections per org
metrics_log_enabled    = true   # emit WebSocket metrics to the log
metrics_log_interval   = 10     # seconds between metrics log lines

# ---------------------------------------------------------------------------
# Deployments
# ---------------------------------------------------------------------------
[deployments]
max_per_api_gateway          = 20     # maximum API deployments per gateway
transitional_status_enabled  = false  # expose "pending" deployment states in responses

# Deployment timeout — mark stuck deployments as failed after timeout_duration seconds.
timeout_enabled  = true
timeout_interval = 20   # seconds between timeout check sweeps
timeout_duration = 60   # seconds before a stuck deployment is timed out

# ---------------------------------------------------------------------------
# Gateway
# ---------------------------------------------------------------------------
[gateway]
# Reject gateway registrations whose runtime version does not match the expected range.
enable_version_verification = false
# Reject gateways that report an unexpected functionality type.
enable_functionality_type_verification = false

# ---------------------------------------------------------------------------
# DevPortal integration
# ---------------------------------------------------------------------------
# Disable for standalone deployments that do not use a DevPortal.
[default_devportal]
enabled    = false
# name       = "Default DevPortal"
# identifier = "default"           # unique slug used internally
# api_url    = "http://devportal:3001"
# hostname   = "devportal.example.com"   # public hostname shown in setup instructions
# api_key    = "change-me"
# header_key_name = "x-wso2-api-key"
# timeout    = 10                  # HTTP client timeout in seconds

# JWT claim name mappings for DevPortal token validation.
# role_claim_name         = "roles"
# groups_claim_name       = "groups"
# organization_claim_name = "organizationID"

# Role names that map to DevPortal access levels.
# admin_role       = "admin"
# subscriber_role  = "Internal/subscriber"
# super_admin_role = "superAdmin"

# ---------------------------------------------------------------------------
# Environment-only settings (no config file key)
# ---------------------------------------------------------------------------
#
#   APIP_DEMO_MODE   "true" (default) relaxes startup checks for quickstart:
#                    file-based auth is allowed, a self-signed TLS certificate
#                    and an ephemeral JWT / secret-encryption key are generated
#                    when none are supplied, and CORS may be left open.
#
#                    Setting it to "false" turns each of those into a startup
#                    requirement: a real auth mode (IDP or JWT with signature
#                    validation on), an explicit CORS allow-list, a stable
#                    secret-encryption key, and either mounted certificates or
#                    tls.enabled = false above.
#
#                    The same variable drives the AI Workspace BFF, so one value
#                    governs the whole stack.
