worker_processes  1;
pid        /tmp/nginx.pid;

events { worker_connections 1024; }
http {
    include    mime.types;
    sendfile on;

    map $request_uri $loggable {
        default 1;
    }

    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;
    }

    # Use /tmp so a non-root container user can write temp files
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path        /tmp/proxy_temp_path;
    fastcgi_temp_path      /tmp/fastcgi_temp;
    uwsgi_temp_path        /tmp/uwsgi_temp;
    scgi_temp_path         /tmp/scgi_temp;

    server {
        gzip on;
        gzip_types text/plain text/css image/svg+xml image/png application/javascript application/json application/zip font/woff font/woff2;

        root        /app/;
        index       index.html;
        server_name localhost;
        listen      5380 ssl;
        ssl_certificate     /tmp/nginx/tls.crt;
        ssl_certificate_key /tmp/nginx/tls.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        location /index.html {
            add_header 'Cache-Control'                 'no-store';
            add_header Strict-Transport-Security       "max-age=31536000; includeSubDomains" always;
            add_header X-Frame-Options                 "sameorigin"    always;
            add_header Content-Security-Policy         "frame-ancestors 'self'" always;
            add_header X-Content-Type-Options          "nosniff"       always;
            add_header X-Permitted-Cross-Domain-Policies "none"        always;
            add_header X-XSS-Protection                "1; mode=block" always;
        }

        # Runtime-injected VITE_* config served from /tmp (written by entrypoint.sh)
        location = /runtime-config.js {
            default_type application/javascript;
            alias        /tmp/runtime-config.js;
            add_header   'Cache-Control' 'no-store';
            access_log   off;
        }

        # Reverse-proxy to platform-api; strips the /api-proxy prefix.
        # SSL verify is off because platform-api uses a self-signed certificate.
        location /api-proxy/ {
            proxy_pass              https://platform-api:9243/;
            proxy_ssl_verify        off;
            proxy_http_version      1.1;
            proxy_set_header        Upgrade           $http_upgrade;
            proxy_set_header        Connection        $connection_upgrade;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_set_header        Authorization     $http_authorization;
            proxy_read_timeout      3600s;
            proxy_connect_timeout   10s;
            proxy_send_timeout      3600s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        access_log /tmp/nginx/logs/access.log combined if=$loggable;
    }
}
