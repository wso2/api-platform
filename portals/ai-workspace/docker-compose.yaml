#
# AI Workspace + Platform API — standalone release compose file.
#
# Configuration:
#   Edit configs/config.toml for AI Workspace settings.
#   Edit configs/config-platform-api.toml for Platform API settings.
#
#   Each config TOML writes its values as '{{ env "..." }}' tokens, so a key can be set
#   from the environment without editing the file — the token names the variable, by
#   convention the key uppercased and prefixed with APIP_AIW_ (AI Workspace) or APIP_CP_
#   (Platform API), e.g. APIP_AIW_LOG_LEVEL, APIP_CP_DATABASE_HOST. A key with no token
#   is not settable from the environment: uncomment or add it in the TOML first.
#
# Setup (REQUIRED — run once before first start):
#   ./setup.sh
#
#   It generates everything the stack requires — nothing is auto-generated at runtime:
#     api-platform.env   APIP_CP_ENCRYPTION_KEY        encrypts secrets at rest
#                APIP_CP_AUTH_JWT_SECRET_KEY   signs login JWTs
#                APIP_CP_ADMIN_USERNAME        admin login username
#                APIP_CP_ADMIN_PASSWORD_HASH   bcrypt hash of the admin password
#     resources/certificates/   TLS pair shared by both services (self-signed;
#                replace with your own certificates for production — same file names)
#
#   The admin password is printed once by setup.sh and stored nowhere.
#   For production, prefer mounting secret files and referencing them from the config
#   TOML with {{ file "..." }} instead of api-platform.env. OIDC mode additionally needs
#   APIP_AIW_OIDC_CLIENT_SECRET in .env (git-ignored).
#
# Authentication:
#   Out of the box the stack uses file-based auth with the admin user generated by
#   setup.sh. To delegate to any OIDC provider, set the APIP_CP_AUTH_IDP_* keys in
#   api-platform.env (loaded into both services via env_file) and auth_mode = "oidc"
#   plus the [oidc] keys in configs/config.toml. See README.md → "Testing with an IDP locally"
#   (worked example: Asgardeo).
#
# Usage:
#   ./setup.sh
#   docker compose up -d
#
# Ports:
#   AI Workspace  →  https://localhost:5380
#   Platform API  →  https://localhost:9243
#
# TLS certificates (REQUIRED — generated by setup.sh):
#   resources/certificates/
#     cert.pem   ← PEM certificate (or full chain), served by both services
#     key.pem    ← PEM private key
#   This one directory is mounted read-only into both containers at their
#   /etc/<service>/tls path. Swap in a certificate from your own CA (same file
#   names) to remove the browser trust warning. The SAN list must cover both
#   hostnames (localhost, platform-api, ai-workspace).
# --------------------------------------------------------------------

services:

  # ---------------------------------------------------------------------------
  # Platform API  (Go HTTPS backend)
  # ---------------------------------------------------------------------------
  platform-api:
    image: ghcr.io/wso2/api-platform/platform-api:0.11.0
    container_name: platform-api
    restart: unless-stopped
    command: ["-config", "/etc/platform-api/config-platform-api.toml"]
    env_file:
      # Supplies the setup.sh-generated keys and admin credentials to the container,
      # where the {{ env "..." }} tokens in config-platform-api.toml resolve them.
      # Optional overrides also go here — e.g. the APIP_CP_AUTH_IDP_* keys that
      # switch auth to an OIDC provider (see README.md → "Testing with an IDP locally").
      # format: raw — the bcrypt password hash contains `$`, which must not be
      # treated as a compose interpolation variable.
      - path: api-platform.env
        required: true
        format: raw
    volumes:
      - ./configs/config-platform-api.toml:/etc/platform-api/config-platform-api.toml:ro
      - platform-api-data:/app/data
      # TLS certificate presented on :9243 — generated by setup.sh; replace the
      # files with your own to remove the browser trust warning. The server reads
      # cert.pem / key.pem from this directory ([https] cert_dir in the config TOML).
      - ./resources/certificates:/etc/platform-api/tls:ro
    ports:
      - "9243:9243"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9243/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # AI Workspace  (React SPA served by the Go BFF)
  #
  # The BFF serves the SPA, proxies all browser→backend traffic same-origin, and
  # owns authentication. Tokens live in the BFF session (HttpOnly cookie); the
  # browser never holds a token.
  # ---------------------------------------------------------------------------
  ai-workspace:
    image: ghcr.io/wso2/api-platform/ai-workspace:1.0.0-alpha2-SNAPSHOT
    container_name: ai-workspace
    restart: unless-stopped
    depends_on:
      platform-api:
        condition: service_healthy
    env_file:
      # Everything the BFF needs is in configs/config.toml — its defaults are this
      # compose deployment's values, and any key can be overridden by setting the
      # matching '{{ env "APIP_AIW_..." }}' token's variable in api-platform.env
      # (e.g. the OIDC keys, including the confidential APIP_AIW_OIDC_CLIENT_SECRET
      # — see README.md).
      # format: raw — values are passed through verbatim, never treated as compose
      # interpolation variables.
      - path: api-platform.env
        required: true
        format: raw
    volumes:
      - ./configs/config.toml:/etc/ai-workspace/config.toml:ro
      # The same certificate directory: cert.pem / key.pem are the TLS pair
      # presented on :5380, and cert.pem doubles as the CA bundle the BFF trusts
      # for the upstream platform-api hop (self-signed, so it is its own CA).
      # The paths are the cert_file / key_file / ca_file defaults in config.toml.
      - ./resources/certificates:/etc/ai-workspace/tls:ro
    ports:
      - "5380:5380"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:5380/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  platform-api-data:
    driver: local
