# AI Workspace + Platform API — standalone release compose file. See README.md.

services:

  platform-api:
    image: ghcr.io/wso2/api-platform/platform-api:0.11.0
    container_name: platform-api
    restart: unless-stopped
    command: ["-config", "/etc/platform-api/config-platform-api.toml"]
    env_file:
      - path: api-platform.env
        required: true
        format: raw
    volumes:
      - ./configs/config-platform-api.toml:/etc/platform-api/config-platform-api.toml:ro
      - platform-api-data:/app/data
      - ./resources/certificates:/etc/platform-api/tls:ro
    ports:
      - "9243:9243"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9243/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  ai-workspace:
    image: ghcr.io/wso2/api-platform/ai-workspace:1.0.0-alpha2-SNAPSHOT
    container_name: ai-workspace
    restart: unless-stopped
    depends_on:
      platform-api:
        condition: service_healthy
    env_file:
      - path: api-platform.env
        required: true
        format: raw
    volumes:
      - ./configs/config.toml:/etc/ai-workspace/config.toml:ro
      - ./resources/certificates:/etc/ai-workspace/tls:ro
    ports:
      - "5380:5380"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:5380/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  platform-api-data:
    driver: local
