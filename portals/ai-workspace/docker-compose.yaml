#
# AI Workspace + Platform API — standalone release compose file.
#
# Configuration:
#   Edit configs/config.toml for AI Workspace settings.
#   Edit configs/config-platform-api.toml for Platform API settings.
#   Set the environment variables below for secrets — either export them
#   in your shell, or create a .env file next to this file:
#
#     AUTH_JWT_SECRET_KEY=<long-random-string>
#     PLATFORM_SECRET_ENCRYPTION_KEY=$(openssl rand -hex 32)   # stable key for persistent secrets
#
# Usage:
#   docker compose up -d
#
# Ports:
#   AI Workspace  →  https://localhost:5380
#   Platform API  →  https://localhost:9243
#
# TLS certificates (optional — avoids browser trust warnings):
#   Both services fall back to a self-signed certificate when no cert is mounted.
#   To use your own certificate, uncomment the volume lines under each service
#   and place your files in a certs/ directory next to this file:
#
#     certs/
#       ai-workspace.crt   ← PEM certificate (or full chain)
#       ai-workspace.key   ← PEM private key
#       platform-api.crt   ← PEM certificate (or full chain)
#       platform-api.key   ← PEM private key
# --------------------------------------------------------------------

services:

  # ---------------------------------------------------------------------------
  # Platform API  (Go HTTPS backend)
  # ---------------------------------------------------------------------------
  platform-api:
    image: ghcr.io/wso2/api-platform/platform-api:0.10.0
    container_name: platform-api
    restart: unless-stopped
    command: ["-config", "/etc/platform-api/config-platform-api.toml"]
    environment:
      # Secrets — set these in your shell or in a .env file next to this file.
      - AUTH_JWT_SECRET_KEY=${AUTH_JWT_SECRET_KEY:-}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-}
      - DATABASE_SUBSCRIPTION_TOKEN_ENCRYPTION_KEY=${DATABASE_SUBSCRIPTION_TOKEN_ENCRYPTION_KEY:-}
      - APIP_DEMO_MODE=${APIP_DEMO_MODE:-true}
      # Encryption key for secrets stored in the database (64 hex chars = 32 bytes).
      # If unset, a random key is generated on startup — encrypted secrets will be
      # unreadable after a container restart. Set a stable value for persistent deployments:
      #   export PLATFORM_SECRET_ENCRYPTION_KEY=$(openssl rand -hex 32)
      - PLATFORM_SECRET_ENCRYPTION_KEY=${PLATFORM_SECRET_ENCRYPTION_KEY:-}
    volumes:
      - ./configs/config-platform-api.toml:/etc/platform-api/config-platform-api.toml:ro
      - platform-api-data:/app/data
      # Optional: mount your own TLS certificate to remove the browser trust warning.
      # The file names must match exactly (cert.pem / key.pem).
      # - ./resources/certs/platform-api.crt:/app/data/certs/cert.pem:ro
      # - ./resources/certs/platform-api.key:/app/data/certs/key.pem:ro
    ports:
      - "9243:9243"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9243/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # AI Workspace  (React SPA served by nginx)
  # ---------------------------------------------------------------------------
  ai-workspace:
    image: ghcr.io/wso2/api-platform/ai-workspace:0.2.0-SNAPSHOT
    container_name: ai-workspace
    restart: unless-stopped
    depends_on:
      platform-api:
        condition: service_healthy
    environment:
      # Route all Platform API calls through nginx (/api-proxy/ → platform-api:9243/).
      # Relative paths avoid direct browser-to-platform-api connections and
      # sidestep self-signed TLS certificate issues.
      - VITE_PLATFORM_API_BASE_URL=/api-proxy/api/v1
      - VITE_PORTAL_API_BASE_URL=/api-proxy/api/portal/v1
    volumes:
      - ./configs/config.toml:/etc/ai-workspace/config.toml:ro
      # Optional: mount your own TLS certificate to remove the browser trust warning.
      # The file names must match exactly (tls.crt / tls.key).
      # - ./certs/ai-workspace.crt:/etc/ai-workspace/tls/tls.crt:ro
      # - ./certs/ai-workspace.key:/etc/ai-workspace/tls/tls.key:ro
    ports:
      - "5380:5380"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:5380/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  platform-api-data:
    driver: local
