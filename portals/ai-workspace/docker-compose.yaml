#
# AI Workspace + Platform API — standalone release compose file.
#
# Configuration:
#   Edit configs/config.toml for AI Workspace settings.
#   Edit configs/config-platform-api.toml for Platform API settings.
#
#   Each config TOML writes its values as '{{ env "..." }}' tokens, so a key can be set
#   from the environment without editing the file — the token names the variable, by
#   convention the key uppercased and prefixed with APIP_AIW_ (AI Workspace) or APIP_CP_
#   (Platform API), e.g. APIP_AIW_LOG_LEVEL, APIP_CP_DATABASE_HOST. A key with no token
#   is not settable from the environment: uncomment or add it in the TOML first.
# Secrets (REQUIRED — never hardcode them here or in the config TOML):
#   Copy .env.example to .env (git-ignored) and fill it in:
#     AUTH_JWT_SECRET_KEY=$(openssl rand -hex 32)   # signs login JWTs
#     ENCRYPTION_KEY=$(openssl rand -hex 32)        # encrypts secrets
#     APIP_AIW_OIDC_CLIENT_SECRET=...               # only in OIDC mode
#
#   Each service pulls .env into its container (env_file, below), and each config TOML
#   references the values with {{ env "..." }} tokens. For production, prefer mounting
#   a secret file and referencing it with {{ file "..." }} instead.
#
# Authentication:
#   Out of the box the stack uses file-based auth (login admin / admin) — no
#   configuration needed. To delegate to any OIDC provider, uncomment the IDP block
#   on the Platform API below and set auth_mode = "oidc" plus the [oidc] keys in
#   configs/config.toml. See README.md → "Testing with an IDP locally" (worked
#   example: Asgardeo).
#
# Usage:
#   docker compose --env-file keys.env up -d
#
# Ports:
#   AI Workspace  →  https://localhost:5380
#   Platform API  →  https://localhost:9243
#
# TLS certificates (optional — avoids browser trust warnings):
#   Both services fall back to a self-signed certificate when no cert is mounted.
#   To use your own certificate, uncomment the volume lines under each service
#   and place your files in a certs/ directory next to this file:
#
#     certs/
#       ai-workspace.crt   ← PEM certificate (or full chain)
#       ai-workspace.key   ← PEM private key
#       platform-api.crt   ← PEM certificate (or full chain)
#       platform-api.key   ← PEM private key
# --------------------------------------------------------------------

services:

  # ---------------------------------------------------------------------------
  # Platform API  (Go HTTPS backend)
  # ---------------------------------------------------------------------------
  platform-api:
    image: ghcr.io/wso2/api-platform/platform-api:0.11.0
    container_name: platform-api
    restart: unless-stopped
    command: ["-config", "/etc/platform-api/config-platform-api.toml"]
    environment:
      - APIP_DEMO_MODE=${APIP_DEMO_MODE:-true}
      - APIP_CP_ENCRYPTION_KEY=${APIP_CP_ENCRYPTION_KEY:-}
      - APIP_CP_AUTH_JWT_SECRET_KEY=${APIP_CP_AUTH_JWT_SECRET_KEY:-}
      # ── OIDC IDP — uncomment to validate tokens against any OIDC provider's
      # JWKS instead of file-based auth. Set the OIDC_* values in .env. Claim
      # overrides are optional (default: organization / org_name / org_handle).
      # - APIP_CP_AUTH_IDP_ENABLED=true
      # - APIP_CP_AUTH_JWT_ENABLED=false
      # - APIP_CP_AUTH_FILE_BASED_ENABLED=false
      # - APIP_CP_AUTH_IDP_JWKS_URL=${OIDC_JWKS_URL:-}
      # - APIP_CP_AUTH_IDP_ISSUER=${OIDC_ISSUER:-}
      # - APIP_CP_AUTH_IDP_AUDIENCE=${OIDC_AUDIENCE:-}
      # - APIP_CP_AUTH_IDP_CLAIM_MAPPINGS_ORGANIZATION_CLAIM_NAME=${OIDC_ORG_ID_CLAIM:-}
      # - APIP_CP_AUTH_IDP_CLAIM_MAPPINGS_ORG_NAME_CLAIM_NAME=${OIDC_ORG_NAME_CLAIM:-}
      # - APIP_CP_AUTH_IDP_CLAIM_MAPPINGS_ORG_HANDLE_CLAIM_NAME=${OIDC_ORG_HANDLE_CLAIM:-}
    env_file:
      # Supplies AUTH_JWT_SECRET_KEY / ENCRYPTION_KEY to the container, where the
      # {{ env "..." }} tokens in config-platform-api.toml resolve them. A compose
      # .env alone is not enough: it only substitutes ${...} in this file, it does
      # not put the values inside the container.
      - path: .env
        required: false
    volumes:
      - ./configs/config-platform-api.toml:/etc/platform-api/config-platform-api.toml:ro
      - platform-api-data:/app/data
      # Optional: mount your own TLS certificate to remove the browser trust warning.
      # The file names must match exactly (cert.pem / key.pem).
      # - ./resources/certs/platform-api.crt:/app/data/certs/cert.pem:ro
      # - ./resources/certs/platform-api.key:/app/data/certs/key.pem:ro
    ports:
      - "9243:9243"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9243/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # AI Workspace  (React SPA served by the Go BFF)
  #
  # The BFF serves the SPA, proxies all browser→backend traffic same-origin, and
  # owns authentication. Tokens live in the BFF session (HttpOnly cookie); the
  # browser never holds a token.
  # ---------------------------------------------------------------------------
  ai-workspace:
    image: ghcr.io/wso2/api-platform/ai-workspace:1.0.0-alpha2-SNAPSHOT
    container_name: ai-workspace
    restart: unless-stopped
    depends_on:
      platform-api:
        condition: service_healthy
    environment:
      # These resolve the matching '{{ env "APIP_AIW_..." }}' tokens in
      # configs/config.toml. Only deployment-specific values live here — everything
      # else belongs in that file.
      #
      # The BFF talks to the Platform API over the internal compose network, whose
      # certificate is self-signed.
      - APIP_AIW_PLATFORM_API_URL=https://platform-api:9243
      - APIP_AIW_PLATFORM_API_TLS_SKIP_VERIFY=true
      - APIP_DEMO_MODE=${APIP_DEMO_MODE:-true}
      # ── OIDC — to delegate login to any OIDC provider, set auth_mode = "oidc" and
      # the [oidc] keys in configs/config.toml, and keep the IDP block above in sync.
      # The BFF is a confidential client: its secret stays server-side and is never
      # sent to the browser. Put it in .env as APIP_AIW_OIDC_CLIENT_SECRET (injected
      # below via env_file); config.toml references it with
      #   [oidc]
      #   client_secret = '{{ env "APIP_AIW_OIDC_CLIENT_SECRET" }}'
      # In production prefer mounting a secret file and swapping that for
      #   client_secret = '{{ file "/secrets/ai-workspace/oidc_client_secret" }}'
    env_file:
      # Supplies APIP_AIW_OIDC_CLIENT_SECRET to the container. Never hardcode the
      # secret in the environment block above.
      - path: .env
        required: false
    volumes:
      - ./configs/config.toml:/etc/ai-workspace/config.toml:ro
      # Optional: mount your own TLS certificate to remove the browser trust warning.
      # The file names must match exactly (tls.crt / tls.key).
      # - ./certs/ai-workspace.crt:/etc/ai-workspace/tls/tls.crt:ro
      # - ./certs/ai-workspace.key:/etc/ai-workspace/tls/tls.key:ro
    ports:
      - "5380:5380"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:5380/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  platform-api-data:
    driver: local
