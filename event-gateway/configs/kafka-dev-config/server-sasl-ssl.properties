process.roles=broker,controller
node.id=1
controller.quorum.voters=1@kafka:29093
controller.listener.names=CONTROLLER

listeners=SASL_SSL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,SASL_SSL_HOST://0.0.0.0:9092
advertised.listeners=SASL_SSL://kafka:29092,SASL_SSL_HOST://localhost:9092
listener.security.protocol.map=CONTROLLER:PLAINTEXT,SASL_SSL:SASL_SSL,SASL_SSL_HOST:SASL_SSL
inter.broker.listener.name=SASL_SSL

sasl.enabled.mechanisms=PLAIN
sasl.mechanism.inter.broker.protocol=PLAIN

ssl.keystore.location=/etc/kafka/secrets/kafka.keystore.jks
ssl.keystore.password=changeit
ssl.key.password=changeit
ssl.truststore.location=/etc/kafka/secrets/kafka.truststore.jks
ssl.truststore.password=changeit
ssl.client.auth=none
ssl.endpoint.identification.algorithm=

offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
group.initial.rebalance.delay.ms=0
auto.create.topics.enable=true
