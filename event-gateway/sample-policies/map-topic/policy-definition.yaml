name: map-topic
version: v1.0.0
displayName: Map Topic
description: |
  Configures the Kafka topic for producing to or consuming from in WebBrokerApi channels.
  This policy specifies the exact topic name at the broker level for channel-based routing.

parameters:
  type: object
  additionalProperties: false
  properties:
    mode:
      type: string
      description: |
        Specifies the operation mode: "produceTo" for producing messages to a topic,
        or "consumeFrom" for consuming messages from a topic.
      enum:
        - produceTo
        - consumeFrom
      
    topic:
      type: string
      description: |
        The Kafka topic name to produce to or consume from.
      minLength: 1
      maxLength: 256
      pattern: "^[a-zA-Z0-9._-]+$"
  
  required:
    - mode
    - topic

systemParameters:
  type: object
  properties: {}
