services:
  event-gateway:
    image: ghcr.io/wso2/api-platform/event-gateway-runtime:0.1.0-SNAPSHOT
    build:
      context: gateway-runtime
      dockerfile: Dockerfile
      additional_contexts:
        sdk-core: ../sdk/core
        common: ../common
        policy-engine: ../gateway/gateway-runtime/policy-engine
    ports:
      - "8080:8080"   # WebSub HTTP
      - "8081:8081"   # WebSocket
      - "9002:9002"   # Admin API
      - "9003:9003"   # Metrics
    environment:
      - APIP_EGW_KAFKA_BROKERS=kafka:29092
      - APIP_EGW_SERVER_WEBSUB_PORT=8080
      - APIP_EGW_SERVER_WEBSOCKET_PORT=8081
    extra_hosts:
      # Allow callbacks to services running on the Docker host (useful on Linux).
      - "host.docker.internal:host-gateway"
    volumes:
      - ./gateway-runtime/configs/config.toml:/etc/event-gateway/config.toml:ro
      - ./gateway-runtime/configs/channels.yaml:/etc/event-gateway/channels.yaml:ro
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - egw-network

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - egw-network

networks:
  egw-network:
    driver: bridge
