services:
  gateway-controller:
    image: ghcr.io/wso2/api-platform/gateway-controller:1.1.0-SNAPSHOT
    build:
      context: ../gateway/gateway-controller
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        sdk-core: ../sdk/core
        common: ../common
    ports:
      - "9095:9095"    # Management API
      - "18001:18001"  # Policy xDS (EventChannelConfig)
    environment:
      - APIP_CONTROLLER_STORAGE_MODE=embedded
      - APIP_CONTROLLER_ROUTER_EVENT_GATEWAY_ENABLED=true
      - APIP_CONTROLLER_ROUTER_EVENT_GATEWAY_WEBSUB_HUB_URL=http://event-gateway:8080
      - APIP_CONTROLLER_ROUTER_EVENT_GATEWAY_WEBSUB_HUB_PORT=8080
      - APIP_CONTROLLER_ROUTER_EVENT_GATEWAY_WEBSUB_HUB_LISTENER_PORT=8080
      - APIP_CONTROLLER_ROUTER_EVENT_GATEWAY_TIMEOUT_SECONDS=30
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - egw-network

  event-gateway:
    image: ghcr.io/wso2/api-platform/event-gateway-runtime:0.1.0-SNAPSHOT
    build:
      context: gateway-runtime
      dockerfile: Dockerfile
      additional_contexts:
        sdk-core: ../sdk/core
        common: ../common
        policy-engine: ../gateway/gateway-runtime/policy-engine
    ports:
      - "8080:8080"   # WebSub HTTP
      - "8081:8081"   # WebSocket
      - "9002:9002"   # Admin API
      - "9003:9003"   # Metrics
    environment:
      - APIP_EGW_KAFKA_BROKERS=kafka:29092
      - APIP_EGW_SERVER_WEBSUB_PORT=8080
      - APIP_EGW_SERVER_WEBSOCKET_PORT=8081
      - APIP_EGW_CONTROLPLANE_ENABLED=true
      - APIP_EGW_CONTROLPLANE_XDS_ADDRESS=gateway-controller:18001
    extra_hosts:
      # Allow callbacks to services running on the Docker host (useful on Linux).
      - "host.docker.internal:host-gateway"
    volumes:
      - ./gateway-runtime/configs/config.toml:/etc/event-gateway/config.toml:ro
      - ./gateway-runtime/configs/channels.yaml:/etc/event-gateway/channels.yaml:ro
    depends_on:
      gateway-controller:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - egw-network

  kafka:
    image: apache/kafka:latest
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - egw-network

  wh-listener:
    image: python:3.11-slim
    command: python /app/listener.py --port 8090
    ports:
      - "8090:8090"
    volumes:
      - ./webhook-listener/listener.py:/app/listener.py:ro
    stdin_open: true
    tty: true
    networks:
      - egw-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "7080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - egw-network

networks:
  egw-network:
    driver: bridge
