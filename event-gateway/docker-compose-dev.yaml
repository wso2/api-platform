services:
  gateway-controller:
    image: ghcr.io/wso2/api-platform/event-gateway-controller:0.1.0-SNAPSHOT
    build:
      context: ../gateway/gateway-controller
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        sdk-core: ../sdk/core
        common: ../common
        build-manifest: ../gateway
    command: ["-config", "/etc/gateway-controller/config.toml"]
    ports:
      - "9090:9090"    # Management API
      - "18001:18001"  # Policy xDS (EventChannelConfig)
    environment:
      - APIP_GW_CONTROLLER_STORAGE_TYPE=sqlite
      - APIP_GW_CONTROLLER_STORAGE_SQLITE_PATH=./data/gateway.db
      - APIP_GW_CONTROLLER_LOGGING_LEVEL=info
      - APIP_GW_DEVELOPMENT_MODE=true
      - APIP_GW_ROUTER_EVENT__GATEWAY_ENABLED=true
      - APIP_GW_ROUTER_EVENT__GATEWAY_WEBSUB__HUB_URL=http://event-gateway:8080
      - APIP_GW_ROUTER_EVENT__GATEWAY_WEBSUB__HUB_PORT=8080
      - APIP_GW_ROUTER_EVENT__GATEWAY_WEBSUB__HUB__LISTENER__PORT=8080
      - APIP_GW_ROUTER_EVENT__GATEWAY_TIMEOUT__SECONDS=30
      - APIP_GW_GATEWAY_REGISTRATION_TOKEN=${GATEWAY_REGISTRATION_TOKEN:?set GATEWAY_REGISTRATION_TOKEN in event-gateway/.env}
      - APIP_GW_CONTROLPLANE_HOST=${GATEWAY_CONTROLPLANE_HOST:?set GATEWAY_CONTROLPLANE_HOST in event-gateway/.env}

    volumes:
      - controller-data:/app/data
      - ../gateway/configs/config.toml:/etc/gateway-controller/config.toml:ro
      - ../gateway/gateway-controller/certificates:/app/certificates
      - ../gateway/gateway-controller/listener-certs:/app/listener-certs:ro
    networks:
      - egw-network

  event-gateway:
    image: ghcr.io/wso2/api-platform/event-gateway-runtime:0.1.0-SNAPSHOT
    build:
      context: gateway-runtime
      dockerfile: Dockerfile
      additional_contexts:
        sdk-core: ../sdk/core
        common: ../common
        policy-engine: ../gateway/gateway-runtime/policy-engine
    ports:
      - "8080:8080"   # WebSub HTTP
      - "8443:8443"   # WebSub HTTPS
      - "8081:8081"   # WebSocket
      - "9002:9002"   # Admin API
      - "9003:9003"   # Metrics
    environment:
      - APIP_EGW_KAFKA_BROKERS=kafka:29092
      - APIP_EGW_KAFKA_TLS=false
      - APIP_EGW_KAFKA_SASL_MECHANISM=plain
      - APIP_EGW_KAFKA_SASL_USERNAME=egw
      - APIP_EGW_KAFKA_SASL_PASSWORD=egw-pass
      # To test SASL_SSL later, switch the Kafka listener block below and then use:
      # - APIP_EGW_KAFKA_TLS=true
      # - APIP_EGW_KAFKA_SASL_MECHANISM=plain
      # - APIP_EGW_KAFKA_SASL_USERNAME=egw
      # - APIP_EGW_KAFKA_SASL_PASSWORD=egw-pass
      - APIP_EGW_SERVER_WEBSUB_ENABLED=true
      - APIP_EGW_SERVER_WEBSUB_HTTP_PORT=8080
      - APIP_EGW_SERVER_WEBSUB_HTTPS_PORT=8443
      - APIP_EGW_SERVER_WEBSUB_TLS_ENABLED=true
      - APIP_EGW_SERVER_WEBSUB_TLS_CERT_FILE=/etc/event-gateway/tls/default-listener.crt
      - APIP_EGW_SERVER_WEBSUB_TLS_KEY_FILE=/etc/event-gateway/tls/default-listener.key
      - APIP_EGW_SERVER_WEBSOCKET_PORT=8081
      - APIP_EGW_CONTROLPLANE_ENABLED=true
      - APIP_EGW_LOGGING_LEVEL=debug
      - APIP_EGW_CONTROLPLANE_XDS_ADDRESS=gateway-controller:18001
    extra_hosts:
      # Allow callbacks to services running on the Docker host (useful on Linux).
      - "host.docker.internal:host-gateway"
    volumes:
      - ../gateway/gateway-controller/listener-certs:/etc/event-gateway/tls:ro
      - ./gateway-runtime/configs/config.toml:/etc/event-gateway/config.toml:ro
      - ./gateway-runtime/configs/channels.yaml:/etc/event-gateway/channels.yaml:ro
    depends_on:
      gateway-controller:
        condition: service_started
      kafka:
        # condition: service_healthy
        condition: service_started
    networks:
      - egw-network

  kafka:
    image: apache/kafka:latest
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OPTS: -Djava.security.auth.login.config=/mnt/shared/config/kafka_server_jaas.conf
    volumes:
      - ./kafka-dev-config/server-sasl-plaintext.properties:/mnt/shared/config/server.properties:ro
      - ./kafka-dev-config/kafka_server_jaas.conf:/mnt/shared/config/kafka_server_jaas.conf:ro
      # Alternate mode: SASL_SSL with PLAIN credentials.
      # Comment out the active server.properties mount above and use this one instead.
      # - ./kafka-dev-config/server-sasl-ssl.properties:/mnt/shared/config/server.properties:ro
      #
      # When enabling SASL_SSL, also mount your broker cert material, for example:
      # - ./kafka-certs/kafka.keystore.jks:/etc/kafka/secrets/kafka.keystore.jks:ro
      # - ./kafka-certs/kafka.truststore.jks:/etc/kafka/secrets/kafka.truststore.jks:ro
    networks:
      - egw-network

  wh-listener:
    image: event-gateway/webhook-listener:local
    build:
      context: webhook-listener
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    networks:
      - egw-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "7080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: PLAIN
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="egw" password="egw-pass";
      # For SASL_SSL later, switch to:
      # KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_SSL
      # KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: PLAIN
      # KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="egw" password="egw-pass";
    depends_on:
      kafka:
        condition: service_started
    networks:
      - egw-network

networks:
  egw-network:
    driver: bridge

volumes:
  controller-data:
