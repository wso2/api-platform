# --------------------------------------------------------------------
# Channel Bindings Configuration
# --------------------------------------------------------------------
# Each channel defines an API with its own entrypoint+endpoint pair.
# The entrypoint type determines the client-facing protocol (websub, websocket).
# The endpoint type determines the broker-facing protocol (kafka).
# Each API gets isolated connections — even if the same types are already in use.

channels:
  # WebSub API example:
  # - name: order-events
  #   mode: websub
  #   context: /orders
  #   version: v1
  #   entrypoint:
  #     type: websub
  #   endpoint:
  #     type: kafka
  #     topic: order-events
  #   policies:
  #     inbound: []
  #     outbound: []

  # Protocol Mediation API example (WS → Kafka 1:1 passthrough):
  # - name: live-prices
  #   mode: protocol-mediation
  #   context: /prices
  #   version: v1
  #   entrypoint:
  #     type: websocket
  #     path: /stream
  #   endpoint:
  #     type: kafka
  #     topic: price-updates
  #   policies:
  #     inbound: []
  #     outbound: []
