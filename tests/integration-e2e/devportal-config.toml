# Developer Portal configuration for the Go integration-e2e stack.
#
# Mounted at /app/configs/config.toml in the devportal container. It replaces
# the image's shipped configs/config.toml, which fails closed at startup on the
# required security secrets and only wires the SQLite `path` key — neither of
# which suits this postgres-backed e2e stack.
#
# Every key lives under the single [developer_portal] table; configLoader.js
# unwraps it and IGNORES anything outside it, so a section at the top level is
# silently dropped and its defaults (src/config/configDefaults.js) win instead.
#
# There is NO automatic APIP_DP_* environment-variable override — an env var set
# in docker-compose.yaml's `devportal.environment` block only takes effect where
# a key below explicitly references it via a {{ env "..." }} token. Every
# APIP_DP_* var the compose file relies on MUST have a matching token here.

[developer_portal.server]
port = '{{ env "APIP_DP_SERVER_PORT" "3000" }}'

[developer_portal.server.https]
# Plain HTTP inside the compose network — the e2e client talks to it over http.
enabled = '{{ env "APIP_DP_SERVER_HTTPS_ENABLED" "false" }}'

[developer_portal.logging]
console_only = '{{ env "APIP_DP_LOGGING_CONSOLE_ONLY" "true" }}'

[developer_portal.database]
# Postgres, not the devportal's default SQLite: the org-update path needs
# UPDATE ... RETURNING, which SQLite doesn't support. Connection comes from the
# APIP_DP_DATABASE_* vars in the compose file.
driver   = '{{ env "APIP_DP_DATABASE_DRIVER" "postgres" }}'
host     = '{{ env "APIP_DP_DATABASE_HOST" "postgres" }}'
port     = '{{ env "APIP_DP_DATABASE_PORT" "5432" }}'
name     = '{{ env "APIP_DP_DATABASE_NAME" "devportal" }}'
user     = '{{ env "APIP_DP_DATABASE_USER" "apip" }}'
password = '{{ env "APIP_DP_DATABASE_PASSWORD" "apip" }}'

[developer_portal.organization]
# Seed the "default" org so its handle matches platform-api's org handle
# (the webhook resolves the control-plane org by handle via org.ref_id).
default_name = '{{ env "APIP_DP_ORGANIZATION_DEFAULT_NAME" "default" }}'
auto_create_subscription_plans = false

[developer_portal.auth]
mode = "local"

[developer_portal.auth.local]
# platform-api signs its tokens with RS256; the devportal verifies them against
# the public half of that keypair. The keypair is generated by the stack's
# platform-api-certgen step and bind-mounted read-only at /etc/devportal/keys
# (on the {{ file }} allowlist) — only jwt_public.pem is exposed here.
platform_api_url = '{{ env "APIP_DP_AUTH_LOCAL_PLATFORM_API_URL" "https://platform-api:9243" }}'
jwt_public_key   = '{{ file (env "APIP_DP_AUTH_LOCAL_JWT_PUBLIC_KEY_FILE" "/etc/devportal/keys/jwt_public.pem") }}'
# platform-api's cert is self-signed inside the compose network.
tls_skip_verify  = '{{ env "APIP_DP_AUTH_LOCAL_TLS_SKIP_VERIFY" "true" }}'

[developer_portal.security]
# Required — devportal fails closed at startup if either doesn't resolve to a
# 64-char hex string. Fixed test-only values set in the compose file.
encryption_key = '{{ env "APIP_DP_SECURITY_ENCRYPTION_KEY" }}'
session_secret = '{{ env "APIP_DP_SECURITY_SESSION_SECRET" }}'
