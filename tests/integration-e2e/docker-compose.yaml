# Combined platform-api + gateway end-to-end stack for cross-database
# integration testing. The real platform-api (control plane) and the real
# gateway (gateway-controller + gateway-runtime data plane) run against the same
# database engine, so a single scenario exercises both products together.
#
# This is the PostgreSQL variant (one server, two logical databases). SQLite and
# SQL Server variants follow the same shape; see README.md.
#
# Images (override via env to use locally built tags):
#   PLATFORM_API_IMAGE       (build: cd platform-api && make build, or the it-e2e tag)
#   GATEWAY_CONTROLLER_IMAGE  GATEWAY_RUNTIME_IMAGE
#
# The gateway-controller's control-plane token is injected at run time after the
# scenario creates a gateway + registration token in platform-api (see README,
# "Bootstrap"). Until then the gateway-controller stays in its reconnect loop.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=apip
      - POSTGRES_PASSWORD=apip
      - POSTGRES_DB=postgres
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
      # platform-api no longer auto-provisions its schema on external databases,
      # so init-db.sql applies it from here (mounted from the source tree).
      - ../../platform-api/internal/database/schema.postgres.sql:/schema/schema.postgres.sql:ro
      # The developer portal likewise pre-loads its schema on postgres (it does
      # not sequelize.sync() on external DBs); init-db.sql applies it too.
      - ../../portals/developer-portal/database/schema.postgres.sql:/devportal-schema/schema.postgres.sql:ro
    ports:
      - "55433:5432"
    healthcheck:
      # Probe over TCP (-h 127.0.0.1), not the unix socket: while the entrypoint
      # runs init-db.sql the temporary server listens on the socket only, so a
      # socket probe reports healthy mid-init and platform-api (which pings once
      # and exits, no retry) hits a refused TCP connection. The TCP probe only
      # passes once the real, post-init server is accepting connections.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U apip -d gateway_test"]
      interval: 2s
      timeout: 3s
      retries: 60
    networks: [e2e]

  # One-shot init container: generates the TLS pair the platform-api HTTPS
  # listener requires (the server no longer generates a self-signed fallback).
  platform-api-certgen:
    image: alpine/openssl
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        [ -f /certs/cert.pem ] && [ -f /certs/key.pem ] && exit 0
        openssl req -x509 -newkey rsa:2048 -sha256 -days 365 -nodes \
          -keyout /certs/key.pem -out /certs/cert.pem \
          -subj "/O=WSO2 API Platform/CN=platform-api" \
          -addext "subjectAltName=DNS:localhost,DNS:platform-api,IP:127.0.0.1"
        # certgen runs as root; platform-api runs as uid 10001, so the key must be
        # owned by that uid, not made world-readable.
        chown 10001 /certs/key.pem
        chmod 0600 /certs/key.pem
    volumes:
      - platform-api-certs:/certs
    networks: [e2e]

  # One-shot init container: generates the RS256 keypair platform-api's
  # auth.jwt config requires (platform-api-config.toml reads it via {{ file }}).
  # Tokens are signed asymmetrically — there is no shared HMAC secret anymore.
  platform-api-jwtkeygen:
    image: alpine/openssl
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        [ -f /keys/jwt_private.pem ] && [ -f /keys/jwt_public.pem ] && exit 0
        openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 \
          -out /keys/jwt_private.pem 2>/dev/null
        openssl rsa -in /keys/jwt_private.pem -pubout \
          -out /keys/jwt_public.pem 2>/dev/null
        # jwtkeygen runs as root; platform-api runs as uid 10001, so the private
        # key must be owned by that uid, not made world-readable.
        chown 10001 /keys/jwt_private.pem
        chmod 0600 /keys/jwt_private.pem
        chmod 0644 /keys/jwt_public.pem
    volumes:
      - platform-api-jwt-keys:/keys
    networks: [e2e]

  platform-api:
    image: ${PLATFORM_API_IMAGE:-platform-api:it-e2e}
    command: ["-config", "/etc/platform-api/config.toml"]
    environment:
      - APIP_CP_DATABASE_DRIVER=postgres
      - APIP_CP_DATABASE_HOST=postgres
      - APIP_CP_DATABASE_PORT=5432
      - APIP_CP_DATABASE_NAME=platform_api
      - APIP_CP_DATABASE_USER=apip
      - APIP_CP_DATABASE_PASSWORD=apip
      - APIP_CP_DATABASE_SSL_MODE=disable
      - APIP_CP_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      # Force file-based auth + a stable org so the scenario can log in and the
      # org is seeded (env overrides the mounted config file).
      - APIP_CP_AUTH_FILE_BASED_ENABLED=true
      - APIP_CP_AUTH_FILE_BASED_ORGANIZATION_ID=default
      - APIP_CP_AUTH_FILE_BASED_ORGANIZATION_UUID=99089a17-72e0-4dd8-a2f4-c8dfbb085295
      - APIP_CP_AUTH_FILE_BASED_ORGANIZATION_DISPLAY_NAME=Default
      - APIP_CP_AUTH_FILE_BASED_ORGANIZATION_REGION=us
      # The @devportal stack injects the admin user (with dp:* scopes) here so the
      # issued JWT is authorized on the developer portal. Empty (the default) means
      # platform-api uses its built-in admin (ap:* scopes only).
      - APIP_CP_AUTH_FILE_BASED_USERS=${AUTH_FILE_BASED_USERS:-}
      # Developer Portal webhook receiver (only the postgres stack runs the devportal).
      # Enabled via env so the sqlite/sqlserver stacks — which have no devportal and no
      # mounted key — leave it off. The private key must be readable by the container
      # user (uid 10001); the suite generates a fresh RSA pair, writes the 0644 private
      # key and points PA_WEBHOOK_KEY at it (see prepareWebhookKey in suite_test.go).
      - APIP_CP_WEBHOOK_ENABLED=true
      - APIP_CP_WEBHOOK_SECRET=5bd108b058ac9b318faf771c82a3f88bf6d3be5cc51c221e7ee213dabdbdee22
      - APIP_CP_WEBHOOK_PRIVATE_KEY_PATH=/etc/platform-api/devportal-webhook.pem
      - APIP_CP_WEBHOOK_GATEWAY_TYPE=wso2/api-platform
    volumes:
      - ./platform-api-config.toml:/etc/platform-api/config.toml:ro
      # RSA private key that platform-api decrypts the webhook's encrypted key/token
      # fields with; its public half is registered on the devportal subscriber. The
      # suite always sets PA_WEBHOOK_KEY (the generated key); the default is only a
      # fallback for manual `docker compose up` after a suite run has generated it.
      - ${PA_WEBHOOK_KEY:-./.webhook-key.it.pem}:/etc/platform-api/devportal-webhook.pem:ro
      - platform-api-certs:/app/data/certs
      - platform-api-jwt-keys:/etc/platform-api/keys:ro
    ports:
      - "${PA_HOST_PORT:-9243}:9243"
    depends_on:
      postgres:
        condition: service_healthy
      platform-api-certgen:
        condition: service_completed_successfully
      platform-api-jwtkeygen:
        condition: service_completed_successfully
    networks: [e2e]

  gateway-controller:
    image: ${GATEWAY_CONTROLLER_IMAGE:-ghcr.io/wso2/api-platform/gateway-controller:it-e2e}
    command: ["-config", "/etc/gateway-controller/config.toml"]
    environment:
      - APIP_GW_CONTROLLER_STORAGE_TYPE=postgres
      - APIP_GW_CONTROLLER_STORAGE_POSTGRES_HOST=postgres
      - APIP_GW_CONTROLLER_STORAGE_POSTGRES_PORT=5432
      - APIP_GW_CONTROLLER_STORAGE_POSTGRES_DATABASE=gateway_test
      - APIP_GW_CONTROLLER_STORAGE_POSTGRES_USER=apip
      - APIP_GW_CONTROLLER_STORAGE_POSTGRES_PASSWORD=apip
      - APIP_GW_CONTROLLER_STORAGE_POSTGRES_SSLMODE=disable
      - APIP_GW_CONTROLLER_LOGGING_LEVEL=debug
      # Control plane = the real platform-api. The token is created by the
      # scenario and injected via GATEWAY_REGISTRATION_TOKEN before this starts.
      - APIP_GW_CONTROLLER_CONTROLPLANE_HOST=platform-api:9243
      - APIP_GW_CONTROLLER_CONTROLPLANE_TOKEN=${GATEWAY_REGISTRATION_TOKEN:-}
      - APIP_GW_CONTROLLER_CONTROLPLANE_INSECURE_SKIP_VERIFY=true
    ports:
      - "9090:9090"   # REST API
      - "9092:9092"   # Admin API
      - "18000:18000" # xDS gRPC
    volumes:
      - ../../gateway/it/test-config.toml:/etc/gateway-controller/config.toml:ro
      - ../../gateway/it/it-aesgcm-keys/default-aesgcm256-v1.bin:/app/data/aesgcm-keys/default-aesgcm256-v1.bin:ro
      - ../../gateway/gateway-controller/certificates:/app/certificates
      - ../../gateway/gateway-controller/listener-certs:/app/listener-certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      platform-api:
        condition: service_started
    networks: [e2e]

  gateway-runtime:
    image: ${GATEWAY_RUNTIME_IMAGE:-ghcr.io/wso2/api-platform/gateway-runtime:it-e2e}
    command: ["--pol.config", "/etc/policy-engine/config.toml"]
    environment:
      - GATEWAY_CONTROLLER_HOST=gateway-controller
      - LOG_LEVEL=info
    ports:
      - "${GW_HTTP_PORT:-18080}:8080"   # HTTP ingress (data plane)
      - "${GW_HTTPS_PORT:-18443}:8443"  # HTTPS ingress
      - "9002:9002"                     # Policy engine admin
    volumes:
      - ../../gateway/it/test-config.toml:/etc/policy-engine/config.toml:ro
    depends_on:
      gateway-controller:
        condition: service_started
    networks: [e2e]

  sample-backend:
    image: ghcr.io/wso2/api-platform/sample-service:latest
    command: ["-addr", ":9080", "-pretty"]
    ports:
      - "9080:9080"
    networks: [e2e]

  # Second gateway (own controller + runtime + DB) for the multi-gateway
  # scenario: the same API is deployed to both gateways, and undeploying from one
  # must not affect the other. Started on demand by the godog suite.
  gateway-controller-2:
    image: ${GATEWAY_CONTROLLER_IMAGE:-ghcr.io/wso2/api-platform/gateway-controller:it-e2e}
    command: ["-config", "/etc/gateway-controller/config.toml"]
    environment:
      - APIP_GW_CONTROLLER_STORAGE_TYPE=postgres
      - APIP_GW_CONTROLLER_STORAGE_POSTGRES_HOST=postgres
      - APIP_GW_CONTROLLER_STORAGE_POSTGRES_PORT=5432
      - APIP_GW_CONTROLLER_STORAGE_POSTGRES_DATABASE=gateway_test2
      - APIP_GW_CONTROLLER_STORAGE_POSTGRES_USER=apip
      - APIP_GW_CONTROLLER_STORAGE_POSTGRES_PASSWORD=apip
      - APIP_GW_CONTROLLER_STORAGE_POSTGRES_SSLMODE=disable
      - APIP_GW_CONTROLLER_LOGGING_LEVEL=debug
      - APIP_GW_CONTROLLER_CONTROLPLANE_HOST=platform-api:9243
      - APIP_GW_CONTROLLER_CONTROLPLANE_TOKEN=${GATEWAY_REGISTRATION_TOKEN_2:-}
      - APIP_GW_CONTROLLER_CONTROLPLANE_INSECURE_SKIP_VERIFY=true
    ports:
      - "9190:9090"
      - "9192:9092"
      - "18100:18000"
    volumes:
      - ../../gateway/it/test-config.toml:/etc/gateway-controller/config.toml:ro
      - ../../gateway/it/it-aesgcm-keys/default-aesgcm256-v1.bin:/app/data/aesgcm-keys/default-aesgcm256-v1.bin:ro
      - ../../gateway/gateway-controller/certificates:/app/certificates
      - ../../gateway/gateway-controller/listener-certs:/app/listener-certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      platform-api:
        condition: service_started
    networks: [e2e]

  gateway-runtime-2:
    image: ${GATEWAY_RUNTIME_IMAGE:-ghcr.io/wso2/api-platform/gateway-runtime:it-e2e}
    command: ["--pol.config", "/etc/policy-engine/config.toml"]
    environment:
      - GATEWAY_CONTROLLER_HOST=gateway-controller-2
      - LOG_LEVEL=info
    ports:
      - "${GW2_HTTP_PORT:-18081}:8080"
      - "${GW2_HTTPS_PORT:-18444}:8443"
      - "9102:9002"
    volumes:
      - ../../gateway/it/test-config.toml:/etc/policy-engine/config.toml:ro
    depends_on:
      gateway-controller-2:
        condition: service_started
    networks: [e2e]

  # Developer Portal — the consumer-facing plane. Credentials (subscriptions,
  # API keys) generated here are fired as signed webhooks to platform-api's
  # receiver (…/api/internal/v0.9/webhook/events), which persists them and
  # propagates to the gateway data plane over its existing WebSocket sync. 
  # Started on demand by the godog suite (postgres stack only).
  devportal:
    image: ${DEVPORTAL_IMAGE:-developer-portal:it-e2e}
    depends_on:
      postgres:
        condition: service_healthy
      platform-api:
        condition: service_started
    volumes:
      # The devportal has no automatic APIP_DP_* env override (see
      # src/config/configLoader.js) — an APIP_DP_* var only applies where this
      # config.toml references it via {{ env "..." }}. It replaces the image's
      # shipped configs/config.toml, which fails closed on the security secrets
      # and wires only the SQLite file key (ignoring APIP_DP_DATABASE_TYPE etc.).
      - ./devportal-config.toml:/app/configs/config.toml:ro
    environment:
      # Its own database on the shared postgres server (created by init-db.sql).
      # Postgres, not the devportal's default SQLite: the org-update path needs
      # UPDATE ... RETURNING, which SQLite doesn't support. Schema auto-migrates.
      - APIP_DP_DATABASE_TYPE=postgres
      - APIP_DP_DATABASE_HOST=postgres
      - APIP_DP_DATABASE_PORT=5432
      - APIP_DP_DATABASE_NAME=devportal
      - APIP_DP_DATABASE_USERNAME=apip
      - APIP_DP_DATABASE_PASSWORD=apip
      # Plain HTTP to avoid the self-signed cert dance in tests (tls disabled).
      - APIP_DP_TLS_ENABLED=false
      - APIP_DP_SERVER_BASEURL=http://devportal:3000
      # Seed the "default" org so its handle matches platform-api's org handle
      # (the webhook resolves the control-plane org by handle via org.ref_id).
      - APIP_DP_ORGANIZATION_DEFAULTNAME=default
      - APIP_DP_DEMO_ENABLED=false
      - APIP_DP_ORGANIZATION_AUTOCREATESUBSCRIPTIONPLANS=false
      - APIP_DP_LOGGING_CONSOLEONLY=true
      # platform-api now signs admin tokens with RS256 (asymmetric), so there is
      # no shared HMAC secret to hand the devportal for local verification.
      # APIP_DP_PLATFORMAPI_JWTSECRET is left unset: the devportal decodes the
      # token payload without verifying its signature, trusting the direct
      # HTTPS connection to platform-api instead (see extractPlatformJwtClaims
      # in src/utils/platformJwt.js) — the same trust boundary
      # APIP_DP_PLATFORMAPI_INSECURE already relies on for this test stack.
      - APIP_DP_PLATFORMAPI_BASEURL=https://platform-api:9243
      - APIP_DP_PLATFORMAPI_INSECURE=true
      # The webhook delivery worker POSTs over raw https with the default agent,
      # and platform-api serves a self-signed cert here. APIP_DP_PLATFORMAPI_INSECURE
      # only covers the auth client, so disable TLS verification globally for this
      # throwaway test container to let signed webhook deliveries through.
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      # Stable AES-256-GCM key (64 hex) for encrypting the webhook subscriber
      # secret at rest; must not change across restarts or the stored secret
      # becomes undecryptable and outbound requests go unsigned.
      - APIP_DP_SECURITY_ENCRYPTIONKEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      # express-session signing secret (64 hex). Required — the devportal fails
      # closed at startup if it doesn't resolve. Fixed test-only value.
      - APIP_DP_SECURITY_SESSIONSECRET=fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210
    ports:
      - "${DP_HOST_PORT:-3000}:3000"
    networks: [e2e]

networks:
  e2e:
    driver: bridge

volumes:
  platform-api-certs:
  platform-api-jwt-keys:
