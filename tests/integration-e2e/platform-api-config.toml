# platform-api configuration for the combined e2e stack.
# Database settings come from environment variables (see docker-compose.yaml);
# this file supplies file-based auth so the scenario can log in (admin/admin).

[platform_api]

[platform_api.logging]
level = '{{ env "APIP_CP_LOGGING_LEVEL" "info" }}'

[platform_api.security]
encryption_key = '{{ env "APIP_CP_ENCRYPTION_KEY" }}'

[platform_api.database]
driver   = '{{ env "APIP_CP_DATABASE_DRIVER" "sqlite3" }}'
path     = '{{ env "APIP_CP_DATABASE_PATH" "/app/data/platform.db" }}'
host     = '{{ env "APIP_CP_DATABASE_HOST" "" }}'
port     = '{{ env "APIP_CP_DATABASE_PORT" "5432" }}'
name     = '{{ env "APIP_CP_DATABASE_NAME" "" }}'
user     = '{{ env "APIP_CP_DATABASE_USER" "" }}'
password = '{{ env "APIP_CP_DATABASE_PASSWORD" "" }}'
ssl_mode = '{{ env "APIP_CP_DATABASE_SSL_MODE" "disable" }}'

[platform_api.auth]
mode = '{{ env "APIP_CP_AUTH_MODE" "file" }}'

[platform_api.auth.jwt]
issuer      = '{{ env "APIP_CP_AUTH_JWT_ISSUER" "platform-api" }}'
# RS256 keypair generated by the platform-api-jwtkeygen init container and
# bind-mounted read-only at /etc/platform-api/keys. The server reads these
# paths directly rather than inlining the PEM content into config.
public_key_file  = '{{ env "APIP_CP_AUTH_JWT_PUBLIC_KEY_FILE" "/etc/platform-api/keys/jwt_public.pem" }}'
private_key_file = '{{ env "APIP_CP_AUTH_JWT_PRIVATE_KEY_FILE" "/etc/platform-api/keys/jwt_private.pem" }}'

[platform_api.auth.file.organization]
id           = '{{ env "APIP_CP_AUTH_FILE_ORGANIZATION_ID" "default" }}'
display_name = '{{ env "APIP_CP_AUTH_FILE_ORGANIZATION_DISPLAY_NAME" "Default" }}'
region       = '{{ env "APIP_CP_AUTH_FILE_ORGANIZATION_REGION" "us" }}'
uuid         = '{{ env "APIP_CP_AUTH_FILE_ORGANIZATION_UUID" "99089a17-72e0-4dd8-a2f4-c8dfbb085295" }}'

# Default login: admin / admin (bcrypt hash of "admin", reused from the shipped sample config).
[[platform_api.auth.file.users]]
username      = "admin"
password_hash = "$2y$10$U2yKMwGamGwDoMu0hRPT7u8nCuP8z/qxHFOKV6dhIxkJN9NJ0eVQ."
scopes        = "ap:organization:manage ap:gateway:manage ap:gateway_custom_policy:manage ap:rest_api:manage ap:llm_provider:manage ap:llm_proxy:manage ap:mcp_proxy:manage ap:webbroker_api:manage ap:websub_api:manage ap:application:manage ap:subscription:manage ap:subscription_plan:manage ap:project:manage ap:llm_template:manage ap:devportal:manage ap:api_key:read ap:secret:manage dp:org_manage dp:api_manage dp:sub_plan_manage dp:app_manage dp:subscription_manage dp:api_key_manage dp:webhook_subscriber_manage"

[platform_api.webhook]
enabled          = '{{ env "APIP_CP_WEBHOOK_ENABLED" "false" }}'
secret           = '{{ env "APIP_CP_WEBHOOK_SECRET" "" }}'
private_key_path = '{{ env "APIP_CP_WEBHOOK_PRIVATE_KEY_PATH" "" }}'
