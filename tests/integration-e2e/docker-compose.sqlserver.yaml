# SQL Server variant of the combined e2e stack. One SQL Server instance holds
# two databases (platform_api, gateway_test). Same scenario as the other
# backends; see the godog suite and README.md.
#
# CI (amd64) uses the default mcr.microsoft.com/mssql/server image. On Apple
# Silicon that image fails under emulation, so override with Azure SQL Edge:
#   MSSQL_IMAGE=mcr.microsoft.com/azure-sql-edge:latest E2E_DB=sqlserver go test -run TestFeatures ./...
services:
  sqlserver:
    image: ${MSSQL_IMAGE:-mcr.microsoft.com/mssql/server:2022-latest}
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_PASSWORD:-Strong!Passw0rd}
      - MSSQL_PID=Developer
    ports:
      - "14333:1433"
    networks: [e2e]

  # Creates both databases via sqlcmd (the server images do not auto-create them)
  # and pre-provisions the platform_api schema: platform-api only auto-runs DDL
  # for SQLite, so against SQL Server the operator must provision it. The
  # gateway-controller still auto-migrates its own gateway_test schema.
  mssql-init:
    image: mcr.microsoft.com/mssql-tools:latest
    depends_on:
      sqlserver:
        condition: service_started
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >
        for i in $$(seq 1 90); do
          /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" && break;
          sleep 2;
        done;
        /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P "$${MSSQL_SA_PASSWORD}" -b -Q
        "IF DB_ID('platform_api') IS NULL CREATE DATABASE [platform_api]; IF DB_ID('gateway_test') IS NULL CREATE DATABASE [gateway_test];" &&
        /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P "$${MSSQL_SA_PASSWORD}" -b -I -d platform_api -i /schema/schema.sqlserver.sql
    environment:
      - MSSQL_SA_PASSWORD=${MSSQL_PASSWORD:-Strong!Passw0rd}
    volumes:
      - ../../platform-api/internal/database/schema.sqlserver.sql:/schema/schema.sqlserver.sql:ro
    networks: [e2e]

  # One-shot init container: generates the TLS pair the platform-api HTTPS
  # listener requires (the server no longer generates a self-signed fallback).
  platform-api-certgen:
    image: alpine/openssl
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        [ -f /certs/cert.pem ] && [ -f /certs/key.pem ] && exit 0
        openssl req -x509 -newkey rsa:2048 -sha256 -days 365 -nodes \
          -keyout /certs/key.pem -out /certs/cert.pem \
          -subj "/O=WSO2 API Platform/CN=platform-api" \
          -addext "subjectAltName=DNS:localhost,DNS:platform-api,IP:127.0.0.1"
    volumes:
      - platform-api-certs:/certs
    networks: [e2e]

  platform-api:
    image: ${PLATFORM_API_IMAGE:-platform-api:it-e2e}
    command: ["-config", "/etc/platform-api/config.toml"]
    environment:
      - APIP_CP_DATABASE_DRIVER=sqlserver
      - APIP_CP_DATABASE_HOST=sqlserver
      - APIP_CP_DATABASE_PORT=1433
      - APIP_CP_DATABASE_NAME=platform_api
      - APIP_CP_DATABASE_USER=sa
      - APIP_CP_DATABASE_PASSWORD=${MSSQL_PASSWORD:-Strong!Passw0rd}
      - APIP_CP_DATABASE_SSL_MODE=disable
      # Single encryption key — must be 32 bytes (64 hex chars). Used for all at-rest
      # encryption (secrets, subscription tokens, HMAC)
      - APIP_CP_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - APIP_CP_AUTH_FILE_BASED_ENABLED=true
      - APIP_CP_AUTH_FILE_BASED_ORGANIZATION_ID=default
      - APIP_CP_AUTH_FILE_BASED_ORGANIZATION_UUID=99089a17-72e0-4dd8-a2f4-c8dfbb085295
      - APIP_CP_AUTH_FILE_BASED_ORGANIZATION_DISPLAY_NAME=Default
      - APIP_CP_AUTH_FILE_BASED_ORGANIZATION_REGION=us
      - APIP_CP_AUTH_JWT_SECRET_KEY=fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210
    volumes:
      - ./platform-api-config.toml:/etc/platform-api/config.toml:ro
      - platform-api-certs:/app/data/certs
    ports:
      - "${PA_HOST_PORT:-9243}:9243"
    depends_on:
      mssql-init:
        condition: service_completed_successfully
      platform-api-certgen:
        condition: service_completed_successfully
    networks: [e2e]

  gateway-controller:
    image: ${GATEWAY_CONTROLLER_IMAGE:-ghcr.io/wso2/api-platform/gateway-controller:it-e2e}
    command: ["-config", "/etc/gateway-controller/config.toml"]
    environment:
      - APIP_GW_CONTROLLER_STORAGE_TYPE=sqlserver
      - APIP_GW_CONTROLLER_STORAGE_DATABASE_DSN=sqlserver://sa:${MSSQL_PASSWORD:-Strong!Passw0rd}@sqlserver:1433?database=gateway_test&encrypt=disable&TrustServerCertificate=true&app+name=gateway-controller
      - APIP_GW_CONTROLLER_LOGGING_LEVEL=debug
      - APIP_GW_CONTROLLER_CONTROLPLANE_HOST=platform-api:9243
      - APIP_GW_CONTROLLER_CONTROLPLANE_TOKEN=${GATEWAY_REGISTRATION_TOKEN:-}
      - APIP_GW_CONTROLLER_CONTROLPLANE_INSECURE_SKIP_VERIFY=true
    ports:
      - "9090:9090"
      - "9092:9092"
      - "18000:18000"
    volumes:
      - ../../gateway/it/test-config.toml:/etc/gateway-controller/config.toml:ro
      - ../../gateway/it/it-aesgcm-keys/default-aesgcm256-v1.bin:/app/data/aesgcm-keys/default-aesgcm256-v1.bin:ro
      - ../../gateway/gateway-controller/certificates:/app/certificates
      - ../../gateway/gateway-controller/listener-certs:/app/listener-certs:ro
    depends_on:
      mssql-init:
        condition: service_completed_successfully
      platform-api:
        condition: service_started
    networks: [e2e]

  gateway-runtime:
    image: ${GATEWAY_RUNTIME_IMAGE:-ghcr.io/wso2/api-platform/gateway-runtime:it-e2e}
    command: ["--pol.config", "/etc/policy-engine/config.toml"]
    environment:
      - GATEWAY_CONTROLLER_HOST=gateway-controller
      - LOG_LEVEL=info
    ports:
      - "${GW_HTTP_PORT:-18080}:8080"
      - "${GW_HTTPS_PORT:-18443}:8443"
      - "9002:9002"
    volumes:
      - ../../gateway/it/test-config.toml:/etc/policy-engine/config.toml:ro
    depends_on:
      gateway-controller:
        condition: service_started
    networks: [e2e]

  sample-backend:
    image: ghcr.io/wso2/api-platform/sample-service:latest
    command: ["-addr", ":9080", "-pretty"]
    ports:
      - "9080:9080"
    networks: [e2e]

networks:
  e2e:
    driver: bridge

volumes:
  platform-api-certs:
