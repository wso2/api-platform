serverInfo:
  name: bijira-mcp-everything
  version: 1.0.0
tools:
  - description: Echoes back the input
    inputSchema:
      $schema: http://json-schema.org/draft-07/schema#
      additionalProperties: false
      properties:
        message:
          description: Message to echo
          type: string
      required:
        - message
      type: object
    name: echo
  - description: Adds two numbers
    inputSchema:
      $schema: http://json-schema.org/draft-07/schema#
      additionalProperties: false
      properties:
        a:
          description: First number
          type: number
        b:
          description: Second number
          type: number
      required:
        - a
        - b
      type: object
    name: add
  - description: View the pizza menu. This tool provides a list of available pizzas.
    inputSchema:
      $schema: http://json-schema.org/draft-07/schema#
      additionalProperties: false
      properties: {}
      type: object
    name: viewPizzaMenu
  - description: Order a pizza from the menu. This tool allows you to place an order for a pizza.
    inputSchema:
      $schema: http://json-schema.org/draft-07/schema#
      additionalProperties: false
      properties:
        creditCardNumber:
          description: Credit card number for payment
          type: string
        customerName:
          description: Name of the customer
          type: string
        deliveryAddress:
          description: Delivery address for the order
          type: string
        pizzaType:
          description: Type of pizza to order
          type: string
        quantity:
          description: Number of pizzas to order
          minimum: 1
          type: integer
      required:
        - pizzaType
        - quantity
        - customerName
        - deliveryAddress
        - creditCardNumber
      type: object
    name: orderPizza
