services:
  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devportal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ../../portals/developer-portal/artifacts/script.sql:/docker-entrypoint-initdb.d/01-init-devportal.sql
      - ../../platform-api/internal/database/init-platform-api-db.sql:/docker-entrypoint-initdb.d/02-init-platform-api.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devportal"]
      interval: 5s
      timeout: 5s
      retries: 5

  devportal:
    build:
      context: ../../portals/developer-portal
      dockerfile: Dockerfile
    container_name: devportal
    environment:
      - APIP_DP_PLATFORMAPI_JWTSECRET=${APIP_CP_AUTH_JWT_SECRET_KEY:-}
    ports:
      - "3001:3001"
    volumes:
      - ../../portals/developer-portal/config.json:/app/config.json:ro
      - ../../portals/developer-portal/secret.json:/app/secret.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      platform-api-certgen:
        condition: service_completed_successfully

  # One-shot init container: generates the TLS pair the platform-api HTTPS
  # listener requires (the server no longer generates a self-signed fallback).
  platform-api-certgen:
    image: alpine/openssl
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        [ -f /certs/cert.pem ] && [ -f /certs/key.pem ] && exit 0
        openssl req -x509 -newkey rsa:2048 -sha256 -days 365 -nodes \
          -keyout /certs/key.pem -out /certs/cert.pem \
          -subj "/O=WSO2 API Platform/CN=platform-api" \
          -addext "subjectAltName=DNS:localhost,DNS:platform-api,IP:127.0.0.1"
    volumes:
      - platform-api-certs:/certs

  platform-api:
    image: ghcr.io/wso2/api-platform/platform-api:latest 
    build:
      context: ../../platform-api
      dockerfile: Dockerfile
      additional_contexts:
        common: ../../common
    ports:
      - "9243:9243"
    volumes:
      - platform-api-data:/api-platform/data
      - platform-api-certs:/app/data/certs
    environment:
      - APIP_CP_DEFAULT_DEVPORTAL_API_URL=http://devportal:3001
      - APIP_CP_DATABASE_DRIVER=postgres
      - APIP_CP_DATABASE_HOST=postgres
      - APIP_CP_DATABASE_PORT=5432
      - APIP_CP_DATABASE_NAME=platform_api
      - APIP_CP_DATABASE_USER=postgres
      - APIP_CP_DATABASE_PASSWORD=postgres
      - APIP_CP_DATABASE_SSL_MODE=disable
      - APIP_CP_DATABASE_MAX_OPEN_CONNS=25
      - APIP_CP_DATABASE_MAX_IDLE_CONNS=10
      - APIP_CP_DATABASE_CONN_MAX_LIFETIME=300
      - APIP_CP_DATABASE_EXECUTE_SCHEMA_DDL=true
      - APIP_CP_ENCRYPTION_KEY=${APIP_CP_ENCRYPTION_KEY:-}
      - APIP_CP_AUTH_JWT_SECRET_KEY=${APIP_CP_AUTH_JWT_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "--no-check-certificate", "https://localhost:9243/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

  management-portal:
    build:
      context: ../../portals/management-portal
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      platform-api:
        condition: service_healthy

volumes:
  platform-api-data:
    driver: local
  platform-api-certs:
    driver: local
  postgres_data:
