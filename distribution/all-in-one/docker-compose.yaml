services:
  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devportal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ../../portals/developer-portal/artifacts/script.sql:/docker-entrypoint-initdb.d/01-init-devportal.sql
      - ../../platform-api/internal/database/init-platform-api-db.sql:/docker-entrypoint-initdb.d/02-init-platform-api.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devportal"]
      interval: 5s
      timeout: 5s
      retries: 5

  devportal:
    build:
      context: ../../portals/developer-portal
      dockerfile: Dockerfile
    container_name: devportal
    environment:
      - APIP_DP_SERVER_HTTPS_ENABLED=false
      - APIP_DP_DATABASE_DRIVER=postgres
      - APIP_DP_DATABASE_HOST=postgres
      - APIP_DP_DATABASE_PORT=5432
      - APIP_DP_DATABASE_NAME=devportal
      - APIP_DP_DATABASE_USER=postgres
      - APIP_DP_DATABASE_PASSWORD=postgres
      # platform-api signs its tokens with RS256; the devportal verifies them
      # against jwt_public.pem from the shared keypair volume mounted below
      # (auth.local.jwt_public_key in devportal-config.toml). There is no shared
      # HMAC secret. tls_skip_verify covers platform-api's self-signed cert.
      - APIP_DP_AUTH_LOCAL_PLATFORM_API_URL=https://platform-api:9243
      - APIP_DP_AUTH_LOCAL_TLS_SKIP_VERIFY=true
      # Required — devportal fails closed at startup if either doesn't resolve
      # to a 64-char hex string. Set both before `docker compose up`, e.g.:
      #   export APIP_DP_SECURITY_ENCRYPTION_KEY=$(openssl rand -hex 32)
      #   export APIP_DP_SECURITY_SESSION_SECRET=$(openssl rand -hex 32)
      - APIP_DP_SECURITY_ENCRYPTION_KEY=${APIP_DP_SECURITY_ENCRYPTION_KEY:-}
      - APIP_DP_SECURITY_SESSION_SECRET=${APIP_DP_SECURITY_SESSION_SECRET:-}
      - APIP_DP_SERVER_PORT=${APIP_DP_SERVER_PORT:-9543}
    ports:
      - "${APIP_DP_SERVER_PORT:-9543}:${APIP_DP_SERVER_PORT:-9543}"
    volumes:
      # Replaces the image's shipped configs/config.toml (SQLite-only, fails
      # closed on security secrets) — see devportal-config.toml for why.
      - ./devportal-config.toml:/app/configs/config.toml:ro
      # Same RS256 keypair volume platform-api signs with — the devportal reads
      # only jwt_public.pem (0644) from it to verify those tokens.
      - platform-api-jwt-keys:/etc/devportal/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      platform-api:
        condition: service_healthy
      platform-api-jwtkeygen:
        condition: service_completed_successfully

  # One-shot init container: generates the TLS pair the platform-api HTTPS
  # listener requires (the server no longer generates a self-signed fallback).
  platform-api-certgen:
    image: alpine/openssl
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        [ -f /certs/cert.pem ] && [ -f /certs/key.pem ] && exit 0
        openssl req -x509 -newkey rsa:2048 -sha256 -days 365 -nodes \
          -keyout /certs/key.pem -out /certs/cert.pem \
          -subj "/O=WSO2 API Platform/CN=platform-api" \
          -addext "subjectAltName=DNS:localhost,DNS:platform-api,IP:127.0.0.1"
    volumes:
      - platform-api-certs:/certs

  # One-shot init container: generates the RS256 keypair platform-api's
  # auth.jwt config requires AND the 32-byte at-rest encryption key its
  # security config requires — config.toml reads both via {{ file }}. Tokens are
  # signed asymmetrically — there is no shared HMAC secret anymore.
  platform-api-jwtkeygen:
    image: alpine/openssl
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        [ -f /keys/jwt_private.pem ] && [ -f /keys/jwt_public.pem ] && [ -f /keys/encryption.key ] && exit 0
        openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 \
          -out /keys/jwt_private.pem 2>/dev/null
        openssl rsa -in /keys/jwt_private.pem -pubout \
          -out /keys/jwt_public.pem 2>/dev/null
        # At-rest encryption key: 32 bytes as 64 hex chars, read by config.toml
        # via {{ file "/etc/platform-api/keys/encryption.key" }}.
        openssl rand -hex 32 > /keys/encryption.key
        # jwtkeygen runs as root; platform-api runs as uid 10001, so the private
        # key and encryption key must be owned by that uid, not world-readable.
        chown 10001 /keys/jwt_private.pem /keys/encryption.key
        chmod 0600 /keys/jwt_private.pem /keys/encryption.key
        chmod 0644 /keys/jwt_public.pem
    volumes:
      - platform-api-jwt-keys:/keys

  platform-api:
    image: ghcr.io/wso2/api-platform/platform-api:latest
    build:
      context: ../../platform-api
      dockerfile: Dockerfile
      additional_contexts:
        common: ../../common
    # Mounts the shipped default config (../../platform-api/config/config.toml)
    # so the APIP_CP_* env vars below actually take effect — {{ env }} / {{ file }}
    # tokens only resolve from a loaded config file, they are not read directly.
    command: ["-config", "/etc/platform-api/config.toml"]
    ports:
      - "9243:9243"
    volumes:
      - ../../platform-api/config/config.toml:/etc/platform-api/config.toml:ro
      - platform-api-data:/api-platform/data
      - platform-api-certs:/app/data/certs
      # RS256 JWT signing/verification keys — on the Platform API's {{ file }}
      # allowlist (/etc/platform-api).
      - platform-api-jwt-keys:/etc/platform-api/keys:ro
    environment:
      - APIP_CP_DEFAULT_DEVPORTAL_API_URL=http://devportal:${APIP_DP_SERVER_PORT:-9543}
      - APIP_CP_DATABASE_DRIVER=postgres
      - APIP_CP_DATABASE_HOST=postgres
      - APIP_CP_DATABASE_PORT=5432
      - APIP_CP_DATABASE_NAME=platform_api
      - APIP_CP_DATABASE_USER=postgres
      - APIP_CP_DATABASE_PASSWORD=postgres
      - APIP_CP_DATABASE_SSL_MODE=disable
      - APIP_CP_DATABASE_MAX_OPEN_CONNS=25
      - APIP_CP_DATABASE_MAX_IDLE_CONNS=10
      - APIP_CP_DATABASE_CONN_MAX_LIFETIME=300
      - APIP_CP_DATABASE_EXECUTE_SCHEMA_DDL=true
    depends_on:
      postgres:
        condition: service_healthy
      platform-api-certgen:
        condition: service_completed_successfully
      platform-api-jwtkeygen:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "--no-check-certificate", "https://localhost:9243/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

  management-portal:
    build:
      context: ../../portals/management-portal
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      platform-api:
        condition: service_healthy

volumes:
  platform-api-data:
    driver: local
  platform-api-certs:
    driver: local
  platform-api-jwt-keys:
    driver: local
  postgres_data:
