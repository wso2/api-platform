name: model-weighted-round-robin
version: v1.0.1
description: |
  Distribute requests across models using weighted round-robin so higher-weight models receive proportionally more traffic.

parameters:
  type: object
  properties:
    models:
      type: array
      x-wso2-policy-advanced-param: false
      description: List of models with weights for weighted round-robin distribution
      items:
        type: object
        properties:
          model:
            type: string
            description: The AI model name
            minLength: 1
          weight:
            type: integer
            description: |
              The weight assigned to this model for distribution.
              Higher weights mean more requests will be routed to this model.
              Weight is relative to total weight of all models.
            default: 1
            minimum: 1
        required:
          - model
          - weight
      minItems: 1
    suspendDuration:
      type: integer
      x-wso2-policy-advanced-param: true
      description: |
        Suspend duration in seconds for failed models.
        Set to 0 to disable failed-model suspension tracking.
      minimum: 0
      default: 30
  required:
    - models

systemParameters:
  type: object
  properties: {}
