name: analytics-header-filter
version: v1.0.0
description: |
  Filters request and response headers from analytics data using configurable allow or deny lists.

parameters:
  type: object
  additionalProperties: false
  properties:
    request:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: Specifies the request headers to allow or deny in analytics data.
      properties:
        mode:
          type: string
          x-wso2-policy-advanced-param: false
          description: Whether to allow or deny the listed headers.
          enum:
            - allow
            - deny
          default: deny
        headers:
          type: array
          x-wso2-policy-advanced-param: false
          description: Header names to allow or deny. Matching is case-insensitive.
          items:
            type: string
            minLength: 1
            maxLength: 256
          uniqueItems: true
          default: []
      required:
        - mode
    response:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: Specifies response header filtering for analytics.
      properties:
        mode:
          type: string
          x-wso2-policy-advanced-param: false
          description: Whether to allow or deny the listed headers.
          enum:
            - allow
            - deny
          default: deny
        headers:
          type: array
          x-wso2-policy-advanced-param: false
          description: Header names to allow or deny. Matching is case-insensitive.
          items:
            type: string
            minLength: 1
            maxLength: 256
          uniqueItems: true
          default: []
      required:
        - mode
  anyOf:
    - required: [ request ]
    - required: [ response ]

systemParameters:
  type: object
  properties: {}
