name: regex-guardrail
version: v1.0.0
description: |
  Validate request or response content against regex patterns using optional JSONPath extraction and optional inverted matching.

parameters:
  type: object
  properties:
    request:
      type: object
      x-wso2-policy-advanced-param: false
      description: Configuration for request phase validation
      properties:
        enabled:
          type: boolean
          x-wso2-policy-advanced-param: false
          description: Enables validation for the request flow.
          default: true
        regex:
          type: string
          x-wso2-policy-advanced-param: false
          description: Regular expression pattern to match against the content
          minLength: 1
        jsonPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: |
            JSONPath expression to extract a specific value from JSON payload.
            If empty, validates the entire payload as a string.
            Examples: "$.messages", "$.data.content", "$.items[0].text"
          default: "$.messages[-1].content"
        invert:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, validation passes when regex does NOT match (inverted logic).
            If false (default), validation passes when regex matches.
          default: false
        showAssessment:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, includes detailed assessment information in error responses.
            If false, returns minimal error information.
          default: false
      anyOf:
      - properties:
          enabled:
            const: false
        required:
        - enabled
      - required:
        - regex
    response:
      type: object
      x-wso2-policy-advanced-param: false
      description: Configuration for response phase validation
      properties:
        enabled:
          type: boolean
          x-wso2-policy-advanced-param: false
          description: Enables validation for the response flow.
          default: false
        regex:
          type: string
          x-wso2-policy-advanced-param: false
          description: Regular expression pattern to match against the content
          minLength: 1
        jsonPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: |
            JSONPath expression to extract a specific value from JSON payload.
            If empty, validates the entire payload as a string.
            Examples: "$.messages", "$.data.content", "$.items[0].text"
          default: "$.choices[0].message.content"
        streamingJsonPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: |
            JSONPath expression to extract content from SSE streaming delta chunks.
            Used when the upstream returns a streaming (stream: true) response.
            Defaults to the standard OpenAI SSE delta content path.
          default: "$.choices[0].delta.content"
        invert:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, validation passes when regex does NOT match (inverted logic).
            If false (default), validation passes when regex matches.
          default: false
        showAssessment:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, includes detailed assessment information in error responses.
            If false, returns minimal error information.
          default: false
      anyOf:
      - properties:
          enabled:
            const: false
        required:
        - enabled
      - required:
        - regex
  anyOf:
    - required: [ request ]
    - required: [ response ]

systemParameters:
  type: object
  properties: {}
