name: dynamic-endpoint
version: v1.0.0
description: |
  Routes requests to a dynamically specified upstream definition.
  This policy reads an upstream name from parameters and routes the request to that upstream.
  Demonstrates the UpstreamName functionality for dynamic upstream routing.
  
  The targetUpstream must match the name of an entry in the API's upstreamDefinitions section.

parameters:
  type: object
  properties:
    targetUpstream:
      type: string
      description: The name of the upstream definition to route requests to (must match an entry in upstreamDefinitions)
  required:
    - targetUpstream

systemParameters:
  type: object
  properties: {}
