name: respond
version: v1.0.1
description: |
  Return a response directly to the client without forwarding the request to the upstream.

parameters:
  type: object
  additionalProperties: false
  properties:
    statusCode:
      type: integer
      x-wso2-policy-advanced-param: false
      description: HTTP status code for the response. 
      minimum: 100
      maximum: 599
      default: 200
    headers:
      type: array
      x-wso2-policy-advanced-param: false
      description: Array of response headers to include in the response. 
      default: []
      items:
        type: object
        additionalProperties: false
        properties:
          name:
            type: string
            x-wso2-policy-advanced-param: false
            description: Header name
            minLength: 1
            maxLength: 256
            pattern: "^[a-zA-Z0-9-_]+$"
          value:
            type: string
            x-wso2-policy-advanced-param: false
            description: Header value
            maxLength: 8192
        required:
        - name
        - value
    body:
      type: string
      x-wso2-policy-advanced-param: false
      description: Response body content
      default: ""
      maxLength: 1048576
    

systemParameters:
  type: object
  additionalProperties: false
  properties: {}
