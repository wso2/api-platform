name: python-header-modifier
version: v1.0.0
displayName: Python Header Modifier
description: |
  Exercises request-header and response-header phases of the Python runtime.
  This sample can mutate headers, perform request-routing rewrites, short-circuit
  with ImmediateResponse, read auth/vhost data from the shared context, and
  write dynamic metadata plus analytics header filters.

parameters:
  type: object
  properties:
    requestHeaderName:
      type: string
      default: "x-python-request-phase"
    requestHeaderValue:
      type: string
      default: "request-headers-visited"
    responseHeaderName:
      type: string
      default: "x-python-response-phase"
    responseHeaderValue:
      type: string
      default: "response-headers-visited"
    requestHeadersToRemove:
      type: array
      items:
        type: string
      default: []
    responseHeadersToRemove:
      type: array
      items:
        type: string
      default: []
    upstreamName:
      type: string
    rewritePath:
      type: string
    rewriteHost:
      type: string
    rewriteMethod:
      type: string
    queryParamToAddName:
      type: string
    queryParamToAddValues:
      type: array
      items:
        type: string
      default: []
    queryParametersToRemove:
      type: array
      items:
        type: string
      default: []
    blockOnHeader:
      type: string
      description: Short-circuit the request if this header is present.
    blockStatusCode:
      type: integer
      default: 451
    blockBody:
      type: string
      default: "Blocked by python-header-modifier during request headers"
    replaceWhenStatusAtLeast:
      type: integer
      default: 500
    replaceResponseStatusCode:
      type: integer
      description: Replace the upstream response during response headers when set.
    replaceResponseBody:
      type: string
      default: "Response replaced by python-header-modifier"
    analyticsFilterMode:
      type: string
      default: "deny"
    analyticsFilterHeaders:
      type: array
      items:
        type: string
      default: []
  required: []

systemParameters:
  type: object
  properties: {}
