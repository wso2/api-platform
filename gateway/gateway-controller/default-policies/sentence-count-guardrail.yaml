name: sentence-count-guardrail
version: v0.2.3
description: |
  Validate sentence counts in request or response content using min/max limits, optional JSONPath extraction, and optional inverted logic.

parameters:
  type: object
  additionalProperties: false
  properties:
    request:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: Configuration for request phase validation
      properties:
        enabled:
          type: boolean
          x-wso2-policy-advanced-param: false
          description: Enables validation for the request flow.
          default: true
        min:
          type: integer
          x-wso2-policy-advanced-param: false
          description: Minimum allowed sentence count (inclusive)
          minimum: 0
        max:
          type: integer
          x-wso2-policy-advanced-param: false
          description: Maximum allowed sentence count (inclusive)
          minimum: 1
        jsonPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: |
            Extract content using JSONPath from the JSON payload.
            Defaults to "$.messages[-1].content" (last message content).
            Set to an empty string ("") to validate the full payload string.
          default: "$.messages[-1].content"
        invert:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, validation passes when sentence count is NOT within the min-max range (inverted logic).
            If false (default), validation passes when sentence count is within the min-max range.
          default: false
        showAssessment:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, includes detailed assessment information in error responses.
            If false, returns minimal error information.
          default: false
      anyOf:
      - properties:
          enabled:
            const: false
        required:
        - enabled
      - required:
        - min
        - max
    response:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: Configuration for response phase validation
      properties:
        enabled:
          type: boolean
          x-wso2-policy-advanced-param: false
          description: Enables validation for the response flow.
          default: false
        min:
          type: integer
          x-wso2-policy-advanced-param: false
          description: Minimum allowed sentence count (inclusive)
          minimum: 0
        max:
          type: integer
          x-wso2-policy-advanced-param: false
          description: Maximum allowed sentence count (inclusive)
          minimum: 1
        jsonPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: |
            Extract content using JSONPath from the JSON payload.
            Defaults to "$.choices[0].message.content" (assistant response content).
            Set to an empty string ("") to validate the full payload string.
          default: "$.choices[0].message.content"
        invert:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, validation passes when sentence count is NOT within the min-max range (inverted logic).
            If false (default), validation passes when sentence count is within the min-max range.
          default: false
        showAssessment:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, includes detailed assessment information in error responses.
            If false, returns minimal error information.
          default: false
      anyOf:
      - properties:
          enabled:
            const: false
        required:
        - enabled
      - required:
        - min
        - max
  anyOf:
    - required: [ request ]
    - required: [ response ]

systemParameters:
  type: object
  additionalProperties: false
  properties: {}
