name: api-key-auth
version: v0.9.1
description: |
  Secures APIs by validating API keys in incoming requests. API keys can be
  provided through a configured HTTP header or query parameter.

parameters:
  type: object
  additionalProperties: false
  properties:
    key:
      type: string
      x-wso2-policy-advanced-param: false
      description: |
        Specifies the header or query parameter name that carries the API key.
        Header lookup is case-insensitive; query parameter lookup uses exact matching.
      default: API-Key
      validation:
        minLength: 1
        maxLength: 128

    in:
      type: string
      x-wso2-policy-advanced-param: false
      description: |
        Specifies where to read the API key. Supported values are "header" and
        "query".
      default: header
      enum:
        - "header"
        - "query"

  required:
    - key
    - in

systemParameters:
  type: object
  properties:
    issuer:
      type: string
      description: |
        Identifier of the portal that associated with this gateway.
        Resolved from config.toml [api_key] issuer at startup.
        When resolved to a non-empty string, the policy rejects any API key
        whose issuer field is non-null and does not match this value.
        When empty or absent, the issuer check is skipped entirely.
      default: ""
      "wso2/defaultValue": "${config.api_key.issuer}"
