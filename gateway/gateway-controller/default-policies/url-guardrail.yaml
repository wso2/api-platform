name: url-guardrail
version: v0.2.1
description: |
  Validate URLs in request or response content using JSONPath extraction with DNS-only or HTTP reachability checks.

parameters:
  type: object
  additionalProperties: false
  properties:
    request:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: Configuration for request phase validation
      properties:
        enabled:
          type: boolean
          x-wso2-policy-advanced-param: false
          description: Enables validation for the request flow.
          default: false
        jsonPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: |
            JSONPath expression to extract a specific value from JSON payload.
            If empty, validates the entire payload as a string.
            Examples: "$.messages", "$.data.content", "$.items[0].text"
          default: "$.messages[-1].content"
        onlyDNS:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, validates URLs only via DNS resolution (faster, less reliable).
            If false (default), validates URLs via HTTP HEAD request (slower, more reliable).
          default: false
        timeout:
          type: integer
          x-wso2-policy-advanced-param: true
          description: |
            Timeout in milliseconds for DNS lookup or HTTP HEAD request.
            Default is 3000ms (3 seconds).
          minimum: 0
          default: 3000
        showAssessment:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, includes detailed assessment information including invalid URLs in error responses.
            If false, returns minimal error information.
          default: false
    response:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: Configuration for response phase validation
      properties:
        enabled:
          type: boolean
          x-wso2-policy-advanced-param: false
          description: Enables validation for the response flow.
          default: true
        jsonPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: |
            JSONPath expression to extract a specific value from JSON payload.
            If empty, validates the entire payload as a string.
            Examples: "$.messages", "$.data.content", "$.items[0].text"
          default: "$.choices[0].message.content"
        onlyDNS:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, validates URLs only via DNS resolution (faster, less reliable).
            If false (default), validates URLs via HTTP HEAD request (slower, more reliable).
          default: false
        timeout:
          type: integer
          x-wso2-policy-advanced-param: true
          description: |
            Timeout in milliseconds for DNS lookup or HTTP HEAD request.
            Default is 3000ms (3 seconds).
          minimum: 0
          default: 3000
        showAssessment:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, includes detailed assessment information including invalid URLs in error responses.
            If false, returns minimal error information.
          default: false
  anyOf:
    - required: [ request ]
    - required: [ response ]

systemParameters:
  type: object
  additionalProperties: false
  properties: {}
