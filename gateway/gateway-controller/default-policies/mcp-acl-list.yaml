name: mcp-acl-list
version: v1.0.2
description: |
  Control MCP tool, resource, and prompt access with allow/deny mode plus exceptions, apply the same rules to requests and list responses, and avoid rewriting capability names or entry fields.

parameters:
  type: object
  additionalProperties: false
  anyOf:
    - required:
        - tools
    - required:
        - resources
    - required:
        - prompts
  properties:
    tools:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: |
        ACL configuration for tools. Use mode and exceptions to allow or deny tools.
      properties:
        mode:
          type: string
          x-wso2-policy-advanced-param: false
          description: ACL mode for tools.
          enum:
            - allow
            - deny
          default: deny
        exceptions:
          type: array
          x-wso2-policy-advanced-param: false
          description: List of tool names that are exceptions to the mode.
          items:
            type: string
            description: Tool name to include as an exception.
            minLength: 1
            maxLength: 256
    resources:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: |
        ACL configuration for resources. Use mode and exceptions to allow or deny resources.
      properties:
        mode:
          type: string
          x-wso2-policy-advanced-param: false
          description: ACL mode for resources.
          enum:
            - allow
            - deny
          default: deny
        exceptions:
          type: array
          x-wso2-policy-advanced-param: false
          description: List of resource URIs that are exceptions to the mode.
          items:
            type: string
            description: Resource URI to include as an exception.
            minLength: 1
            maxLength: 2048
    prompts:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: |
        ACL configuration for prompts. Use mode and exceptions to allow or deny prompts.
      properties:
        mode:
          type: string
          x-wso2-policy-advanced-param: false
          description: ACL mode for prompts.
          enum:
            - allow
            - deny
          default: deny
        exceptions:
          type: array
          x-wso2-policy-advanced-param: false
          description: List of prompt names that are exceptions to the mode.
          items:
            type: string
            description: Prompt name to include as an exception.
            minLength: 1
            maxLength: 256

systemParameters:
  type: object
  additionalProperties: false
  properties: {}
