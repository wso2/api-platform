name: log-message
version: v0.2.1
description: |
  Log request and response payloads and headers for observability without changing traffic.

parameters:
  type: object
  additionalProperties: false
  properties:
    request:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: Log request data.
      properties:
        payload:
          type: boolean
          x-wso2-policy-advanced-param: false
          default: false
          description: Log request payload.
        headers:
          type: boolean
          x-wso2-policy-advanced-param: false
          default: false
          description: Log request headers.
        excludeHeaders:
          type: array
          x-wso2-policy-advanced-param: true
          description: Exclude request headers from logs.
          items:
            type: string
            minLength: 1
            maxLength: 256
          uniqueItems: true
          default: []
    response:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: Log response data.
      properties:
        payload:
          type: boolean
          x-wso2-policy-advanced-param: false
          default: false
          description: Log response payload.
        headers:
          type: boolean
          x-wso2-policy-advanced-param: false
          default: false
          description: Log response headers.
        excludeHeaders:
          type: array
          x-wso2-policy-advanced-param: true
          description: Exclude response headers from logs.
          items:
            type: string
            minLength: 1
            maxLength: 256
          uniqueItems: true
          default: []
  anyOf:
    - required: [ request ]
    - required: [ response ]

systemParameters:
  type: object
  properties: {}
