name: content-length-guardrail
version: v0.2.1
description: |
  Validate content byte lengths in request or response payloads using min/max limits.

parameters:
  type: object
  properties:
    request:
      type: object
      x-wso2-policy-advanced-param: false
      description: Configuration for request phase validation
      properties:
        enabled:
          type: boolean
          x-wso2-policy-advanced-param: false
          description: Enables validation for the request flow.
          default: true
        min:
          type: integer
          x-wso2-policy-advanced-param: false
          description: Minimum allowed byte length (inclusive)
          minimum: 0
        max:
          type: integer
          x-wso2-policy-advanced-param: false
          description: Maximum allowed byte length (inclusive)
          minimum: 1
        jsonPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: |
            Extract content with JSONPath before byte-length validation.
          default: "$.messages[-1].content"
        invert:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, validation passes when content length is NOT within the min-max range (inverted logic).
            If false (default), validation passes when content length is within the min-max range.
          default: false
        showAssessment:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, includes detailed assessment information in error responses.
            If false, returns minimal error information.
          default: false
      anyOf:
      - properties:
          enabled:
            const: false
        required:
        - enabled
      - required:
        - min
        - max
    response:
      type: object
      x-wso2-policy-advanced-param: false
      description: Configuration for response phase validation
      properties:
        enabled:
          type: boolean
          x-wso2-policy-advanced-param: false
          description: Enables validation for the response flow.
          default: false
        min:
          type: integer
          x-wso2-policy-advanced-param: false
          description: Minimum allowed byte length (inclusive)
          minimum: 0
        max:
          type: integer
          x-wso2-policy-advanced-param: false
          description: Maximum allowed byte length (inclusive)
          minimum: 1
        jsonPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: |
            Extract content with JSONPath before byte-length validation.
          default: "$.choices[0].message.content"
        invert:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, validation passes when content length is NOT within the min-max range (inverted logic).
            If false (default), validation passes when content length is within the min-max range.
          default: false
        showAssessment:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, includes detailed assessment information in error responses.
            If false, returns minimal error information.
          default: false
      anyOf:
      - properties:
          enabled:
            const: false
        required:
        - enabled
      - required:
        - min
        - max

systemParameters:         
  type: object
  properties: {}
