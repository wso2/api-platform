name: host-rewrite
version: v1.0.0
description: |
  Rewrite the Host header of incoming requests before forwarding to the upstream.

parameters:
  type: object
  properties:
    host:
      type: string
      x-wso2-policy-advanced-param: false
      description: The new Host header value to set for the request.
      minLength: 1
      maxLength: 255
      pattern: "^[a-zA-Z0-9.-]+$"
  required:
    - host
systemParameters:
  type: object
  additionalProperties: false
  properties: {}
