name: mcp-authz
version: v0.2.3
description: |
  Authorize MCP tools, resources, prompts, and methods using claim/scope rules after `mcp-auth`; evaluate rules by specificity, require all matching rules to pass, and allow access when no rule matches.

parameters:
  type: object
  additionalProperties: false
  required:
    - rules
  properties:
    rules:
      type: array
      x-wso2-policy-advanced-param: false
      description: Define authorization rules for MCP attributes by setting attribute type/name plus required claims and/or scopes; exact-name rules are evaluated before wildcards, and all matching rules must pass.
      items:
        type: object
        additionalProperties: false
        anyOf:
          - required:
              - requiredClaims
            properties:
              requiredClaims:
                minProperties: 1
          - required:
              - requiredScopes
            properties:
              requiredScopes:
                minItems: 1
        required:
          - attribute
        properties:
          attribute:
            type: object
            x-wso2-policy-advanced-param: false
            description: |
              MCP resource attribute to authorize access to. Specifies the attribute type and name.
            additionalProperties: false
            required:
              - type
            properties:
              type:
                type: string
                x-wso2-policy-advanced-param: false
                enum:
                  - tool
                  - resource
                  - prompt
                  - method
                description: "Select the MCP attribute type to authorize: `tool`, `resource`, `prompt`, or `method`."

              name:
                type: string
                x-wso2-policy-advanced-param: false
                description: Specify the attribute name to authorize, or `*` to match all names for the selected type.
                default: "*"
                minLength: 1
                maxLength: 256

          requiredClaims:
            type: object
            x-wso2-policy-advanced-param: false
            description: "Require JWT claims as `claimName: expectedValue`; all listed claims must exist and match exactly, and if scopes are also set, both claims and scopes must pass."
            default: {}
            additionalProperties:
              type: string

          requiredScopes:
            type: array
            x-wso2-policy-advanced-param: false
            description: Require OAuth scopes for this rule; every listed scope must exist in token `scope` or `scp`, and if claims are also set, both scopes and claims must pass.
            default: []
            items:
              type: string
              minLength: 1
              maxLength: 256
      minItems: 1
