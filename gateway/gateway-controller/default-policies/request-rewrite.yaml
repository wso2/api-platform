name: request-rewrite
version: v1.0.1
description: |
  Rewrite request paths, query parameters, and HTTP methods before forwarding upstream, with optional header and query match conditions to apply rewrites only when criteria are met.

parameters:
  type: object
  additionalProperties: false
  properties:
    match:
      type: object
      x-wso2-policy-advanced-param: true
      description: Run rewrites only when all configured header and query parameter matchers succeed.
      additionalProperties: false
      properties:
        headers:
          type: array
          x-wso2-policy-advanced-param: false
          description: List of header match conditions. Every condition must match for rewrites to run.
          minItems: 1
          items:
            type: object
            additionalProperties: false
            properties:
              name:
                type: string
                x-wso2-policy-advanced-param: false
                description: Header name to evaluate. Matching is case-insensitive.
                minLength: 1
              type:
                type: string
                x-wso2-policy-advanced-param: false
                description: "How to evaluate the header: Exact value, RE2 Regex, or only presence."
                enum:
                  - Exact
                  - Regex
                  - Present
              value:
                type: string
                x-wso2-policy-advanced-param: false
                description: Header value or regex pattern used when type is Exact or Regex.
                minLength: 1
                maxLength: 2048
            required:
              - name
              - type
            allOf:
              - if:
                  properties:
                    type:
                      enum: [Exact, Regex]
                  required: [type]
                then:
                  required: [value]
        queryParams:
          type: array
          x-wso2-policy-advanced-param: false
          description: List of query parameter match conditions. Every condition must match for rewrites to run.
          minItems: 1
          items:
            type: object
            additionalProperties: false
            properties:
              name:
                type: string
                x-wso2-policy-advanced-param: false
                description: Query parameter name to evaluate.
                minLength: 1
              type:
                type: string
                x-wso2-policy-advanced-param: false
                description: "How to evaluate the query parameter: Exact value, RE2 Regex, or only presence."
                enum:
                  - Exact
                  - Regex
                  - Present
              value:
                type: string
                x-wso2-policy-advanced-param: false
                description: Parameter value or regex pattern used when type is Exact or Regex.
                minLength: 1
                maxLength: 2048
            required:
              - name
              - type
            allOf:
              - if:
                  properties:
                    type:
                      enum: [Exact, Regex]
                  required: [type]
                then:
                  required: [value]
      minProperties: 1

    pathRewrite:
      type: object
      x-wso2-policy-advanced-param: false
      description: Path rewrite settings applied to the request relative path.
      additionalProperties: false
      properties:
        type:
          type: string
          x-wso2-policy-advanced-param: false
          description: "Path rewrite strategy: replace operation prefix, full path, or regex match."
          enum:
            - ReplacePrefixMatch
            - ReplaceFullPath
            - ReplaceRegexMatch
        replacePrefixMatch:
          type: string
          x-wso2-policy-advanced-param: false
          description: New path prefix used for ReplacePrefixMatch. The matched operation prefix is replaced and the rest is kept.
          minLength: 1
          maxLength: 2048
          pattern: "^/.*"
        replaceFullPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: Full relative path to forward when type is ReplaceFullPath.
          minLength: 1
          maxLength: 2048
          pattern: "^/.*"
        replaceRegexMatch:
          type: object
          x-wso2-policy-advanced-param: false
          description: Regex-based path rewrite settings used when type is ReplaceRegexMatch.
          additionalProperties: false
          properties:
            pattern:
              type: string
              x-wso2-policy-advanced-param: false
              description: RE2 regex pattern applied to the relative path.
              minLength: 1
              maxLength: 1024
            substitution:
              type: string
              x-wso2-policy-advanced-param: false
              description: Replacement string for regex matches. Use capture groups like \1.
              maxLength: 2048
          required:
            - pattern
            - substitution
      required:
        - type
      allOf:
        - if:
            properties:
              type:
                const: ReplacePrefixMatch
            required: [type]
          then:
            required: [replacePrefixMatch]
        - if:
            properties:
              type:
                const: ReplaceFullPath
            required: [type]
          then:
            required: [replaceFullPath]
        - if:
            properties:
              type:
                const: ReplaceRegexMatch
            required: [type]
          then:
            required: [replaceRegexMatch]

    queryRewrite:
      type: object
      x-wso2-policy-advanced-param: false
      description: Ordered rules that modify query parameters before the request is forwarded.
      additionalProperties: false
      properties:
        rules:
          type: array
          x-wso2-policy-advanced-param: false
          description: Ordered query rewrite rules. Each rule runs on the output produced by previous rules.
          minItems: 1
          items:
            type: object
            description: Single query rewrite rule.
            additionalProperties: false
            properties:
              action:
                type: string
                x-wso2-policy-advanced-param: false
                description: Operation to apply. Replace overwrites values, Remove deletes values, Add adds a value, Append concatenates text to each existing value, and ReplaceRegexMatch rewrites existing values using regex.
                enum:
                  - Replace
                  - Remove
                  - Add
                  - Append
                  - ReplaceRegexMatch
              name:
                type: string
                x-wso2-policy-advanced-param: false
                description: Query parameter name to modify.
                minLength: 1
              value:
                type: string
                x-wso2-policy-advanced-param: false
                description: Value used by Replace, Add, or Append. Replace sets this value, Add appends another value entry, and Append concatenates this text to current values.
                maxLength: 2048
              separator:
                type: string
                x-wso2-policy-advanced-param: false
                description: Text inserted between each existing value and value during Append. If empty, values are joined directly.
                default: ""
                maxLength: 64
              pattern:
                type: string
                x-wso2-policy-advanced-param: false
                description: RE2 regex pattern used by ReplaceRegexMatch to match text in each existing parameter value.
                minLength: 1
                maxLength: 1024
              substitution:
                type: string
                x-wso2-policy-advanced-param: false
                description: Replacement template used with pattern in ReplaceRegexMatch. Capture groups can be referenced as \1, \2, and so on.
                maxLength: 2048
            required:
              - action
              - name
            allOf:
              - if:
                  properties:
                    action:
                      enum: [Replace, Add, Append]
                  required: [action]
                then:
                  required: [value]
              - if:
                  properties:
                    action:
                      const: ReplaceRegexMatch
                  required: [action]
                then:
                  required: [pattern, substitution]
      required:
        - rules

    methodRewrite:
      type: string
      x-wso2-policy-advanced-param: false
      description: HTTP method to forward upstream after rewrite.
      enum:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - HEAD
        - OPTIONS

  anyOf:
    - required: [pathRewrite]
    - required: [queryRewrite]
    - required: [methodRewrite]

systemParameters:
  type: object
  additionalProperties: false
  properties: {}
