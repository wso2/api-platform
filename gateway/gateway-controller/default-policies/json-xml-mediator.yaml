name: json-xml-mediator
version: v0.8.0
description: |
  Mediates request and response payloads between downstream and upstream JSON/XML formats

parameters:
  type: object
  additionalProperties: false
  required: ["upstreamPayloadFormat", "downsteamPayloadFormat"]
  allOf:
    - not:
        required: ["upstreamPayloadFormat", "downsteamPayloadFormat"]
        properties:
          upstreamPayloadFormat:
            const: xml
          downsteamPayloadFormat:
            const: xml
    - not:
        required: ["upstreamPayloadFormat", "downsteamPayloadFormat"]
        properties:
          upstreamPayloadFormat:
            const: json
          downsteamPayloadFormat:
            const: json
  properties:
    downsteamPayloadFormat:
      type: string
      x-wso2-policy-advanced-param: false
      description: Defines the payload format expected by downstream clients. Requests are converted from this format before reaching upstream, and responses are converted back to this format before returning to the client. This value must differ from upstreamPayloadFormat.
      enum: ["xml", "json"]
    upstreamPayloadFormat:
      type: string
      x-wso2-policy-advanced-param: false
      description: Defines the payload format expected by the upstream service. Requests are converted to this format before reaching upstream, and responses are interpreted as arriving in this format before any downstream conversion is applied.
      enum: ["xml", "json"]

systemParameters:
  type: object
  additionalProperties: false
  properties: {}
