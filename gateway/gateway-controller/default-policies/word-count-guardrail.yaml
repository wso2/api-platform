name: word-count-guardrail
version: v0.2.1
description: |
  Validate word counts in request or response content using min/max limits, optional JSONPath extraction, and optional inverted logic.

parameters:
  type: object
  additionalProperties: false
  properties:
    request:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: Configuration for request phase validation
      properties:
        enabled:
          type: boolean
          x-wso2-policy-advanced-param: false
          description: Enables validation for the request flow.
          default: true
        min:
          type: integer
          x-wso2-policy-advanced-param: false
          description: Minimum allowed word count (inclusive)
          minimum: 0
        max:
          type: integer
          x-wso2-policy-advanced-param: false
          description: Maximum allowed word count (inclusive)
          minimum: 1
        jsonPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: |
            JSONPath expression to extract a specific value from JSON payload.
            If empty, validates the entire payload as a string.
            Examples: "$.messages", "$.data.content", "$.items[0].text"
          default: "$.messages[-1].content"
        invert:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, validation passes when word count is NOT within the min-max range (inverted logic).
            If false (default), validation passes when word count is within the min-max range.
          default: false
        showAssessment:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, includes detailed assessment information in error responses.
            If false, returns minimal error information.
          default: false
      anyOf:
      - properties:
          enabled:
            const: false
        required:
        - enabled
      - required:
        - min
        - max
    response:
      type: object
      x-wso2-policy-advanced-param: false
      additionalProperties: false
      description: Configuration for response phase validation
      properties:
        enabled:
          type: boolean
          x-wso2-policy-advanced-param: false
          description: Enables validation for the response flow.
          default: false
        min:
          type: integer
          x-wso2-policy-advanced-param: false
          description: Minimum allowed word count (inclusive)
          minimum: 0
        max:
          type: integer
          x-wso2-policy-advanced-param: false
          description: Maximum allowed word count (inclusive)
          minimum: 1
        jsonPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: |
            JSONPath expression to extract a specific value from JSON payload.
            If empty, validates the entire payload as a string.
            Examples: "$.messages", "$.data.content", "$.items[0].text"
          default: "$.choices[0].message.content"
        invert:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, validation passes when word count is NOT within the min-max range (inverted logic).
            If false (default), validation passes when word count is within the min-max range.
          default: false
        showAssessment:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, includes detailed assessment information in error responses.
            If false, returns minimal error information.
          default: false
      anyOf:
      - properties:
          enabled:
            const: false
        required:
        - enabled
      - required:
        - min
        - max
  anyOf:
    - required: [ request ]
    - required: [ response ]

systemParameters:
  type: object
  additionalProperties: false
  properties: {}
