name: mcp-rewrite
version: v1.0.1
description: |
  Rewrite MCP tool, resource, and prompt names between client-facing and backend values, and optionally filter list responses to configured entries (omit to allow all, set `[]` to deny all).

parameters:
  type: object
  additionalProperties: false
  properties:
    tools:
      type: array
      x-wso2-policy-advanced-param: false
      description: |
        List of tools to rewrite. When provided, only these tools are included
        in tools/list responses and unlisted tools/call requests are rejected.
        Omit this field to allow all tools. Set [] to deny all tools.
        Each entry must include "name" and may include "target" plus any
        additional fields to be returned in tools/list.
      items:
        type: object
        additionalProperties: true
        required:
          - name
          - description
          - inputSchema
        properties:
          name:
            type: string
            x-wso2-policy-advanced-param: false
            description: User-facing tool name exposed to clients.
            minLength: 1
            maxLength: 256
          description:
            type: string
            x-wso2-policy-advanced-param: false
            description: User-facing tool description returned in tools/list.
            minLength: 1
          inputSchema:
            type: string
            x-wso2-policy-advanced-param: false
            description: Tool input schema returned in tools/list.
            minLength: 1
          outputSchema:
            type: string
            x-wso2-policy-advanced-param: true
            description: Tool output schema returned in tools/list.
            minLength: 1
          target:
            type: string
            x-wso2-policy-advanced-param: true
            description: Backend tool name to use when forwarding requests.
            minLength: 1
            maxLength: 256
    resources:
      type: array
      x-wso2-policy-advanced-param: false
      description: |
        List of resources to rewrite. When provided, only these resources are
        included in resources/list responses and unlisted resources/read requests
        are rejected. Omit this field to allow all resources. Set [] to deny all
        resources. Each entry must include "name" and may include "target" plus
        any additional fields to be returned in resources/list.
      items:
        type: object
        additionalProperties: true
        required:
          - name
          - uri
        properties:
          name:
            type: string
            x-wso2-policy-advanced-param: false
            description: User-facing resource identifier (URI) exposed to clients.
            minLength: 1
            maxLength: 1024
          description:
            type: string
            x-wso2-policy-advanced-param: false
            description: User-facing resource description returned in resources/list.
            minLength: 1
          uri:
            type: string
            x-wso2-policy-advanced-param: false
            description: User-facing resource URI returned in resources/list.
            minLength: 1
            maxLength: 2048
          target:
            type: string
            x-wso2-policy-advanced-param: true
            description: Backend resource identifier (URI) to use when forwarding requests.
            minLength: 1
            maxLength: 1024
    prompts:
      type: array
      x-wso2-policy-advanced-param: false
      description: |
        List of prompts to rewrite. When provided, only these prompts are
        included in prompts/list responses and unlisted prompts/get requests
        are rejected. Omit this field to allow all prompts. Set [] to deny all
        prompts. Each entry must include "name" and may include "target" plus
        any additional fields to be returned in prompts/list.
      items:
        type: object
        additionalProperties: true
        required:
          - name
        properties:
          name:
            type: string
            x-wso2-policy-advanced-param: false
            description: User-facing prompt name exposed to clients.
            minLength: 1
            maxLength: 256
          description:
            type: string
            x-wso2-policy-advanced-param: false
            description: User-facing prompt description returned in prompts/list.
            minLength: 1
          target:
            type: string
            x-wso2-policy-advanced-param: true
            description: Backend prompt name to use when forwarding requests.
            minLength: 1
            maxLength: 256
  anyOf:
    - required: [tools]
    - required: [resources]
    - required: [prompts]

systemParameters:
  type: object
  properties: {}
