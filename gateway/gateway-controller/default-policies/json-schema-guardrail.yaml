name: json-schema-guardrail
version: v1.0.1
description: |
  Validate request or response content against a JSON Schema.

parameters:
  type: object
  properties:
    request:
      type: object
      description: Configuration for request phase validation.
      properties:
        enabled:
          type: boolean
          x-wso2-policy-advanced-param: false
          description: Enables validation for the request flow.
          default: false
        schema:
          type: string
          description: Provide the JSON Schema as a valid JSON string for validating the extracted or full payload.
        jsonPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: |
            Extract JSON with JSONPath before schema validation.
          default: "$.messages[-1].content"
        invert:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, validation passes when schema validation FAILS (inverted logic).
            If false (default), validation passes when schema validation succeeds.
          default: false
        showAssessment:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, includes detailed validation error information in error responses.
            If false, returns minimal error information.
          default: false
      anyOf:
      - properties:
          enabled:
            const: false
        required:
        - enabled
      - required:
        - schema
    response:
      type: object
      description: Configuration for response phase validation
      properties:
        enabled:
          type: boolean
          x-wso2-policy-advanced-param: false
          description: Enables validation for the response flow.
          default: true
        schema:
          type: string
          description: Provide the JSON Schema as a valid JSON string for validating the extracted or full payload.
        jsonPath:
          type: string
          x-wso2-policy-advanced-param: false
          description: |
            Extract JSON with JSONPath before schema validation.
          default: "$.choices[0].message.content"
        invert:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, validation passes when schema validation FAILS (inverted logic).
            If false (default), validation passes when schema validation succeeds.
          default: false
        showAssessment:
          type: boolean
          x-wso2-policy-advanced-param: true
          description: |
            If true, includes detailed validation error information in error responses.
            If false, returns minimal error information.
          default: false
      anyOf:
      - properties:
          enabled:
            const: false
        required:
        - enabled
      - required:
        - schema

systemParameters:         
  type: object
  properties: {}
