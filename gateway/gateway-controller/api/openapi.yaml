          application/json:
            schema:
              $ref: '#/components/schemas/LLMProxyConfiguration'
      responses:
        '201':
          description: LLM proxy created and deployed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMProxyCreateResponse'
        '400':
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - Proxy with same name and version already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: List all LLM proxies
      description: Retrieve a list of all LLM proxies
      operationId: listLLMProxies
      tags:
        - LLM Provider Management
      parameters:
        - name: displayName
          in: query
          required: false
          description: Filter by LLM proxy displayName
          schema:
            type: string
          example: OpenAI Provider
        - name: version
          in: query
          required: false
          description: Filter by LLM proxy version
          schema:
            type: string
          example: v1.0
        - name: context
          in: query
          required: false
          description: Filter by LLM proxy context/path
          schema:
            type: string
          example: /openai
        - name: status
          in: query
          required: false
          description: Filter by deployment status
          schema:
            type: string
            enum: [ pending, deployed, failed ]
          example: pending
        - name: vhost
          in: query
          required: false
          description: Filter by LLM proxy vhost
          schema:
            type: string
          example: api.openai.com
      responses:
        '200':
          description: List of LLM proxies
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  count:
                    type: integer
                    example: 2
                  proxies:
                    type: array
                    items:
                      $ref: '#/components/schemas/LLMProxyListItem'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /llm-proxies/{id}:
    get:
      summary: Get LLM proxy by unique identifier
      description: Retrieve the complete configuration for a specific LLM proxy
      operationId: getLLMProxyById
      tags:
        - LLM Provider Management
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the LLM proxy
          schema:
            type: string
          example: wso2-docs-assistant
      responses:
        '200':
          description: LLM proxy details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMProxyDetailResponse'
            application/yaml:
              schema:
                $ref: '#/components/schemas/LLMProxyDetailResponse'
        '404':
          description: LLM proxy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update an existing LLM proxy
      description: Update the configuration of an existing LLM proxy
      operationId: updateLLMProxy
      tags:
        - LLM Provider Management
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the LLM proxy
          schema:
            type: string
          example: wso2-docs-assistant
      requestBody:
        required: true
        description: Updated LLM proxy
        content:
          application/yaml:
            schema:
              $ref: '#/components/schemas/LLMProxyConfiguration'
          application/json:
            schema:
              $ref: '#/components/schemas/LLMProxyConfiguration'
      responses:
        '200':
          description: LLM proxy updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMProxyUpdateResponse'
        '400':
          description: Invalid configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: LLM proxy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete an LLM proxy
      description: Remove an LLM proxy from the Gateway Controller
      operationId: deleteLLMProxy
      tags:
        - LLM Provider Management
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the LLM proxy
          schema:
            type: string
          example: wso2-docs-assistant
      responses:
        '200':
          description: LLM proxy deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: LLM proxy deleted successfully
                  id:
                    type: string
                    example: wso2-docs-assistant
        '404':
          description: LLM proxy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    RestAPI:
      type: object
      required:
        - apiVersion
        - metadata
        - kind
        - spec
      properties:
        apiVersion:
          type: string
          description: API specification version
          example: gateway.api-platform.wso2.com/v1alpha1
          enum:
            - gateway.api-platform.wso2.com/v1alpha1
        kind:
          type: string
          description: API type
          example: RestApi
          enum:
            - RestApi
        metadata:
          $ref: "#/components/schemas/Metadata"
        spec:
          $ref: '#/components/schemas/APIConfigData'

    WebSubAPI:
      type: object
      required:
        - apiVersion
        - metadata
        - kind
        - spec
      properties:
        apiVersion:
          type: string
          description: API specification version
          example: gateway.api-platform.wso2.com/v1alpha1
          enum:
            - gateway.api-platform.wso2.com/v1alpha1
        kind:
          type: string
          description: API type
          example: WebSubApi
          enum:
            - WebSubApi
        metadata:
          $ref: "#/components/schemas/Metadata"
        spec:
          $ref: '#/components/schemas/WebhookAPIData'

    Metadata:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Unique handle for the resource
          example: weather-api-v1.0
        labels:
          type: object
          description: Labels are key-value pairs for organizing and selecting APIs. Keys must not contain spaces.
          additionalProperties:
            type: string
          example:
            environment: production
            team: backend
            version: v1

    APIConfigData:
      type: object
      required:
        - displayName
        - version
        - context
        - upstream
        - operations
        # - kind
      properties:
        displayName:
          type: string
          description: Human-readable API name (must be URL-friendly - only letters, numbers, spaces, hyphens, underscores, and dots allowed)
          minLength: 1
          maxLength: 100
          pattern: '^[a-zA-Z0-9\-_\. ]+$'
          example: weather-api
        # kind:
        #   type: string
        #   description: API type
        #   example: RestApi
        #   enum:
        #     - RestApi
        version:
          type: string
          description: Semantic version of the API
          pattern: '^v\d+\.\d+$'
          example: v1.0
        context:
          type: string
          description: Base path for all API routes (must start with /, no trailing slash)
          pattern: '^\/[a-zA-Z0-9_\-\/]*[^\/]$'
          minLength: 1
          maxLength: 200
          example: /weather
        upstreamDefinitions:
          type: array
          description: List of reusable upstream definitions with optional timeout configurations
          items:
            $ref: "#/components/schemas/UpstreamDefinition"
        upstream:
          type: object
          required:
            - main
          description: API-level upstream configuration
          properties:
            main:
              $ref: "#/components/schemas/Upstream"
            sandbox:
              $ref: "#/components/schemas/Upstream"
        vhosts:
          type: object
          required:
            - main
          description: Custom virtual hosts/domains for the API
          properties:
            main:
              type: string
              description: Custom virtual host/domain for production traffic
              pattern: '^[a-zA-Z0-9\.\-]+$'
              example: api.example.com
            sandbox:
              type: string
              description: Custom virtual host/domain for sandbox traffic
              pattern: '^[a-zA-Z0-9\.\-]+$'
              example: sandbox-api.example.com
        subscriptionPlans:
          type: array
          description: List of subscription plan names available for this API
          items:
            type: string
          example: ["Gold", "Silver"]
        policies:
          type: array
          description: List of API-level policies applied to all operations unless overridden
          items:
            $ref: "#/components/schemas/Policy"
        operations:
          type: array
          description: List of HTTP operations/routes
          minItems: 1
          items:
            $ref: "#/components/schemas/Operation"

    UpstreamDefinition:
      type: object
      required:
        - name
        - upstreams
      description: Reusable upstream configuration with optional timeout and load balancing settings
      properties:
        name:
          type: string
          description: Unique identifier for this upstream definition
          minLength: 1
          maxLength: 100
          pattern: '^[a-zA-Z0-9\-_]+$'
          example: my-upstream-1
        basePath:
          type: string
          description: Base path prefix for all endpoints in this upstream (e.g., /api/v2). All requests to this upstream will have this path prepended.
          example: /api/v2
        timeout:
          $ref: "#/components/schemas/UpstreamTimeout"
        upstreams:
          type: array
          description: List of backend targets with optional weights for load balancing
          minItems: 1
          items:
            type: object
            required:
              - url
            properties:
              url:
                type: string
                format: uri
                description: Backend URL (host and port only, path comes from basePath)
                example: http://prod-backend-1:5000
              weight:
                type: integer
                description: Weight for load balancing (optional, default 100)
                minimum: 0
                maximum: 100
                example: 80

    UpstreamTimeout:
      type: object
      description: Timeout configuration for upstream requests
      properties:
        connect:
          type: string
          description: Connection timeout duration (e.g., "5s", "500ms")
          pattern: '^\d+(\.\d+)?(ms|s|m|h)$'
          example: 5s

    Upstream:
      type: object
      oneOf:
        - required: [ "url" ]
        - required: [ "ref" ]
      description: Upstream backend configuration (single target or reference)
      properties:
        url:
          type: string
          format: uri
          description: Direct backend URL to route traffic to
          example: http://prod-backend:5000/api/v2
        ref:
          type: string
          description: Reference to a predefined upstreamDefinition
        hostRewrite:
          type: string
          enum:
            - auto
            - manual
          default: auto
          description: >
            Controls how the Host header is handled when routing to the upstream.
            `auto` delegates host rewriting to Envoy, which rewrites the Host header
            using the upstream cluster host. `manual` disables automatic rewriting
            and expects explicit configuration.

    Operation:
      type: object
      required:
        - method
        - path
      properties:
        method:
          type: string
          description: HTTP method
          enum:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - HEAD
            - OPTIONS
          example: GET
        path:
          type: string
          description: Route path with optional {param} placeholders
          pattern: '^\/.*$'
          example: /{country_code}/{city}
        policies:
          type: array
          description: List of policies applied only to this operation (overrides or adds to API-level policies)
          items:
            $ref: "#/components/schemas/Policy"

    Policy:
      type: object
      required:
        - name
        - version
      properties:
        name:
          type: string
          description: Name of the policy
          example: apiKeyValidation
        version:
          type: string
          description: >
            Version of the policy. Only major-only version is allowed (e.g., v0, v1).
            Full semantic version (e.g., v1.0.0) is not accepted and will be rejected.
            The Gateway Controller resolves the major version to the single matching
            full version installed in the gateway image.
          pattern: '^v\d+$'
          example: v1
        executionCondition:
          type: string
          description: Expression controlling conditional execution of the policy
          example: "request.metadata[authenticated] != true"
        params:
          type: object
          description: Arbitrary parameters for the policy (free-form key/value structure)
          additionalProperties: true
    # Reusable policy definition (catalog entry)
    PolicyDefinition:
      type: object
      required:
        - name
        - version
        - flows
      properties:
        name:
          type: string
          description: Unique policy name
          minLength: 1
          maxLength: 200
          example: APIKeyValidation
        version:
          type: string
          description: Semantic version of the policy definition
          pattern: '^v\d+\.\d+\.\d+$'
          example: v1.0.0
        description:
          type: string
          description: Human readable description of the policy's purpose
          maxLength: 2000
        parameters:
          type: object
          description: JSON Schema describing the parameters accepted by this policy. This itself is a JSON Schema document.
          additionalProperties: true
        systemParameters:
          type: object
          description: JSON Schema describing any initialization parameters for this policy. This itself is a JSON Schema document.
          additionalProperties: true

    PolicyListResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        count:
          type: integer
          example: 2
        policies:
          type: array
          items:
            $ref: "#/components/schemas/PolicyDefinition"


    # -----------------------
    # Webhook (Async) API schema
    # -----------------------
    WebhookAPIData:
      type: object
      required:
        - displayName
        - version
        - context
        - channels
      properties:
        displayName:
          type: string
          description: Human-readable API name (must be URL-friendly - only letters, numbers, spaces, hyphens, underscores, and dots allowed)
          minLength: 1
          maxLength: 100
          pattern: '^[a-zA-Z0-9\-_\. ]+$'
          example: weather-api
        version:
          type: string
          description: Semantic version of the API
          pattern: '^v\d+\.\d+$'
          example: v1.0
        context:
          type: string
          description: Base path for all API routes (must start with /, no trailing slash)
          pattern: '^\/[a-zA-Z0-9_\-\/]*[^\/]$'
          minLength: 1
          maxLength: 200
          example: /weather
        vhosts:
          type: object
          required:
            - main
          description: Custom virtual hosts/domains for the API
          properties:
            main:
              type: string
              description: Custom virtual host/domain for production traffic
              pattern: '^[a-zA-Z0-9\.\-]+$'
              example: api.example.com
            sandbox:
              type: string
              description: Custom virtual host/domain for sandbox traffic
              pattern: '^[a-zA-Z0-9\.\-]+$'
              example: sandbox-api.example.com
        channels:
          type: array
          description: List of channels - Async operations(SUB) for WebSub APIs
          minItems: 1
          items:
            $ref: '#/components/schemas/Channel'
        policies:
          type: array
          description: List of API-level policies applied to all operations unless overridden
          items:
            $ref: '#/components/schemas/Policy'

    # AsyncAPI-inspired server definition used when kind is async/* or http/websub.
    # Simplified mapping of AsyncAPI 2.x Server Object into OpenAPI.
    Server:
      type: object
      description: Server definition for async or WebSub APIs.
      required:
        - url
        - protocol
      properties:
        url:
          type: string
          format: uri
          description: Base URL or connection string for the server (variables may be denoted by {name}).
          example: https://websub-hub.internal:9098
        protocol:
          type: string
          description: Transport protocol used by the server.
          enum:
            - websub
            - websocket
            - sse
            - mqtt
            - kafka
          example: websub
        protocolVersion:
          type: string
          description: Version of the selected protocol (if applicable).
          example: '1.0'
        description:
          type: string
          description: Human-readable description of this server.
          example: Internal WebSub Hub instance.
        variables:
          type: object
          description: Templated variables contained in the server URL.
          additionalProperties:
            type: object
            required:
              - default
            properties:
              enum:
                type: array
                items:
                  type: string
                description: Allowed values.
              default:
                type: string
                description: Default value for the variable.
              description:
                type: string
                description: Description of the variable.
        security:
          type: array
          description: Security requirements for this server (each item maps scheme name to optional scopes array).
          items:
            type: object
            additionalProperties:
              type: array
              items:
                type: string
        bindings:
          type: object
          description: Protocol-specific server bindings (arbitrary key/value structure).
          additionalProperties: true

    # Simplified AsyncAPI Channel object represented as an OpenAPI schema.
    Channel:
      type: object
      description: Channel (topic/event stream) definition for async APIs.
      required:
        - name
        - method
      properties:
        name:
          type: string
          description: Channel name or topic identifier relative to API context.
          example: issues
        method:
          type: string
          description: Operation method type.
          enum:
            - SUB
        policies:
          type: array
          description: List of policies applied only to this channel (overrides or adds to API-level policies)
          items:
            $ref: "#/components/schemas/Policy"
        # subscribe:
        #   type: object
        #   description: Consumer (receive) operation definition.
        #   properties:
        #     summary:
        #       type: string
        #       example: Receive issue events.
        #     policies:
        #       type: array
        #       description: List of policies applied only to this operation (overrides or adds to API-level policies)
        #       items:
        #         $ref: "#/components/schemas/Policy"
        #     message:
        #       $ref: '#/components/schemas/ChannelMessage'
        # publish:
        #   type: object
        #   description: Producer (send) operation definition.
        #   properties:
        #     summary:
        #       type: string
        #       example: Publish issue events.
        #     policies:
        #       type: array
        #       description: List of policies applied only to this operation (overrides or adds to API-level policies)
        #       items:
        #         $ref: "#/components/schemas/Policy"
        #     message:
        #       $ref: '#/components/schemas/ChannelMessage'
        # parameters:
        #   type: object
        #   description: Path/channel parameters (keyed by parameter name).
        #   additionalProperties:
        #     type: object
        #     properties:
        #       description:
        #         type: string
        #       schema:
        #         type: object
        #         description: JSON Schema fragment for the parameter value.
        #         additionalProperties: true
        # bindings:
        #   type: object
        #   description: Protocol-specific channel bindings (arbitrary key/value structure).
        #   additionalProperties: true

    # Message schema used within Channel publish/subscribe operations.
    ChannelMessage:
      type: object
      description: Event/message definition transported over a channel.
      required:
        - name
        - payload
      properties:
        name:
          type: string
          description: Logical message name.
          example: IssueEvent
        contentType:
          type: string
          description: Content type of the payload.
          example: application/json
        summary:
          type: string
          description: Short description of the message.
          example: Event emitted when an issue is created.
        payload:
          type: object
          description: JSON Schema representation of the message body.
          additionalProperties: true
          example:
            type: object
            properties:
              action:
                type: string
              issue:
                type: object

    RestAPICreateResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: RestAPI created successfully
        id:
          type: string
          description: Unique id for the created RestAPI
          example: weather-api-v1.0
        createdAt:
          type: string
          format: date-time
          example: 2025-10-11T10:30:00Z
    RestAPIUpdateResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: RestAPI updated successfully
        id:
          type: string
          example: weather-api-v1.0
        updatedAt:
          type: string
          format: date-time
          example: 2025-10-11T11:45:00Z

    WebSubAPICreateResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: WebSubAPI created successfully
        id:
          type: string
          description: Unique id for the created WebSubAPI
          example: weather-websub-api
        createdAt:
          type: string
          format: date-time
          example: 2025-10-11T10:30:00Z
    WebSubAPIUpdateResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: WebSubAPI updated successfully
        id:
          type: string
          example: weather-websub-api
        updatedAt:
          type: string
          format: date-time
          example: 2025-10-11T11:45:00Z

    APIKeyCreationRequest:
      type: object
      properties:
        name:
          type: string
          description: Identifier of the API key. If not provided, a default identifier will be generated
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          minLength: 3
          maxLength: 63
          example: my-production-key
        apiKey:
          type: string
          minLength: 36
          description: |
            Optional plain-text API key value for external key injection.
            If provided, this key will be used instead of generating a new one.
            The key will be hashed before storage. The key can be in any format
            (minimum 36 characters). Use this for injecting externally generated
            API keys.
          example: "cloud-apim-key-abc123xyz789"
        maskedApiKey:
          type: string
          description: |
            Masked version of the API key for display purposes.
            Provided by the platform API when injecting pre-hashed keys.
          example: "apip_****xyz789"
        expiresIn:
          type: object
          description: Expiration duration for the API key
          properties:
            unit:
              type: string
              description: Time unit for expiration
              enum:
                - seconds
                - minutes
                - hours
                - days
                - weeks
                - months
              example: days
            duration:
              type: integer
              description: Duration value for expiration
              example: 30
          required:
            - unit
            - duration
        expiresAt:
          type: string
          format: date-time
          description: Expiration timestamp. If both expiresIn and expiresAt are provided, expiresAt takes precedence.
          example: "2026-12-08T10:30:00Z"
        externalRefId:
          type: string
          description: |
            External reference ID for the API key.
            This field is optional and used for tracing purposes only.
            The gateway generates its own internal ID for tracking.
          example: "cloud-apim-key-98765"
        issuer:
          type: string
          description: |
            Identifies the portal that created this key. If provided, only api keys generated from
            the same portal will be accepted. If not provided, there is no portal restriction.
          example: "api-platform-devportal"
    APIKeyCreationResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: API key generated successfully
        remainingApiKeyQuota:
          type: integer
          description: Remaining API key quota for the user
          example: 9
        apiKey:
          $ref: '#/components/schemas/APIKey'
      required:
        - status
        - message
    APIKey:
      type: object
      description: Details of an API key
      properties:
        name:
          type: string
          description: URL-safe identifier for the API key (auto-generated from displayName, immutable, used as path parameter)
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          minLength: 3
          maxLength: 63
          example: my-production-key
        displayName:
          type: string
          description: Human-readable name for the API key (user-provided, mutable)
          minLength: 1
          maxLength: 100
          example: My Production Key
        apiKey:
          type: string
          description: Generated API key with apip_ prefix
          example: "apip_1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"
        apiId:
          type: string
          description: Unique public identifier of the API that the key is associated with
          example: weather-api-v1.0
        status:
          type: string
          description: Status of the API key
          enum:
            - active
            - revoked
            - expired
          example: active
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the API key was generated
          example: "2025-12-08T10:30:00Z"
        createdBy:
          type: string
          description: Identifier of the user who generated the API key
          example: api_consumer
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Expiration timestamp (null if no expiration)
          example: "2025-12-08T10:30:00Z"
        source:
          type: string
          description: Source of the API key (local or external)
          enum:
            - local
            - external
          example: local
