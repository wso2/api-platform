  /mcp-proxies:
    post:
      summary: Create a new MCPProxy
      description: |
        Submit a new MCPProxy to the Gateway Controller. The configuration
        is validated, persisted, and translated to Envoy xDS resources. The Router
        begins routing traffic for the MCP Proxy within 5 seconds.
      operationId: createMCPProxy
      tags:
        - MCP Proxy Management
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/MCPProxyConfiguration"
          application/json:
            schema:
              $ref: "#/components/schemas/MCPProxyConfiguration"
      responses:
        "201":
          description: MCPProxy created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPProxyCreateResponse"
        "400":
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - MCP Proxy with same name and version already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: List all MCPProxies
      description: |
        Retrieve a list of all deployed MCPProxies with metadata.
        Returns basic information about each MCP Proxy (name, version, context, deployment time).
      operationId: listMCPProxies
      tags:
        - MCP Proxy Management
      parameters:
        - name: displayName
          in: query
          required: false
          description: Filter by MCP proxy display name
          schema:
            type: string
          example: My MCP Proxy
        - name: version
          in: query
          required: false
          description: Filter by MCP proxy version
          schema:
            type: string
          example: v1.0
        - name: context
          in: query
          required: false
          description: Filter by MCP proxy context/path
          schema:
            type: string
          example: /everything
        - name: status
          in: query
          required: false
          description: Filter by deployment status
          schema:
            type: string
            enum: [ pending, deployed, failed ]
          example: pending
      responses:
        "200":
          description: List of MCPProxies
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  count:
                    type: integer
                    example: 5
                  mcpProxies:
                    type: array
                    items:
                      $ref: "#/components/schemas/MCPProxyListItem"
