openapi: 3.0.3
info:
  title: Gateway Controller API
  description: |
    REST API for managing API configurations in the WSO2 API Platform Gateway.

    The Gateway Controller accepts API configurations in YAML or JSON format and dynamically
    configures the Router (Envoy Proxy) via xDS protocol. Supports full CRUD lifecycle
    for API configurations with real-time updates to the Router.

    **Key Features:**
    - Submit API configurations in YAML or JSON
    - Real-time validation and error reporting
    - Zero-downtime configuration updates
    - Persistent storage with SQLite
    - Query deployed API configurations
  version: 1.0.0
  contact:
    name: WSO2 API Platform Team
servers:
  - url: http://localhost:9090
    description: Local development
  - url: http://gateway-controller:9090
    description: Docker/Kubernetes deployment

paths:
  /rest-apis:
    post:
      summary: Create a new RestAPI
      description: |
        Submit a new RestAPI to the Gateway Controller. The configuration
        is validated, persisted, and translated to Envoy xDS resources. The Router
        begins routing traffic for the API within 5 seconds.

        **Validation Rules:**
        - API name + version combination must be unique
        - Context must start with `/` and not end with `/`
        - At least one upstream and one operation required
        - For same API name, context must be consistent across versions
      operationId: createRestAPI
      tags:
        - API Management
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/RestAPI"
          application/json:
            schema:
              $ref: "#/components/schemas/RestAPI"
            example:
              version: gateway.api-platform.wso2.com/v1alpha1
              kind: RestApi
              spec:
                name: PetStore API
                version: v1.0
                context: /petstore
                upstreams:
                  - url: http://petstore.swagger.io/v2
                policies:
                  - name: apiKeyValidation
                    version: v1
                    executionCondition: "request.metadata[authenticated] != true"
                    params:
                      header: X-API-Key
                      mandatory: true
                  - name: setHeaders
                    version: v1
                    params:
                      requestHeaders:
                        - X-Request-Source: WSO2 API Manager
                      responseHeaders:
                        - X-Response-Source: WSO2 API Manager
                operations:
                  - method: GET
                    path: /pet/{petId}
                    policies:
                      - name: apiKeyValidation
                        version: v1
                        executionCondition: "request.metadata[authenticated] != true"
                        params:
                          header: X-API-Key
                          mandatory: true
                  - method: POST
                    path: /pet
                  - method: PUT
                    path: /pet
                  - method: DELETE
                    path: /pet/{petId}
                  - method: GET
                    path: /store/inventory
                  - method: POST
                    path: /store/order
      responses:
        "201":
          description: RestAPI created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestAPICreateResponse"
        "400":
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - API with same name and version already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: List all RestAPIs
      description: |
        Retrieve a list of all deployed RestAPIs with metadata.
        Returns basic information about each API (name, version, context, deployment time).
      operationId: listRestAPIs
      tags:
        - API Management
      parameters:
        - name: displayName
          in: query
          required: false
          description: Filter by API display name
          schema:
            type: string
          example: Weather API
        - name: version
          in: query
          required: false
          description: Filter by API version
          schema:
            type: string
          example: v1.0
        - name: context
          in: query
          required: false
          description: Filter by API context/path
          schema:
            type: string
          example: /weather
        - name: status
          in: query
          required: false
          description: Filter by deployment status
          schema:
            type: string
            enum: [ pending, deployed, failed ]
          example: pending
      responses:
        "200":
          description: List of RestAPIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  count:
                    type: integer
                    example: 5
                  apis:
                    type: array
                    items:
                      $ref: "#/components/schemas/RestAPIListItem"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rest-apis/{id}:
    get:
      summary: Get RestAPI by id
      description: |
        Retrieve the complete configuration for a specific RestAPI by its id.
        The id is a unique string identifier (not a UUID).
      operationId: getRestAPIById
      tags:
        - API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier for the API.
          schema:
            type: string
          example: weather-api-v1.0
      responses:
        "200":
          description: RestAPI details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestAPIDetailResponse"
            application/yaml:
              schema:
                $ref: "#/components/schemas/RestAPIDetailResponse"
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Update an existing RestAPI
      description: |
        Update an existing RestAPI. The update is validated and applied atomically.
        The Router receives the updated configuration within 5 seconds. In-flight requests
        complete with the old configuration; new requests use the updated configuration.

        **Important:** If validation fails, the existing configuration remains active.
      operationId: updateRestAPI
      tags:
        - API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API to update.
          schema:
            type: string
          example: weather-api-v1.0
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/RestAPI"
          application/json:
            schema:
              $ref: "#/components/schemas/RestAPI"
      responses:
        "200":
          description: RestAPI updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestAPIUpdateResponse"
        "400":
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Delete a RestAPI
      description: |
        Remove a RestAPI from the Gateway Controller. The Router stops
        accepting traffic for this API within 5 seconds. In-flight requests complete
        successfully; new requests receive 404 Not Found.
      operationId: deleteRestAPI
      tags:
        - API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API to delete.
          schema:
            type: string
          example: weather-api-v1.0
      responses:
        "200":
          description: RestAPI deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: RestAPI deleted successfully
                  id:
                    type: string
                    example: weather-api-v1.0
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rest-apis/{id}/api-keys:
    post:
      summary: Create a new API key for an API
      description: |
        Generates a new API key for the specified API.
        Use the created key to authenticate client requests when the API Key validation policy is enabled.
        The generated key is a 32-byte random value, encoded in hexadecimal, and prefixed with apip_.
        If you are using an external API key, you may provide it directly without modification.
      operationId: createAPIKey
      tags:
        - API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API to generate the key for
          schema:
            type: string
          example: weather-api-v1.0
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/APIKeyCreationRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/APIKeyCreationRequest"
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreationResponse"
        "400":
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: Get the list of API keys for an API
      description: |
        Retrieve all active API keys for the specified API created by the user. If the user is an admin, retrieves all
        active API keys for the API.
      operationId: listAPIKeys
      tags:
        - API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API to retrieve the keys for
          schema:
            type: string
          example: weather-api-v1.0
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyListResponse"
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rest-apis/{id}/api-keys/{apiKeyName}/regenerate:
    post:
      summary: Regenerate API key for an API
      description: |
        Regenerate the given API key for the specified API. The newly generated key can be
        used by clients to authenticate requests to the API if API Key validation
        policy is applied. The key is a 32-byte random value encoded in hexadecimal
        and prefixed with "apip_".
      operationId: regenerateAPIKey
      tags:
        - API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API to generate the key for
          schema:
            type: string
          example: weather-api-v1.0
        - name: apiKeyName
          in: path
          required: true
          description: |
            Name of the API key to regenerate
          schema:
            type: string
          example: weather-api-key
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/APIKeyRegenerationRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/APIKeyRegenerationRequest"
      responses:
        '200':
          description: API key rotated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreationResponse"
        "400":
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rest-apis/{id}/api-keys/{apiKeyName}:
    put:
      summary: Update an API key with a new regenerated value
      description: |
        Update an existing API key with a new regenerated value. This allows
        rotating API keys with a predetermined value instead of auto-generating one.
        The new key must be at least 20 characters long.
      operationId: updateAPIKey
      tags:
        - API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API
          schema:
            type: string
          example: weather-api-v1.0
        - name: apiKeyName
          in: path
          required: true
          description: |
            Name of the API key to update
          schema:
            type: string
          example: weather-api-key
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/APIKeyUpdateRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/APIKeyUpdateRequest"
      responses:
        '200':
          description: API key updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreationResponse"
        "400":
          description: Invalid request (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: API or API key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Revoke an API key
      description: |
        Revoke a previously generated API key for the specified API. Once revoked,
        the key can no longer be used to authenticate requests.
      operationId: revokeAPIKey
      tags:
        - API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API to revoke the key for
          schema:
            type: string
          example: weather-api-v1.0
        - name: apiKeyName
          in: path
          required: true
          description: |
            Name of the API key to revoke
          schema:
            type: string
          example: weather-api-key
      responses:
        '200':
          description: API key revoked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyRevocationResponse"
        "400":
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscription-plans:
    post:
      summary: Create a subscription plan
      operationId: createSubscriptionPlan
      tags:
        - API Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionPlanCreateRequest"
      responses:
        '201':
          description: Subscription plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlanResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: List subscription plans
      operationId: listSubscriptionPlans
      tags:
        - API Management
      responses:
        '200':
          description: List of subscription plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlanListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscription-plans/{planId}:
    get:
      summary: Get a subscription plan by ID
      operationId: getSubscriptionPlan
      tags:
        - API Management
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription plan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlanResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a subscription plan
      operationId: updateSubscriptionPlan
      tags:
        - API Management
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionPlanUpdateRequest"
      responses:
        '200':
          description: Subscription plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlanResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a subscription plan
      operationId: deleteSubscriptionPlan
      tags:
        - API Management
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Subscription plan deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions:
    post:
      summary: Create a subscription
      description: |
        Creates an application-level subscription for the specified API.
        Used by control plane sync and admin. applicationId references applications in DevPortal/STS.
      operationId: createSubscription
      tags:
        - API Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionCreateRequest"
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - subscription already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: List subscriptions
      description: Returns application-level subscriptions filtered by API and/or application.
      operationId: listSubscriptions
      tags:
        - API Management
      parameters:
        - name: apiId
          in: query
          required: false
          description: Filter by API ID (deployment ID or handle)
          schema:
            type: string
        - name: applicationId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, REVOKED]
      responses:
        '200':
          description: List of subscriptions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/{subscriptionId}:
    get:
      summary: Get a subscription by ID
      operationId: getSubscription
      tags:
        - API Management
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "404":
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a subscription
      operationId: updateSubscription
      tags:
        - API Management
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionUpdateRequest"
      responses:
        '200':
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "404":
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a subscription
      operationId: deleteSubscription
      tags:
        - API Management
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Subscription deleted
        "404":
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /websub-apis:
    post:
      summary: Create a new WebSubAPI
      description: |
        Submit a new WebSubAPI to the Gateway Controller. The configuration
        is validated, persisted, and translated to Envoy xDS resources. The Router
        begins routing traffic for the WebSub API within 5 seconds.
      operationId: createWebSubAPI
      tags:
        - WebSub API Management
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/WebSubAPI"
          application/json:
            schema:
              $ref: "#/components/schemas/WebSubAPI"
      responses:
        "201":
          description: WebSubAPI created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSubAPICreateResponse"
        "400":
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - WebSub API with same name and version already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: List all WebSubAPIs
      description: |
        Retrieve a list of all deployed WebSubAPIs with metadata.
        Returns basic information about each WebSub API (name, version, context, deployment time).
      operationId: listWebSubAPIs
      tags:
        - WebSub API Management
      parameters:
        - name: displayName
          in: query
          required: false
          description: Filter by WebSub API display name
          schema:
            type: string
          example: Weather WebSub API
        - name: version
          in: query
          required: false
          description: Filter by WebSub API version
          schema:
            type: string
          example: v1.0
        - name: context
          in: query
          required: false
          description: Filter by WebSub API context/path
          schema:
            type: string
          example: /weather-events
        - name: status
          in: query
          required: false
          description: Filter by deployment status
          schema:
            type: string
            enum: [ pending, deployed, failed ]
          example: pending
      responses:
        "200":
          description: List of WebSubAPIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  count:
                    type: integer
                    example: 5
                  apis:
                    type: array
                    items:
                      $ref: "#/components/schemas/WebSubAPIListItem"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /websub-apis/{id}:
    get:
      summary: Get WebSubAPI by id
      description: |
        Retrieve the complete configuration for a specific WebSubAPI by its id.
        The id is a unique string identifier (not a UUID).
      operationId: getWebSubAPIById
      tags:
        - WebSub API Management
      parameters:
        - name: id
          in: path
