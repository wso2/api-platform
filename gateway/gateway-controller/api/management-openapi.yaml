openapi: 3.0.3
info:
  title: Gateway Controller Management API
  description: |
    REST API for managing API configurations in the WSO2 API Platform Gateway.
  version: 0.9.0
  contact:
    name: WSO2 API Platform Team
servers:
  - url: http://localhost:9090/api/management/v0.9
    description: Local development
  - url: http://gateway-controller:9090/api/management/v0.9
    description: Docker/Kubernetes deployment

security:
  - basicAuth: []

paths:
  /rest-apis:
    post:
      summary: Create a new RestAPI
      description: Add a new RestAPI to the Gateway.
      operationId: createRestAPI
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/RestAPIRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/RestAPIRequest"
      responses:
        "201":
          description: RestAPI created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestAPI"
        "400":
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - API with same name and version already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: List all RestAPIs
      description: List RestAPIs registered in the Gateway, optionally filtered by name, version, context, or status.
      operationId: listRestAPIs
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      parameters:
        - name: displayName
          in: query
          required: false
          description: Filter by API display name
          schema:
            type: string
          example: Reading List API
        - name: version
          in: query
          required: false
          description: Filter by API version
          schema:
            type: string
          example: v1.0
        - name: context
          in: query
          required: false
          description: Filter by API context/path
          schema:
            type: string
          example: /reading-list
        - name: status
          in: query
          required: false
          description: Filter by deployment status
          schema:
            type: string
            enum: [ deployed, undeployed ]
          example: undeployed
      responses:
        "200":
          description: List of RestAPIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  count:
                    type: integer
                    example: 5
                  apis:
                    type: array
                    items:
                      $ref: "#/components/schemas/RestAPI"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rest-apis/{id}:
    get:
      summary: Get RestAPI by id
      description: Get a RestAPI by its ID.
      operationId: getRestAPIById
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier for the API.
          schema:
            type: string
          example: reading-list-api-v1.0
      responses:
        "200":
          description: RestAPI details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestAPI"
            application/yaml:
              schema:
                $ref: "#/components/schemas/RestAPI"
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Update an existing RestAPI
      description: Update an existing RestAPI in the Gateway.
      operationId: updateRestAPI
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API to update.
          schema:
            type: string
          example: reading-list-api-v1.0
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/RestAPIRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/RestAPIRequest"
      responses:
        "200":
          description: RestAPI updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestAPI"
        "400":
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Delete a RestAPI
      description: Delete a RestAPI from the Gateway.
      operationId: deleteRestAPI
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API to delete.
          schema:
            type: string
          example: reading-list-api-v1.0
      responses:
        "200":
          description: RestAPI deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: RestAPI deleted successfully
                  id:
                    type: string
                    example: reading-list-api-v1.0
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rest-apis/{id}/api-keys:
    post:
      summary: Create a new API key for an API
      description: Generate a new API key for a RestAPI in the Gateway. The key is a 32-byte random value encoded in hexadecimal, prefixed with `apip_`. Use the API Key policy on the API to validate incoming requests with this key.
      operationId: createAPIKey
      x-basicauth-roles: [admin, consumer]
      tags:
        - Rest API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API to generate the key for
          schema:
            type: string
          example: reading-list-api-v1.0
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/APIKeyCreationRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/APIKeyCreationRequest"
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreationResponse"
        "400":
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: Get the list of API keys for an API
      description: List all API keys for a RestAPI in the Gateway.
      operationId: listAPIKeys
      x-basicauth-roles: [admin, consumer]
      tags:
        - Rest API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API to retrieve the keys for
          schema:
            type: string
          example: reading-list-api-v1.0
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyListResponse"
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rest-apis/{id}/api-keys/{apiKeyName}/regenerate:
    post:
      summary: Regenerate API key for an API
      description: Regenerate an existing API key for a RestAPI in the Gateway. The previous key is revoked and replaced with a new 32-byte random value encoded in hexadecimal, prefixed with `apip_`.
      operationId: regenerateAPIKey
      x-basicauth-roles: [admin, consumer]
      tags:
        - Rest API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API to generate the key for
          schema:
            type: string
          example: reading-list-api-v1.0
        - name: apiKeyName
          in: path
          required: true
          description: |
            Name of the API key to regenerate
          schema:
            type: string
          example: reading-list-api-key
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/APIKeyRegenerationRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/APIKeyRegenerationRequest"
      responses:
        '200':
          description: API key rotated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreationResponse"
        "400":
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rest-apis/{id}/api-keys/{apiKeyName}:
    put:
      summary: Update an API key with a new regenerated value
      description: Update an API key with a custom value instead of auto-generating one.
      operationId: updateAPIKey
      x-basicauth-roles: [admin, consumer]
      tags:
        - Rest API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API
          schema:
            type: string
          example: reading-list-api-v1.0
        - name: apiKeyName
          in: path
          required: true
          description: |
            Name of the API key to update
          schema:
            type: string
          example: reading-list-api-key
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/APIKeyUpdateRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/APIKeyUpdateRequest"
      responses:
        '200':
          description: API key updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreationResponse"
        "400":
          description: Invalid request (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: API or API key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Revoke an API key
      description: Revoke an API key. Once revoked, it can no longer be used to authenticate requests.
      operationId: revokeAPIKey
      x-basicauth-roles: [admin, consumer]
      tags:
        - Rest API Management
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Unique public identifier of the API to revoke the key for
          schema:
            type: string
          example: reading-list-api-v1.0
        - name: apiKeyName
          in: path
          required: true
          description: |
            Name of the API key to revoke
          schema:
            type: string
          example: reading-list-api-key
      responses:
        '200':
          description: API key revoked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyRevocationResponse"
        "400":
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: RestAPI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscription-plans:
    post:
      summary: Create a subscription plan
      description: Create a subscription plan that defines rate limits and access tiers for API subscriptions.
      operationId: createSubscriptionPlan
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionPlanCreateRequest"
      responses:
        '201':
          description: Subscription plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlanResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: List subscription plans
      description: List all subscription plans available in the Gateway.
      operationId: listSubscriptionPlans
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      responses:
        '200':
          description: List of subscription plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlanListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscription-plans/{planId}:
    get:
      summary: Get a subscription plan by ID
      description: Get the details of a subscription plan by its ID.
      operationId: getSubscriptionPlan
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription plan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlanResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a subscription plan
      description: Update an existing subscription plan in the Gateway.
      operationId: updateSubscriptionPlan
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionPlanUpdateRequest"
      responses:
        '200':
          description: Subscription plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlanResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a subscription plan
      description: Delete a subscription plan from the Gateway.
      operationId: deleteSubscriptionPlan
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Subscription plan deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions:
    post:
      summary: Create a subscription
      description: Subscribe an application to a RestAPI in the Gateway.
      operationId: createSubscription
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionCreateRequest"
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - subscription already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: List subscriptions
      description: List subscriptions in the Gateway, optionally filtered by API, application, or status.
      operationId: listSubscriptions
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      parameters:
        - name: apiId
          in: query
          required: false
          description: Filter by API ID (deployment ID or handle)
          schema:
            type: string
        - name: applicationId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, REVOKED]
      responses:
        '200':
          description: List of subscriptions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/{subscriptionId}:
    get:
      summary: Get a subscription by ID
      description: Get the details of a subscription by its ID.
      operationId: getSubscription
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "404":
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a subscription
      description: Update an existing subscription in the Gateway.
      operationId: updateSubscription
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionUpdateRequest"
      responses:
        '200':
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "404":
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a subscription
      description: Delete a subscription from the Gateway.
      operationId: deleteSubscription
      x-basicauth-roles: [admin, developer]
      tags:
        - Rest API Management
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Subscription deleted
        "404":
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /websub-apis:
    post:
      summary: Create a new WebSubAPI
      description: Add a new WebSubAPI to the Gateway.
      operationId: createWebSubAPI
      x-basicauth-roles: [admin, developer]
      tags:
        - WebSub API Management
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/WebSubAPIRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/WebSubAPIRequest"
      responses:
        "201":
          description: WebSubAPI created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSubAPI"
        "400":
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - WebSub API with same name and version already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: List all WebSubAPIs
      description: List WebSubAPIs registered in the Gateway, optionally filtered by name, version, context, or status.
      operationId: listWebSubAPIs
      x-basicauth-roles: [admin, developer]
      tags:
        - WebSub API Management
      parameters:
        - name: displayName
          in: query
          required: false
          description: Filter by WebSub API display name
          schema:
            type: string
          example: Weather WebSub API
        - name: version
          in: query
          required: false
          description: Filter by WebSub API version
          schema:
            type: string
          example: v1.0
        - name: context
          in: query
          required: false
          description: Filter by WebSub API context/path
          schema:
            type: string
          example: /weather-events
        - name: status
          in: query
          required: false
          description: Filter by deployment status
          schema:
            type: string
            enum: [ deployed, undeployed ]
          example: undeployed
      responses:
        "200":
          description: List of WebSubAPIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  count:
                    type: integer
                    example: 5
                  apis:
                    type: array
                    items:
                      $ref: "#/components/schemas/WebSubAPI"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /websub-apis/{id}/api-keys:
    post:
      summary: Create a new API key for a WebSub API
      description: Generate a new API key for a WebSub API in the Gateway. The key is a 32-byte random value encoded in hexadecimal, prefixed with `apip_`. Use the API Key policy on the API to validate incoming requests with this key.
      operationId: createWebSubAPIKey
      x-basicauth-roles: [admin, consumer]
      tags:
        - WebSub API Management
      parameters:
        - name: id
          in: path
          required: true
          description: Unique public identifier of the WebSub API to generate the key for
          schema:
            type: string
          example: weather-websub-api
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/APIKeyCreationRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/APIKeyCreationRequest"
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreationResponse"
        '400':
          description: Invalid configuration (validation failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (duplicate key or conflicting update)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: WebSub API not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
