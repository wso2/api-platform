        required: true
        content:
          application/yaml:
            schema:
              $ref: '#/components/schemas/SecretConfigurationRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/SecretConfigurationRequest'
      responses:
        '201':
          description: Secret created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretConfigurationResponseCreateUpdate'
              examples:
                created:
                  summary: Successful creation
                  value:
                    apiVersion: gateway.api-platform.wso2.com/v1alpha1
                    kind: Secret
                    metadata:
                      name: database-password
                    spec:
                      displayName: Database Password
                      description: PostgreSQL main database password
                    status:
                      id: database-password
                      createdAt: "2026-01-05T10:30:00Z"
                      updatedAt: "2026-01-05T10:30:00Z"
        '400':
          description: Bad request - missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - secret with this ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - encryption failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /secrets/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Unique secret identifier
        schema:
          type: string
        examples:
          simple:
            summary: Simple ID
            value: "database-password"
          complex:
            summary: Namespaced ID
            value: "prod.db.main.password"

    get:
      tags:
        - Secrets Management
      summary: Retrieve a secret
      description: |
        Retrieves and decrypts a secret. The secret value is decrypted using the
        encryption provider chain before being returned. If all providers fail to
        decrypt the secret, a 500 error is returned with a generic message.
      operationId: getSecret
      x-basicauth-roles: [admin]
      responses:
        '200':
          description: Secret retrieved and decrypted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretConfigurationResponseRetrieved'
              examples:
                success:
                  summary: Successful retrieval
                  value:
                    apiVersion: "gateway.api-platform.wso2.com/v1alpha1"
                    kind: "Secret"
                    metadata:
                      name: "database-password"
                    spec:
                      displayName: "Database Password"
                      description: "PostgreSQL main database password"
                      value: "sup3rs3cr3t!"
                    status:
                      id: "database-password"
                      createdAt: "2026-01-05T10:30:00Z"
                      updatedAt: "2026-01-05T10:30:00Z"
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Secret configuration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - decryption failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Secrets Management
      summary: Update a secret
      description: |
        Updates an existing secret with a new value. The new value is encrypted
        using the current primary encryption provider, enabling automatic migration
        to newer keys during updates. Old secrets remain readable via the provider chain.
      operationId: updateSecret
      x-basicauth-roles: [admin]
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: '#/components/schemas/SecretConfigurationRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/SecretConfigurationRequest'
      responses:
        '200':
          description: Secret updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretConfigurationResponseCreateUpdate'
              examples:
                updated:
                  summary: Successful update
                  value:
                    apiVersion: gateway.api-platform.wso2.com/v1alpha1
                    kind: Secret
                    metadata:
                      name: database-password
                    spec:
                      displayName: Database Password
                      description: PostgreSQL main database password
                    status:
                      id: database-password
                      createdAt: "2026-01-05T10:30:00Z"
                      updatedAt: "2026-01-05T11:45:00Z"
        '400':
          description: Bad request - missing or invalid value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Secret configuration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - encryption failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Secrets Management
      summary: Delete a secret
      description: |
        Permanently deletes a secret from the database. This is a hard delete with
        no recovery mechanism. The operation is idempotent - deleting a non-existent
        secret returns 404.
      operationId: deleteSecret
      x-basicauth-roles: [admin]
      responses:
        '200':
          description: Secret deleted successfully (no content)
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Secret configuration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not-found:
                  summary: Secret does not exist
                  value:
                    status: "not_found"
                    message: "secret configuration not found"
        '500':
          description: Internal server error - database failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    # Shared server-managed status block returned on every k8s-shaped resource.
    # Clients MUST NOT send this on POST/PUT – any user-provided status is ignored
    # by the server and overwritten with the authoritative values on the response.
    ResourceStatus:
      type: object
      description: Server-managed lifecycle information for a resource
      properties:
        id:
          type: string
          description: Unique identifier assigned by the server (equal to metadata.name)
          example: reading-list-api-v1.0
        state:
          type: string
          description: Desired deployment state reported by the server
          enum:
            - deployed
            - undeployed
          example: deployed
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the resource was first created (UTC)
          example: 2026-04-24T07:21:13Z
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the resource was last updated (UTC)
          example: 2026-04-24T07:21:13Z
        deployedAt:
          type: string
          format: date-time
          description: Timestamp when the resource was last deployed (omitted when undeployed)
          example: 2026-04-24T07:21:13Z

    # Request body for create/update: user/resource fields only (no server-managed status).
    RestAPIRequest:
      type: object
      required:
        - apiVersion
        - metadata
        - kind
        - spec
      properties:
        apiVersion:
          type: string
          description: API specification version
          example: gateway.api-platform.wso2.com/v1alpha1
          enum:
            - gateway.api-platform.wso2.com/v1alpha1
        kind:
          type: string
          description: API type
          example: RestApi
          enum:
            - RestApi
        metadata:
          $ref: "#/components/schemas/Metadata"
        spec:
          $ref: '#/components/schemas/APIConfigData'
      example:
        apiVersion: gateway.api-platform.wso2.com/v1alpha1
        kind: RestApi
        metadata:
          name: reading-list-api-v1.0
        spec:
          displayName: Reading-List-API
          version: v1.0
          context: /reading-list/$version
          upstream:
            main:
              url: https://apis.bijira.dev/samples/reading-list-api-service/v1.0
          policies:
            - name: set-headers
              version: v1
              params:
                request:
                  headers:
                    - name: x-wso2-apip-gateway-version
                      value: v1.0.0
                response:
                  headers:
                    - name: x-environment
                      value: development
          operations:
            - method: GET
              path: /books
            - method: POST
              path: /books
            - method: GET
              path: /books/{id}
            - method: PUT
              path: /books/{id}
            - method: DELETE
              path: /books/{id}

    # Full resource including server-managed status (list/get responses).
    RestAPI:
      allOf:
        - $ref: '#/components/schemas/RestAPIRequest'
        - type: object
          properties:
            status:
              readOnly: true
              description: Server-managed lifecycle fields. Populated on responses.
              allOf:
                - $ref: '#/components/schemas/ResourceStatus'
      example:
        apiVersion: gateway.api-platform.wso2.com/v1alpha1
        kind: RestApi
        metadata:
          name: reading-list-api-v1.0
        spec:
          displayName: Reading-List-API
          version: v1.0
          context: /reading-list/$version
          upstream:
            main:
              url: https://apis.bijira.dev/samples/reading-list-api-service/v1.0
          policies:
            - name: set-headers
              version: v1
              params:
                request:
                  headers:
                    - name: x-wso2-apip-gateway-version
                      value: v1.0.0
                response:
                  headers:
                    - name: x-environment
                      value: development
          operations:
            - method: GET
              path: /books
            - method: POST
              path: /books
            - method: GET
              path: /books/{id}
            - method: PUT
              path: /books/{id}
            - method: DELETE
              path: /books/{id}
        status:
          id: reading-list-api-v1.0
          state: deployed
          createdAt: 2026-04-24T07:21:13Z
          updatedAt: 2026-04-24T07:21:13Z
          deployedAt: 2026-04-24T07:21:13Z

    WebSubAPIRequest:
      type: object
      required:
        - apiVersion
        - metadata
        - kind
        - spec
      properties:
        apiVersion:
          type: string
          description: API specification version
          example: gateway.api-platform.wso2.com/v1alpha1
          enum:
            - gateway.api-platform.wso2.com/v1alpha1
        kind:
          type: string
          description: API type
          example: WebSubApi
          enum:
            - WebSubApi
        metadata:
          $ref: "#/components/schemas/Metadata"
        spec:
          $ref: '#/components/schemas/WebhookAPIData'
      example:
        apiVersion: gateway.api-platform.wso2.com/v1alpha1
        kind: WebSubApi
        metadata:
          name: github-events-v1.0
        spec:
          displayName: GitHub Events
          version: v1.0
          context: /github-events/$version
          channels:
            - name: issues
              method: SUB
            - name: pull_requests
              method: SUB

    WebSubAPI:
      allOf:
        - $ref: '#/components/schemas/WebSubAPIRequest'
        - type: object
          properties:
            status:
              readOnly: true
              description: Server-managed lifecycle fields. Populated on responses.
              allOf:
                - $ref: '#/components/schemas/ResourceStatus'
      example:
        apiVersion: gateway.api-platform.wso2.com/v1alpha1
        kind: WebSubApi
        metadata:
          name: github-events-v1.0
        spec:
          displayName: GitHub Events
          version: v1.0
          context: /github-events/$version
          channels:
            - name: issues
              method: SUB
            - name: pull_requests
              method: SUB
        status:
          id: github-events-v1.0
          state: deployed
          createdAt: 2026-04-24T07:21:13Z
          updatedAt: 2026-04-24T07:21:13Z
          deployedAt: 2026-04-24T07:21:13Z

    Metadata:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Unique handle for the resource
          example: reading-list-api-v1.0
        labels:
          type: object
          description: Labels are key-value pairs for organizing and selecting APIs. Keys must not contain spaces.
          additionalProperties:
            type: string
          example:
            environment: production
            team: backend
            version: v1
        annotations:
          type: object
          description: Annotations are arbitrary non-identifying metadata. Use domain-prefixed keys.
          additionalProperties:
            type: string
          example:
            gateway.api-platform.wso2.com/project-id: 019d953f-d386-7a64-aa92-1869a28292e0

    APIConfigData:
      type: object
      required:
        - displayName
        - version
        - context
        - upstream
        - operations
        # - kind
      properties:
        displayName:
          type: string
          description: Human-readable API name (must be URL-friendly - only letters, numbers, spaces, hyphens, underscores, and dots allowed)
          minLength: 1
          maxLength: 100
          pattern: '^[a-zA-Z0-9\-_\. ]+$'
          example: Reading List API
        # kind:
        #   type: string
        #   description: API type
        #   example: RestApi
        #   enum:
        #     - RestApi
        version:
          type: string
          description: Semantic version of the API
          pattern: '^v\d+\.\d+$'
          example: v1.0
        context:
          type: string
          description: Base path for all API routes (must start with /, no trailing slash). Use $version to embed the version in the path (e.g., /reading-list/$version resolves to /reading-list/v1.0).
          pattern: '^\/[a-zA-Z0-9_\-\/]*[^\/]$'
          minLength: 1
          maxLength: 200
          example: /reading-list/$version
        upstreamDefinitions:
          type: array
          description: List of reusable upstream definitions with optional timeout configurations
          items:
            $ref: "#/components/schemas/UpstreamDefinition"
        upstream:
          type: object
          required:
            - main
          description: API-level upstream configuration
          properties:
            main:
              $ref: "#/components/schemas/Upstream"
            sandbox:
              $ref: "#/components/schemas/Upstream"
        vhosts:
          type: object
          required:
            - main
          description: Custom virtual hosts/domains for the API
          properties:
            main:
              type: string
              description: Custom virtual host/domain for production traffic
              pattern: '^[a-zA-Z0-9\.\-]+$'
              example: api.example.com
            sandbox:
              type: string
              description: Custom virtual host/domain for sandbox traffic
              pattern: '^[a-zA-Z0-9\.\-]+$'
              example: sandbox-api.example.com
        subscriptionPlans:
          type: array
          description: List of subscription plan names available for this API
          items:
            type: string
          example: ["Gold", "Silver"]
        policies:
          type: array
          description: List of API-level policies applied to all operations unless overridden
          items:
            $ref: "#/components/schemas/Policy"
        operations:
          type: array
          description: List of HTTP operations/routes
          minItems: 1
          items:
            $ref: "#/components/schemas/Operation"
        deploymentState:
          type: string
          description: Desired deployment state - 'deployed' (default) or 'undeployed'. When set to 'undeployed', the API is removed from router traffic but configuration, API keys, and policies are preserved for potential redeployment.
          enum: [deployed, undeployed]
          default: deployed
          example: deployed

    UpstreamDefinition:
      type: object
      required:
        - name
        - upstreams
      description: Reusable upstream configuration with optional timeout and load balancing settings
      properties:
        name:
          type: string
          description: Unique identifier for this upstream definition
          minLength: 1
          maxLength: 100
          pattern: '^[a-zA-Z0-9\-_]+$'
          example: my-upstream-1
        basePath:
          type: string
          description: Base path prefix for all endpoints in this upstream (e.g., /api/v2). All requests to this upstream will have this path prepended.
          example: /api/v2
        timeout:
          $ref: "#/components/schemas/UpstreamTimeout"
        upstreams:
          type: array
          description: List of backend targets with optional weights for load balancing
          minItems: 1
          items:
            type: object
            required:
              - url
            properties:
              url:
                type: string
                format: uri
                description: Backend URL (host and port only, path comes from basePath)
                example: http://prod-backend-1:5000
              weight:
                type: integer
                description: Weight for load balancing (optional, default 100)
                minimum: 0
                maximum: 100
                example: 80

    UpstreamTimeout:
      type: object
      description: Timeout configuration for upstream requests
      properties:
        connect:
          type: string
          description: Connection timeout duration (e.g., "5s", "500ms")
          pattern: '^\d+(\.\d+)?(ms|s|m|h)$'
          example: 5s

    Upstream:
      type: object
      oneOf:
        - required: [ "url" ]
        - required: [ "ref" ]
      description: Upstream backend configuration (single target or reference)
      properties:
        url:
          type: string
          format: uri
          description: Direct backend URL to route traffic to
          example: http://prod-backend:5000/api/v2
        ref:
          type: string
          description: Reference to a predefined upstreamDefinition
        hostRewrite:
          type: string
          enum:
            - auto
            - manual
          default: auto
          description: >
            Controls how the Host header is handled when routing to the upstream.
            `auto` delegates host rewriting to Envoy, which rewrites the Host header
            using the upstream cluster host. `manual` disables automatic rewriting
            and expects explicit configuration.

    Operation:
      type: object
      required:
        - method
        - path
      properties:
        method:
          type: string
          description: HTTP method
          enum:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - HEAD
            - OPTIONS
          example: GET
        path:
          type: string
          description: Route path with optional {param} placeholders
          pattern: '^\/.*$'
          example: /books/{id}
        policies:
          type: array
          description: List of policies applied only to this operation (overrides or adds to API-level policies)
          items:
            $ref: "#/components/schemas/Policy"

    Policy:
      type: object
      required:
        - name
        - version
      properties:
        name:
          type: string
          description: Name of the policy
          example: cors
        version:
          type: string
          description: >
            Version of the policy. Only major-only version is allowed (e.g., v0, v1).
            Full semantic version (e.g., v1.0.0) is not accepted and will be rejected.
            The Gateway Controller resolves the major version to the single matching
            full version installed in the gateway image.
          pattern: '^v\d+$'
          example: v1
        executionCondition:
          type: string
          description: Expression controlling conditional execution of the policy
          example: "request.metadata[authenticated] != true"
        params:
          type: object
          description: Arbitrary parameters for the policy (free-form key/value structure)
          additionalProperties: true

    # -----------------------
    # Webhook (Async) API schema
    # -----------------------
    WebhookAPIData:
      type: object
      required:
        - displayName
        - version
        - context
        - channels
      properties:
        displayName:
          type: string
          description: Human-readable API name (must be URL-friendly - only letters, numbers, spaces, hyphens, underscores, and dots allowed)
          minLength: 1
          maxLength: 100
          pattern: '^[a-zA-Z0-9\-_\. ]+$'
          example: reading-list-api
        version:
          type: string
          description: Semantic version of the API
          pattern: '^v\d+\.\d+$'
          example: v1.0
        context:
          type: string
          description: Base path for all API routes (must start with /, no trailing slash)
          pattern: '^\/[a-zA-Z0-9_\-\/]*[^\/]$'
          minLength: 1
          maxLength: 200
          example: /weather
        vhosts:
          type: object
          required:
            - main
          description: Custom virtual hosts/domains for the API
          properties:
            main:
              type: string
              description: Custom virtual host/domain for production traffic
              pattern: '^[a-zA-Z0-9\.\-]+$'
              example: api.example.com
            sandbox:
              type: string
              description: Custom virtual host/domain for sandbox traffic
              pattern: '^[a-zA-Z0-9\.\-]+$'
              example: sandbox-api.example.com
        channels:
          type: array
          description: List of channels - Async operations(SUB) for WebSub APIs
          minItems: 1
          items:
            $ref: '#/components/schemas/Channel'
        policies:
          type: array
          description: List of API-level policies applied to all operations unless overridden
          items:
            $ref: '#/components/schemas/Policy'
        deploymentState:
          type: string
          description: Desired deployment state - 'deployed' (default) or 'undeployed'. When set to 'undeployed', the API is removed from router traffic but configuration, API keys, and policies are preserved for potential redeployment.
          enum: [deployed, undeployed]
          default: deployed
          example: deployed

    # Simplified AsyncAPI Channel object represented as an OpenAPI schema.
    Channel:
      type: object
      description: Channel (topic/event stream) definition for async APIs.
      required:
        - name
        - method
      properties:
        name:
          type: string
          description: Channel name or topic identifier relative to API context.
          example: issues
        method:
          type: string
          description: Operation method type.
          enum:
            - SUB
        policies:
          type: array
          description: List of policies applied only to this channel (overrides or adds to API-level policies)
          items:
            $ref: "#/components/schemas/Policy"
        # subscribe:
        #   type: object
        #   description: Consumer (receive) operation definition.
        #   properties:
        #     summary:
        #       type: string
        #       example: Receive issue events.
        #     policies:
        #       type: array
        #       description: List of policies applied only to this operation (overrides or adds to API-level policies)
        #       items:
        #         $ref: "#/components/schemas/Policy"
        #     message:
        #       $ref: '#/components/schemas/ChannelMessage'
        # publish:
        #   type: object
        #   description: Producer (send) operation definition.
        #   properties:
        #     summary:
        #       type: string
        #       example: Publish issue events.
        #     policies:
        #       type: array
        #       description: List of policies applied only to this operation (overrides or adds to API-level policies)
        #       items:
        #         $ref: "#/components/schemas/Policy"
        #     message:
        #       $ref: '#/components/schemas/ChannelMessage'
        # parameters:
        #   type: object
        #   description: Path/channel parameters (keyed by parameter name).
        #   additionalProperties:
        #     type: object
        #     properties:
        #       description:
        #         type: string
        #       schema:
        #         type: object
        #         description: JSON Schema fragment for the parameter value.
        #         additionalProperties: true
        # bindings:
        #   type: object
        #   description: Protocol-specific channel bindings (arbitrary key/value structure).
        #   additionalProperties: true

    APIKeyCreationRequest:
      type: object
      properties:
        name:
          type: string
          description: Identifier of the API key. If not provided, a default identifier will be generated
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          minLength: 3
          maxLength: 63
          example: my-production-key
        apiKey:
          type: string
          minLength: 36
          description: |
            Optional plain-text API key value for external key injection.
            If provided, this key will be used instead of generating a new one.
            The key will be hashed before storage. The key can be in any format
            (minimum 36 characters). Use this for injecting externally generated
            API keys.
          example: "xxxxxx-wso2-api-platform-key-xxxxxx-xxxxxxx"
        maskedApiKey:
          type: string
          description: |
            Masked version of the API key for display purposes.
            Provided by the platform API when injecting pre-hashed keys.
          example: "apip_****xyz789"
        expiresIn:
          type: object
          description: Expiration duration for the API key
          properties:
            unit:
              type: string
              description: Time unit for expiration
              enum:
                - seconds
                - minutes
                - hours
                - days
                - weeks
                - months
              example: days
            duration:
              type: integer
              description: Duration value for expiration
              example: 30
          required:
            - unit
            - duration
        expiresAt:
          type: string
          format: date-time
          description: Expiration timestamp. If both expiresIn and expiresAt are provided, expiresAt takes precedence.
          example: "2026-12-08T10:30:00Z"
        externalRefId:
          type: string
          description: |
            External reference ID for the API key.
            This field is optional and used for tracing purposes only.
            The gateway generates its own internal ID for tracking.
          example: "cloud-apim-key-98765"
        issuer:
          type: string
          description: |
            Identifies the portal that created this key. If provided, only api keys generated from
            the same portal will be accepted. If not provided, there is no portal restriction.
          example: "api-platform-devportal"
      example:
        name: my-production-key
    APIKeyCreationResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: API key generated successfully
        remainingApiKeyQuota:
          type: integer
          description: Remaining API key quota for the user
          example: 9
        apiKey:
