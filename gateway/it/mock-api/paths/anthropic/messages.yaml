post:
  summary: Create Anthropic message
  operationId: createAnthropicMessage
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - model
            - messages
            - max_tokens
          properties:
            model:
              type: string
            messages:
              type: array
              items:
                type: object
            max_tokens:
              type: integer

  responses:
    "200":
      description: Successful response
      content:
        application/json:
          # claude-3-5-haiku-20241022: input=8e-7, output=4e-6
          # 50 input + 25 output = 0.0001400000
          example:
            id: msg_01XFDUDYJgAACzvnptvVoYEL
            type: message
            role: assistant
            model: claude-3-5-haiku-20241022
            content:
              - type: text
                text: "Hello! How can I help you today?"
            stop_reason: end_turn
            stop_sequence: null
            usage:
              input_tokens: 50
              output_tokens: 25
              cache_creation_input_tokens: 0
              cache_read_input_tokens: 0
