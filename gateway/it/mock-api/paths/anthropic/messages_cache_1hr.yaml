post:
  summary: Create Anthropic message with mixed 5m and 1hr cache writes
  operationId: createAnthropicMessageCache1hr
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - model
            - messages
            - max_tokens
          properties:
            model:
              type: string
            messages:
              type: array
              items:
                type: object
            max_tokens:
              type: integer

  responses:
    "200":
      description: Successful response
      content:
        application/json:
          # claude-opus-4-6: input=5e-6, output=2.5e-5, 5m_write=6.25e-6, 1hr_write=1e-5
          # 10 input_tokens + 5 output_tokens + 100 5m-write + 500 1hr-write
          # regularPrompt = 10 - 100 - 500 → clamped to 0
          # cost = 0*5e-6 + 5*2.5e-5 + 100*6.25e-6 + 500*1e-5
          #      = 0 + 0.000125 + 0.000625 + 0.005 = 0.0057500000
          example:
            id: msg_cache1hr_example
            type: message
            role: assistant
            model: claude-opus-4-6
            content:
              - type: text
                text: "Hello! How can I help you today?"
            stop_reason: end_turn
            stop_sequence: null
            usage:
              input_tokens: 10
              output_tokens: 5
              cache_creation_input_tokens: 600
              cache_read_input_tokens: 0
              cache_creation:
                ephemeral_5m_input_tokens: 100
                ephemeral_1h_input_tokens: 500
