post:
  summary: Create Mistral chat completion
  operationId: createMistralChatCompletion
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - model
            - messages
          properties:
            model:
              type: string
            messages:
              type: array
              items:
                type: object
                required:
                  - role
                  - content
                properties:
                  role:
                    type: string
                  content:
                    type: string

  responses:
    "200":
      description: Successful response
      content:
        application/json:
          example:
            id: cmpl-e5cc70bb28c444948073e77776eb30ef
            object: chat.completion
            created: 1702256327
            model: mistral-small-latest
            choices:
              - index: 0
                message:
                  role: assistant
                  content: "Hello! How can I assist you today?"
                finish_reason: stop
            usage:
              prompt_tokens: 100
              completion_tokens: 50
              total_tokens: 150
              prompt_audio_seconds: null
