post:
  summary: Create chat completion with flex service tier
  operationId: createChatCompletionFlex
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - model
            - messages
          properties:
            model:
              type: string
            messages:
              type: array
              items:
                type: object

  responses:
    "200":
      description: Successful response with flex service tier
      content:
        application/json:
          # gpt-5.4: input_flex=1.25e-6, output_flex=7.5e-6
          # prompt=100, completion=50, service_tier=flex
          # cost = 100*1.25e-6 + 50*7.5e-6 = 1.25e-4 + 3.75e-4 = 0.0005000000
          example:
            id: chatcmpl-FlexTierTest
            object: chat.completion
            created: 1741569952
            model: gpt-5.4
            choices:
              - index: 0
                message:
                  role: assistant
                  content: "Flex tier response."
                  refusal: null
                  annotations: []
                logprobs: null
                finish_reason: stop
            usage:
              prompt_tokens: 100
              completion_tokens: 50
              total_tokens: 150
              prompt_tokens_details:
                cached_tokens: 0
                audio_tokens: 0
              completion_tokens_details:
                reasoning_tokens: 0
                audio_tokens: 0
                accepted_prediction_tokens: 0
                rejected_prediction_tokens: 0
            service_tier: flex
