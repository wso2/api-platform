post:
  summary: Chat with GPT-3.5-turbo (price-overridden)
  operationId: gpt35Chat
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            model:
              type: string
            messages:
              type: array
              items:
                type: object

  responses:
    "200":
      description: Successful response
      content:
        application/json:
          # gpt-3.5-turbo embedded price: input=5e-7, output=1.5e-6
          # Custom override price: input=1e-5, output=3e-5
          # Usage: 100 prompt + 50 completion
          # WITH override: (100*1e-5) + (50*3e-5) = 1e-3 + 1.5e-3 = 0.0025000000
          # WITHOUT override (embedded): (100*5e-7) + (50*1.5e-6) = 5e-5 + 7.5e-5 = 0.0001250000
          example:
            id: resp-gpt35-001
            object: chat.completion
            created: 1741569952
            model: gpt-3.5-turbo
            choices:
              - index: 0
                message:
                  role: assistant
                  content: "Hello from GPT-3.5 Turbo!"
                finish_reason: stop
            usage:
              prompt_tokens: 100
              completion_tokens: 50
              total_tokens: 150
