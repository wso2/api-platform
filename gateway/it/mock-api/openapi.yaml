openapi: 3.0.3
info:
  title: Mock API Server
  version: 1.0.0

servers:
  - url: http://localhost:4010

paths:
  /health:
    get:
      summary: Health check
      description: Simple health check endpoint to verify service availability
      responses:
        "200":
          description: Service is healthy
  # Mock OpenAI
  /openai/v1/chat/completions:
    $ref: ./paths/openai/chat.yaml
  /openai/v1/embeddings:
    $ref: ./paths/openai/embeddings.yaml
  # Mock Anthropic
  /anthropic/v1/messages:
    $ref: ./paths/anthropic/messages.yaml
  # Mock Gemini native
  /gemini/v1/models/{model}:generateContent:
    $ref: ./paths/gemini/generate_content.yaml
  # Mock unknown LLM (no pricing data)
  /unknown-llm/v1/chat:
    $ref: ./paths/unknown-llm/chat.yaml
  # Mock custom-priced LLMs (for custom pricing file tests)
  /custom-llm/v1/chat:
    $ref: ./paths/custom-llm/chat.yaml
  /custom-llm/v1/gpt35:
    $ref: ./paths/custom-llm/gpt35.yaml

components:
  schemas:
    $ref: ./components/schemas.yaml
  securitySchemes:
    $ref: ./components/security_schemes.yaml
