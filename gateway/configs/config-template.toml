# =============================================================================
# CONTROLLER CONFIGURATION
# =============================================================================

[controller.server]
# REST API port for gateway management
api_port = 9090
# xDS gRPC port for Envoy communication
xds_port = 18000
# Graceful shutdown timeout
shutdown_timeout = "15s"
# Unique identifier for the gateway instance (used in persistent storage)
# It is recommended to use a uuid_v7 for this to improve db efficiency.
gateway_id = '{{ env "APIP_GW_CONTROLLER_SERVER_GATEWAY_ID" "platform-gateway-id" }}'

[controller.admin_server]
# Dedicated admin/debug HTTP server for config dump and xDS sync endpoints
enabled = true
port = 9092
allowed_ips = ["*"]

[controller.admin_server.pprof]
# Go runtime profiling (net/http/pprof) served on the admin server, off by default.
# When profiling, also restrict admin_server.allowed_ips or reach it via port-forward.
enabled = false
# runtime.SetBlockProfileRate arg (0 = block profiling off; e.g. 10000 samples ~1/10µs blocking)
block_profile_rate = 0
# runtime.SetMutexProfileFraction arg (0 = mutex profiling off; e.g. 5 samples 1/5 contentions)
mutex_profile_fraction = 0

[controller.policy_server]
# Policy xDS gRPC port for policy distribution
port = 18001

[controller.policy_server.tls]
# Enable or disable TLS
enabled = false
# Path to TLS certificate file (required if TLS is enabled)
cert_file = "./certs/server.crt"
# Path to TLS private key file (required if TLS is enabled)
key_file = "./certs/server.key"

[controller.controlplane]
# Control plane websocket endpoint. Environment values reach these keys ONLY through the
# {{ env }} tokens below (there is no APIP_GW_ prefix override); each token has a default,
# so an unset variable keeps the built-in value.
host = '{{ env "APIP_GW_CONTROLLER_CONTROLPLANE_HOST" "" }}'
# Control plane authentication (registration) token
token = '{{ env "APIP_GW_CONTROLLER_CONTROLPLANE_TOKEN" "" }}'
# Initial reconnect delay
reconnect_initial = "1s"
# Maximum reconnect delay
reconnect_max = "5m"
# Polling interval for periodic sync
polling_interval = "15m"
# Skip TLS certificate verification for control plane connections
insecure_skip_verify = '{{ env "APIP_GW_CONTROLLER_CONTROLPLANE_INSECURE_SKIP_VERIFY" "false" }}'
# Enable two-way artifact/deployment sync with the control plane (default: true)
deployment_sync_enabled = '{{ env "APIP_GW_CONTROLLER_CONTROLPLANE_DEPLOYMENT_SYNC_ENABLED" "true" }}'
# APIM OAuth2 Client ID
apim_oauth2_client_id = '{{ env "APIP_GW_CONTROLLER_CONTROLPLANE_APIM_OAUTH2_CLIENT_ID" "" }}'
# APIM OAuth2 Client secret
apim_oauth2_client_secret = '{{ env "APIP_GW_CONTROLLER_CONTROLPLANE_APIM_OAUTH2_CLIENT_SECRET" "" }}'
# Gateway name
gateway_name = '{{ env "APIP_GW_CONTROLLER_CONTROLPLANE_GATEWAY_NAME" "default" }}'

[controller.storage]
# Storage type: "sqlite", "postgres", "sqlserver", or "memory"
type = '{{ env "APIP_GW_CONTROLLER_STORAGE_TYPE" "sqlite" }}'

[controller.storage.sqlite]
path = '{{ env "APIP_GW_CONTROLLER_STORAGE_SQLITE_PATH" "./data/gateway.db" }}'

[controller.storage.postgres]
# Optional DSN. If set, host/port/database/user/password are ignored.
# dsn = "postgres://user:password@localhost:5432/gateway?sslmode=require"
host = '{{ env "APIP_GW_CONTROLLER_STORAGE_POSTGRES_HOST" "localhost" }}'
port = '{{ env "APIP_GW_CONTROLLER_STORAGE_POSTGRES_PORT" "5432" }}'
database = '{{ env "APIP_GW_CONTROLLER_STORAGE_POSTGRES_DATABASE" "gateway" }}'
user = '{{ env "APIP_GW_CONTROLLER_STORAGE_POSTGRES_USER" "gateway" }}'
password = '{{ env "APIP_GW_CONTROLLER_STORAGE_POSTGRES_PASSWORD" "" }}'
sslmode = '{{ env "APIP_GW_CONTROLLER_STORAGE_POSTGRES_SSLMODE" "require" }}' # disable, require, verify-ca, verify-full
connect_timeout = "5s"
max_open_conns = 25
max_idle_conns = 5
conn_max_lifetime = "30m"
conn_max_idle_time = "5m"
application_name = "gateway-controller"

[controller.storage.database]
# Global DB configuration used by sqlserver (and future SQL backends).
# For sqlite and postgres, legacy [controller.storage.sqlite]/[controller.storage.postgres]
# sections are still supported for backward compatibility.
driver = "sqlserver"
# Optional DSN. If set, host/port/database/user/password are ignored. The sample composes
# supply this from api-platform.env for type = "sqlserver".
dsn = '{{ env "APIP_GW_CONTROLLER_STORAGE_DATABASE_DSN" "" }}'
host = "localhost"
port = 1433
database = "gateway"
user = "gateway"
password = ""
connect_timeout = "5s"
max_open_conns = 25
max_idle_conns = 5
conn_max_lifetime = "30m"
conn_max_idle_time = "5m"
application_name = "gateway-controller"

[controller.storage.database.options]
encrypt = "true" # disable, false, true, strict
trust_server_certificate = "false"

[controller.policies]
# Directory containing policy definitions. The immutable-gateway builder image sets
# APIP_GW_CONTROLLER_POLICIES_DEFINITIONS_PATH=/app/policies, which this token reads.
definitions_path = '{{ env "APIP_GW_CONTROLLER_POLICIES_DEFINITIONS_PATH" "./default-policies" }}'

[controller.auth.basic]
enabled = true

[[controller.auth.basic.users]]
username = "admin"
password = "admin"
password_hashed = false
roles = ["admin"]

[controller.auth.idp]
enabled = false
jwks_url = ""
issuer = ""

[api_key]
api_keys_per_user_per_api = 10
algorithm = "sha256"
issuer = "api-platform-devportal"

[controller.logging]
level = '{{ env "APIP_GW_CONTROLLER_LOGGING_LEVEL" "info" }}'
format = "text"

[controller.metrics]
enabled = true
port = '{{ env "APIP_GW_CONTROLLER_METRICS_PORT" "9091" }}'

[controller.event_hub]
# Interval at which events are polled from the database
poll_interval = "3s"
# Interval at which old events are cleaned up
cleanup_interval = "10m"
# How long events are retained before being deleted
retention_period = "1h"

[controller.event_hub.database]
# Connection pool settings for the EventHub database connection
max_open_conns = 5
max_idle_conns = 2
conn_max_lifetime = "30m"
conn_max_idle_time = "5m"

# =============================================================================
# ROUTER CONFIGURATION
# =============================================================================

[router]
# Gateway host for incoming requests
gateway_host = "*"
# Listener port for incoming HTTP traffic (Envoy proxy port)
listener_port = 8080
# HTTPS listener configuration
https_enabled = true
https_port = 8443
# Tracing service name
tracing_service_name = "router"

[router.access_logs]
# Enable or disable access logs
enabled = true
# Log format: "json" or "text"
format = "text"
# Text format template
text_format = """
[%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%" %REQ(:PATH)% %UPSTREAM_PROTOCOL% %RESPONSE_CODE% %RESPONSE_FLAGS% %RESPONSE_CODE_DETAILS% %CONNECTION_TERMINATION_DETAILS% %BYTES_RECEIVED% %BYTES_SENT% %DURATION% %REQUEST_TX_DURATION% %RESPONSE_TX_DURATION% %REQUEST_DURATION% %RESPONSE_DURATION% "%REQ(X-FORWARDED-FOR)%" "%REQ(USER-AGENT)%" "%REQ(X-REQUEST-ID)%" "%REQ(:AUTHORITY)%" "%UPSTREAM_HOST%"
"""

[router.access_logs.json_fields]
t = "%START_TIME%"
meth = "%REQ(:METHOD)%"
path = "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
proto = "%PROTOCOL%"
respCd = "%RESPONSE_CODE%"
respFlg = "%RESPONSE_FLAGS%"
bytesRx = "%BYTES_RECEIVED%"
bytesTx = "%BYTES_SENT%"
dur = "%DURATION%"
upSvcT = "%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%"
xff = "%REQ(X-FORWARDED-FOR)%"
ua = "%REQ(USER-AGENT)%"
reqId = "%REQ(X-REQUEST-ID)%"
host = "%REQ(:AUTHORITY)%"
upHost = "%UPSTREAM_HOST%"
upProto = "%UPSTREAM_PROTOCOL%"
upPath = "%REQ(:PATH)%"
respCdDtl = "%RESPONSE_CODE_DETAILS%"
connTrmDtl = "%CONNECTION_TERMINATION_DETAILS%"
reqTxDur = "%REQUEST_TX_DURATION%"
respTxDur = "%RESPONSE_TX_DURATION%"
reqDur = "%REQUEST_DURATION%"
respDur = "%RESPONSE_DURATION%"

[router.downstream_tls]
cert_path = "./listener-certs/default-listener.crt"
key_path = "./listener-certs/default-listener.key"
minimum_protocol_version = "TLS1_2"
maximum_protocol_version = "TLS1_3"
ciphers = "ECDHE-ECDSA-AES128-GCM-SHA256,ECDHE-RSA-AES128-GCM-SHA256,ECDHE-ECDSA-AES128-SHA,ECDHE-RSA-AES128-SHA,AES128-GCM-SHA256,AES128-SHA,ECDHE-ECDSA-AES256-GCM-SHA384,ECDHE-RSA-AES256-GCM-SHA384,ECDHE-ECDSA-AES256-SHA,ECDHE-RSA-AES256-SHA,AES256-GCM-SHA384,AES256-SHA"

[router.upstream.tls]
minimum_protocol_version = "TLS1_2"
maximum_protocol_version = "TLS1_3"
ciphers = "ECDHE-ECDSA-AES128-GCM-SHA256,ECDHE-RSA-AES128-GCM-SHA256,ECDHE-ECDSA-AES128-SHA,ECDHE-RSA-AES128-SHA,AES128-GCM-SHA256,AES128-SHA,ECDHE-ECDSA-AES256-GCM-SHA384,ECDHE-RSA-AES256-GCM-SHA384,ECDHE-ECDSA-AES256-SHA,ECDHE-RSA-AES256-SHA,AES256-GCM-SHA384,AES256-SHA"
trusted_cert_path = "/etc/ssl/certs/ca-certificates.crt"
custom_certs_path = "./certificates"
verify_host_name = true
disable_ssl_verification = false

[router.upstream.timeouts]
route_timeout_ms = 60000
route_idle_timeout_ms = 300000
connect_timeout_ms = 5000

[router.http_listener]
server_header_transformation = "OVERWRITE"
server_header_value = "WSO2 API Platform"
# Downstream per-connection buffer limit in bytes (default: 1048576 / 1 MiB)
per_connection_buffer_limit_bytes = 1048576
# Disable dot-segment resolution and duplicate-slash merging on the request path. Defaults to
# false (normalization enabled) so route matching cannot be fooled by ".." or "//" in the path.
disable_path_normalization = false
# How to handle escaped slashes ("%2F"/"%5C") in the request path. Options: "KEEP_UNCHANGED"
# (default), "REJECT_REQUEST", "UNESCAPE_AND_REDIRECT", "UNESCAPE_AND_FORWARD".
path_with_escaped_slashes_action = "KEEP_UNCHANGED"

# HTTP Connection Manager (downstream) timeouts
# A value of zero disables any of these timeout settings.
[router.http_listener.timeouts]
# Max duration for the entire downstream request
request_timeout = "0s"
# Max duration to receive the complete request headers
request_headers_timeout = "0s"
# Idle timeout for a single HTTP stream/request
stream_idle_timeout = "5m"
# Idle timeout for the downstream connection
idle_timeout = "1h"

[router.policy_engine]
host = "policy-engine"
port = 9001
timeout_ms = 60000
message_timeout_ms = 60000

[router.policy_engine.tls]
enabled = false
cert_path = ""
key_path = ""
ca_path = ""
server_name = ""
skip_verify = false

# =============================================================================
# POLICY ENGINE CONFIGURATION
# =============================================================================

[policy_engine.server]
extproc_port = 9001

[policy_engine.admin]
enabled = true
port = 9002
allowed_ips = ["*", "127.0.0.1"]

[policy_engine.admin.pprof]
# Go runtime profiling (net/http/pprof) served on the admin server, off by default.
# When profiling, also restrict admin.allowed_ips or reach it via port-forward.
enabled = false
# runtime.SetBlockProfileRate arg (0 = block profiling off; e.g. 10000 samples ~1/10µs blocking)
block_profile_rate = 0
# runtime.SetMutexProfileFraction arg (0 = mutex profiling off; e.g. 5 samples 1/5 contentions)
mutex_profile_fraction = 0

[policy_engine.config_mode]
mode = "xds"

[policy_engine.xds]
connect_timeout = "10s"
request_timeout = "5s"
initial_reconnect_delay = "1s"
max_reconnect_delay = "60s"

[policy_engine.xds.tls]
enabled = false
# cert_path = "/path/to/client-cert.pem"
# key_path = "/path/to/client-key.pem"
# ca_path = "/path/to/ca-cert.pem"

[policy_engine.file_config]
path = ""

[policy_engine.logging]
level = "info"
format = "text"

[policy_engine.metrics]
enabled = true
port = 9003

# =============================================================================
# PYTHON EXECUTOR CONFIGURATION
# =============================================================================

[policy_engine.python_executor]
# Timeout for policy execution
timeout = "30s"

[policy_engine.python_executor.server]
# Mode: "uds" (Unix Domain Socket) or "tcp"
mode = "uds"
# Port (only used when mode = "tcp")
port = 9010
# Host (only used when mode = "tcp")
host = "localhost"

# =============================================================================
# COLLECTOR CONFIGURATION
# =============================================================================
# The collector is the shared data-capture pipeline: it injects the analytics
# system policy and ships request/response headers and bodies to the policy-engine
# over ALS. It has NO on/off switch of its own — it is implicit, turning on
# automatically whenever a consumer below is enabled ([analytics] or
# [traffic_logging]) and staying off otherwise. This section only tunes what the
# collector captures.
[collector]
# Capture request/response payloads (bodies) into the collected event. Bodies are
# captured in full; per-consumer size caps are applied on output (see
# traffic_logging.max_payload_size).
request_body = false
response_body = false
# Capture ALL request/response headers into the collected event (request_headers/
# response_headers). Applies to every API via the collector system policy, so no
# per-API header policy is needed. Sensitive values are redacted on output by
# consumers that support it (e.g. traffic_logging.masked_headers)
# Off by default; enable deliberately per consumer.
request_headers = false
response_headers = false

# Path prefixes for which the collector produces no analytics event and no
# traffic-log line at all (as if disabled for that one request) — e.g. health
# checks or metrics scrapes. Enforced by Envoy itself via an access-log filter,
# so the policy-engine never even receives the request. Matched case-sensitively
# against the path the client called (Envoy's x-envoy-original-path, set whenever
# a route rewrite occurred), never against the rewritten backend path. Requests
# without that header (no rewrite occurred) are never suppressed by this filter —
# matching bare :path would risk suppressing traffic whose backend path merely
# happens to share the prefix. Empty by default (no suppression).
ignore_path_prefixes = []
# ignore_path_prefixes = ["/health", "/metrics"]

# ALS transport tuning (advanced; defaults are sensible). One section read by BOTH
# ends of the Envoy → policy-engine access-log stream:
#   • gateway-controller — configures Envoy's gRPC access-log sink (the sender)
#   • policy-engine       — runs the receiving gRPC server
# Shared keys (TLS, message/header limits) must match on both ends and live here
# once. Envoy-sender-only keys (buffer_*, grpc_request_timeout) are read only by
# the controller and ignored by the policy-engine.
# NOTE: the TCP port (18090) is not configurable here — it is a fixed constant
# (collector.ServerPort in common/collector) shared by both ends, so they can
# never disagree on it. See ANALYTICS_LOG_PUBLISHER_DESIGN.md changelog.
[collector.server]
mode = "uds"                       # "uds" (default) or "tcp"
buffer_flush_interval = 1000000000 # Envoy sender only (nanoseconds)
buffer_size_bytes = 16384          # Envoy sender only
grpc_request_timeout = 20000000000 # Envoy sender only (nanoseconds)
shutdown_timeout = "600s"
public_key_path = ""               # TLS for the ALS connection (both ends)
private_key_path = ""
als_plain_text = true              # plaintext gRPC (skip TLS)
max_message_size = 1000000000
max_header_limit = 8192

# =============================================================================
# ANALYTICS CONFIGURATION (consumer — enabling it activates the collector)
# =============================================================================
[analytics]
enabled = false
# Deprecated: allow_payloads is preserved for backward compatibility. When true
# and both send_request_body and send_response_body are false, both directions
# are enabled (bool fields cannot distinguish "unset" from explicitly false).
# To disable payloads entirely, set allow_payloads = false or remove it; do not
# rely on send_*_body = false while allow_payloads remains true.
allow_payloads = false
# Deprecated: send_request_body / send_response_body are preserved
# for backward compatibility and are mapped onto the [collector] body-capture flags
# during validation (with a warning). Prefer setting [collector] directly.
send_request_body = false
send_response_body = false
enabled_publishers = ["moesif"]

[analytics.publishers.moesif]
application_id = '{{ env "APIP_GW_ANALYTICS_PUBLISHERS_MOESIF_APPLICATION_ID" "" }}'
moesif_base_url = "https://api.moesif.net"
publish_interval = 5
event_queue_size = 10000
batch_size = 50
timer_wakeup_seconds = 3

# =============================================================================
# TRAFFIC LOGGING (consumer — enabling it activates the collector)
# =============================================================================
# Writes collected events (rich API/application/AI/latency metadata, plus
# request/response headers and — when the collector's request_body/response_body
# is enabled — payloads) to stdout as a JSON line. Useful for log-scraping pipelines such as
# Fluent Bit/Loki/ELK; no external SaaS needed.
#
# No policy required: enabling this section emits one stdout line for every
# request to every API — including requests an auth policy denied
# (short-circuited), which is otherwise invisible to any logging done from
# inside the policy chain. Honors the shared collector.ignore_path_prefixes.
[traffic_logging]
enabled = false
# Header names (case-insensitive) whose values are redacted as "****" in the
# logged requestHeaders/responseHeaders.
masked_headers = ["authorization", "x-api-key", "x-jwt-assertion"]
# Max bytes of request/response payload written to each log line (0 = no limit).
# Applied output-side, so the collector still captures full bodies and other
# consumers are unaffected.
max_payload_size = 0
# Each toggle only selects among what [collector] already captures — e.g.
# request_body here is a no-op while collector.request_body = false.
request_headers = false
request_body = false
response_headers = false
response_body = false

# Optional field projection over the emitted line: drop the named fields and
# keep everything else. Names are top-level keys (e.g. "latencies",
# "requestHeaders") or dotted paths of arbitrary depth into nested JSON objects
# (e.g. "requestHeaders.authorization"; header sub-keys match case-insensitively,
# every other path segment matches case-sensitively). A path that reaches past a
# string value (e.g. one dot too many into a single header, or into requestBody)
# is a no-op for that entry rather than an error.
# This only trims what the request_*/response_* toggles above already include —
# it is not a standalone switch. Setting only exclude_fields, with every
# request_*/response_* toggle left at its false default, still logs no headers
# or bodies at all.
exclude_fields = []
# exclude_fields = ["requestBody", "responseBody"]
# A multi-level path is useful when a properties entry below exposes a whole CEL
# map wholesale (e.g. `claims = "$ctx:auth.property"`, whose keys vary per token)
# instead of one flattened property per claim — reach into it to drop just one:
# exclude_fields = ["properties.claims.internal_debug"]

# Optional extra key->value pairs added under a top-level "properties" object.
# A value prefixed "$ctx:" is evaluated as a CEL expression against context
# built from the collected event; other values are literal strings.
#
# Available variables: request.path, request.method, request.id,
# request.header['<name>'] (lower-case keys), response.status,
# response.header['<name>'], api.id, api.name, api.version, api.context,
# api.kind, project.id, target.statusCode, target.destination,
# application.id/name/owner/keyType (populated only when an auth policy that
# stamps application identity, e.g. api-key-auth, actually ran).
# request.header/response.header are masked with the same masked_headers list
# above, so a property expression cannot re-expose a header (e.g.
# request.header['authorization']) that masked_headers already redacts.
#
# auth.* is also available — subject, type, issuer, credential_id, token_id,
# audience (list), scopes (list), property['<claim>'] (map), authenticated,
# authorized — populated generically (auth-type-agnostic) for ANY authenticated
# request by the collector system policy, independent of which auth policy
# (jwt-auth, opaque-token-auth, api-key-auth, etc.) ran. For an unauthenticated
# or denied request every auth.* variable resolves to its zero value rather
# than erroring, so `auth.subject != "" ? auth.subject : "anonymous"` is the
# recommended pattern for a property that should always resolve to something.
# This zero-value guarantee covers scalar variables only: indexing into a map
# or list variable (property['<claim>'], audience[0]) still raises a "no such
# key"/index-out-of-range evaluation error when the claim/index is absent, and
# the property is silently omitted from that line (logged at debug level). Use
# the `in` operator to guard any map/list index, e.g. `'tenant' in auth.property
# ? auth.property['tenant'] : ''`.
#
# metadata['<key>'] is also available — a generic map backed by SharedContext.Metadata,
# a bag ANY policy (including third-party/Python policies) can write an arbitrary
# key into for inter-policy communication. There is no fixed schema and, unlike
# masked_headers for captured headers, no masking config for this path: any value a
# policy writes to SharedContext.Metadata should be assumed visible here. Same
# zero-value rules as auth.* — metadata itself is always bound to an empty map, but
# indexing a specific key needs the same `in` guard shown above, e.g.
# `'applicationId' in metadata ? metadata['applicationId'] : ''`.
[traffic_logging.properties]
# env = "prod"
# apiName = "$ctx:api.name"
# status = "$ctx:response.status"
# subject = "$ctx:auth.subject != '' ? auth.subject : 'anonymous'"
# tenant = "$ctx:'tenant' in auth.property ? auth.property['tenant'] : ''"
# appId = "$ctx:'applicationId' in metadata ? metadata['applicationId'] : ''"


# =============================================================================
# POLICY CONFIGURATIONS
# =============================================================================

[policy_configurations.llm_cost_v1]
pricing_file = "/etc/policy-engine/llm-pricing/model_prices.json"

# =============================================================================
# IMMUTABLE GATEWAY CONFIGURATION
# =============================================================================

[immutable_gateway]
enabled = false
artifacts_dir = "/etc/api-platform-gateway/immutable_gateway/artifacts"

# =============================================================================
# MCP CONFIGURATION
# =============================================================================

[mcp]
# When true, restores the legacy behaviour of appending the "/mcp" resource path to the
# MCP backend upstream (i.e. "<context>/mcp" is forwarded to "<upstream>/mcp"). The
# default (false) forwards to exactly the configured upstream path. Enable this only if
# existing MCP API definitions rely on the "/mcp" suffix being appended to the backend.
append_resource_path_to_backend = false

# =============================================================================
# TRACING CONFIGURATION
# =============================================================================

[tracing]
enabled = false
endpoint = "otel-collector:4317"
insecure = true
service_version = "1.0.0"
batch_timeout = "1s"
max_export_batch_size = 512
sampling_rate = 1.0
