
# The collector is the shared data-capture pipeline. It must be enabled before any
# consumer (analytics, traffic_logging) can receive data.
[collector]
enabled = true
# Capture request/response payloads (bodies) into the collected event (full bodies;
# per-consumer size caps are applied on output).
send_request_body = true
send_response_body = true
# Capture ALL request/response headers (redacted on output by per-consumer masking).
send_request_headers = true
send_response_headers = true

# Analytics consumer (e.g. Moesif). Requires [collector].enabled = true.
[analytics]
enabled = false
enabled_publishers = ["moesif"]

# [analytics.publishers.moesif]
# application_id = "<MOESIF_APPLICATION_ID>"

# Traffic-logging consumer: writes each collected event to stdout as a JSON line
# (no external service needed). Requires [collector].enabled = true.
[traffic_logging]
enabled = true
# Header names (case-insensitive) whose values are redacted as "****".
masked_headers = ["authorization"]
# Max bytes of request/response payload written to each log line (0 = no limit).
max_payload_size = 2048
# Skip traffic-log lines for these path prefixes (e.g. health probes).
ignored_path_prefixes = ["/health", "/ready"]

[router]
gateway_host = "*"

[router.access_logs]
enabled = true

[controller.server]
gateway_id = "platform-gateway-id"

[policy_engine.logging]
level = "info"

[controller.logging]
level = "info"

[controller.controlplane]
insecure_skip_verify = true
gateway_name = "default"
apim_oauth2_client_id = "your-client-id"
apim_oauth2_client_secret = "your-client-secret"
# Option 2: Resource Owner Password Credentials Flow (OAuth2)
# apim_oauth2_username = "your-username"
# apim_oauth2_password = "your-password"

[controller.auth.basic]
enabled = true

[[controller.auth.basic.users]]
username = "admin"
password = "admin"
roles = ["admin"]

[policy_configurations.llm_cost_v1]
pricing_file = "/etc/policy-engine/llm-pricing/model_prices.json"

[immutable_gateway]
enabled = false
artifacts_dir = "/etc/api-platform-gateway/immutable_gateway/artifacts"

