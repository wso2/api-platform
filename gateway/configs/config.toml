[collector]
send_request_body = false
send_response_body = false
send_request_headers = false
send_response_headers = false

[analytics]
enabled = true
enabled_publishers = ["moesif"]

[analytics.publishers.moesif]
application_id = "<MOESIF_APPLICATION_ID>"

[traffic_logging]
enabled = false
masked_headers = ["authorization", "x-api-key", "x-jwt-assertion"]
max_payload_size = 2048

[router]
gateway_host = "*"

[router.access_logs]
enabled = true

[controller.server]
gateway_id = "platform-gateway-id"

[policy_engine.logging]
level = "info"

[controller.logging]
level = "info"

[controller.controlplane]
insecure_skip_verify = true
gateway_name = "default"
apim_oauth2_client_id = "your-client-id"
apim_oauth2_client_secret = "your-client-secret"
# Option 2: Resource Owner Password Credentials Flow (OAuth2)
# apim_oauth2_username = "your-username"
# apim_oauth2_password = "your-password"

[controller.auth.basic]
enabled = true

[[controller.auth.basic.users]]
username = "admin"
password = "admin"
roles = ["admin"]

[policy_configurations.llm_cost_v1]
pricing_file = "/etc/policy-engine/llm-pricing/model_prices.json"

[immutable_gateway]
enabled = false
artifacts_dir = "/etc/api-platform-gateway/immutable_gateway/artifacts"

