name: wso2_apip_sys_analytics
version: v1.0.0
description: |
  Collects analytics data from request and response flows. This gets attached even
  without any policies in the chain. Inspects headers and, optionally, bodies to
  populate analytics metadata that is emitted via Envoy dynamic metadata and consumed
  by the policy engine analytics pipeline and publishers.

parameters:
  type: object
  additionalProperties: false
  properties:
    request_body:
      type: boolean
      default: false
      description: >
        When true, the analytics system policy will capture the request body
        into analytics metadata as request_payload, which is then forwarded
        through the analytics pipeline (including publishers like Moesif).
    response_body:
      type: boolean
      default: false
      description: >
        When true, the analytics system policy will capture the response body
        into analytics metadata as response_payload, for both buffered and
        streaming responses, which is then forwarded through the analytics
        pipeline (including publishers like Moesif).
    request_headers:
      type: boolean
      default: false
      description: >
        When true, the analytics system policy captures ALL request headers
        into analytics metadata as request_headers, which is forwarded through
        the analytics pipeline (including the stdout/log and Moesif publishers).
        Sensitive values are not masked here; the log publisher's masked_headers
        setting redacts them on output.
    response_headers:
      type: boolean
      default: false
      description: >
        When true, the analytics system policy captures ALL response headers
        into analytics metadata as response_headers, which is forwarded through
        the analytics pipeline (including the stdout/log and Moesif publishers).
    allow_payloads:
      type: boolean
      default: false
      description: >
        Deprecated: use request_body and response_body instead.
        When true, and when request_body and response_body are not
        explicitly set, the analytics system policy behaves as if both
        request_body and response_body are true, capturing request
        and response bodies into analytics metadata as request_payload and
        response_payload, which are then forwarded through the analytics
        pipeline (including publishers like Moesif). When false, payloads are
        not captured unless controlled by the newer flags.

systemParameters:
  type: object
  properties: {}
