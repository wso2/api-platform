name: wso2_apip_sys_analytics
version: v1.0.0
description: |
  Collects request and response analytics metadata from gateway traffic,
  including optional payload capture, for the policy engine analytics pipeline
  and publishers.

parameters:
  type: object
  additionalProperties: false
  properties:
    allow_payloads:
      type: boolean
      default: false
      description: >
        When true, the analytics system policy will capture request and response
        bodies into analytics metadata as request_payload and response_payload,
        which are then forwarded through the analytics pipeline (including
        publishers like Moesif). When false, payloads are not captured.

systemParameters:
  type: object
  properties: {}
