# A ManagedSecret pushes a secret into the gateway-controller secret store.
# Use either an inline value (good for demos) or valueFrom (recommended for
# production: keeps the plaintext in a Kubernetes Secret).
apiVersion: gateway.api-platform.wso2.com/v1
kind: ManagedSecret
metadata:
  name: openai-api-key
spec:
  displayName: openai-api-key
  description: API key used by upstream LLM providers
  value:
    valueFrom:
        name: openai-credentials
        key: api-key
---
# Companion Kubernetes Secret. The operator reads this when reconciling
# the ManagedSecret above and forwards the plaintext to the gateway-controller
# /secrets endpoint.
apiVersion: v1
kind: Secret
metadata:
  name: openai-credentials
type: Opaque
stringData:
  api-key: sk-replace-me-with-real-value
