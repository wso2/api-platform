apiVersion: gateway.api-platform.wso2.com/v1alpha1
kind: RestApi
metadata:
  name: petstore-api-v1.0
  annotations:
    gateway.api-platform.wso2.com/project-id: 019d953f-d386-7a64-aa92-1869a28292e0
spec:
  displayName: PetStore API test
  version: v1.0
  context: /petstoretest
  upstream:
    main:
      url: http://petstore.swagger.io/v2
  policies:
    - name: api-key-auth
      version: v1
      params:
        key: X-API-Key
        in: header
    - name: set-headers
      version: v1
      params:
        request:
          headers:
            - name: X-Client-Version
              value: "1.2.3"
  operations:
    - method: GET
      path: /pet/{petId}
    - method: POST
      path: /pet
    - method: PUT
      path: /pet
    - method: DELETE
      path: /pet/{petId}
    - method: GET
      path: /store/inventory
    - method: POST
      path: /store/order
