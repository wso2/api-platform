# HTTPBin echo API — debug aid.
#
# httpbin.org/anything echoes the full request back as JSON: url, method,
# headers, body, query params. That makes it ideal for verifying exactly
# what the gateway forwards upstream — header injections, host rewrites,
# path stripping, body transforms — without running a local backend.
#
# Used by the `gateway-debug` agent skill to reproduce issues with
# minimal moving parts.

apiVersion: gateway.api-platform.wso2.com/v1alpha1
kind: RestApi
metadata:
  name: httpbin-echo-v1
spec:
  displayName: HTTPBin Echo
  version: v1
  context: /httpbin
  upstream:
    main:
      url: https://httpbin.org
  policies:
    - name: set-headers
      version: v1
      params:
        request:
          headers:
            - name: X-Gateway-Marker
              value: "ap-gateway"
  operations:
    - method: GET
      path: /anything
    - method: POST
      path: /anything
    - method: PUT
      path: /anything
    - method: DELETE
      path: /anything
