# --------------------------------------------------------------------
# Mistral LLM Provider Configuration
#
# Uses the built-in `mistralai` template and points to the public
# Mistral API endpoint. Replace the placeholder with a real Mistral key.
#
# The openai-to-mistral policy on the proxy layer translates
# OpenAI-format requests into Mistral's wire format (path
# /v1/chat/completions, model override, drop unsupported fields).
#
# Auth: upstream.auth is the gateway -> Mistral vendor auth. Proxies in
# front of this provider inherit this vendor auth automatically.
# --------------------------------------------------------------------

apiVersion: gateway.api-platform.wso2.com/v1
kind: LlmProvider
metadata:
  name: mistral-provider
spec:
  displayName: Mistral Provider
  version: v1.0
  template: mistralai
  upstream:
    url: https://api.mistral.ai
    auth:
      type: api-key
      header: Authorization
      value: Bearer REPLACE_WITH_MISTRAL_API_KEY
  policies:
    - name: api-key-auth
      version: v1
      paths:
        - path: /v1/chat/completions
          methods: [POST]
          params:
            key: X-API-Key
            in: header
        - path: /v1/embeddings
          methods: [POST]
          params:
            key: X-API-Key
            in: header
        - path: /v1/models
          methods: [GET]
          params:
            key: X-API-Key
            in: header
  accessControl:
    mode: deny_all
    exceptions:
      - path: /v1/chat/completions
        methods: [POST]
      - path: /v1/embeddings
        methods: [POST]
      - path: /v1/models
        methods: [GET]

# The proxy in front of this provider authenticates over the internal loopback
# route with an API key issued for this LlmProvider. Create one as shown in
# api-key.yaml, then set the issued value as the proxy's provider.auth.value.
