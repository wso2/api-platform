# A Certificate uploads a PEM-encoded TLS certificate to the gateway. The
# gateway-controller assigns a UUID id on first upload that the operator
# persists to .status.id; the CR then becomes immutable on the gateway side.
apiVersion: gateway.api-platform.wso2.com/v1alpha1
kind: Certificate
metadata:
  name: example-upstream-ca
spec:
  displayName: example-upstream-ca
  certificate:
    valueFrom:
        name: example-upstream-ca-pem
        key: ca.crt
---
apiVersion: v1
kind: Secret
metadata:
  name: example-upstream-ca-pem
type: Opaque
stringData:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    MIIDXTCCAkWgAwIBAgIJAKL0UG+mRKtjMA0GCSqGSIb3DQEBCwUAMEUxCzAJBgNV
    REPLACE-WITH-A-REAL-PEM-BUNDLE
    -----END CERTIFICATE-----
