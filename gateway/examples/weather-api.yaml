apiVersion: gateway.api-platform.wso2.com/v1alpha1
kind: RestApi
metadata:
  name: weather-api-v1.0
spec:
  displayName: Weather-API
  version: v1.0
  context: /weather/$version
  upstream:
    main:
      url: "http://httpbin.org/api/v2"
  policies:
    - name: set-headers
      version: v0
      params:
        request:
          headers:
            - name: api-level-req-header
              value: hello
        response:
          headers:
            - name: api-level-res-header
              value: world
            - name: x-content-type-options
              value: nosniff
  operations:
    - method: GET
      path: /{country_code}/{city}
      policies:
        - name: modify-headers
          version: v0
          params:
            request:
              headers:
                - name: operation-level-req-header
                  value: hello
            response:
              headers:
                - name: operation-level-res-header
                  value: world
    - method: GET
      path: /alerts/active
    - method: POST
      path: /alerts/active
      policies:
        - name: respond
          version: v0
          params:
            statusCode: 201
            body: '{"message": "Active weather alert created successfully."}'
            headers:
              - name: Content-Type
                value: application/json
