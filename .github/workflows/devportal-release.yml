name: Developer Portal Release

on:
  workflow_dispatch:
    inputs:
      platform_api_version:
        description: 'Platform API version to bundle (e.g. 0.13.0). If empty, uses platform-api/VERSION. When set, configs and db-scripts are fetched from tag platform-api/v<version> and docker-compose is pinned to it.'
        required: true
        type: string
        default: ''
      ai_workspace_version:
        description: 'AI Workspace version to pin for the optional "with-ai-workspace" Compose profile (e.g. 1.0.0). Need not be released yet — the image tag is pinned regardless, and its config template is taken from tag portals/ai-workspace/v<version> if that tag exists, otherwise from the working tree.'
        required: true
        type: string
        default: ''

env:
  DOCKER_REGISTRY: ghcr.io/${{ github.repository_owner }}/api-platform
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Docker registry (lowercase owner)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "DOCKER_REGISTRY=ghcr.io/${OWNER}/api-platform" >> $GITHUB_ENV

      - name: Determine version from VERSION file
        id: version
        run: |
          VERSION=$(make -C portals/developer-portal version-get-release --no-print-directory)
          echo "Releasing developer-portal version: ${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Validate release tag is available
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if git ls-remote --exit-code --tags origin "refs/tags/developer-portal/v${VERSION}" >/dev/null 2>&1; then
            echo "Release tag developer-portal/v${VERSION} already exists"
            exit 1
          fi

      - name: Set version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          make -C portals/developer-portal version-set VERSION=${VERSION}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build Docker image for testing
        run: make -C portals/developer-portal build

      - name: Run tests
        env:
          # The IT compose files read ${PLATFORM_API_IMAGE}, defaulting to the
          # working tree's SNAPSHOT tag. Point them at the released image being
          # bundled so the tests exercise the same version the zip pins.
          PLATFORM_API_IMAGE: ${{ env.DOCKER_REGISTRY }}/platform-api:${{ inputs.platform_api_version }}
        run: |
          echo "Running integration tests against ${PLATFORM_API_IMAGE}"
          make test-devportal

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.API_PLATFORM_BOT_TOKEN }}

      - name: Build and push multi arch Docker image
        run: make build-and-push-devportal-multiarch

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            git commit -am "Release developer-portal version ${{ steps.version.outputs.version }}"
          fi
          git tag -a developer-portal/v${{ steps.version.outputs.version }} -m "Developer Portal ${{ steps.version.outputs.version }}"
          git push origin developer-portal/v${{ steps.version.outputs.version }}

      - name: Build distribution zip
        env:
          PLATFORM_API_VERSION: ${{ inputs.platform_api_version }}
          AIW_VERSION: ${{ inputs.ai_workspace_version }}
        run: |
          echo "Bundling platform-api configs and db-scripts from tag platform-api/v${PLATFORM_API_VERSION}"
          echo "Pinning optional ai-workspace image to ${AIW_VERSION}"
          make -C portals/developer-portal dist \
            PLATFORM_API_VERSION="${PLATFORM_API_VERSION}" \
            AIW_VERSION="${AIW_VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: developer-portal/v${{ steps.version.outputs.version }}
          name: Developer Portal ${{ steps.version.outputs.version }}
          body: |
            ## Developer Portal Release ${{ steps.version.outputs.version }}

            ### Docker Image
            ```bash
            docker pull ${{ env.DOCKER_REGISTRY }}/developer-portal:${{ steps.version.outputs.version }}
            ```

            ### Supported Platforms
            - `linux/amd64`
            - `linux/arm64`

            ### Distribution
            The attached `wso2apip-developer-portal-${{ steps.version.outputs.version }}.zip` contains the
            standalone Developer Portal + Platform API distribution (docker-compose and configs).
          files: portals/developer-portal/target/wso2apip-developer-portal-${{ steps.version.outputs.version }}.zip
          draft: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          token: ${{ secrets.API_PLATFORM_BOT_TOKEN }}

      - name: Bump to next dev version
        run: make -C portals/developer-portal version-bump-next-dev

      - name: Commit version bump
        run: |
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            git commit -am "Bump developer-portal to next dev version"
          else
            echo "No changes to commit"
          fi

      - name: Create PR for version bump
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Bump developer-portal to next dev version"
          title: "chore: Bump developer-portal to next dev version"
          body: |
            Automated version bump after release `developer-portal/v${{ steps.version.outputs.version }}`

            This PR bumps the developer-portal version to the next development version.
          branch: version-bump-${{ github.run_id }}
          base: main
          delete-branch: true
          assignees: lasanthaS
          labels: |
            automated
            version-bump
