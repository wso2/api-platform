name: Developer Portal Release

on:
  workflow_dispatch:

env:
  DOCKER_REGISTRY: ghcr.io/${{ github.repository_owner }}/api-platform

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version from VERSION file
        id: version
        run: |
          VERSION=$(make -C portals/developer-portal version-get-release --no-print-directory)
          echo "Releasing developer-portal version: ${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Validate release tag is available
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if git ls-remote --exit-code --tags origin "refs/tags/developer-portal/v${VERSION}" >/dev/null 2>&1; then
            echo "Release tag developer-portal/v${VERSION} already exists"
            exit 1
          fi

      - name: Set version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          make -C portals/developer-portal version-set VERSION=${VERSION}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Run tests
        run: make test-devportal

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.API_PLATFORM_BOT_TOKEN }}

      - name: Build and push multi arch Docker image
        run: make build-and-push-devportal-multiarch

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            git commit -am "Release developer-portal version ${{ steps.version.outputs.version }}"
          fi
          git tag -a developer-portal/v${{ steps.version.outputs.version }} -m "Developer Portal ${{ steps.version.outputs.version }}"
          git push origin developer-portal/v${{ steps.version.outputs.version }}

      - name: Bump to next dev version
        run: make -C portals/developer-portal version-bump-next-dev

      - name: Commit version bump
        run: |
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            git commit -am "Bump developer-portal to next dev version"
          else
            echo "No changes to commit"
          fi

      - name: Create PR for version bump
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Bump developer-portal to next dev version"
          title: "chore: Bump developer-portal to next dev version"
          body: |
            Automated version bump after release `developer-portal/v${{ steps.version.outputs.version }}`

            This PR bumps the developer-portal version to the next development version.
          branch: version-bump-${{ github.run_id }}
          base: main
          delete-branch: true
          assignees: lasanthaS
          labels: |
            automated
            version-bump
