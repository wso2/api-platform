name: Platform API PR Check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'platform-api/**'
      - '.github/workflows/platform-api-pr-check.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache-dependency-path: '**/go.sum'

      - name: Go build
        run: go build ./cmd/main.go
        working-directory: platform-api/src

      - name: Run tests
        run: make test
        working-directory: platform-api

  pr-check-sqlserver:
    runs-on: ubuntu-24.04
    env:
      DATABASE_DRIVER: sqlserver
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 1433
      DATABASE_NAME: platform_api
      DATABASE_USER: sa
      DATABASE_SSL_MODE: disable
      DB_SCHEMA_PATH: ./internal/database/schema.sql
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache-dependency-path: '**/go.sum'

      - name: Start SQL Server and create database
        run: |
          set -euo pipefail

          # Generate the SA password at runtime instead of using a committed
          # literal or a stored secret. A runtime value avoids secret-scanner
          # false positives and the secret-handling pitfalls (e.g. a stray
          # trailing newline) that silently fail SQL Server's password policy at
          # container init. The value satisfies SQL Server complexity
          # (uppercase + lowercase + digits) and contains no shell-special
          # characters, so it survives every quoting layer intact.
          SA_PASSWORD="Aa1$(openssl rand -hex 16)"
          echo "::add-mask::$SA_PASSWORD"
          echo "DATABASE_PASSWORD=$SA_PASSWORD" >> "$GITHUB_ENV"

          docker run -d --name sqlserver \
            -e ACCEPT_EULA=Y \
            -e MSSQL_PID=Developer \
            -e MSSQL_SA_PASSWORD="$SA_PASSWORD" \
            -p 1433:1433 \
            mcr.microsoft.com/mssql/server:2022-latest

          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl -fsSL https://packages.microsoft.com/config/ubuntu/24.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list >/dev/null
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y --no-install-recommends mssql-tools18

          for i in {1..60}; do
            if /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "$SA_PASSWORD" -Q "SELECT 1" >/dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "SQL Server did not become ready in time"
              docker logs sqlserver || true
              exit 1
            fi
            sleep 2
          done

          /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "$SA_PASSWORD" \
            -Q "IF DB_ID('platform_api') IS NULL CREATE DATABASE [platform_api]"

      - name: Build with SQL Server configuration
        run: go build ./cmd/main.go
        working-directory: platform-api/src

      - name: Run tests with SQL Server driver configuration
        run: make test
        working-directory: platform-api
