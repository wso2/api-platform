name: AI Workspace PR Check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'portals/ai-workspace/**'
      - '.github/workflows/ai-workspace-pr-check.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-check:
    runs-on: ubuntu-24.04
    env:
      AUTH_JWT_SECRET_KEY: ai-workspace-pr-check-secret-key
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Build AI Workspace image
        run: make build
        working-directory: portals/ai-workspace

      - name: Run AI Workspace E2E suite
        run: make test-ai-workspace
