name: SDK Core Release

on:
  # Auto-release on merge to main is disabled — releasing SDK Core is manual-only
  # to prevent an unintended version bump/tag on every merge that touches sdk/core/**.
  # Trigger a release via Actions → "Run workflow" with an explicit version.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.3.10). Required for manual trigger.'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        env:
          # Pass the untrusted input via env — never interpolate it into the shell script body.
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger - use provided version (read from env, remove leading 'v' if present)
            VERSION="${INPUT_VERSION#v}"
            # Validate strict semantic version (MAJOR.MINOR.PATCH) before it reaches any tag/push command
            if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Error: provided version is not a valid semantic version (expected MAJOR.MINOR.PATCH, e.g. 0.3.10)"
              exit 1
            fi
            echo "Using manually provided version: ${VERSION}"
          else
            # Push trigger (PR merge) - auto-increment patch version
            # Get the latest SDK Core tag
            LATEST_TAG=$(git tag -l "sdk/core/v*" | sort -V | tail -n 1)
            if [ -z "$LATEST_TAG" ]; then
              # No existing tags, start with 0.0.1
              VERSION="0.0.1"
              echo "No existing SDK Core tags found, starting with version: ${VERSION}"
            else
              # Extract version from tag (remove sdk/core/v prefix)
              CURRENT_VERSION="${LATEST_TAG#sdk/core/v}"
              echo "Latest SDK Core tag: ${LATEST_TAG} (version: ${CURRENT_VERSION})"

              # Parse major.minor.patch
              MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
              MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
              PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

              # Increment patch version
              NEW_PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
              echo "Auto-incremented patch version: ${VERSION}"
            fi
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Validate tag does not exist
        run: |
          SDK_CORE_TAG="sdk/core/v${{ steps.version.outputs.version }}"
          if git rev-parse "$SDK_CORE_TAG" >/dev/null 2>&1; then
            echo "Error: Tag $SDK_CORE_TAG already exists!"
            exit 1
          fi
          echo "Tag $SDK_CORE_TAG does not exist, proceeding with release"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "sdk/core/v${{ steps.version.outputs.version }}" -m "SDK Core ${{ steps.version.outputs.version }}"
          git push origin "sdk/core/v${{ steps.version.outputs.version }}"
