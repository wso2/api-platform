name: SDK Core Release

on:
  push:
    branches:
      - main
    paths:
      - 'sdk/core/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.5.3). Required for manual trigger.'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
            echo "Using manually provided version: ${VERSION}"
          else
            LATEST_TAG=$(git tag -l "sdk/core/v*" | sort -V | tail -n 1)
            if [ -z "$LATEST_TAG" ]; then
              VERSION="0.0.1"
              echo "No existing sdk/core tags found, starting with version: ${VERSION}"
            else
              CURRENT_VERSION="${LATEST_TAG#sdk/core/v}"
              echo "Latest sdk/core tag: ${LATEST_TAG} (version: ${CURRENT_VERSION})"
              MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
              MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
              PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
              NEW_PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
              echo "Auto-incremented patch version: ${VERSION}"
            fi
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Validate tag does not exist
        run: |
          TAG_NAME="sdk/core/v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Error: Tag $TAG_NAME already exists!"
            exit 1
          fi
          echo "Tag $TAG_NAME does not exist, proceeding with release"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "sdk/core/v${{ steps.version.outputs.version }}" -m "SDK Core ${{ steps.version.outputs.version }}"
          git push origin "sdk/core/v${{ steps.version.outputs.version }}"
